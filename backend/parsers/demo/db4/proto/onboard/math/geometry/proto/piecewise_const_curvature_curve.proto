
syntax = "proto2";
package snoah;

import "onboard/math/geometry/proto/arc2d.proto";
import "onboard/math/geometry/proto/affine_transformation.proto";

message ConstCurvatureCurveProto {
  optional bool is_straight = 1;
  optional bool arc_inversed = 2;

  optional Vec2dProto segment_start = 3;
  optional Vec2dProto segment_end = 4;

  optional Arc2dHRProto arc_hr = 5;
  optional Arc2dARProto arc_ar = 6;
}

message PiecewiseConstCurvatureCurveProto {
  repeated ConstCurvatureCurveProto curves = 1;
}
