    AFTERSALES_CAMERA_CALIBRATION_SUCCEED = 0x00;
    AFTERSALES_CAMERA_INIT_FAILED = 0x01;
    AFTERSALES_CAMERA_CALIBRATION_WRITE_FAILED = 0x02;
    AFTERSALES_CAMERA_CALIBRATION_CONFIG_FAILED = 0x03;

    AFTERSALES_CAMERA_INSTALLATION_ERROR = 0x04;
    AFTERSALES_CAMERA_INVALID_CALIBRATION = 0x05;
    AFTERSALES_CAMERA_INVALID_CALIB_SCENE = 0x06;

    AFTERSALES_CAMERA_NO_LANELINE_OR_UNCLEAR_LANELINE = 0x07;
    AFTERSALES_CAMERA_POSE_INVALID = 0x08;
    AFTERSALES_CAMERA_INTRINSIC_READ_FAILED = 0x09;
    AFTERSALES_CAMEAR_CALIBRATION_START_FAILED = 0x0A;

    AFTERSALES_CAMERA_CALIBRATION_RUNNING = 0xFE;
    AFTERSALES_CAMERA_OVER_TIME_LIMIT = 0xFF;
  }
  optional SingleCameraResponse calib_response = 1;
  optional CameraId camera_id = 2;
}

message LiCalibrationResponseProto {
  optional LiteHeader header = 1;
  optional LiCalibrationRoutine routine = 2;
  optional FactoryFrontRearResponse front_rear_response = 3;
  optional FactoryFrontTeleResponse front_tele_response = 4;
  optional FactorySurroundingResponse surrouding_response = 5;
  optional FactoryLidarResponse lidar_response = 6;
  optional FactoryFisheyeResponse fisheye_response = 7;
  optional int32 calibration_rate = 9;  // [0~100]
