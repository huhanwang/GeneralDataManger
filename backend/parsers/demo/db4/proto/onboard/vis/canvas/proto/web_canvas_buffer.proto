syntax = "proto2";

package snoah;

import "onboard/vis/canvas/proto/canvas_buffer.proto";
import "onboard/math/geometry/proto/affine_transformation.proto";

// Use sint32 to store 2D coordinates in millimeters.
message WvCoord2iProto {
  optional sint32 x = 1;
  optional sint32 y = 2;
}

// Use sint32 to store 3D coordinates in millimeters.
message WvCoord3iProto {
  optional sint32 x = 1;
  optional sint32 y = 2;
  optional sint32 z = 3;
}

// TODO(tiancheng): replace Vec2iProto/Vec3iProto with
// WvCoord2iProto/WvCoord3iProto in code below.
//  A single point. Store millimeter smooth coordinates as Vec3iProto.
message WvPointProto {
  optional vis.BorderStyleProto border_style = 1;
  optional Vec3iProto pos = 2;
  optional int64 point_size = 3;
}

// A line segment. Store millimeter smooth coordinates as Vec3iProto.
message WvLineProto {
  optional vis.BorderStyleProto border_style = 1;
  optional Vec3iProto start = 2;
  optional Vec3iProto end = 3;
}

// A polyline. Store millimeter smooth coordinates as Vec3iProto.
message WvLineStripProto {
  optional vis.BorderStyleProto border_style = 1;
  repeated Vec3iProto vertices = 2;
}

// A polygon. Store millimeter smooth coordinates as Vec3iProto.
message WvPolygonProto {
  optional vis.BorderStyleProto border_style = 1;
  optional vis.FillStyleProto fill_style = 2;
  repeated Vec3iProto vertices = 3;
}

// A triangle strip. Store millimeter smooth coordinates as Vec3iProto.
message WvTriangleStripProto {
  optional vis.BorderStyleProto border_style = 1;
  optional vis.FillStyleProto fill_style = 2;
  repeated Vec3iProto vertices = 3;
}

message WvPlannerExternalStatusProto {
  optional string header = 1;
  optional string status = 2;
  optional bool highlight = 3;
}

// Draw call, compressed by int-millimeter coordinates. Graphics primitives
// only.
message WvDrawCallProto {
  oneof Primitive {
    WvPointProto point = 1;
    WvLineProto line = 2;
    WvLineStripProto line_strip = 3;
    WvPolygonProto polygon = 6;
    vis.TextProto text = 7;
    vis.PointsProto points = 8;
    vis.ImageProto image = 9;
    WvTriangleStripProto triangle_strip = 10;
    vis.LineStripProto double_line_strip = 11;
    vis.PolygonProto double_polygon = 12;
    vis.TextProto screen_text = 13;
    vis.PointsWithBaseProto points_with_base = 14;
  }
}

message WvHover {
  message Contour {
    repeated WvCoord2iProto points = 1;
  }
  message CenterRadius {
    optional WvCoord2iProto center = 1;
    optional sint32 radius = 2;
  }
  oneof MouseRegion {
    Contour contour = 1;
    CenterRadius center_radius = 2;
  }
  repeated WvDrawCallProto draw_call = 3;
  repeated vis.TextProto screen_text = 4;
}

// Canvas buffer for web vantage, representing all results generated by
// canvas_base.
message WvCanvasBufferProto {
  optional string name = 1;
  repeated WvDrawCallProto draw_call = 2;
  repeated vis.TextProto screen_text = 3;
  repeated WvPlannerExternalStatusProto planner_external_status = 4;
  repeated WvHover hover_info = 5;
}

message WvCanvasBuffersProto {
  repeated WvCanvasBufferProto buffers = 2;
}