syntax = "proto2";
package snoah.lidar_process.lidar;
option go_package = "qcraft-proto.ai/onboard/perception/lidar_process/lidar/object_filter_bank/proto/filter_bank_config";

message FilterBankConfig {
  repeated string filter_name = 1;
  optional double delete_bg_semantic_th = 2 [default = 0.1];
  optional double delete_bg_geometry_th = 3 [default = 0.1];
  optional double delete_bg_time_seq_th = 4 [default = 0.1];
  optional bool delete_bg = 5 [default = false];
  optional double delete_fg_semantic_th = 6 [default = 0.1];
  optional double delete_fg_geometry_th = 7 [default = 0.1];
  optional double delete_fg_time_seq_th = 8 [default = 0.1];
  optional bool delete_fg = 9 [default = false];
  optional bool is_split_objects = 10 [default = true];
  optional bool use_bg_track = 11 [default = true];
}