syntax = "proto2";
package snoah.lidar_process.lidar;
option go_package = "qcraft-proto.ai/onboard/perception/lidar_process/lidar/object_filter_bank/proto/track_filter_bank_config";

message FilterConfig {
  optional string filter_name = 1;
  optional double delete_fg_th = 2 [default = 1.0];
  optional double delete_bg_th = 3 [default = 1.0];
}
message TrackFilterBankConfig {
  repeated FilterConfig filter_names = 1;
  optional bool is_split_objects = 2 [default = true];
  optional bool use_bg_track = 3 [default = true];
  optional float geo_filter_second_th = 4 [default = 1.0];
  optional float fg_velocity = 5 [default = 0.1];
  optional bool use_spliter_post_tracker = 6 [default = false];
}