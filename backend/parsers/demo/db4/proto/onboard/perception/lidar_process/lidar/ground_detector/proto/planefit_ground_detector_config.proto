syntax = "proto2";
package snoah.lidar_process.lidar;
option go_package = "qcraft-proto.ai/onboard/perception/lidar_process/lidar/ground_detector/proto/planefit_ground_detector_config";

message PlanefitGroundDetectorConfig {
  optional float min_x = 1 [default = 0.0];
  optional float max_x = 2 [default = 120.0];
  optional float min_y = 3 [default = -20.0];
  optional float max_y = 4 [default = 20.0];
  // optional float range = 4 [default = 60.0];
  optional float resolution_x = 5 [default = 10.0];
  optional float resolution_y = 6 [default = 10.0];
  optional string fit_name = 7 [default = "RansacFit"];
  optional string seed_name = 8 [default = "PriorGroundSeed"];
  optional string optimize_name = 9 [default = "GlobalGroundOptimize"];
  optional float seed_grid_length = 10 [default = 0.4];
  optional uint32 nr_min_samples = 11 [default = 32];
  optional float inner_ratio = 12 [default = 0.99];
  optional float inner_dist_normal = 13 [default = 0.03];
  optional uint32 nr_ransac_iter = 14 [default = 32];
  optional float max_ground_pitch = 15 [default = 30.0];
  optional float ground_threshold = 16 [default = 0.25];
  optional float sample_resolution = 17 [default = 1.0];
  optional uint32 optimize_neighbor_radius = 18 [default = 3];
  optional float max_orientation_dist = 19 [default = 10.0];
  optional float max_z_dist_normal = 20 [default = 0.12];
  optional float seed_min_x = 21 [default = 0.0];
  optional float seed_max_x = 22 [default = 50.0];
  optional float seed_min_y = 23 [default = -10.0];
  optional float seed_max_y = 24 [default = 10.0];
  optional float conflict_ratio_th = 25 [default = 0.2];
  optional float min_theta_threshold = 26 [default = 10.0];
  optional float min_area_threshold = 27 [default = 1.5];
  optional float min_conf_threshold = 28 [default = 0.2];
  optional float valid_subgrid_threshold = 29 [default = 0.25];
  optional float x_exp_function_base = 30 [default = 0.90];
  optional float y_exp_function_base = 31 [default = 0.675];
  optional uint32 min_intensity = 32 [default = 1];
  optional uint32 valid_plane_cnt_th = 33 [default = 3];
  optional float rainy_trust_min_x = 34 [default = 0.0];
  optional float rainy_trust_max_x = 35 [default = 20.0];
  optional float rainy_trust_min_y = 36 [default = -3.0];
  optional float rainy_trust_max_y = 37 [default = 3.0];
  optional float seed_max_z_diff_normal = 38 [default = 0.05];
  optional float seed_max_z_diff_rainy = 39 [default = 0.05];
  optional float inner_dist_rainy = 40 [default = 0.045];
  optional float rainy_inner_ratio_decay = 41 [default = 0.0];
  optional float max_z_dist_rainy = 42 [default = 0.18];
  optional float far_min_x = 43 [default = 40.0];
  optional float far_max_x = 44 [default = 120.0];
  optional float far_min_y = 45 [default = -8.0];
  optional float far_max_y = 46 [default = 8.0];
  optional float max_orientation_dist_roll = 47 [default = 3.0];
}