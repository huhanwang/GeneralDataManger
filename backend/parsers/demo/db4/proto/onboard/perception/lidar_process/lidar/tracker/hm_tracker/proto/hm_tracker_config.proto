syntax = "proto2";
package snoah.lidar_process.lidar;
option go_package = "qcraft-proto.ai/onboard/perception/lidar_process/lidar/tracker/hm_tracker/proto/hm_tracker_config";

message ObjectTypeCostConfig {
  optional string type_first = 1 [default = ""];
  optional string type_second = 2 [default = ""];
  optional float adjust_range_th = 3 [default = 4.0];
  optional float adjust_factor = 4 [default = 1.0];
}

message GatesConfig {
  enum GateType {
    EUCLIDEAN_DIST = 0;
  }

  message GateParamConfig {
    optional GateType gate_type = 1;
    repeated float gate_thresholds = 2;
  }

  repeated GateParamConfig gate_params = 1;
}

message ObjectTrackMatcherConfig {
  optional float max_match_dist = 1 [default = 4.0];
  optional float bg_weight_location_dist = 2 [default = 0];
  optional float bg_weight_direction_dist = 3 [default = 0];
  optional float bg_weight_bbox_size_dist = 4 [default = 0];
  optional float bg_weight_point_num_dist = 5 [default = 0];
  optional float bg_weight_histogram_dist = 6 [default = 0];
  optional float bg_weight_centroid_shift_dist = 7 [default = 0.2];
  optional float bg_weight_bbox_iou_dist = 8 [default = 0.8];
  optional float bg_weight_type_dist = 9 [default = 0.1];
  optional float bg_background_object_match_threshold = 10 [default = 4.0];

  optional float fg_weight_location_dist = 11 [default = 0.6];
  optional float fg_weight_direction_dist = 12 [default = 0.2];
  optional float fg_weight_bbox_size_dist = 13 [default = 0.1];
  optional float fg_weight_point_num_dist = 14 [default = 0.1];
  optional float fg_weight_histogram_dist = 15 [default = 0.5];
  optional float fg_weight_centroid_shift_dist = 16 [default = 0];
  optional float fg_weight_bbox_iou_dist = 17 [default = 0];
  optional float fg_weight_type_dist = 18 [default = 0.1];
  optional float bound_value = 19 [default = 100.0];
  optional float cascade_gnn_max_match_dist = 20 [default = 0.6];
  repeated ObjectTypeCostConfig object_type_cost_list = 21;
  optional float dist_cost_adjust_start_time = 22 [default = 1.5];
  optional float dist_cost_bytime_factor = 23 [default = 1.0];
  optional float dist_cost_factor_in_crowded_area = 24 [default = 1.0];
  optional int32 dist_cost_adjust_point_num_th = 25 [default = 10];
  optional float dist_cost_adjust_point_num_dist_factor = 26 [default = 10.0];
  optional float dist_cost_adjust_point_num_dist_th = 27 [default = 0.9];
}

message KalmanFilterConfig {
  optional float noise_maximum = 1 [default = 0.1];

  optional bool use_adaptive = 2 [default = false];

  optional float centroid_measurement_noise = 3 [default = 0.4];
  optional float centroid_init_velocity_variance = 4 [default = 5.0];
  optional float propagation_variance_xy = 5 [default = 10.0];
  optional float propagation_variance_z = 6 [default = 10.0];

  optional bool use_convergence_boostup = 7 [default = false];
  optional int32 boostup_history_size_minimum = 8 [default = 3];
  optional float converged_confidence_minimum = 9 [default = 0.9];

  optional bool use_complete_box_for_measured_velocity = 10 [default = true];
  optional float complete_box_heading_diff_deg_thres = 11 [default = 5.0];
  optional float complete_box_area_diff_ratio_thres = 12 [default = 0.05];
  optional float complete_box_center_move_diff_thres = 13 [default = 0.2];
  optional bool check_complete_box_type_stablility = 14 [default = true];
  optional float ped_propagation_variance_xy = 15 [default = 2.5];
  optional float ped_propagation_variance_z = 16 [default = 2.5];
}

message TrackerConfig {
  optional string filter_name = 1 [default = "KalmanFilter"];
  optional bool separate_fore_background = 2 [default = false];
}

message HmMultiTargetTrackerConfig {
  optional string filter_method = 1 [default = "KalmanFilter"];
  optional string foreground_mathcer_method = 2
      [default = "MultiHmBipartiteGraphMatcher"];
  optional string background_matcher_method = 3
      [default = "GnnBipartiteGraphMatcher"];
  optional bool use_histogram_for_match = 4 [default = true];
  optional float histogram_bin_size = 5 [default = 10];
  optional bool use_recover = 6 [default = false];
  optional int32 recover_times = 7 [default = 2];
  optional bool use_trace_layer_filler = 8 [default = false];
}

message MultiFgRecoverConfig {
  optional double forward_distance = 1 [default = 60.0];
  optional double lateral_distance = 2 [default = 3.0];
  optional double pc_height_thresh = 3 [default = 1.5];
  optional double match_score_thresh = 4 [default = 0.0];
  optional double matrix_nonzero_cnt_thresh = 5 [default = 1.0];
  optional double vehicle_expand_range = 6 [default = 0.25];
  optional double pedestrain_expand_range = 7 [default = 0.5];
  optional double bicycle_expand_range = 8 [default = 0.25];
  optional int32 min_enable_recover_frames = 9 [default = 2];
  optional float filter_intensity_thresh = 10 [default = 1.0];
  optional float expand_bbox_height = 11 [default = 0.5];
  optional int32 max_continous_recover_times = 12 [default = 2];
  optional int32 fg_pts_thresh = 13 [default = 5];
  optional float expand_templete_size_xy = 14 [default = 0.2];
  optional bool use_kept_size = 15 [default = false];
  optional float expand_pc_search_size_xy = 16 [default = 0.2];
  optional float roi_img_resolution = 17 [default = 0.25];
  optional bool update_orintation = 18 [default = false];
  optional bool down_sampling = 19 [default = false];
}

message PostProcessorConfig {
  optional int32 smooth_orientation_track_frames = 1 [default = 5];
  optional double need_to_reverse_direction = 2 [default = 0.75];
}