syntax = "proto2";
package snoah.lidar_process.lidar;
option go_package = "qcraft-proto.ai/onboard/perception/lidar_process/lidar/object_filter_bank/velocity_filter/proto/velocity_filter";
message VelocityFilterConfig {
  optional bool enable = 1 [default = true];
  optional double fg_belief_vel_diff_th = 2 [default = 5.0];
  optional int32 fg_vel_check_frames = 3 [default = 10];
  optional double fg_vel_stdev_velo = 4 [default = 1.5];
  optional double fg_vel_min_vel = 5 [default = 0.5];
  optional double fg_max_m_acc = 6 [default = 30];
  optional double fg_max_vel_use_acc = 7 [default = 15];
  optional double fg_measure_vel_diff_th = 8 [default = 10.0];
  optional double fg_measure_belief_vel_diff_th = 9 [default = 10.0];
  optional double fg_measure_measure_vel_diff_th = 10 [default = 10.0];
  optional double fg_measure_belief_vel_anti_diff_th = 11 [default = 2.0];
}