syntax = "proto2";
package snoah.lidar_process;
option go_package = "qcraft-proto.ai/onboard/perception/lidar_process/lidar/proto/lidar_obstacle_perception_config";

message LidarObstaclePerceptionConfig {
  optional string segmentor = 1 [default = "DummySegmentation"];
  optional string frame_classifier = 2 [default = "DummyClassifier"];
  optional string multi_target_tracker = 3
      [default = "DummyMultiTargetTracker"];

  optional bool use_track_filter_bank = 4 [default = true];
  optional bool use_object_filter_bank = 5 [default = true];
  optional string safe_checker = 6 [default = "FailSafe"];
  optional bool is_down_sample = 7 [default = false];
  optional float moving_velo_thresh = 8 [default = 0.5];
  optional int32 consecutive_static_time_thresh = 9 [default = 15];
  optional string version = 10 [default = ""];
}