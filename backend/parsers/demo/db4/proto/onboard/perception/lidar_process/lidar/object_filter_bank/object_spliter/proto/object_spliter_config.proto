syntax = "proto2";
package snoah.lidar_process.lidar;
option go_package = "qcraft-proto.ai/onboard/perception/lidar_process/lidar/object_filter_bank/object_spliter/proto/object_spliter_config";

message ObjectSpliterConfig {
  optional float short_edge_th = 1 [default = 0.8];
  optional float long_edge_th = 2 [default = 3.5];
  optional bool is_down_sample = 3 [default = false];
  optional float giant_size = 4 [default = 10.0];
  optional int32 concave_hull_dim = 5 [default = 2];
  optional float concave_hull_alpha = 6 [default = 0.75];
  optional float concave_hull_range_x = 7 [default = 20.0];
  optional float concave_hull_range_y = 8 [default = 10.0];
}