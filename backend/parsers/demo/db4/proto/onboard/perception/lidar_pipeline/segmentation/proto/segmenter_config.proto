syntax = "proto2";

package snoah.segmentation;
option go_package = "qcraft-proto.ai/onboard/perception/lidar_pipeline/segmentation/proto/segmenter_config";

message TreeNodeProto {
  optional string name = 1;
  optional string parent = 2;
  optional int32 score = 3;
}

message TreeNodesProto {
  repeated TreeNodeProto tree_nodes = 1;
}
