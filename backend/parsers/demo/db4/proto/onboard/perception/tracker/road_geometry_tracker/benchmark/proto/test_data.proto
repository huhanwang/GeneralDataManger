syntax = "proto2";
package snoah;
option go_package = "qcraft-proto.ai/onboard/perception/tracker/road_geometry_tracker/benchmark/proto/test_data";

// import "onboard/proto/perception/vision/bev_road_geometry.proto";
import "onboard/proto/perception.proto";

message BevStaticPerceptionTestBenchmarkProto {
  optional VisionBevRoadGeometryProto bev_road_geometry_result = 1;
  optional VisionBevRoadGeometryProto mapformer_result = 2;
}
message RoadGeometryTrackerInputMapformerBenchmarkData {
  repeated BevStaticPerceptionTestBenchmarkProto bev_static_perception_proto =
      1;
}

message RoadGeometryTrackerInputData {
  repeated VisionBevRoadGeometryProto vision_bev_road_geometrys = 1;
}
