syntax = "proto2";

package snoah;

option go_package = "qcraft-proto.ai/onboard/perception/proto/detection_range";

// Detection range in vehicle coordinate.
message DetectionRangeProto {
  optional float front = 1;
  optional float rear = 2;
  optional float left = 3;
  optional float right = 4;
}
