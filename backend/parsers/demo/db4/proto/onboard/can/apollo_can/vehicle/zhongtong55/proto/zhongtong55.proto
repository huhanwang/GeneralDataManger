message Vehicle_steering_feedback_zt55_c01a5a7 {
  // Report Message
  enum Vehicle_eps_statusType {
    VEHICLE_EPS_STATUS_STANDBY = 0;
    VEHICLE_EPS_STATUS_AUTODRIVING = 1;
    VEHICLE_EPS_STATUS_MANUALDRIVING = 4;
    VEHICLE_EPS_STATUS_MANUALENGAGE = 5;
    VEHICLE_EPS_STATUS_ALARM = 6;
    VEHICLE_EPS_STATUS_FAULT = 7;
  }
  // [] [0|255]
  optional int32 life_vehicle_eps_feedback = 1;
  // [Nm] [-12.8|5.05]
  optional double vehicle_eps_torque_feedback = 2;
  // [] [0|15]
  optional Vehicle_eps_statusType vehicle_eps_status = 3;
  // [Nm] [-5|4.96132]
  optional double vehicle_eps_motortorque_feedback = 4;
  // [degree/s] [0|540]
  optional double vehicle_eps_anglespeed_feedback = 5;
  // LeftNegative_RightPositive [degree] [-1575|1575]
