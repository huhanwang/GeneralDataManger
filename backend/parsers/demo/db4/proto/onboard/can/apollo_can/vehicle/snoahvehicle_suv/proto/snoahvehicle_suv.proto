  // [] [0|0]
  optional bool acc_drive_off_req = 1;
  // [] [0|0]
  optional bool acc_dec_to_stop_req = 2;
  // [m/s2] [0|12.7]
  optional double acc_target_ax_upper_limit = 3;
  // [m/s2] [0|3.15]
  optional double acc_target_ax_upper_comft_band = 4;
  // [m/s2] [-12.7|0]
  optional double acc_target_ax_lower_limit = 5;
  // [m/s2] [0|3.15]
  optional double acc_target_ax_lower_comft_band = 6;
  // [m/s2] [-7|5.75]
  optional double acc_target_ax = 7;
  // [] [0|7]
  optional AccStateType acc_state = 8;
  // [] [0|0]
  optional bool acc_standstill_req = 9;
  // [] [0|15]
  optional int32 acc_rolling_counter = 10;
  // [] [0|255]
  optional int32 acc_check_sum = 11;
}

