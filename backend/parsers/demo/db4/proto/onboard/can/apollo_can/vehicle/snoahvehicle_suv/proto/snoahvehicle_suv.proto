// Control Message.
message Snoah_acc_command_71 {
  enum AccStateType {
    ACCSTATE_OFF_MODE = 0;
    ACCSTATE_PASSIVE_MODE = 1;
    ACCSTATE_STANDBY_MODE = 2;
    ACCSTATE_ACTIVE_CONTROL_MODE = 3;
    ACCSTATE_OVERRIDE = 4;
    ACCSTATE_BRAKE_ONLY_MODE = 5;
    ACCSTATE_STANDSTILL = 6;
    ACCSTATE_FAILURE_MODE = 7;
