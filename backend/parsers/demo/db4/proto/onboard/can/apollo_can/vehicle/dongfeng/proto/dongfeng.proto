    EPB_EPBSTATUS_DYNAMICBRAKINGINPROGRESS = 4;
    EPB_EPBSTATUS_BRAKELOCKEDMAXIMUMSTRESSVALUE = 5;
    EPB_EPBSTATUS_FAULT = 6;
