syntax = "proto2";

package apollo.canbus;

message Acu_acclongreq_6a {
  // Control Message
  enum Acc_toq_reqstsType {
    ACC_TOQ_REQSTS_INACTIVE = 0;
    ACC_TOQ_REQSTS_ACTIVE = 1;
  }
  enum Acc_drvoffType {
    ACC_DRVOFF_NO_REQUEST = 0;
    ACC_DRVOFF_REQUEST = 1;
  }
  enum Acc_modeType {
    ACC_MODE_OFF_MODE = 0;
    ACC_MODE_PASSIVE_MODE = 1;
    ACC_MODE_STANDBY_MODE = 2;
    ACC_MODE_ACTIVE_CONTROL_MODE = 3;
    ACC_MODE_BRAKE_ONLY_MODE = 4;
    ACC_MODE_OVERRIDE_MODE = 5;
    ACC_MODE_STANDSTILL_MODE = 6;
    ACC_MODE_FAILURE_MODE = 7;
  }
  enum Acc_decel_reqstsType {
    ACC_DECEL_REQSTS_NOT_REQUEST = 0;
    ACC_DECEL_REQSTS_REQUEST = 1;
  }
  // [] [-848|1199.5]
  optional double acc_toq_req = 1;
  // 0  off 1 active [] [0|1]
  optional Acc_toq_reqstsType acc_toq_reqsts = 2;
  // drive off request [] [0|1]
  optional Acc_drvoffType acc_drvoff = 3;
  // [] [0|7]
  optional Acc_modeType acc_mode = 4;
  // unstable Decel [] [0|1]
  optional Acc_decel_reqstsType acc_decel_reqsts = 5;
  // [m/s2] [-7.22|3.015]
  optional double acc_decel_req = 6;
  // [] [0|15]
  optional int32 acc_msgcntr = 7;
  // [] [0|255]
  optional int32 acc_crc = 8;
}

message Acu_gearreq_7d {
  // Control Message
  enum Avp_apaparkmodType {
    AVP_APAPARKMOD_OFF = 0;
    AVP_APAPARKMOD_SAPA = 1;
    AVP_APAPARKMOD_VPPS = 2;
    AVP_APAPARKMOD_NBS = 3;
    AVP_APAPARKMOD_DESCRIPTION_FOR_THE_VALUE_0X4 = 4;
    AVP_APAPARKMOD_DESCRIPTION_FOR_THE_VALUE_0X5 = 5;
    AVP_APAPARKMOD_DESCRIPTION_FOR_THE_VALUE_0X6 = 6;
    AVP_APAPARKMOD_DESCRIPTION_FOR_THE_VALUE_0X7 = 7;
  }
  enum Avp_apastsType {
    AVP_APASTS_INITIAL = 0;
    AVP_APASTS_STANDBY = 1;
    AVP_APASTS_SEARCH = 2;
    AVP_APASTS_PRE_GUIDENCE = 3;
    AVP_APASTS_GUIDANCE = 4;
    AVP_APASTS_RESERVED = 5;
    AVP_APASTS_ABORT = 6;
    AVP_APASTS_FAULT = 7;
    AVP_APASTS_PUB_ROAD = 8;
    AVP_APASTS_OFFMODE = 9;
    // AVP_APASTS_RESERVED = 10;
    // AVP_APASTS_RESERVED = 11;
    // AVP_APASTS_RESERVED = 12;
    // VP_APASTS_RESERVED = 13;
    // AVP_APASTS_RESERVED = 14;
    // AVP_APASTS_RESERVED = 15;
  }
  enum Avp_brkmodstsType {
    AVP_BRKMODSTS_NO_BRAKE = 0;
    AVP_BRKMODSTS_COMFORT = 1;
    AVP_BRKMODSTS_EMERGENCY = 2;
    AVP_BRKMODSTS_RESERVED = 3;
  }
  enum Avp_targearreqType {
    AVP_TARGEARREQ_NO_GEAR_REQUEST = 0;
    AVP_TARGEARREQ_D = 1;
    AVP_TARGEARREQ_R = 2;
    AVP_TARGEARREQ_N = 3;
    AVP_TARGEARREQ_P = 4;
  }
  enum Avp_crtlmodeType {
    AVP_CRTLMODE_NO = 0;
    AVP_CRTLMODE_DIST_CRTL = 1;
    AVP_CRTLMODE_SPD_CRTL = 2;
    AVP_CRTLMODE_RES = 3;
  }
  // [] [0|7]
  optional Avp_apaparkmodType avp_apaparkmod = 1;
  // [] [0|15]
  optional Avp_apastsType avp_apasts = 2;
  // 0 No 1 Comfort 2 Emergency 3 Reseved [] [0|7]
  optional Avp_brkmodstsType avp_brkmodsts = 3;
  // [] [-3.2|3.1]
  optional double avp_spdlmt = 4;
  // [] [0|1]
  optional bool avp_gearreqactv = 5;
  // [] [0|15]
  optional int32 avp_msgcntr = 6;
  // [] [0|255]
  optional int32 avp_crc = 7;
  // [cm] [-4095|4096]
  optional int32 avp_dstreq = 8;
  // [] [0|7]
  optional Avp_targearreqType avp_targearreq = 9;
  // [] [0|15]
  optional Avp_crtlmodeType avp_crtlmode = 10;
}

