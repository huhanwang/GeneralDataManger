message Wheelspeed_report_5a {
  // Report Message
  // Wheel Speed Rear Right [km/h] [0|0]
  optional double rr = 1;
  // Wheel Speed Rear Left [km/h] [0|0]
  optional double rl = 2;
  // Wheel Speed Front Right [km/h] [0|0]
  optional double fr = 3;
  // Wheel Speed Front Left [km/h] [0|0]
  optional double fl = 4;
}

message Accel_report_5b {
  // Report Message
  // Vertical Acceleration [m/s^2] [0|0]
  optional double vert = 1;
  // Longitudinal Acceleration [m/s^2] [0|0]
  optional double my_long = 2;
  // Lateral Acceleration [m/s^2] [0|0]
  optional double lat = 3;
}

message Gyro_report_5c {
