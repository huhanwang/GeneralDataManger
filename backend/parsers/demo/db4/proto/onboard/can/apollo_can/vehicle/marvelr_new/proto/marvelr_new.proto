  optional bool emeglampreq = 1;
  // [] [0|15]
  optional int32 lghtreqrc = 2;
  // [] [0|0]
  optional bool lghten = 3;
  // Turn Light Request [] [0|0]
  optional TrnlghtreqType trnlghtreq = 4;
}

