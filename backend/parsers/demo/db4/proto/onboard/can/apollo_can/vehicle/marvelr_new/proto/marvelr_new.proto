syntax = "proto2";

package apollo.canbus;
message Brake_command_50 {
  // Control Message
  enum BrkreqenType {
    BRKREQEN_DISABLE = 0;
    BRKREQEN_ENABLED = 1;
  }
  // [] [0|0]
  optional int32 brkreqchksm = 1;
  // Optional Watchdog Counter (brakes) [] [0|15]
  optional int32 brkreqrc = 2;
  // Brake Pedal Command [%] [0|99.9]
  optional double brkreqval = 3;
  // Brakes Enable [] [0|0]
  optional BrkreqenType brkreqen = 4;
}

message Brake_report_51 {
  // Report Message
  enum BrkcmdtimeoutType {
    BRKCMDTIMEOUT_VALID = 0;
    BRKCMDTIMEOUT_TIMEOUT = 1;
  }
  enum BrkrptenType {
    BRKRPTEN_DISABLED = 0;
    BRKRPTEN_ENABLED = 1;
  }
  enum BrkoverrideType {
    BRKOVERRIDE_NO_OVERRIDE = 0;
    BRKOVERRIDE_DRIVER_OVERRIDE = 1;
  }
  // brake  available [] [0|1]
  optional bool brkavl = 1;
  // brake fault [] [0|1]
  optional bool brkflt = 2;
  // Rolling Counter [] [0|15]
  optional int32 brkrptrc = 3;
  // Brake Pedal Output [%] [0|100]
  optional double brkout = 4;
  // Brake Pedal Input [%] [0|100]
  optional double brkpdlpos = 5;
  // Timeout (brake command) [] [0|0]
  optional BrkcmdtimeoutType brkcmdtimeout = 6;
  // Brakes Enabled [] [0|0]
  optional BrkrptenType brkrpten = 7;
  // Driver Override (brakes) [] [0|0]
  optional BrkoverrideType brkoverride = 8;
  optional bool brake_pedal_pressed = 9;
}

message Throttle_command_52 {
  // Control Message
  enum ThrreqenType {
    THRREQEN_DISABLE = 0;
    THRREQEN_ENABLED = 1;
  }
  // [] [0|0]
  optional int32 thrreqchksm = 1;
  // Optional Watchdog Counter (throttle) [] [0|15]
  optional int32 thrreqrc = 2;
  // Throttle Pedal Command [%] [0|100]
  optional double thrreqval = 3;
  // Throttle Enable [] [0|0]
  optional ThrreqenType thrreqen = 4;
}

message Throttle_report_53 {
  // Report Message
  enum ThrcmdtimeoutType {
    THRCMDTIMEOUT_VALID = 0;
    THRCMDTIMEOUT_TIMEOUT = 1;
  }
  enum ThrrptenType {
    THRRPTEN_DISABLED = 0;
    THRRPTEN_ENABLED = 1;
  }
  enum ThroverrideType {
    THROVERRIDE_NO_OVERRIDE = 0;
    THROVERRIDE_DRIVER_OVERRIDE = 1;
  }
  // throttle available [] [0|1]
  optional bool thravl = 1;
  // Throttle Fault [] [0|1]
  optional bool thrflt = 2;
  // Rolling Counter [] [0|0]
  optional int32 thrrptrc = 3;
  // Throttle Pedal Output [] [-848|2000]
  optional double throut = 4;
  // Throttle Pedal Input [%] [0|100]
  optional double thractlpos = 5;
  // Timeout (throttle command) [] [0|0]
  optional ThrcmdtimeoutType thrcmdtimeout = 6;
  // Throttle Enabled [] [0|0]
  optional ThrrptenType thrrpten = 7;
  // Driver Override (throttle) [] [0|0]
  optional ThroverrideType throverride = 8;
}

message Steering_command_54 {
  // Control Message
  enum EpsctlmodType {
    EPSCTLMOD_NONE = 0;
    EPSCTLMOD_ANGLEREQ = 1;
    EPSCTLMOD_TOQREQ = 2;
    EPSCTLMOD_RES = 3;
  }
  enum StrreqenType {
    STRREQEN_DISABLE = 0;
    STRREQEN_ENABLED = 1;
  }
  // [] [0|15]
  optional EpsctlmodType epsctlmod = 1;
  // [] [-10.24|10.23]
  optional double lkareqtoqval = 2;
  // [] [0|0]
  optional bool lkareqtoqen = 3;
  // [] [0|0]
  optional int32 strreqchksm = 4;
  // Optional Watchdog Counter (steering) [] [0|15]
  optional int32 strreqrc = 5;
  // Steering Command Rate Limit [degrees/s] [0|500]
  optional double strwhlangspdreq = 6;
  // Steering Enable [] [0|0]
  optional StrreqenType strreqen = 7;
  // Steering Wheel Angle Request [degrees] [-470|470]
  optional double strwhlangreqval = 8;
}

message Steering_report_55 {
  // Report Message
  enum StrcmdtimeoutType {
    STRCMDTIMEOUT_VALID = 0;
    STRCMDTIMEOUT_TIMEOUT = 1;
  }
  enum StrrptenType {
    STRRPTEN_DISABLED = 0;
    STRRPTEN_ENABLED = 1;
  }
  enum StroverrideType {
    STROVERRIDE_NO_OVERRIDE = 0;
    STROVERRIDE_DRIVER_OVERRIDE = 1;
  }
  // steering available [] [0|1]
  optional bool stravl = 1;
  // Steering Fault [] [0|1]
  optional bool strflt = 2;
  // Rolling Counter [] [0|15]
  optional int32 strrptrc = 3;
  // Timeout (steering command) [] [0|0]
  optional StrcmdtimeoutType strcmdtimeout = 4;
  // Driver Steering Delivered Torque [Nm] [0|0]
  optional double drvrstrgdlvrdtoq = 5;
  // Vehicle Speed [kph] [0|0]
  optional double vehspd = 6;
  // Steering Enabled [] [0|0]
  optional StrrptenType strrpten = 7;
  // Driver Override (steering) [] [0|0]
  optional StroverrideType stroverride = 8;
  // Steering Wheel Angle [degrees] [-470|470]
  optional double strwhlangval = 9;
  // Steering Wheel Angle Speed[degrees/s] [-2048|2046]
  optional double strwhlangspd = 10;
}

message Gear_command_56 {
  // Control Message
  enum GearreqenType {
    GEARREQEN_DISABLE = 0;
    GEARREQEN_ENABLED = 1;
  }
  enum GearposreqType {
    GEARPOSREQ_NONE = 0;
    GEARPOSREQ_PARK = 1;
    GEARPOSREQ_REVERSE = 2;
    GEARPOSREQ_NEUTRAL = 3;
    GEARPOSREQ_DRIVE = 4;
    GEARPOSREQ_LOW = 5;
  }
  // [] [0|15]
  optional int32 gearrc = 1;
  // [] [0|0]
  optional int32 gearchksm = 2;
  // Gear Shift Enable [] [0|0]
  optional GearreqenType gearreqen = 3;
  // Gear Position Request [] [0|0]
  optional GearposreqType gearposreq = 4;
}

message Gear_report_57 {
  // Report Message
  enum GearctlstsType {
    GEARCTLSTS_NOT_REJECTED = 0;
    GEARCTLSTS_OVERRIDE = 1;
    GEARCTLSTS_SHIFT_IN_PROGRESS = 2;
    GEARCTLSTS_REPEAT = 3;
    GEARCTLSTS_CMD_ILLEGAL = 4;
    GEARCTLSTS_SPEED_NOT_2KPH = 5;
    GEARCTLSTS_REJECTED_BY_VEHICLE_TIMEOUT = 6;
  }
  enum GearactlposType {
    GEARACTLPOS_NONE = 0;
    GEARACTLPOS_PARK = 1;
    GEARACTLPOS_REVERSE = 2;
    GEARACTLPOS_NEUTRAL = 3;
    GEARACTLPOS_DRIVE = 4;
    GEARACTLPOS_LOW = 5;
  }
  // [] [0|0]
  optional bool gearcmdtimeout = 1;
  // Gear available [] [0|1]
  optional bool gearavl = 2;
  // Gear Status [] [0|0]
  optional GearctlstsType gearctlsts = 3;
  // Gear Actual Position [] [0|0]
  optional GearactlposType gearactlpos = 4;
}

message Light_command_58 {
  // Control Message
  enum TrnlghtreqType {
    TRNLGHTREQ_NONE = 0;
    TRNLGHTREQ_LEFT = 1;
    TRNLGHTREQ_RIGHT = 2;
    TRNLGHTREQ_DOUBLEFLASH = 3;
  }
