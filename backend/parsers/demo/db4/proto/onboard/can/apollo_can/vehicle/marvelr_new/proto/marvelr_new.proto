}

message Gps_1_report_5d {
  // Report Message
  enum ValidType {
    VALID_INVALID = 0;
    VALID_VALID = 1;
  }
  // GPS Valid [] [0|0]
  optional ValidType valid = 1;
  // GPS Longitude [degrees] [0|0]
  optional double longitude = 2;
  // GPS Latitude [degrees] [0|0]
  optional double latitude = 3;
}

message Gps_2_report_5e {
  // Report Message
  enum InfType {
    INF_ACTUAL_POSITION = 0;
    INF_INFERRED_POSITION = 1;
  }
  enum FltgpsType {
    FLTGPS_NO_FAULT = 0;
    FLTGPS_FAULT = 1;
  }
  // GPS Position Inferred [] [0|0]
  optional InfType inf = 1;
  // Fault GPS [] [0|0]
  optional FltgpsType fltgps = 2;
  // GPS Position Dilution Of Precision [] [0|0]
  optional double pdop = 3;
  // Compass Heading [degrees] [0|315]
  optional double compass = 4;
  // GPS UTC Seconds [seconds] [0|59]
  optional int32 seconds = 5;
  // GPS UTC Minutes [minutes] [0|59]
  optional int32 minutes = 6;
  // GPS UTC Hours [hours] [0|23]
  optional int32 hours = 7;
  // GPS UTC Day [days] [1|31]
  optional int32 day = 8;
  // GPS UTC Month [months] [1|12]
  optional int32 month = 9;
  // GPS UTC Year [years] [0|99]
  optional int32 year = 10;
}

message Gps_3_report_5f {
  // Report Message
  enum QualityType {
    QUALITY_NO_FIX = 0;
    QUALITY_2D_FIX = 1;
    QUALITY_3D_FIX = 2;
  }
  // GPS Number Of satellites [] [0|0]
