    VCU_BRKPEDALSTVD_NOT_VALID = 0;
    VCU_BRKPEDALSTVD_VALID = 1;
  }
  enum Vcu_brkpedalstType {
    VCU_BRKPEDALST_NOT_PRESSED = 0;
    VCU_BRKPEDALST_PRESSED = 1;
  }
  // Checksum signal for frame [-] [0|255]
  optional int32 scu_18_checksum = 1;
  // Virtual position of gas pedal position validity. [] [0|1]
  optional Vcu_gaspedalvirtualpstvdType vcu_gaspedalvirtualpstvd = 2;
  // VCU_BrakePedSt valid data [] [0|1]
  optional Vcu_brkpedalstvdType vcu_brkpedalstvd = 3;
