syntax = "proto2";

package apollo.canbus;

message Vehicle_signal_ctl_336 {
  // Control Message
  enum BrklireqType {
    BRKLIREQ_NOREQUEST = 0;
    BRKLIREQ_REQUEST = 1;
    BRKLIREQ_RESERVED = 2;
    BRKLIREQ_INVALID = 3;
  }
  enum Turn_lightType {
    TURN_LIGHT_NOTURN = 0;
    TURN_LIGHT_TURNLEFT = 1;
    TURN_LIGHT_TURNRIGHT = 2;
    TURN_LIGHT_INVALID = 3;
  }
  enum Beam_activeType {
    BEAM_ACTIVE_OFF = 0;
    BEAM_ACTIVE_PASSIVE = 1;
    BEAM_ACTIVE_ACTIVE = 2;
    BEAM_ACTIVE_RESERVED1 = 3;
    BEAM_ACTIVE_RESERVED2 = 4;
    BEAM_ACTIVE_RESERVED3 = 5;
    BEAM_ACTIVE_RESERVED4 = 6;
    BEAM_ACTIVE_INVALID = 7;
  }
  enum BeamType {
    BEAM_LOWBEAM = 0;
    BEAM_HIGHBEAM = 1;
  }
  enum Emergency_enableType {
    EMERGENCY_ENABLE_OFF = 0;
    EMERGENCY_ENABLE_SLOW = 1;
    EMERGENCY_ENABLE_FAST = 2;
    EMERGENCY_ENABLE_INVALID = 3;
  }
  // [] [0|1]
  optional bool horn = 1;
  // [] [0|3]
  optional BrklireqType brklireq = 2;
  // [] [0|3]
  optional Turn_lightType turn_light = 3;
  // [] [0|7]
  optional Beam_activeType beam_active = 4;
  // [] [0|1]
  optional BeamType beam = 5;
  // [] [0|3]
  optional Emergency_enableType emergency_enable = 6;
}

