  enum Rr_windowType {
    RR_WINDOW_NOREQUEST = 0;
    RR_WINDOW_UPREQUEST = 1;
    RR_WINDOW_DOWNREQUEST = 2;
    RR_WINDOW_AUTOUPREQUEST = 3;
    RR_WINDOW_AUTODOWNREQUEST = 4;
