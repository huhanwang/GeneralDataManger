syntax = "proto2";
package snoah;

import "onboard/lite/proto/lite_common.proto";
import "onboard/lite/proto/module_config.proto";

message ModuleStartupStats {
  message ResourceStats {
    optional int64 cpu_usage = 1;
    optional int64 mem_usage_kb = 2;
    // TODO(xycai) add more resource
  }

  message SingleModuleStartupStats {
    optional LiteModuleName module_name = 1;
    optional string full_node_name = 2;
    optional uint32 ok_time_ms = 3;
    optional uint32 ok_time_after_message_ms = 4;
    optional uint32 init_time_ms = 5;
    optional ResourceStats startup_resources = 10;
    optional ResourceStats runtime_resources = 11;
    repeated LiteModuleConfig.PubSubMessage required_messages = 8;
    repeated LiteModuleConfig.PubSubMessage publish_messages = 9;

    reserved 6, 7;
  }
  repeated SingleModuleStartupStats module_startup_stats = 1;
}