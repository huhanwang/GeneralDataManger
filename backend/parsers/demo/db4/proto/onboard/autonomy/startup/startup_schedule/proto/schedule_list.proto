syntax = "proto2";

package snoah;

import "onboard/lite/launch_plan/proto/launch_plan_component.proto";

message ModuleStartupScheduleList {
  // launch_plan x components* -> startup_schedule x startup_stats
  message ModuleStartupScheduleItem {
    optional string launch_plan = 1;
    repeated string launch_plan_components = 2;
    optional LaunchPlanComponentMatchCondition
        launch_plan_component_match_condition = 5;
    optional string startup_schedule = 3;
    optional string startup_stats = 4;
  }
  repeated ModuleStartupScheduleItem startup_schedules = 1;
}
