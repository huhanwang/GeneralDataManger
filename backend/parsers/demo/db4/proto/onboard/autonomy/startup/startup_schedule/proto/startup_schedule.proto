syntax = "proto2";
package snoah;

import "onboard/lite/proto/lite_common.proto";

message ModuleStartupSchedule {
  message ModuleOnNode {
    optional string full_node_name = 1;
    optional LiteModuleName module_name = 2;
  }
  message SingleModuleStartupSchedule {
    optional ModuleOnNode module = 1;
    optional ModuleOnNode start_after_module = 2;
    optional uint32 module_ok_order = 3;
  }
  repeated SingleModuleStartupSchedule modules = 1;
}