syntax = "proto2";

package snoah;

message SomeipTopicConfig {
  required string topic_name = 1;
  optional bool is_reliable = 2 [default = true];
  optional string app_name = 3;
  enum CommType {
    PUB = 1;
    SUB = 2;
    CLIENT = 3;
    SERVER = 4;
  }
  required CommType type = 4;
  optional string field_name_in = 5;
  optional string channel_in = 6;
  optional string field_name_out = 7;
  optional string channel_out = 8;
  optional int32 method_id = 9;
  optional int32 event_id = 10;
  optional bool is_field = 11 [default = false];
  optional int32 eventgroup_id = 12;
  required int32 service_id = 13;
  required int32 instance_id = 14;
  required int32 remote_service_id = 15;
  required int32 remote_instance_id = 16;
  required string hicom_server_topic = 17;
  optional bool is_inner_col = 18 [default = false];
  repeated ColChannelConfig col_channel_configs = 19;
  repeated ColChannelConfig in_col_channel_configs = 20;
}

message ColChannelConfig {
  optional string field_name_out = 1;
  optional string channel_out = 2;
  optional string field_name_in = 3;
  optional string channel_in = 4;
}

message SomeipCommConfig {
  optional string config_json_path = 1;
  repeated SomeipTopicConfig topic_configs = 2;
}
