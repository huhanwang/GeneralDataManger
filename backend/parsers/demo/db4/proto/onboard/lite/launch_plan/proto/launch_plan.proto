syntax = "proto2";

package snoah;

import "onboard/lite/proto/module_config.proto";

message MessageChannelDomain {
  optional string field_name = 1;
  optional string channel = 2;
  optional string domain = 3;
}

message NodeFullName {
  optional string node_name = 1;
  optional string name_space = 2;
}

message ShadowModeConfig {
  optional string shad_launch_plan = 1;
  optional string shad_app_path = 2;
}

message NodeLaunchConfig {
  optional NodeFullName node_name = 1;
  optional LaunchRunConfig launch_run_config = 2;
  repeated GFlagConfig flags = 3;
  optional string shm_segment_config_conf_path = 4;
  optional ShadowModeConfig shadow_mode_config = 5;
}

message FunctionGroupConfigFile {
  optional string file_path = 1;
}

message LaunchPlan {
  repeated NodeLaunchConfig node_launch_configs = 1;
  repeated MessageChannelDomain inter_node_exclude_messages = 2;
  repeated GFlagConfig shared_flags = 3;
  repeated FunctionGroupConfigFile function_groups = 4;
}
