syntax = "proto2";

package snoah;

import "onboard/proto/q_issue.proto";
import "onboard/lite/health_management/proto/log_warning.proto";

message IssueMatchCondition {
  optional QIssueType issue_type = 1;
  optional QIssueSubType issue_subtype = 2;
}

message TraceCollectCondition {
  optional IssueMatchCondition issue_match_condition = 1;
  optional double expired_time_s = 2 [default = 2.0];
  optional bool is_ignore = 3;
}

message LogWarningCondition {
  optional QIssueSubType issue_type = 1;
  optional LogWarningType log_warning_type = 2;
}

message IssueStrategy {
  repeated IssueMatchCondition capture_match_conditions = 1;
  repeated IssueMatchCondition filter_match_conditions = 2;
  repeated TraceCollectCondition trace_collect_conditions = 3;
  repeated LogWarningCondition log_warning_conditions = 4;
}
