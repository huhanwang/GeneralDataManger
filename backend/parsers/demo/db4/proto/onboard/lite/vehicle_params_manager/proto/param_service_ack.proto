syntax = "proto2";

package snoah;

import "onboard/lite/proto/lite_common.proto";

message UpdateParamsSign {
  optional int64 update_timestamp = 1;
  optional int32 update_sign = 2;
}

message ParamServiceAckProto {
  optional LiteHeader header = 1;
  optional UpdateParamsSign sign = 2;
  optional bool ok = 3;
}
