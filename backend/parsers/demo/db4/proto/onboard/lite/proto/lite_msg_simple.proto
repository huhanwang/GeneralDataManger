syntax = "proto2";

package snoah;

import "onboard/lite/proto/lite_common.proto";
import "onboard/lite/proto/proto_field_option.proto";

message LiteMsgSimpleProto {
  optional LiteHeader header = 1;
}

message LitePerfTestMsgProto {
  optional LiteHeader header = 1;
  optional bool end_flag = 2;
  optional sfixed64 sn = 3;
  optional fixed64 len = 4;
  repeated fixed64 data = 5;
}

message LiteTestInnerColProto {
  optional LiteHeader header = 1;
  optional bool end_flag = 2 [(trans_matrix) = true];
  optional int32 check_num = 3 [(trans_matrix) = true];
}
