syntax = "proto2";

package snoah.qlfs;

import "onboard/qlfs/common/proto/common.proto";
import "onboard/qlfs/db/proto/db.proto";

message GrpcHeader {
  optional bool success = 1 [default = true];
  optional string error_msg = 2;
}

enum QlfsQueryInputType {
  QLFS_BY_SHA = 0;
  QLFS_BY_BRANCH_NAME = 1;
}

message QuerySchemaFileRequestProto {
  optional string key = 1;
  optional QlfsQueryInputType type = 2;
}

message QuerySchemaFileResponseProto {
  optional GrpcHeader header = 1;
  optional string schema_file_location = 2;
  optional string description = 3;
  optional string last_update_time = 4;
  optional string author = 5;
  optional string branch = 6;
  optional string sha = 7;
}

message QueryPushFilePathRequestProto {
  optional string branch_name = 1;
  optional bool force = 2;
  optional SchemaProto updated_files = 3;
}

message QueryPushFilePathResponseProto {
  optional GrpcHeader header = 1;
  optional SchemaProto updated_files = 2;
}

message PushRequestProto {
  optional string branch_name = 1;
  optional bool force = 2;
  optional SchemaProto all_files = 3;
  optional string description = 4;
  optional string author = 5;
  optional string parent_sha = 6;
  optional string last_update_time = 7;
}
message PushResponseProto {
  optional GrpcHeader header = 1;
  optional string sha = 2;
}

message QueryMasterInfoRequestProto {
  optional int32 depth = 1;
}

message QueryMasterInfoResponseProto {
  optional GrpcHeader header = 1;
  repeated CommitProto commits = 2;
}

message ReleaseConflictFileProto {
  optional string path = 1;
  // add or modify
  optional bool add = 2;
  optional string author = 3;
  optional string description = 4;
  optional string update_time = 5;
  optional string full = 6;
}

message QueryReleaseInfoRequestProto {
  optional string key = 1;
  optional QlfsQueryInputType type = 2;
  repeated string rules = 3;
}
message QueryReleaseInfoResponseProto {
  optional GrpcHeader header = 1;
  repeated string added_files = 2;
  repeated string deleted_files = 3;
  repeated string modified_files = 4;
  repeated ReleaseConflictFileProto conflict_files = 5;
}

message ReleaseRequestProto {
  optional string key = 1;
  optional QlfsQueryInputType type = 2;
  repeated string rules = 3;
  optional bool set_overwrite_list = 4;
  // If a file has conflict and it in 'overwrite_list', it will overwrite the
  // master file by this branch file
  repeated string overwrite_list = 5;
}

message ReleaseResponseProto {
  optional GrpcHeader header = 1;
  // If failed, there are conflicit files
  repeated ReleaseConflictFileProto conflict_files = 2;
  optional string sha = 3;
}

message QueryFilePathRequestProto {
  optional string file = 1;
  optional string sha = 2;
}
message QueryFilePathResponseProto {
  optional GrpcHeader header = 1;
  optional string path = 2;
}

message UploadAudioFileRequestProto {
  // The file name, like 'station_gongyanyuan.wav'
  optional string name = 1;
  // The file sha256, which will be used to check correctness of transfer
  optional string sha = 2;
  // The audio file
  optional bytes buffer = 3;
}

message UploadAudioFileResponseProto {
  optional GrpcHeader header = 1;
  // If success, the name/sha will be same with the fields in 'request'
  optional string name = 2;
  optional string sha = 3;

  optional string qlfs_commit = 4;
}

message QueryFileShaRequestProto {
  optional string key = 1;
  optional QlfsQueryInputType type = 2;
  optional string file_name = 3;
}

message QueryFileShaResponseProto {
  optional GrpcHeader header = 1;
  optional string file_sha = 2;
  optional string oss_file_location = 3;
}

service QlfsService {
  rpc QuerySchemaFile(QuerySchemaFileRequestProto)
      returns (QuerySchemaFileResponseProto);
  rpc QueryFileSha(QueryFileShaRequestProto)
      returns (QueryFileShaResponseProto);
  rpc QueryPushFilePath(QueryPushFilePathRequestProto)
      returns (QueryPushFilePathResponseProto);
  rpc Push(PushRequestProto) returns (PushResponseProto);
  rpc QueryMasterInfo(QueryMasterInfoRequestProto)
      returns (QueryMasterInfoResponseProto);
  rpc QueryReleaseInfo(QueryReleaseInfoRequestProto)
      returns (QueryReleaseInfoResponseProto);
  rpc Release(ReleaseRequestProto) returns (ReleaseResponseProto);
  rpc QueryFilePath(QueryFilePathRequestProto)
      returns (QueryFilePathResponseProto);
  rpc UploadAudioFile(stream UploadAudioFileRequestProto)
      returns (UploadAudioFileResponseProto);
}