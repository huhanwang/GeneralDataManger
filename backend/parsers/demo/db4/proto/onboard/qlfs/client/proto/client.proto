syntax = "proto2";

package snoah.qlfs;

message ClientDescProto {
  optional string branch = 1;
  optional string schema_file = 2;
  optional string description = 3;
  optional string last_update_time = 4;
  optional string author = 5;
  optional string root_schema_file = 6;
  optional string parent_sha = 7;
  // For release
  repeated string last_pull_rules = 8;

  optional bool is_healthy = 9 [default = true];
}