syntax = "proto2";

package snoah.qlfs;

enum BumpTypeFromRquest {
  BUMP_MODEL = 0;
  BUMP_CODE = 1;
}

message GrpcHeader {
  optional bool success = 1 [default = true];
  optional string error_msg = 2;
}

message ProducerRequestProto {
  required string commit_id = 1;
}

message ProducerResponseProto {
  optional GrpcHeader header = 1;
}

message ConsumerRequestProto {
  optional string commit_id = 1;
  repeated Version version = 3;
}

message ConsumerResponseProto {
  optional string commit_id = 1;
  optional GrpcHeader header = 5;
}

message GetVersionRequestProto {
  required string commit_id = 1;
}

message GetVersionResponseProto {
  optional Versions versions = 1;
  repeated Version version = 2;
  optional GrpcHeader header = 3;
}

message Versions {
  optional string j5_version = 1;
  optional string orin_version = 2;
  optional string omc_version = 3;
}

message Version {
  optional string name = 1;
  optional string value = 2;
}

message CommitVersionProto {
  optional string commit_id = 1;
  repeated Version version = 2;
}

service BumpService {
  rpc ProducerRpc(ProducerRequestProto) returns (ProducerResponseProto);
  rpc ConsumerRpc(ConsumerRequestProto) returns (ConsumerResponseProto);
  rpc GetVersionRpc(GetVersionRequestProto) returns (GetVersionResponseProto);
}
