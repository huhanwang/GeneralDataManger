syntax = "proto2";

package snoah;

message DataCheckParamsProto {
  optional double calib_used_time_seconds = 1;
  optional double calib_slide_window_seconds = 2;
  optional double max_data_wait_seconds = 3;
  optional double max_calibration_seconds = 4;
}

message CalibrationCheckParamsProto {
  optional double acc_norm_threshold = 1;
  optional double acc_std_threshold = 2;
  optional double gyro_norm_threshold = 3;
  optional double gyro_std_threshold = 4;
  optional double frequency_threshold = 5;
  optional double drop_frame_rate_threshold = 6;
  optional double time_std_threshold = 7;
  optional double acc_xy_mean_threshold = 8;
  optional double acc_xy_std_threshold = 9;
  optional double gyro_xyz_mean_threshold = 10;
  optional double gyro_xyz_std_threshold = 11;
}

message ModuleParamsProto {
  optional string time_zone_name = 1 [default = "Asia/Shanghai"];
  optional int32 time_zone_key = 2 [default = 8];
}

message ImuEolCalibrationParamsProto {
  optional DataCheckParamsProto data_check_params = 1;
  optional CalibrationCheckParamsProto calibration_check_params = 2;
  optional ModuleParamsProto module_params = 3;
}
