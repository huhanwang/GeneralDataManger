
syntax = "proto2";

package snoah.mlplanner;

message MLPlannerStatusProto {
  enum MLPlannerStatusCode {
    UNINITIALIZED = 0;
    OK = 1;
    OBJECT_MANAGER_FAILED = 2;
    MODEL_INFERENCE_FAILED = 3;

    // Next id: 4.
  }
  optional MLPlannerStatusCode status = 1 [default = UNINITIALIZED];
  optional string message = 2;
}
