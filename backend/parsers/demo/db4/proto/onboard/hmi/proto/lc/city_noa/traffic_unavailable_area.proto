
syntax = "proto2";

package snoah.LongCheng;

import "onboard/hmi/proto/lc/city_noa/point2D_conf_level.proto";

enum TrafficUnavailableAreaType {
  TrafficUnavailableAreaType_TYPE_NONE = 0;
  TrafficUnavailableAreaType_TYPE_MAP_FREESPACE = 1;  // 基于地图的freespace
  TrafficUnavailableAreaType_TYPE_OCCUPANCY_FREESPACE =
      2;  // 基于Occupancy的freespace
  TrafficUnavailableAreaType_TYPE_GENERAL_AREA = 3;  // RESERVED
}

message TrafficUnavailableArea {
  optional string id = 1;
  optional TrafficUnavailableAreaType type = 2;
  repeated Point2DConfLevel unavailable_area = 3;
}
