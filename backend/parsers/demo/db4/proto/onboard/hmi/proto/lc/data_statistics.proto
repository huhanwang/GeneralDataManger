syntax = "proto2";

package snoah.LongCheng;


import "onboard/hmi/proto/lc/common.proto";
import "onboard/lite/proto/lite_common.proto";

message Value {
  optional int64 _d = 1;
  repeated string _v = 2;
}

message DataStatistic {
  optional string name = 1;
  optional int64 timestamp = 2;  // ms
  optional Value value = 3;
}

message DataStatistics {
  optional LiteHeader header = 1;
  optional HeaderLC header_lc = 2;
  repeated DataStatistic statistic = 3;
  optional string json_data = 4;
}
