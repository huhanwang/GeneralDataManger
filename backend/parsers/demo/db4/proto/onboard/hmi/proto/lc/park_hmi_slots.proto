syntax = "proto2";

package snoah.LongCheng;

import "onboard/hmi/proto/lc/common.proto";

message PARKHMISlot {
  optional int64 id = 1;
  optional int64 display_id = 2;
  // enter edge midpoint.
  optional Point2D slotpoint = 3;
  // enter edge angle [0, 90).
  optional float edge1ang = 4;
  // side edge angle [0, 360).
  optional float edge2ang = 6;
  // enter edge lenth.
  optional float edge1len = 7;
  // side edge lenth.
  optional float edge2len = 8;

  optional uint32 stop_status = 9;
  optional uint32 status = 10;
  optional uint32 type = 11;
  optional bool has_limiter = 12;
  optional uint32 slot_available_status = 13;
  optional bool select_enable = 14;
  optional bool small_space_size = 15;
  optional bool is_memorized = 16;
  optional bool is_personalized = 17;
  repeated Point2D points = 18;
  optional Point2D center = 19;
  optional double slot_heading = 20;
};

message PARKSlots {
  optional HeaderLC header = 1;
  repeated PARKHMISlot parking_slots = 2;
}
