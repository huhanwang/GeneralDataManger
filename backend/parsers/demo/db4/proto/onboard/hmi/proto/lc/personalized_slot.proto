syntax = "proto2";

package snoah.LongCheng;

import "onboard/hmi/proto/lc/common.proto";
import "onboard/hmi/proto/lc/park_hmi_slots.proto";
import "onboard/hmi/proto/lc/ap_hmi_slots.proto";

message PARKHMIPersonalizedSlotAVM {
  optional int64 id = 1;
  optional Point2D center_point = 2;
  optional float slot_angle = 3;
  optional float slot_length = 4;
  optional float slot_width = 5;

  optional LPP_PARKING_SLOT_STATUS status = 6;
  optional LPP_PARKING_SLOT_TYPE type = 7;
  optional bool is_heading_reversed = 8;
};

message PersonalSlot {
  optional PARKHMIPersonalizedSlotAVM personal_slot_for_avm = 1;
  optional PARKHMISlot personal_slot_for_eid = 2;
}
