syntax = "proto2";

package snoah.LongCheng.rpa;

// import "onboard/hmi/proto/lc/common.proto";
import "onboard/lite/proto/lite_common.proto";

message VALUE {
  enum PackageType {
    INT8 = 0;
    UINT8 = 1;
    INT16 = 2;
    UINT16 = 3;
    INT32 = 4;
    UINT32 = 5;
    FLOAT = 6;
    INT64 = 7;
    UINT64 = 8;
    DOUBLE = 9;
  }

  optional PackageType package_type = 1;
  oneof value {
    int32 value_i8 = 2;
    uint32 value_u8 = 3;
    int32 value_i16 = 4;
    uint32 value_u16 = 5;
    int32 value_i32 = 6;
    uint32 value_u32 = 7;
    float value_float = 8;
    int64 value_i64 = 9;
    uint64 value_u64 = 10;
    double value_double = 11;
  }
}

message PACKAGE {
  optional int32 key = 1;
  optional VALUE value = 2;
}

message RuntimeUploadingProto {
  optional LiteHeader header = 1;
  repeated PACKAGE pairs = 3;
}
