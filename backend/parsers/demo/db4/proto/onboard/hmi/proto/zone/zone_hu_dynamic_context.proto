  optional ZoneTrafficParticipants zone_traffic_participants =
      11;  // 交通参与者&障碍物

  optional ZoneStaticElements static_elements = 12;  // 静态元素

  repeated ZoneTrafficLight traffic_lights = 13;  // 交通灯
                                                  // 需要高度信息

