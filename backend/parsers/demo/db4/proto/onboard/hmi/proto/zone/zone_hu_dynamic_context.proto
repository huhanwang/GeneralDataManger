message ZoneTrafficParticipants {
  optional uint64 time_stamp = 1;
  optional uint32 cycle_counter = 2;
  optional int32 status = 3;
  repeated ZoneTrafficParticipant zone_traffic_participant = 4;
}

message ZoneStaticElements {
  optional uint64 time_stamp = 1;
  optional uint32 cycle_counter = 2;
  optional int32 status = 3;
  repeated ZoneStaticElement static_element = 4;
}

message ZoneHuDynamicContext {
  optional LiteHeader header = 1;

  //   optional CityHeader city_header = 2;

  optional ZoneLaneLine zone_lane_lines = 3;           // 车道线们
  optional ZoneNoaGuidelines zone_noa_guidelines = 4;  // NOA Guidelines

