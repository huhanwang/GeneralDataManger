syntax = "proto2";

package snoah.LongCheng;

import "onboard/hmi/proto/lc/common.proto";
import "onboard/lite/proto/lite_common.proto";

enum LPP_PARKING_SLOT_TYPE {
  LPP_PARKING_SLOT_TYPE_LEFT_PARALLEL = 0;
  LPP_PARKING_SLOT_TYPE_LEFT_VERTICAL = 1;
  LPP_PARKING_SLOT_TYPE_LEFT_ANGLED = 2;
  LPP_PARKING_SLOT_TYPE_RIGHT_PARALLEL = 3;
  LPP_PARKING_SLOT_TYPE_RIGHT_VERTICAL = 4;
  LPP_PARKING_SLOT_TYPE_RIGHT_ANGLED = 5;
  LPP_PARKING_SLOT_TYPE_ERROR = 7;
}
enum LPP_PARKING_SLOT_STATUS {
  LPP_PARKING_SLOT_STATUS_AVAILABLE = 0;
  LPP_PARKING_SLOT_STATUS_VEHICLE_OCCUPIED = 1;
  LPP_PARKING_SLOT_STATUS_PED_OCCUPIED = 2;
  LPP_PARKING_SLOT_STATUS_TWO_WHEELER_OCCUPIED = 3;
  LPP_PARKING_SLOT_STATUS_PRK_LOCK_OCCUPIED = 4;
  LPP_PARKING_SLOT_STATUS_CONE_OCCUPIED = 5;
  LPP_PARKING_SLOT_STATUS_OTHER_OCCUPIED = 14;
  LPP_PARKING_SLOT_STATUS_NOT_ACC = 15;
  LPP_PARKING_SLOT_STATUS_TOO_FAR = 16;
  LPP_PARKING_SLOT_STATUS_TOO_CLOSE = 17;
  LPP_PARKING_SLOT_STATUS_TOO_SMALL = 18;
  LPP_PARKING_SLOT_STATUS_NEAR_CROSS = 19;
  LPP_PARKING_SLOT_STATUS_FAR_CROSS = 20;
  LPP_PARKING_SLOT_STATUS_BEYOND_DISPLAY_AREA = 21;
  LPP_PARKING_SLOT_STATUS_NARROW_ROAD = 22;
  LPP_PARKING_SLOT_STATUS_SPACE_TOO_SMALL = 23;
  LPP_PARKING_SLOT_STATUS_INTERSECT_TOO_SMALL = 24;
  LPP_PARKING_SLOT_STATUS_OBS_TOO_CLOSE = 25;
  LPP_PARKING_SLOT_STATUS_ANGLE_TOO_LARGE = 26;
  LPP_PARKING_SLOT_STATUS_INVALID_POSITION = 27;
  LPP_PARKING_SLOT_STATUS_ERROR = 28;
  LPP_PARKING_SLOT_STATUS_PLANNING_FAIL = 29;
}

enum LPP_PARKING_SLOT_STATUS_EDGE {
  LPP_PARKING_SLOT_STATUS_EDGE_1_OCCUPIED = 11;
  LPP_PARKING_SLOT_STATUS_EDGE_2_OCCUPIED = 12;
  LPP_PARKING_SLOT_STATUS_EDGE_3_OCCUPIED = 13;
  LPP_PARKING_SLOT_STATUS_EDGE_4_OCCUPIED = 14;
}

enum LPP_PARKING_SLOT_STOP_STATUS {
  LPP_PARKING_SLOT_STOP_STATUS_NONE = 0;
  LPP_PARKING_SLOT_STOP_STATUS_EDGE_1 = 1;
  LPP_PARKING_SLOT_STOP_STATUS_EDGE_2 = 2;
  LPP_PARKING_SLOT_STOP_STATUS_EDGE_3 = 3;
  LPP_PARKING_SLOT_STOP_STATUS_EDGE_4 = 4;
}

enum LPP_PARKING_SLOT_AVAILABLE {
  LPP_PARKING_SLOT_AVAILABLE_NONE = 0;
  LPP_PARKING_SLOT_AVAILABLE_OPTIMUM = 1;
  LPP_PARKING_SLOT_AVAILABLE_TARGET = 2;
  LPP_PARKING_SLOT_AVAILABLE_MEMORIZED = 3;
}
message APHMISlot {
  optional int64 id = 1;
  optional int64 display_id = 2;
  // enter edge midpoint.
  optional Point2D slotpoint = 3;
  // enter edge angle [0, 90).
  optional float edge1ang = 4;
  // side edge angle [0, 360).
  optional float edge2ang = 6;
  // enter edge lenth.
  optional float edge1len = 7;
  // side edge lenth.
  optional float edge2len = 8;

  optional LPP_PARKING_SLOT_STOP_STATUS stop_status = 9;
  optional LPP_PARKING_SLOT_STATUS status = 10;
  optional LPP_PARKING_SLOT_TYPE type = 11;
  optional bool has_limiter = 12;
  optional LPP_PARKING_SLOT_AVAILABLE slot_available_status = 13;
};

message Slots {
  optional LiteHeader header = 1;
  optional HeaderLC header_lc = 2;
  repeated APHMISlot parking_slots = 3;
}
