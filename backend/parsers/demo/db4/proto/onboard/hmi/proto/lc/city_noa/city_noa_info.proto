message ADASInfo {
  optional ACC_FUNCTION_INDICATOR acc_function_indicator = 1;
  optional ACC_FUNCTION_STATUS acc_function_status = 2;
  optional ACC_FUNCTION_UNAVAILABLE_REASON acc_function_unavailable_reason = 3;
  optional bool acc_drive_off_remind = 5;
  optional LKA_LKAPLUS_FUNCTION_INDICATOR lka_lkaplus_function_indicator = 7;
  optional LKA_LKAPLUS_FUNCTION_STATUS lka_lkaplus_function_status = 8;
  optional LKA_LKAPLUS_UNAVAILABLE_REASON lka_lkaplus_unavailable_reason = 9;
  optional SR_TIPS_REMIND sr_tips_remind = 10;
}

message NOAInfo {
  optional NOA_FUNCTION_INDICATOR noa_function_indicator = 1;
  optional NOA_FUNCTION_STATUS noa_function_status = 2;
  optional NOA_UNAVAILABLEREASON noa_unavailablereason = 3;
  optional NOA_QUIT_NOTICE noa_quit_notice = 4;
  optional double noa_distance_left = 6;
  optional NOA_TURNING_AND_AVOID_MODE noa_turning_and_avoid_mode = 8;
  optional NOA_ACTIVE_VOICE_BROADCAST noa_active_voice_broadcast = 9;
}

message AlcInfo {
  optional LANE_CHANGE_BLOCK_REASON lane_change_block_reason = 1;
  optional LANE_CHANGE_REASON lane_change_reason = 2;
  optional LANE_CHANGE_ST lane_change_st = 3;
  optional LANE_CHANGE_UNAVAILABLE_REASON lane_change_unavailable_reason = 4;
  optional int32 lane_change_takeover_request_warning =
      5;  // 驾驶员控制变道提醒
  optional RECOMMEND_LANE_CHANGING recommend_lane_changing =
      6;  // 推荐变道，只用于效率变道
}

message ActvieSafetyHuInfo {
  optional bool safety_fcw_wrnng_active = 1
      [default = false];  // true: active, false: inactive
  optional bool safety_fcw_error_status = 2
      [default = false];  // true: error, false: no error
  optional bool safety_aeb_function_enable = 3
      [default = false];  // true:enable,  false: disable
  optional bool safety_aes_function_enable = 4
      [default = false];  // true:enable,  false: disable
  optional bool safety_bsd_function_enable = 5
      [default = false];  // true:enable, false: disable
  optional bool safety_bsd_error_status = 6
      [default = false];  // true: error, false: no error
  optional bool safety_dow_function_enable = 7
      [default = false];  // true:enable, false: disable
  optional bool safety_dow_error_status = 8
      [default = false];  // true: error, false: no error
  optional bool safety_elk_function_feedback = 9
      [default = false];  // true: enable, false: disable
  optional bool safety_elk_error_status = 10
      [default = false];  // true: error, false: no error
  optional int32 safety_fcw_function_feedback =
      11;  // 0 disable, 1 early, 2 normal, 3 late
  optional int32 safety_aeb_function_status =
      12;  // 0 off, 1 init, 2 inhibit, 3 stand by, 4 override, 5 active, 6 eba,
           // 7 error
  optional int32 safety_aes_function_status = 13;
  optional int32 safety_aes_function_direction = 14;
  optional int32 safety_bsd_left_warning_level =
      15;  // 0 no warning, 1 first level, 2 second level
  optional int32 safety_bsd_right_warning_level =
      16;  // 0 no warning, 1 first level, 2 second level
  optional int32 safety_ld_function_feedback =
      17;  // 0 disable, 1 ldw enable, 2 ldp enable
  optional int32 safety_ld_function_line_type = 18;
  optional int32 safety_ld_error_status =
      19;  // 0 no error, 1 ldw error, 2 ldp error, 3 both error
  optional int32 safety_ldw_warning_direction = 20;  // 0 none, 1 left, 2 right
  optional int32 safety_ldP_warning_direction = 21;  // 0 none, 1 left, 2 right
  optional int32 safety_ldp_function_status =
      22;  // 0 standby, 1 left active, 2 right active, 3 fail
  optional int32 safety_dow_rl_door_warning_level =
      23;  // 0 no warning, 1 first level, 2 second level
  optional int32 safety_dow_rr_door_warning_level =
      24;  // 0 no warning, 1 first level, 2 second level
  optional int32 safety_dow_fl_door_warning_level =
      25;  // 0 no warning, 1 first level, 2 second level
  optional int32 safety_dow_fr_door_warning_level =
      26;  // 0 no warning, 1 first level, 2 second level
  optional int32 safety_elk_function_control_type =
      27;  // 0 default, 1 L_Bound, 3 L_OC_Car, 5 LF_Car, 7 L_OT_Car
  optional int32 safety_elk_function_warning_type = 28;
  optional int32 safety_elk_function_status =
      29;  // 0 off, 1 standby, 2 active, 3 finish, 4 fail
  optional uint32 safety_fcta_left_warning = 30;
  optional uint32 safety_fcta_right_warning = 31;
  optional uint32 safety_rcta_left_warning = 32;
  optional uint32 safety_rcta_right_warning = 33;
  optional uint32 safety_rctb_left_warning = 34;
  optional uint32 safety_rctb_right_warning = 35;
  optional bool safety_rcw_wrnng = 36;
  optional uint32 ls_aeb_object_type = 37;
  optional uint32 ls_aeb_warning = 38;
  optional uint32 ls_aeb_active = 39;
  optional uint32 safety_fctb_left_warning = 40;
  optional uint32 safety_fctb_right_warning = 41;
  optional uint32 safety_mai_active = 42;
  optional uint32 asafety_func_direction = 43;
}

