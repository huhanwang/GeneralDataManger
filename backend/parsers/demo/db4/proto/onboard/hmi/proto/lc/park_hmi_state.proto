  HMI_APA_STATUS_COMPLETE = 7;
  HMI_APA_STATUS_FAILURE = 8;
  HMI_APA_STATUS_OVERRIDE = 9;
}

enum MappingStatus {
  HMI_MAPPING_STATUS_INHIBIT = 0;
  HMI_MAPPING_STATUS_STANDBY = 1;
