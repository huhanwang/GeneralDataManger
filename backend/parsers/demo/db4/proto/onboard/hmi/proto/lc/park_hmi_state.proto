message APOInfo {
  optional APODirectionDisplay apo_direction_display =
      1;  // Availability of APO direction
  optional APOSlotType apo_slot_type =
      2;  // Type of slot which the vehicle is located
  optional APODirectionConfirm apo_direction_confirm =
      3;  // APO direction execute confirm
}

message SubStatus {
  optional APASubStatus cur_apa_sub_status = 1;  // APA Display info
  optional AVPSubStatus cur_avp_sub_status = 2;  // AVP Display info
  optional MapSubStatus cur_map_sub_status = 3;  // Mapping Display info
}

message ParkTargetGear {
  enum TargetGear {
    GEAR_R = 1;
    GEAR_N = 2;
    GEAR_D = 3;
    GEAR_P = 4;
  }

  optional uint64 id = 1;
  optional TargetGear gear = 2;
}

message ActiveInfo {
  optional LongCheng.Pose3D map_loc = 1;
  optional LongCheng.Pose3D odom_pose = 2;
  optional float step_total_distance = 3;   // Total distance of current step
  optional float step_drove_distance = 4;   // Drove distance of current step
  optional float step_remain_distance = 5;  // Remain distance of current step
  optional float total_distance = 6;        // Total distance of whole process
  optional float drove_distance = 7;        // Drove distance of whole process
  optional float remain_distance = 8;       // Remain distance of whole process
  optional float path_length = 9;
  optional float path_remain_length = 10;
  optional int32 remain_holdsteer_times = 11;  // Times of remain gear shifting
  optional int32 total_holdsteer_times =
      12;  // Times of whole process gear shifting
  repeated ParkTargetGear target_gears = 13;  // List of target gears
  optional int64 learning_distance = 14;
  optional int64 learning_back_distance = 15;
  optional int64 learning_allowed_back_distance = 16;
}

message ParkHmiState {
  optional LiteHeader header = 1;
  optional LongCheng.HeaderLC header_lc = 2;
  optional BasicInfoLC basic_info = 3;
  optional APOInfo apo_info = 4;
  optional SubStatus sub_status = 5;
  optional ActiveInfo active_info = 6;
  optional RpaStateProto.RPAUnavailableReason rpa_unavailable_reason = 7;
}

message XApHmiState {
  optional LiteHeader header = 1;
  optional LongCheng.HeaderLC header_lc = 2;
  optional ParkStatus apa_status = 3;
}
