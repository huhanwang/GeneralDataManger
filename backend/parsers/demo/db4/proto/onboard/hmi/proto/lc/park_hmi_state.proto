  APO_DIRECTION_DISPLAY_FRONT = 1;        // Front available
  APO_DIRECTION_DISPLAY_RIGHT = 2;        // Right available
  APO_DIRECTION_DISPLAY_LEFT = 3;         // Left availabale
  APO_DIRECTION_DISPLAY_FRONT_RIGHT = 4;  // Front & Right available
  APO_DIRECTION_DISPLAY_FRONT_LEFT = 5;   // Front & Left available
  APO_DIRECTION_DISPLAY_RIGHT_LEFT = 6;   // Right & Left available
