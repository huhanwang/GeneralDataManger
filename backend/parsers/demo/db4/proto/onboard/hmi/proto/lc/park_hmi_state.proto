enum ParkingObjectType {
  TYPE_NONE = 0;
  TYPE_SPEED_BUMP = 1;
  TYPE_PILLAR = 2;
}
message APHMIObject {
  optional int32 id = 1;
  optional int32 type = 2;
  optional LongCheng.Point3D position = 3;
  optional float heading = 4;
  optional float length = 5;
  optional float width = 6;
}

