  APO_DIRECTION_CONFIRM_INVALID = 0;
  APO_DIRECTION_CONFIRM_FRONT = 1;
  APO_DIRECTION_CONFIRM_LEFT = 2;
  APO_DIRECTION_CONFIRM_RIGHT = 3;
}

enum APAUnavailableReason {
  Availabale = 1;
  OVER_SLOP = 14;
}

enum HUEIDDISPLAYMODE {
  DRIVING_MODE = 0;
  PARKING_MODE = 1;
}

enum MappingRouteType {
  HMI_MAPPING_ROUTE_TYPE_INITI = 0;
  HMI_MAPPING_ROUTE_TYPE_PARKING_IN = 1;
  HMI_MAPPING_ROUTE_TYPE_PARKING_OUT = 2;
  HMI_MAPPING_ROUTE_TYPE_PARKING_IN_BACKGROUNG = 3;
  HMI_MAPPING_ROUTE_TYPE_PARKING_OUT_BACKGROUNG = 4;
}

message BasicInfoLC {
  optional ParkStatus park_status = 1;  // APA work status
  optional MappingStatus mapping_status = 2;
  optional ParkFunctionMode park_function_mode = 3;
  optional ParkControlMode park_control_mode = 4;
  optional FunctionStandbyMode function_standby_mode = 5;
  optional bool pas_warning = 6;                   // PAS warning
  optional int32 mapping_progress_percentage = 7;  // 0-100
  optional MappingResult mapping_result = 8;
  optional int64 recommand_id = 9;
  optional int64 target_id = 10;
  optional int64 car_in_slot_id = 11;
  optional LocStatusLC loc_status = 12;
  optional AVPUnactivateReason avp_unactivate_reason = 13;
  optional string loc_map_id = 14;  // 已匹配地图 ID
  optional MapType map_type = 15;   // 地图前台后台学习类型
  optional bool is_apa_active = 16;  // AVP功能是否进入APA进程，用于切换视角
  optional bool avp_active_unavailable = 17;
  optional UnbuckledAlertLevel unbuckled_alert_level = 18;
  optional OverrideAlertLevel override_alert_level = 19;
  optional SpeedlimitAlertLevel speedlimit_alert_level = 20;
  optional TakeOverReq takeover_req = 21;
  optional TurnAction turn_action = 22;
  optional SlopAction slop_action = 23;
  optional bool mapping_by_system = 24;
  optional int32 alert_time_count = 25;
  optional bool drive_in_park_lot = 26;
  optional bool in_door = 27;
  optional ParkOffsetEnable park_offset_enable = 28;
  optional ParkOffsetType park_offset = 29;
  optional ParkOffsetStatus park_offset_middle_status = 30;
  optional ParkOffsetStatus park_offset_left_status = 31;
  optional ParkOffsetStatus park_offset_right_status = 32;
  optional APAUnavailableReason apa_unavailable_reason = 33;
  optional HUEIDDISPLAYMODE hu_eid_display_mode = 34;
  optional MappingResult rpa_doorclose_unavailable_reason = 35;
  optional bool rpa_doorclose_unavailable_reason_tts_req = 36;
  optional bool remote_key_not_in_car = 37;
  optional bool flag_is_personalized_slot = 38;
  optional MappingRouteType mapping_route_type = 39;
  optional Chassis.GearPosition gear_location = 40;
}

