syntax = "proto2";

package snoah.LongCheng;

import "onboard/hmi/proto/lc/common.proto";

enum ParkingObjectType {
  TYPE_NONE = 0;
  TYPE_SPEED_BUMP = 1;
  TYPE_PILLAR = 2;
}
message APHMIObject {
  optional int32 id = 1;
  optional int32 type = 2;
  optional Point3D position = 3;
  optional float heading = 4;
  optional float length = 5;
  optional float width = 6;
}
message Objects {
  optional HeaderLC header = 1;
  repeated APHMIObject parking_objects = 2;
}
