syntax = "proto2";

package snoah.mapping;

import "onboard/common/proto/drive_mission.proto";

message RouteSpecificSemanticMapProto {
  optional string map_name = 1;
  optional string map_sha = 2;
  optional string route_id = 3;
  optional RoutingRequestProto routing_request = 4;
  repeated sfixed64 patch_ids = 5;
}

message RouteSpecificSemanticMapsProto {
  repeated RouteSpecificSemanticMapProto route_maps = 1;
}
