syntax = "proto2";

package snoah.mapping;

import "onboard/maps/proto/geometry.proto";
import "onboard/maps/proto/lane_path.proto";
import "onboard/math/geometry/proto/affine_transformation.proto";
import "onboard/common/proto/map_geometry.proto";
import "onboard/maps/proto/semantic_map_shape.proto";
import "onboard/maps/proto/semantic_map_zone.proto";
import "onboard/maps/ehr/proto/extension.proto";
import "onboard/maps/ehr/proto/dynamic_event.proto";
import "onboard/maps/proto/sd_map.proto";
import "onboard/maps/proto/map_internal.proto";
import "onboard/maps/dynamic_layer/proto/non_odd.proto";

// AutoNavi HighDefinition Map ExchangeFormat:

// WARNING: The type sfixed64 is researved for feature ID only! Don't use it to
// represent other info in semantic maps.

// A sequence consisting of the start and end points of some dashed line
// segments.
message DashPointSequence {
  // The points are already sorted along the lane boundary direction.
  repeated GeoPointProto points = 1;
  // Indicates whether the first point in a sequence of points is the start or
  // end point.
  optional bool first_point_is_start = 2 [default = true];
  repeated ValidationRecord skip_records = 3;
  repeated Confidence points_confidence = 4;
}

// The intersection geometry information of Polyline and Polygon.
message GeoIntersectInfo {
  optional sfixed64 other_id = 1;
  // Fraction of entry points in Polyline.
  optional double entry_fraction = 2;
  // Fraction of exit points in Polyline.
  optional double exit_fraction = 3;
}

message LaneBoundaryProto {
  optional sfixed64 id = 1;

  optional sfixed64 section_id = 9;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields: marked by map labeling operators.
  optional GeoPolylineProto polyline = 2;

  // Control points to generate Bézier curve.
  optional GeoPolylineProto control_points = 8;

  enum Type {
    SOLID_DOUBLE_YELLOW = 1;
    SOLID_YELLOW = 2;
    BROKEN_YELLOW = 3;
    SOLID_WHITE = 4;
    BROKEN_WHITE = 5;
    CURB = 6;
    CURB_MOVABLE = 14;
    UNKNOWN_TYPE = 7;
    BROKEN_LEFT_DOUBLE_WHITE = 8;
    BROKEN_RIGHT_DOUBLE_WHITE = 9;
    VIRTUAL = 10;
    SOLID_DOUBLE_WHITE = 11;
    BROKEN_DOUBLE_YELLOW = 12;
    BROKEN_DOUBLE_WHITE = 13;

    reserved 1000 to 1999;  // for auto labeling
  }
  optional Type type = 3;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
  repeated LaneBoundaryIncidenceProto lanes_on_left = 6;
  repeated LaneBoundaryIncidenceProto lanes_on_right = 7;

  repeated sfixed64 start_connection_ids = 10;
  repeated sfixed64 end_connection_ids = 11;
  repeated int32 belonging_levels = 12;
  // This field is only valid for curb.
  // It is the height relative to the ground.
  optional double height = 13;  // meters
  repeated ValidationRecord skip_records = 14;
  // End points of dashed line segment.
  // This field is set when the boundary type is related to the broken line.
  optional DashPointSequence dash_point_sequence = 15;

  optional Confidence confidence = 16;

  enum VisualType {
    YELLOW_SOLID = 1;
    YELLOW_BROKEN = 2;
    WHITE_SOLID = 3;
    WHITE_BROKEN = 4;
  }
  repeated VisualType visual_types = 18;  // at most 2

  enum SemanticType {
    // LeftLine_RightLine
    BROKEN_BROKEN = 1;
    BROKEN_SOLID = 2;
    SOLID_BROKEN = 3;
    SOLID_SOLID = 4;
  }
  optional SemanticType semantic_type = 19;
  repeated GeometryShape shapes = 20;

  reserved 4, 5, 17;
  // This field is for compatibility with OnlineLaneBoundaryProto. In Online
  // Map, boundaries can be very long, and the type of the points can vary in
  // between. It's guarranteed that, if not empty,then points_type_size() ==
  // polyline().points_size(). For HDMap, it's guarranteed to be empty.
  repeated Type points_type = 21;

  // Describes the type of lane boundary attachment line.
  enum ExtraType {
    NONE = 1;
    VARIABLE_DIRECTION = 2;
    LEAD = 3;
    SLOW_DOWN = 4;
  }
  optional ExtraType extra_type = 22;
  repeated ExtraType points_extra_type = 26;
  // For historical reasons, the curb in the type field is a general concept,
  // which means any boundary, and also means the virtual curb generated by
  // qview. Now, in order to provide data for the perception model, the curb
  // type is subdivided.
  enum CurbType {
    GENERAL_LOW_CURB = 1;      // 低路沿
    FENCE = 2;                 // 栅栏
    CEMENT_PIER = 3;           // 水泥墩
    GENERAL_HIGH_CURB = 4;     // 高路沿
    GUARDRAIL = 5;             // 护栏
    KERB = 6;                  // 路肩
    WALL = 7;                  // 墙
    BARRIER = 8;               // 杆状障碍物
    VIRTUAL_THRINACIA = 9;     // 虚拟三角岛
    PAVED_ROADEDGE = 10;       // 铺设道路边缘
    NO_MARKING_ROADEDGE = 11;  // 无标线无可区分边界（虚拟边界）
    NATUAL_BARRIER = 12;       // 绿化带、山体、土坡、边沟等
    CONSTRUCTION_FENCE = 13;   // 施工围栏
    CURB_TYPE_NONE = 99;       // 未知
  }
  optional CurbType curb_type = 24;

  // third party hd map only
  optional bool is_drivable_boundary = 25;

  // smooth coordinate
  repeated Vec2dProto smooth_points = 27;

  reserved 23;

  extensions 100 to 199;  // for auto labeling
}

message CrosswalkCrossingProto {
  optional sfixed64 crosswalk_id = 1;
  optional double start_fraction = 2;
  optional double end_fraction = 3;
  repeated int32 belonging_levels = 4;
  repeated ValidationRecord skip_records = 5;
}

message LaneInteractionProto {
  optional sfixed64 other_lane_id = 1;

  enum GeometricConfiguration {
    CROSS = 1;
    MERGE = 2;
  }
  optional GeometricConfiguration geometric_configuration = 2;

  enum ReactionRule {
    // We have stop sign, the other lane does not.
    STOP = 1;
    // Both lane have stop signs.
    BOTH_STOP = 2;
    // We have lower precedence than the other lane.
    YIELD = 3;
    // We have higher precedence than the other lane.
    PROCEED = 4;
    // When the traffic light is red, we should yield to the other lane.
    YIELD_ON_RED = 6;
    // When the traffic light is green circle, we should yield to the other
    // lane.
    YIELD_ON_GREEN_CIRCLE = 7;
    // Both lanes have the same precedence.
    FFA = 5;  // FFA stands for Free For All
    // The other lane is merging lane, we should yield.
    YIELD_MERGE = 8;
    // We are merging lane, the other lane should yield.
    PROCEED_MERGE = 9;
  }
  optional ReactionRule reaction_rule = 3;

  optional sfixed64 intersection_id = 4;
  optional double this_lane_fraction = 5;
  optional double other_lane_fraction = 6;
  optional bool keep_it = 7;
  repeated int32 belonging_levels = 8;
  repeated ValidationRecord skip_records = 9;
}

message LaneNeighborProto {
  optional sfixed64 other_id = 1;
  optional double this_start_fraction = 2;
  optional double this_end_fraction = 3;
  optional double other_start_fraction = 4;
  optional double other_end_fraction = 5;
  optional bool opposite = 8;

  optional sfixed64 lane_boundary_id = 7;
  optional LaneBoundaryProto.Type lane_boundary_type = 6;
  repeated int32 belonging_levels = 9;
  repeated ValidationRecord skip_records = 10;
}

message LaneBoundaryIncidenceProto {
  optional sfixed64 lane_id = 1;
  optional sfixed64 lane_boundary_id = 2;
  optional double lane_start_fraction = 3;
  optional double lane_end_fraction = 4;
  optional double lane_boundary_start_fraction = 5;
  optional double lane_boundary_end_fraction = 6;
  optional bool opposite = 7;
  repeated int32 belonging_levels = 8;
  optional bool manual_modification = 9;
  repeated ValidationRecord skip_records = 10;
}

// Next ID: 37
message LaneProto {
  optional sfixed64 id = 1;

  optional sfixed64 section_id = 30;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolylineProto polyline = 2;

  // Control points to generate Bézier curve.
  optional GeoPolylineProto control_points = 24;

  enum Type {
    // General for any passenger vehicle
    GENERAL = 1;
    BICYCLE_ONLY = 2;
    BUS_ONLY = 3;
    // TODO(luzou): this is deprecated by the: optional bool is_virtual = 43
    VIRTUAL = 4 [deprecated = true];
    EMERGENCY = 5;
    RAMP = 6;
    WALKING_STREET = 7;
    // Parking lane: can drive on it, if not occupied
    PARKING = 8;
    // Basically means GENERAL + BICYCLE_ONLY
    MIXED_WITH_CYCLIST = 9;
    ENTRANCE = 10;  // 仅为加速车线,不包括加减速复合车线
    EXIT = 11;      // 仅为减速车线,不包括加减速复合车线
    RAMP_ENTRANCE = 12 [deprecated = true];
    RAMP_EXIT = 13 [deprecated = true];
    RAMP_JCT = 14 [deprecated = true];
    TIDAL = 15;               // 潮汐车道，四维称REVERSIBLE
    VARIABLE_DIRECTION = 16;  // 可变车道
    LEFT_TURN_WAITING = 17;   // 左转待转车道
  }
  optional Type type = 3;

  enum Direction {
    STRAIGHT = 1;
    LEFT_TURN = 2;
    RIGHT_TURN = 3;
    UTURN = 4;
  }
  optional Direction direction = 36 [default = STRAIGHT];

  message GroundArrow {
    enum Type {
      STRAIGHT = 1;
      LEFT = 2;
      RIGHT = 3;
      UTURN = 4;
      LEFT_UTURN = 5;
      RIGHT_UTURN = 6;
      LEFT_RIGHT = 7;
      STRAIGHT_UTURN = 8;
      STRAIGHT_LEFT = 9;
      STRAIGHT_RIGHT = 10;
      STRAIGHT_LEFT_RIGHT = 11;
      STRAIGHT_U_TURN_LEFT = 12;
      MERGE_TO_LEFT = 13;
      MERGE_TO_RIGHT = 14;
    }
    optional Type type = 1;
    optional double fraction = 2;
  }
  repeated GroundArrow ground_arrows = 57;

  optional uint32 speed_limit_mph = 4;
  optional uint32 speed_limit_kph = 29;
  message SpeedLimit {
    optional double start_fraction = 1;
    optional uint32 speed_limit_kph = 2;
  }
  repeated SpeedLimit speed_limits_kph = 54;

  repeated sfixed64 incoming_lanes = 5;
  repeated sfixed64 outgoing_lanes = 6;

  optional sfixed64 endpoint_associated_stop_sign = 7;
  optional bool endpoint_associated_yield_sign = 19;
  // Replace endpoint by startpoint associated with tl
  repeated sfixed64 endpoint_associated_traffic_lights = 8;
  repeated sfixed64 startpoint_associated_traffic_lights = 31;

  // Only used at left waiting turn lane in intersection
  message MultiTrafficLightControlPoint {
    optional double lane_fraction = 1
        [default = 0];  // fraction position at this lane
    repeated sfixed64 left_tls =
        2;  // left traffic lights which can affect this point
    repeated sfixed64 straight_tls = 3;
    repeated sfixed64 right_tls = 4;
  }
  repeated MultiTrafficLightControlPoint multi_traffic_light_control_points =
      34;

  optional bool controlled_by_green_circle_tl = 14;
  optional bool controlled_by_green_arrow_tl = 15;
  optional bool controlled_by_red_circle_tl = 16;
  optional bool controlled_by_red_arrow_tl = 17;

  // If there are associated traffic lights, we will stop on red unless this
  // is true. This will be true for all right turns without "No turn on red"
  // signs.
  optional bool can_go_on_red = 18;

  optional bool endpoint_toll = 9;

  // Similar to endpoint toll, If true, can be activated as a endpoint_toll by
  // remote assist request.
  optional bool dynamic_endpoint_toll = 20;

  // If not empty, must be the same size as polyline().points().
  repeated double left_rac_clearances = 21;
  repeated double right_rac_clearances = 22;

  // Turn signal is required when we're driving on this lane.
  message RequireTurnSignalProto {
    // If this proto exists, even if empty, the corresponding signal is requird.
    // If the start/end fractions are specified, the turn signal is required in
    // the specified range. If not specified, it is assumed to be the full
    // range.
    optional double start_fraction = 1;
    optional double end_fraction = 2;
  }
  optional RequireTurnSignalProto require_left_turn_signal = 32;
  optional RequireTurnSignalProto require_right_turn_signal = 33;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
  repeated CrosswalkCrossingProto crosswalk_crossings = 12;
  repeated LaneInteractionProto interactions = 13;

  repeated LaneNeighborProto lane_neighbors_on_left = 25;
  repeated LaneNeighborProto lane_neighbors_on_right = 26;
  repeated LaneBoundaryIncidenceProto lane_boundaries_on_left = 27;
  repeated LaneBoundaryIncidenceProto lane_boundaries_on_right = 28;
  repeated int32 belonging_levels = 35;
  optional bool is_merging = 37 [default = false];
  repeated sfixed64 keep_clear_zone_id = 38;

  enum TurnProtect {
    PROTECTED = 1;
    UNPROTECTED = 2;
    PROTECTED_TO_UNPROTECTED = 3;
  }
  optional TurnProtect left_turn_protect = 39 [default = PROTECTED];

  // specify the intervals in day in which the current lane is 'bus only'.
  // The intervals are measured in floating point hours
  repeated Interval bus_only_day_intervals = 40;
  // For reversible lanes, sometimes calls tidal flow or tidal lanes.
  // They have opposite direction in some time intervals of day.
  repeated Interval reverse_day_intervals = 41;
  repeated ValidationRecord skip_records = 42;

  optional bool is_virtual = 43;
  optional bool is_left_turn_to_outermost = 44;
  repeated GeometryShape shapes = 46;

  repeated GeoIntersectInfo intersected_intersections = 47;
  optional bool is_in_intersection = 48;

  optional ehr.hdmap.LaneExtend third_party_lane_extend = 51;

  repeated GeoIntersectInfo intersected_crosswalks = 52;
  repeated GeoIntersectInfo intersected_speed_bumps = 53;

  // smooth coordinate
  repeated Vec2dProto smooth_points = 55;

  reserved 10, 11, 23, 45, 49, 50;

  repeated Vec3dProto polyline_yaw_pitch_rolls =
      56;  // Corresponding to the points in the polyline(filed 2) one by one.
  optional bool is_spliting = 58 [default = false];
  // next index: 59

  extensions 100 to 199;  // for auto labeling
}

message CrosswalkProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolygonProto polygon = 2;

  enum Type {
    UNCONTROLLED = 1;
    TRAFFIC_LIGHT_CONTROLLED = 2;
    // If pedestrain is offroad and in crosswalk will treat it as onroad.
    MUST_YEILD = 3;
  }
  optional Type type = 3;

  optional sfixed64 associated_traffic_light = 4;
  repeated int32 belonging_levels = 5;
  repeated ValidationRecord skip_records = 6;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
  repeated GeoIntersectInfo intersected_lanes = 7;

  repeated Vec2dProto polygon_points = 8;
}

enum TrafficLightShape {
  TLS_ROUND = 1;
  TLS_UP_ARROW = 2;
  TLS_LEFT_ARROW = 3;
  TLS_RIGHT_ARROW = 4;
  TLS_UP_LEFT_ARROW = 5;
  TLS_UP_RIGHT_ARROW = 6;
  TLS_UTURN = 7;
  TLS_COUNTDOWN = 8;
  TLS_TEXT = 9;
}

enum TrafficLightTransitionPattern {
  TLTP_GREEN_YELLOW_RED = 1;
  TLTP_GREEN_GREENFLASHING_YELLOW_RED = 2;
  // According to the new National Standard, right-turn TLs does not have Green
  // state, 'Off' means 'Proceed'
  TLTP_OFF_YELLOW_RED = 3;
}

enum TrafficLightStaticColor {
  TLC_GREEN = 1;
  TLC_YELLOW = 2;
  TLC_RED = 3;
}

message TrafficLightBulbProto {
  optional TrafficLightStaticColor color = 1;
  optional TrafficLightShape shape = 2;
  repeated int32 belonging_levels = 3;
  repeated ValidationRecord skip_records = 4;
}

message TrafficLightProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPointProto point = 2;

  enum Type {
    REGULAR = 1;
    CROSSWALK = 2;
  }
  optional Type type = 6 [default = REGULAR];
  repeated TrafficLightShape shapes = 7 [deprecated = true];
  optional bool vertical = 8 [default = true];

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
  optional GeoPointProto bb_center = 3;
  optional double bb_heading = 4;
  optional Vec3dProto bb_size = 5;

  /////////////////////////////////////////////////////////////////////////////
  // TL topological relationship
  repeated sfixed64 controlling_lane_ids = 9;
  repeated sfixed64 blocking_tl_ids = 10;
  repeated sfixed64 being_blocked_tl_ids = 11;
  repeated sfixed64 synced_tl_ids = 12;

  optional TrafficLightTransitionPattern transition_pattern = 13;
  repeated TrafficLightBulbProto bulbs = 14;

  // The duration of yellow light, can be used by planner
  optional double yellow_duration = 15;
  // The duration of (green) flashing, can be used by planner. e.g. 5s
  // Here we assume only green light can flash, if not, change this field
  optional double flash_duration = 16;

  // When flashing, the interval of a turned on light, e.g. 0.5s.
  // Can be used by perception
  optional double flash_on_interval = 17;
  // the interval of a turned off light during flashing, e.g. 0.1s
  optional double falsh_off_interval = 18;
  repeated int32 belonging_levels = 19;
  // According to the new National Standard, right-turn TLs does not have Green
  // state, 'Off' means 'Proceed'
  optional bool can_proceed_on_off = 20;
  repeated ValidationRecord skip_records = 21;
  optional double relative_height = 22;
  // Some third party vendors may provide this info (Tencent)
  repeated LaneProto.Direction control_directions = 23;
  optional sfixed64 section_id = 24;
}

message StopSignProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPointProto point = 2;
  optional double heading = 3;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
  optional sfixed64 intersection_id = 4;
  repeated int32 belonging_levels = 5;
  repeated ValidationRecord skip_records = 6;
}

message SpeedBumpProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolygonProto polygon = 2;
  optional uint32 speed_limit_mph = 3 [default = 5];
  optional uint32 speed_limit_kph = 4 [default = 10];
  repeated int32 belonging_levels = 5;
  repeated ValidationRecord skip_records = 6;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
  repeated GeoIntersectInfo intersected_lanes = 7;
}

message ParkingAreaProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolygonProto polygon = 2;
  repeated int32 belonging_levels = 3;
  repeated ValidationRecord skip_records = 4;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
}

message IntersectionProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolygonProto polygon = 2;
  repeated int32 belonging_levels = 3;
  repeated ValidationRecord skip_records = 4;
  repeated Vec2dProto polygon_points = 7;  // smooth coordinate

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
  optional bool traffic_light_controlled = 5;
  repeated GeoIntersectInfo intersected_lanes = 6;
}

message DrivewayProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolygonProto polygon = 2;
  repeated int32 belonging_levels = 3;
  repeated ValidationRecord skip_records = 4;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
}

// Deprecated
message VegetationZoneProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolygonProto polygon = 2;
  repeated int32 belonging_levels = 3;
  repeated ValidationRecord skip_records = 4;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
}

// Deprecated
message StaticObjectZoneProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolygonProto polygon = 2;
  repeated int32 belonging_levels = 3;
  repeated ValidationRecord skip_records = 4;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
}

message PerceptionZoneProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolygonProto polygon = 2;

  enum Type {
    STATIC_OBJECT = 1;
    IGNORANCE = 2;
    VEGETATION = 3;
    BARRIER = 4;
    REFLECTION = 5;   // e.g. vertical mirror surface of buildings.
    OVERHANGING = 6;  // Hanging but no need to detect. e.g. soft vegetations.
  }
  optional Type type = 3;
  repeated int32 belonging_levels = 4;
  repeated ValidationRecord skip_records = 5;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
}

message ImageryUncertainZoneProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolygonProto polygon = 2;
  repeated int32 belonging_levels = 3;
  repeated ValidationRecord skip_records = 4;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
}

message PostProcessingZoneProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolygonProto polygon = 2;

  enum Type {
    ROAD_DEFECT = 1;
    ROAD_WORK = 2;
    PARKED_VEHICLE_WITH_GROUND = 3;
    PARKED_VEHICLE = 4;
  }
  optional Type type = 3 [default = ROAD_DEFECT];

  optional string road_work_done_date = 4 [default = "20190801"];
  repeated int32 belonging_levels = 5;
  repeated ValidationRecord skip_records = 6;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
}

// An explanation of a location is in the map.
message NamedSpotProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional string name = 2;
  optional GeoPointProto point = 3;
  optional sfixed64 associated_bus_station_stop_area = 4;
  repeated int32 belonging_levels = 5;
  optional string note = 6;
  enum Type {
    // This type represents the passenger stop where taxis and minibuses
    // pick up / drop off passengers.
    PICK_UP_POINT = 1;
    // This type is used to mark some special cases that break the current
    // mapping specification.
    TAG = 2;
  }
  optional Type type = 7 [default = PICK_UP_POINT];
  repeated ValidationRecord skip_records = 8;
}

message SectionProto {
  optional sfixed64 id = 1;
  repeated sfixed64 lanes = 2;
  repeated sfixed64 boundaries = 3;
  repeated sfixed64 incoming_sections = 4;
  repeated sfixed64 outgoing_sections = 5;
  repeated int32 belonging_levels = 6;

  // Used by global routing algorithms
  // the length and speed_limit is currently not used, maybe deprecate in future
  optional double length = 7;           // meters
  optional double speed_limit = 8;      // meters per second
  repeated uint64 patch_ids = 9;        // the patch ids this section belongs to
  optional double average_length = 10;  // meters
  optional double average_speed_limit = 11;  // meters per second
  repeated ValidationRecord skip_records = 12;

  enum RoadClass {
    NORMAL = 1;
    CITY_EXPRESS = 2;
    HIGHWAY = 3;
  }
  optional RoadClass road_class = 13;

  enum Type {
    // OPEN means not covered by anything, e.g. can receive GPS signal, etc.
    OPEN = 1;
    TUNNEL = 2;
    BENEATH_VIADUCT = 3;
    UNDERGROUND = 4;
    ROUNDABOUT = 5;
  }
  optional Type type = 14;

  optional ehr.hdmap.SectionExtend third_party_section_extend = 16;

  optional DynamicEvents dynamic_events = 17;
  optional bool is_toll_booth_area = 18 [default = false];
  repeated non_odd.NonODDProto non_odds = 19;

  reserved 15;
}

message BusStationStopAreaProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolygonProto polygon = 2;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
  repeated LanePathProto lane_paths = 3;
  repeated int32 belonging_levels = 4;
  repeated ValidationRecord skip_records = 5;
}

// For QView visualization only.
message BuildingProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolygonProto polygon = 2;
  optional uint32 height = 3 [default = 10];  // meters
  repeated int32 belonging_levels = 4;
  repeated ValidationRecord skip_records = 5;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
}

// For QView visualization only.
message BusStationProto {
  optional sfixed64 id = 1;

  optional GeoPointProto point = 2;
  optional double heading = 3;
  optional uint32 height = 4 [default = 10];
  repeated int32 belonging_levels = 5;
  repeated ValidationRecord skip_records = 6;
}

// For Localization elimination.
message LocalizationUncertainZoneProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolygonProto polygon = 2;
  repeated int32 belonging_levels = 3;
  repeated ValidationRecord skip_records = 4;

  enum Type {
    POOR_IMAGERY = 1;
    LONG_TUNEL = 2;
    // For visual localization: If the quality of BEV road geometry is bad,
    // leading to consistent visual localization failure, we can mark this the
    // region as 'low quality' or 'unusable`. However, this is very very bad!
    // Because BEV detection algorithm/model is dynamic, the result improves
    // constantly and frequently over time, but this hack is often forgotten by
    // virtually everyone, and persists forever.
    LOW_PRECISION_ROAD_GEOMETRY =
        3;  // The quality of perception bev detection
            // results is not good, only some lane lines can be used.
    UNUSABLE_ROAD_GEOMETRY = 4;  // Perception bev results unusable.
  }
  // Since this type of zone only represented POOR_IMAGERY before, and there was
  // no type field, when adding a new similar zone, we put it into the type, so
  // the default type was added to the historical data.
  optional Type type = 5 [default = POOR_IMAGERY];

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
}

// For map level switching.
message LevelSwitchZoneProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolygonProto polygon = 2;
  optional int32 from_level_id = 3 [default = 0];
  optional int32 to_level_id = 4 [default = 1];
  repeated int32 belonging_levels = 5;
  repeated ValidationRecord skip_records = 6;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
}

message KeepClearZoneProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolygonProto polygon = 2;
  repeated int32 belonging_levels = 3;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
  repeated sfixed64 lanes = 4;
  repeated ValidationRecord skip_records = 5;
}

message ParkingSpotProto {
  optional sfixed64 id = 1;

  /////////////////////////////////////////////////////////////////////////////
  // Primary fields:
  optional GeoPolygonProto polygon = 2;
  repeated int32 entering_sides = 3;
  optional GeoLineSegmentProto stopper = 4;
  optional sfixed64 front_neighbor_id = 5;
  optional sfixed64 back_neighbor_id = 6;
  optional sfixed64 left_neighbor_id = 7;
  optional sfixed64 right_neighbor_id = 8;
  repeated int32 belonging_levels = 9;
  repeated ValidationRecord skip_records = 10;

  /////////////////////////////////////////////////////////////////////////////
  // Derived fields: created by postprocessing the map.
}

// for L2++ localization
message PoleProto {
  optional sfixed64 id = 1;
  optional GeoPointProto point = 2;
  optional double height = 3;

  // a series of vertexes represent a irregular pole
  optional GeoPolylineProto vertexes = 4;

  enum Type {
    UNKNOWN = 1;
    TRAFFIC_LIGHT = 2;
    STREET_LIGHT = 3;
    SIGN = 4;
    HANGING = 5;
    WIRE = 6;
    ADVERTISING = 7;
    WARNING = 8;
    GANTRY = 9;
  }
  optional Type type = 5;
  optional Confidence confidence = 6;
  repeated int32 belonging_levels = 7;
  repeated ValidationRecord skip_records = 8;
  optional sfixed64 section_id = 9;
}

message GroundMarkingProto {
  optional sfixed64 id = 1;
  // There are only four points and are stored counterclockwise from the upper
  // left point.
  optional GeoPolygonProto polygon = 2;
  enum Type {
    OTHER = 99;
    TEXT = 100;
    BUS_LANE = 101;
    VARIABLE_ORIENTATION_LANE = 102;
    ARROW = 200;
    STRAIGHT = 201;
    STRAIGHT_LEFT = 202;
    STRAIGHT_RIGHT = 203;
    STRAIGHT_U_TURN = 204;
    LEFT = 205;
    LEFT_U_TURN = 206;
    MERGE_TO_LEFT = 207;
    RIGHT = 208;
    MERGE_TO_RIGHT = 209;
    LEFT_RIGHT = 210;
    U_TURN = 211;
    FORBID_LEFT = 212;
    FORBID_RIGHT = 213;
    FORBID_U_TURN = 214;
    STRAIGHT_LEFT_RIGHT = 215;
    STRAIGHT_U_TURN_LEFT = 216;
    RIGHT_U_TURN = 217;
    FORBID_STRAIGHT = 218;
    INDICATING_ARROW = 250;
    INDICATING_STRAIGHT = 251;
    NUMBER = 300;
    MAX_SPEED_LIMIT = 301;
    MIN_SPEED_LIMIT = 302;
    TIME = 303;
    SIGN = 400;
    OTHER_LINE_MARKING = 500;

    reserved 1000 to 1999;  // for auto labeling
  }
  optional Type type = 3;
  // For example, when the type is a number, it is an Arabic number.
  // For example, when the type is text, it is likely to be Chinese characters.
  optional string text = 4;
  optional Confidence confidence = 5;
  repeated int32 belonging_levels = 6;
  repeated ValidationRecord skip_records = 7;
  // For example, when the type is arrow, it is the corner of the arrow.
  repeated GeoPointProto extra_points = 8;
  optional sfixed64 section_id = 9;

  extensions 100 to 199;  // for auto labeling
}

message LineProto {
  optional sfixed64 id = 1;
  optional GeoPolylineProto polyline = 2;
  // Control points to generate Bézier curve.
  optional GeoPolylineProto control_points = 3;
  enum Type {
    STOP_LINE = 1;
    WAIT_AREA_STOP_LINE = 2;

    reserved 1000 to 1999;  // for auto labeling
  }
  optional Type type = 4;
  repeated int32 belonging_levels = 5;
  repeated ValidationRecord skip_records = 6;

  // smooth coordinate
  repeated Vec2dProto smooth_points = 7;

  extensions 100 to 199;  // for auto labeling
}

message ParkingPillarProto {
  optional sfixed64 id = 1;
  optional GeoPointProto center = 2;
  optional GeoPolygonProto polygon = 3;
  repeated int32 belonging_levels = 4;
}

enum FeatureType {
  LANEBOUNDARY = 1;
  LANE = 2;
  CROSSWALK = 3;
  TRAFFICLIGHT = 4;
  STOPSIGN = 5;
  SPEEDBUMP = 6;
  PARKING_AREA = 7;
  INTERSECTION = 8;
  DRIVEWAY = 9;
  VEGETATION_ZONE = 10;
  STATICOBJECT_ZONE = 11;
  POSTPROCESSING_ZONE = 12;
  NAMEDSPOT = 13;
  SECTION = 14;
  BILDING = 15;
  BUSSTATION = 16;
  PERCEPTION_ZONE = 17;
  IMAGERYUNCERTAIN_ZONE = 18;
  LOCALIZATIONUNCERTAIN_ZONE = 19;
  LEVELSWITCH_ZONE = 20;
  PARKING_SPOT = 21;
  POLE = 22;
  GROUND_MARKING = 23;
  LINE = 24;
  BUS_STATION_STOP_AREA = 25;
  KEEP_CLEAR_ZONE = 26;
  TRAFFIC_SIGN = 27;
  SD_NODE = 28;
  SD_LINK = 29;
  PARKING_PILLAR = 30;
}

message SemanticMapProto {
  repeated LaneBoundaryProto lane_boundaries = 2;
  repeated LaneProto lanes = 3;
  repeated CrosswalkProto crosswalks = 4;
  repeated TrafficLightProto traffic_lights = 5;
  repeated StopSignProto stop_signs = 6;
  repeated SpeedBumpProto speed_bumps = 7;
  repeated ParkingAreaProto parking_areas = 8;
  repeated IntersectionProto intersections = 9;
  repeated DrivewayProto driveways = 10;
  repeated VegetationZoneProto vegetation_zones = 11 [deprecated = true];
  repeated StaticObjectZoneProto static_object_zones = 12 [deprecated = true];
  repeated PostProcessingZoneProto post_processing_zones = 13;
  repeated NamedSpotProto named_spots = 14;
  repeated SectionProto sections = 15;
  repeated BuildingProto buildings = 16;
  repeated BusStationProto bus_stations = 17;
  repeated PerceptionZoneProto perception_zones = 18;
  repeated ImageryUncertainZoneProto imagery_uncertain_zones = 19;
  repeated BusStationStopAreaProto bus_station_stop_areas = 20;
  repeated LocalizationUncertainZoneProto localization_uncertain_zones = 21;
  repeated LevelSwitchZoneProto level_switch_zones = 22;
  repeated KeepClearZoneProto keep_clear_zones = 23;
  repeated ParkingSpotProto parking_spots = 24;
  repeated PoleProto poles = 25;
  repeated GroundMarkingProto ground_markings = 26;
  repeated LineProto lines = 27;
  repeated TrafficSignProto traffic_signs = 28 [deprecated = true];
  repeated SdNodeProto sd_nodes = 29 [deprecated = true];
  repeated SdLinkProto sd_links = 30 [deprecated = true];
  repeated CrossingIslandProto crossing_islands = 31;
  repeated NotForLabelZoneProto not_for_label_zones = 32;
  repeated LabelZoneProto label_zones = 33;
  repeated ParkingPillarProto parking_pillars = 34;

  reserved 1;
}
