  enum LaneCategoryType {
    LANE_TYPE_NULL = 255;    // 无对应车道
    LANE_TYPE_NORMAL = 0;    // 普通车道类型
    LANE_TYPE_BUS = 1;       // 公交专用车道类型
    LANE_TYPE_OTHER = 2;     // 其他专用道类型
    LANE_TYPE_TIDAL = 3;     // 潮汐车道类型
    LANE_TYPE_VARIABLE = 4;  // 可变车道类型
  };

  enum TollLaneType {
    TOLL_LANE_TYPE_NULL = 0;          // 无效值
    TOLL_LANE_TYPE_NORMAL = 1;        // 支持普通收费车道
    TOLL_LANE_TYPE_ETC = 2;           // 支持ETC收费车道
    TOLL_LANE_TYPE_AUTO_MATRIC = 4;   // 支持自动发卡车道
    TOLL_LANE_TYPE_ALI_PAY = 8;       // 支持支付宝收费车道
    TOLL_LANE_TYPE_WE_CHAT_PAY = 16;  // 支持微信支付车道
    TOLL_LANE_TYPE_ITC = 32;          // 支持ITC收费车道
  };

  enum TrafficLightDirection {
    TRAFFICLIGHT_DIR_INVALID = 0;   // 无效值
    TRAFFICLIGHT_DIR_LEFT = 1;      // 左转
    TRAFFICLIGHT_DIR_RIGHT = 2;     // 右转
    TRAFFICLIGHT_DIR_U_TURN = 7;    // 掉头 autoSDK650不支持
    TRAFFICLIGHT_DIR_STRAIGHT = 8;  // 直行
  };

  enum TrafficLightType {
    TRAFFICLIGHT_TYPE_INVALID = 0;        // 无效值
    TRAFFICLIGHT_TYPE_RED_COUNTDOWN = 1;  // 红灯倒计时
    TRAFFICLIGHT_TYPE_GREEN = 10;         // 绿灯可通行
    TRAFFICLIGHT_TYPE_TURN_RED = 20;      // 即将变红灯
  };

  message LocationInfo {
    optional ValidInfo info_valid = 1;
    optional mapping.GeoPointProto lat_lon_state = 2;
  }
  message IntervalSpeedInfo {
    optional ValidInfo info_valid = 1;
    optional double length = 2;
    optional IntervalSpeed interval_speed_state = 3;
    optional mapping.GeoPointProto start_point = 4;
    optional mapping.GeoPointProto end_point = 5;
    optional CameraType camera_type = 6;
    optional uint32 max_interval_speed_kph = 7;  // km/h
    optional uint32 min_interval_speed_kph = 8;  // km/h
    optional uint32 ego_average_speed = 9;       // km/h
    optional double dist_to_start = 10;          // m
    optional double dist_to_end = 11;            // m
  }

  message CameraInfo {
    optional ValidInfo info_valid = 1;
    optional double dist_to_camera = 2;  // m
    optional CameraType camera_type = 3;
    optional uint32 camera_limit_speed_kph = 4;  // km/h, NULL: 0
  }

  message RoadInfo {
    optional ValidInfo info_valid = 1;
    optional string road_name = 2;
    // Should be enum, but can't determine the type right now
    optional int32 road_class = 3;
    optional uint32 limit_speed_kph = 4;  // unit to be confirmed
  }

  message NextCrossInfo {
    optional ValidInfo info_valid = 1;
    optional ManeuverIcon next_cross_maneuver_id = 2;
    optional uint32 next_cross_remain_dist = 3;
    optional uint32 next_cross_segment_idx = 4;
    optional NextCrossMainAction next_cross_main_action = 5;
    optional NextCrossAssistAction next_cross_assist_action = 6;
  };

  // NavInfo的含义是"导航信息"，不是“四维图新”
  message NaviInfoData {
    optional ValidInfo info_valid = 1;
    optional uint32 remain_time = 2;  // TODO(luzou): unit to be confirmed
    optional uint32 remain_distance = 3;
    // NOTE(luzou): The original IDL definition is "uint32 manueuverID", but I
    // believe the true meaning is "ManeuverIcon maneuverID". To be confirmed,
    // the same applies to the following fields.
    optional ManeuverIcon maneuver_id = 4;
    optional string road_name = 5;
    optional string next_road_name = 6;
    optional uint32 segment_remain_dist = 7;
    optional ValidInfo next_segment_valid = 8;
    optional ManeuverIcon next_segment_maneuver_id = 9;
    optional uint32 next_segment_remain_dist = 10;
    optional uint32 current_segment_idx = 11;
    optional uint32 current_link_idx = 12;
    repeated NextCrossInfo next_cross_info_list = 13;
  }
  message RouteInfoData {
    optional ValidInfo info_valid = 1;
    optional double timestamp = 2;
    optional RouteCode route_code = 3;
    optional RouteType route_type = 4;
    repeated RouteSourceType route_source_type = 5;
  };
  message LaneInfoData {
    optional ValidInfo info_valid = 1;
    // The original naming is 'back_lane_list' and 'front_lane_list', means
    // '前景车道' and '背景车道' in Chinese. '前景车道' 代表导航路线推荐的车道,
    // '背景车道'
    // 代表所有的车道。这种命名方式和HUI显示的方式相关：导航推荐车道显示为高亮，其他车道显示为灰色。
    // 需要注意的是：'前景车道' 和 '背景车道'
    // 的车道数量和顺序都是一致的，即：'前景车道' 的第一个车道，对应 '背景车道'
    // 的第一个车道。只不过 '前景车道' 中不在导航路线上的车道的值是NULL。
    repeated LaneType back_lane_list = 2;
    repeated LaneType front_lane_list = 3;
    repeated ExtendLaneType back_extend_lane_list = 6;
    repeated ExtendLaneType front_extend_lane_list = 7;
    repeated LaneCategoryType back_lane_type_list = 8;
    optional mapping.GeoPointProto lat_lon_state = 9;
    optional uint32 segment_idx = 10;
    optional uint32 link_idx = 11;
    optional uint32 lane_count = 12;
    reserved 4, 5;
  }

  // Unsure about the meaning of this struct, but it's in the original IDL.
  message Reserved {
    optional ValidInfo reserved_valid = 1;
    optional uint32 value0 = 2;
    optional uint32 value1 = 3;
    optional uint32 value2 = 4;
    optional double length = 5;
    optional string reserved_name = 6;
  }

  message TollStation {
    optional BuildingStatus building_status = 1;
    optional uint32 remain_dist = 2;  // m
    optional string name = 3;
  }
  message TollGateInfo {
    optional ValidInfo info_valid = 1;
    repeated TollLaneType toll_lane_type_list = 2;
  };
  message TrafficLight {
    optional ValidInfo info_valid = 1;            // 当前帧消息是否有效
    optional uint64 id = 2;                       // 交通灯全局唯一ID
    optional mapping.GeoPointProto position = 3;  // 交通灯位置经纬度
    optional TrafficLightDirection direction = 4;  // 交通灯方向
    optional TrafficLightType type = 5;            // 灯态
    optional uint64 start_time =
        6;  // 灯态开始时间戳，单位秒，1970，UTC+8，type为红灯倒计时有效，其它灯态无效
    optional uint64 end_time =
        7;  // 灯态结束时间戳，单位秒，1970，UTC+8，type为红灯倒计时有效，其它灯态无效
  };

  optional LiteHeader header = 1;
  // NOTE(luzou): The original IDL timestamp is ms in uint64, should be
  // converted to seconds in double.
  optional double timestamp = 2;
  optional NaviInfoData navi_info = 3;
  optional RoadInfo road_info = 4;
  optional IntervalSpeedInfo interval_speed_info = 5;
  optional CameraInfo camera_info = 6;
  optional LocationInfo location_info = 7;
  repeated LaneInfoData lane_info = 8;
  optional RouteInfoData route_info = 12;
  optional TollGateInfo toll_gate_info = 13;
  repeated Reserved reserved_info = 9;
  repeated TollStation toll_station_info = 10;
  // Whether we are in navigation state.
  optional bool is_navi = 11;
  optional TrafficLight traffic_light = 14;
}
