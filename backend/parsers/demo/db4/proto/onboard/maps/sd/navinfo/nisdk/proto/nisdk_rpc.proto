syntax = "proto2";

package snoah;
import "onboard/maps/sd/navinfo/nisdk/proto/nisdk_outputs.proto";
import "onboard/maps/sd/navinfo/nisdk/proto/nisdk_debug_msg.proto";
import "google/protobuf/empty.proto";

service NiSdk {
  rpc NiSdkCallback(navinfo.nisdk.Callback) returns (google.protobuf.Empty) {}

  rpc UpdateNiSdkDebugMessage(NiSdkDebugMessage)
      returns (google.protobuf.Empty) {}
}