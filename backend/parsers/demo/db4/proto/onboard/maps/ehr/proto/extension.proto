syntax = "proto2";

package snoah.mapping.ehr.hdmap;

import "onboard/common/proto/map_geometry.proto";

message SectionExtend {
  optional uint64 link_identifier = 1;
  optional bool is_part_of_calculated_route = 2 [default = false];
  optional uint64 path_id = 3;
  optional GeoPolygonProto polygon = 4;
}

message LaneExtend {
  optional uint64 lane_model_identifier = 1;
  optional uint32 lane_identifier = 2;
}