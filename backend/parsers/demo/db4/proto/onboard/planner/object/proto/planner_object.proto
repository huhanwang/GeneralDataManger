
syntax = "proto2";

package snoah.planner;

import "onboard/proto/trajectory_point.proto";
// import "onboard/proto/perception.proto";
import "onboard/proto/perception/fusion/objects.proto";

message FilterReason {
  enum Type {
    // No reason, equivalent to not filter.
    NONE = 1;
    // The stationary object is not on drive passage.
    STATIONARY_OBJECT_NOT_ON_DRIVE_PASSAGE = 2;
    // The trajectory is not on drive passage.
    TRAJECTORY_NOT_ON_DRIVE_PASSAGE = 3;
    // The trajectory's likelihood is too low.
    TRAJECTORY_LOW_LIKELIHOOD = 4;
    // The stationary object is totally behind AV.
    STATIONARY_OBJECT_BEHIND_AV = 5;
    // The object is moving away from AV.
    OBJECT_BEHIND_MOVING_AWAY_FROM_AV = 6;
    // The stationary object is not on sl boundary.
    STATIONARY_OBJECT_NOT_ON_SL_BOUNDARY = 7;
    // Reflected object in proximity. This is a hack to filter fake objects.
    REFLECTED_OBJECT_IN_PROXIMITY = 8;
    // The object trajectory is not on sl boundary.
    TRAJECTORY_NOT_ON_SL_BOUNDARY = 9;
    // The trajectory is not the most likely trajectory.
    NOT_MOST_LIKELY_TRAJECTORY = 10;
    // The stationary object is not within freespace region.
    STATIONARY_OBJECT_NOT_IN_FREESPACE_REGION = 11;
    // The trajectory is not within freespace region.
    TRAJECTORY_NOT_IN_FREESPACE_REGION = 12;
    // The trajectory has collision with a confident trajectory.
    TRAJECTORY_COLLIDES_WITH_CONFIDENT_OTHERS = 13;
    // Not acc target.
    IGNORED_BY_ACC = 14;
    // Object current position is not on or near path boundary.
    OBJECT_NOT_ON_OR_NEAR_PATH_BOUNDARY = 15;
    // Object current position is beyond non-virtual curb and parallel with
    // drive passage.
    OBJECT_PARALLEL_BEYOND_CURB = 16;
    // Spacetime trajectory entering inner path boundary too late.
    ST_TRAJ_ENTER_TARGET_BOUND_TOO_LATE = 17;
    // Spacetime trajectory entering inner path boundary beyond map (in extended
    // part of DrivePassage).
    ST_TRAJ_ENTER_TARGET_BOUND_BEYOND_MAP = 18;
    // RoadWayPositionType::RWPT_UNKNOWN object.
    UNKNOWN_ROADWAY_POSITION_OBJECT = 19;
    // Object with cut-in trajectories shouldn't have lane keeping trajectories
    // at the same time.
    TRAJECTORY_EXCEPT_CUT_IN = 20;
    // Object is too far-away considering current AV speed.
    OBJECT_TOO_FAR_CONSIDER_AV_SPEED = 21;
    // Moving Object is too far-away from SL boundary.
    MOVING_OBJ_NOT_NEAR_SL_BOUNDARY = 22;
    // Moving object start in behind perpendicular parking spot.
    OBJECT_BEHIND_PERPENDICULAR_PARKING_SPOT = 23;
    // Pedestrain is far from AV while parking.
    PEDESTRAIN_FAR_FROM_AV_IN_PARKING = 24;
    // AV is almost entirely in parking_spot.
    AV_IN_PARKING_SPOT = 25;
    // Unreliable perception type.
    UNRELIABLE_PERCEPTION_OBJECT_TYPE = 26;
    // Object is occluded.
    OBJECT_OCCLUDED = 27;
  }
}

// Records the filtered objects or predictions.
message FilteredTrajectories {
  message Filtered {
    optional FilterReason.Type reason = 1;
    // The object id.
    optional string id = 2;
    // The trajectory index.
    optional int32 index = 3;
  }
  repeated Filtered filtered = 1;
}

message SpacetimePlannerObjectTrajectoryReason {
  enum Type {
    // No reason, equivalent to not filter.
    NONE = 1;
    // Spacetime planner considers stationary trajectories.
    STATIONARY = 2;
    // Slow trajectories that moving with the same direction as the ego vehicle.
    SIDE = 3;
    // Trajectories that need emergency avoidance.
    EMERGENCY_AVOIDANCE = 4;
    // All front trajectories.
    FRONT = 5;
    // Added by planner, usually leading obj.
    LEADING = 6;
    // All trajectories.
    ALL = 7;
    // Trajectories drive in.
    DRIVE_IN = 8;
    // Trajectories behind notice.
    BEHIND = 9;
    // Oncoming Trajectories need gaming
    ONCOMING_GAMING = 10;
    // Speed Finder CONFLICT
    SPEED_FINDER_CONFLICT = 11;
    // Speed Finder CONFLICT BEHIND EGO VEHINCLE
    SPEED_FINDER_CONFLICT_BEHIND = 12;
  }
}

message SpacetimePlannerObjectFilteredReason {
  enum Type {
    NOT_FILTERED = 0;
    CUT_IN_VEHICLE = 1;
    CROSSING = 2;
    REVERSE_VEHICLE = 3;
    OCCLUDED_VEHICLE = 4;
    BEYOND_STOP_LINE = 5;
    BEHAVIOR_CONFLICT = 6;
    FAR_AWAY = 7;
    WHO_KNOWS = 8;
    UNKNOWN_REASON = 9;
    CUT_OUT_VEHICLE = 10;
    BUS_STATION = 11;
  }
}

// Records the trajectories considered in spacetime planner.
message SpacetimePlannerObjectTrajectoriesProto {
  message SpacetimePlannerObjectTrajectoryProto {
    optional SpacetimePlannerObjectTrajectoryReason.Type reason = 1;
    // The object id.
    optional string id = 2;
    // The trajectory index.
    optional int32 index = 3;
  }
  repeated SpacetimePlannerObjectTrajectoryProto trajectory = 1;
  message FilteredSpacetimePlannerObjectTrajectoryProto {
    optional SpacetimePlannerObjectFilteredReason.Type reason = 1;
    // The object id.
    optional string id = 2;
    // The trajectory index.
    optional int32 index = 3;
  }
  repeated FilteredSpacetimePlannerObjectTrajectoryProto filtered_trajectory =
      2;
}

message PlannerObjectProto {
  optional ObjectProto object = 1;

  message PredictionInfoProto {
    optional double probability = 1;
    repeated SecondOrderTrajectoryPointProto points = 2;
  }
  repeated PredictionInfoProto prediction = 2;
  optional bool is_stationary = 3;
}
