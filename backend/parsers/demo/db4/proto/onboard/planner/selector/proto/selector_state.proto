
syntax = "proto2";

package snoah.planner;


import "onboard/proto/turn_signal.proto";
import "google/protobuf/timestamp.proto";
import "onboard/proto/lane_change_type.proto";
import "onboard/planner/scheduler/proto/lane_change.proto";
import "onboard/math/geometry/proto/affine_transformation.proto";

enum LaneChangeLateralSpeed {
  LANE_CHANGE_LATERAL_SPEED_SLOW = 1;
  LANE_CHANGE_LATERAL_SPEED_MEDIUM = 2;
  LANE_CHANGE_LATERAL_SPEED_FAST = 3;
}

message LastForkInfoProto {
  optional bool left_has_diverge = 2;
  optional bool right_has_diverge = 3;
  optional google.protobuf.Timestamp fork_start_time = 4;
  reserved 1;
}

message LastLcInfoProto {
  optional bool lc_left = 1;
  optional google.protobuf.Timestamp lane_change_time = 2;
  optional LaneChangeType lane_change_type = 3;
}

message TargetLaneStateProto {
  optional bool is_borrow = 1;
  optional bool is_fallback = 2;
  repeated sfixed64 lane_ids = 3;
  repeated Vec2dProto center_points = 4;
  optional uint64 successive_count = 5;
}

message SelectorLaneChangeRequestProto {
  optional bool lc_left = 2;
  optional LaneChangeType lane_change_type = 3;
  optional RequestState state = 4;
  reserved 1;
}

enum RequestState {
  NO_REQUEST = 0;
  WAITING_RESPONSE = 1;
  RECEIVED_RESPONSE = 2;
}

enum RouteTtcConfig {
  CONSERVATIVE = 0;
  RADICAL = 1;
}

message PrefilterStateProto {
  optional bool choose_left_branch = 1;
}

message RouteTtcSettingProto {
  optional RequestState request_state = 1;
  optional RouteTtcConfig request_config = 2;
  optional RouteTtcConfig response_config = 3;
  optional uint64 prepare_request_frame = 4;
}

message SelectorStateProto {
  optional TargetLaneStateProto selected_target_lane_state = 2;
  optional google.protobuf.Timestamp last_redlight_stop_time = 4;
  optional LastLcInfoProto last_lc_info = 6;
  optional SelectorLaneChangeRequestProto selector_lane_change_request = 7;
  optional google.protobuf.Timestamp last_user_reject_alc_time = 8;
  optional RouteTtcSettingProto route_ttc_setting = 10;
  optional LaneChangeType lane_change_type = 16;
  optional LaneChangeType last_user_reject_alc_type = 17;
  optional PrefilterStateProto prefilter_state = 19;
  optional TargetLaneStateProto best_target_lane_state = 21;
  optional TurnSignal last_turn_signal = 22;
  optional TurnSignalReason last_turn_signal_reason = 23;
  optional google.protobuf.Timestamp state_start_time = 24;
  optional bool need_ignore_solid_line = 25;
  optional LaneChangeStage lane_change_stage = 26;
  optional bool is_going_force_route_change_left = 27;
  optional LastForkInfoProto last_fork_info = 28;
  optional LaneChangeLateralSpeed lane_change_lateral_speed = 29;
  optional uint64 lane_change_fesibility_count = 30;
  optional double remain_dist_consider_lc_num = 31;
  optional double lk_traj_max_reach_length = 33;
  // for R2
  optional google.protobuf.Timestamp stuck_start_time = 32;

  reserved 1, 3, 5, 9, 11 to 15, 18, 20;
}
