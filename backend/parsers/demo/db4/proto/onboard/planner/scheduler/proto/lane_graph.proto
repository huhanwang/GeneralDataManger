
syntax = "proto2";
package snoah.planner;

message LanePathCostDebugProto {
  optional string lane_path_info = 1;
  optional int64 index_diff = 2;
  optional bool solid_boundary = 3;
  repeated string cost_infos = 4;
  optional bool final_selected = 5;
  repeated int64 lane_ids = 6;
}

message LanePathFilterDebugProto {
  repeated LanePathCostDebugProto lane_path_cost_debugs = 1;
  optional bool enable_sd_guidance = 2;
  optional int64 last_target_index = 3;
  optional int64 right_most_idx = 4;
  optional int64 preferred_index = 5;
  optional int64 lc_preview_index = 6;
  repeated int64 last_target_lane_ids = 7;
}
