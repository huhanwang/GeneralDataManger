syntax = "proto2";

package snoah.aom.proto;
option go_package = "qcraft-proto.ai/third_party/navinfo/aom/proto/aom_data_types";

message Wgs84Point {
  optional int32 latitude = 1;
  optional int32 longitude = 2;
  optional int32 altitude = 3;
}

message Curve {
  enum CurveType {
    /**
     * @brief 未体现
     *
     */
    CURVETYPE_NOTPRESENT = 0;
    /**
     * @brief 折线
     *
     */
    CURVETYPE_POLYLINE = 1;
    /**
     * @brief Bezier样条曲线
     * @note 目前不支持这种数据
     */
    CURVETYPE_BEZIERSPLINE = 2;
  }
  optional CurveType type = 1;
  optional int32 point_size = 2;
  repeated Wgs84Point points = 3;
}

message LinearObject {
  optional int32 id = 1;
  enum LinearObjectType {
    /**
     * @brief 未知
     *
     */
    LINEAROBJECTTYPE_UNKNOWN = 0;
    /**
     * @brief 车道线Marking，请参考LineMarking中地面标线图示
     *
     */
    LINEAROBJECTTYPE_LANEMARKING = 1;
    /**
     * @brief
     * 安全护栏，高速城快支持无法区分类型，城区无法区分都是Kerb，AVP不支持
     *
     */
    LINEAROBJECTTYPE_GUARDRAIL = 2;
    /**
     * @brief
     * 栅栏，高速城快支持无法区分类型，barrier扩展，城区无法区分都是Kerb，AVP不支持。
     *
     */
    LINEAROBJECTTYPE_FENCE = 3;
    /**
     * @brief 路肩
     * \image html Kerb.png
     */
    LINEAROBJECTTYPE_KERB = 4;
    /**
     * @brief 墙，高速城快支持，城区无法区分都是Kerb，AVP不支持
     *
     */
    LINEAROBJECTTYPE_WALL = 5;
    /**
     * @brief 杆状障碍物，高速城快支持，城区无法区分都是Kerb，AVP不支持
     * @note 目前不支持这种数据
     */
    LINEAROBJECTTYPE_BARRIER = 6;
    /**
     * @brief 虚拟三角岛
     *
     */
    LINEAROBJECTTYPE_VIRTUALTHRINACIA = 7;
    /**
     * @brief 铺设路面边缘
     * \image html LOT_PavedRoad_Edge.png
     *
     */
    LINEAROBJECTTYPE_PAVED_ROADEDGE = 8;
    /**
     * @brief 无标线无可区分边界（虚拟边界）
     * \image html LOT_NoMarkingRoad_Edge.png
     *
     */
    LINEAROBJECTTYPE_NO_MARKING_ROADEDGE = 9;
  }
  optional LinearObjectType type = 2;
  enum LineMarking {
    /**
     * @brief 未知
     *
     */
    LINEMARKING_UNKNOWN = 0;
    /**
     * @brief 无
     *
     */
    LINEMARKING_NONE = 1;
    /**
     * @brief 实线
     * \image html SolidLine.png
     */
    LINEMARKING_SOLIDLINE = 2;
    /**
     * @brief 虚线
     * \image html DashedLine.png
     */
    LINEMARKING_DASHEDLINE = 3;
    /**
     * @brief 双实线
     * \image html DoubleSolidLine.png
     */
    LINEMARKING_DOUBLESOLIDLINE = 4;
    /**
     * @brief 双虚线
     * \image html DoubleDashedLine.png
     */
    LINEMARKING_DOUBLEDASHEDLINE = 5;
    /**
     * @brief 左实线右虚线组合
     * \image html LeftSolidRightDashed.png
     */
    LINEMARKING_LEFTSOLIDRIGHTDASHED = 6;
    /**
     * @brief 右实线左虚线组合
     * \image html RightSolidLeftDashed.png
     */
    LINEMARKING_RIGHTSOLIDLEFTDASHED = 7;
    /**
     * @brief 块形线
     * \image html DashedBlocks.png
     */
    LINEMARKING_DASHEDBLOCKS = 8;
    /**
     * @brief 画有阴影的区域
     * \image html ShadedArea.png
     * \image html ShadedArea1.png
     */
    LINEMARKING_SHADEDAREA = 9;
    /**
     * @brief 障碍物体分割线
     * \image html PhysicalDivider.png
     * \image html PhysicalDivider1.png
     */
    LINEMARKING_PHYSICALDIVIDER = 10;
    /**
     * @brief 菱形减速标线，对应NDS CrossingAlert
     * @note 目前不支持这种数据
     *
     */
    LINEMARKING_DIAMONDDECELARATIONMARK = 11;
    /**
     * @brief 可变导向标线，对应NDS CLIFF
     * @note 目前不支持这种数据
     *
     */
    LINEMARKING_REVERSIBLELANEMARK = 12;
  }
  optional LineMarking marking = 3;
  enum LineMarkingColour {
    /**
     * @brief 无
     *
     */
    LINEMARKINGCOLOUR_NONE = 0;
    /**
     * @brief 其他
     *
     */
    LINEMARKINGCOLOUR_OTHER = 1;
    /**
     * @brief 白色
     *
     */
    LINEMARKINGCOLOUR_WHITE = 2;
    /**
     * @brief 黄色
     *
     */
    LINEMARKINGCOLOUR_YELLOW = 3;
    /**
     * @brief 橙色
     *
     */
    LINEMARKINGCOLOUR_ORANGE = 4;
    /**
     * @brief 红色
     *
     */
    LINEMARKINGCOLOUR_RED = 5;
    /**
     * @brief 蓝色
     *
     */
    LINEMARKINGCOLOUR_BLUE = 6;
  }
  optional LineMarkingColour color = 4;
  optional int32 width = 5;
  optional LineMarkingColour color_left = 6;
}

message BoundaryAttribution {
  optional int32 section_index = 1;
  optional int32 bs_start_point_index = 2;
  optional int32 bs_end_point_index = 3;
  optional LinearObject boundary_marking = 4;
  enum MarkingMaterialType {
    /**
     * @brief 未知
     *
     */
    MARKING_MTRL_UNKNOWN = 0;
    /**
     * @brief 喷涂
     *
     */
    MARKING_MTRL_PAINTED = 1;
    /**
     * @brief 凸起
     *
     */
    MARKING_MTRL_RAISED_PM = 2;
    /**
     * @brief 喷涂+凸起
     *
     */
    MARKING_MTRL_PAINTED_RAISED_PM = 3;
  }
  optional MarkingMaterialType material = 5;
  optional bool is_side_walk = 6;
}

message Boundary {
  optional int32 index = 1;
  enum BoundaryType {
    /**
     * @brief 车道边界类型
     *
     */
    BOUNDARY_TYPE = 0;
    /**
     * @brief 道路边界类型
     *
     */
    ROADEDGE_TYPE = 1;
  }
  optional BoundaryType type = 2;
  optional int32 section_number = 3;
  optional int32 attribution_size = 4;
  repeated BoundaryAttribution attribution_list = 5;
  optional Curve shape = 6;
}

message LaneRelationship {
  optional int32 path_id = 1;
  optional int64 section_id = 2;
  optional int64 topo_successor = 3;
  optional int32 offset = 4;
}

enum YesNoUnknown {
  /**
   * @brief 未知
   *
   */
  UNKNOWN = 0;
  /**
   * @brief yes
   *
   */
  YES = 1;
  /**
   * @brief no
   *
   */
  NO = 2;
}

enum FuzzyTime {
  /**
   * @brief 未知
   *
   */
  FUZZYTIME_UNKNOWN = 0;
  /**
   * @brief 白天
   *
   */
  FUZZYTIME_DAY = 1;
  /**
   * @brief 黑天
   *
   */
  FUZZYTIME_NIGHT = 2;
}

enum ConditionType {
  /**
   * @brief 未知条件
   *
   */
  CONDITIONTYPEUNKNOWN = 0;
  /**
   * @brief 车辆类型限制
   *
   */
  CONDITIONTYPEVEHICLE = 1;
  /**
   * @brief 车辆载重限制
   *
   */
  CONDITIONTYPELOAD = 2;
  /**
   * @brief 一天内时间限制
   *
   */
  CONDITIONTYPETIMEOFDAY = 3;
  /**
   * @brief 一星期内周几限制
   *
   */
  CONDITIONTYPEDAYSOFWEEK = 4;
  /**
   * @brief 车辆重量限制
   *
   */
  CONDITIONTYPEWEIGHT = 5;
  /**
   * @brief 转弯方向限制
   *
   */
  CONDITIONTYPETURNDIRECTION = 6;
  /**
   * @brief 天气限制
   *
   */
  CONDITIONTYPEWEATHER = 7;
  /**
   * @brief 模糊时间限制
   *
   */
  CONDITIONTYPEFUZZYTIME = 8;
  /**
   * @brief 一年内那天限制
   *
   */
  CONDITIONTYPEDAYOFYEAR = 9;
}

message ConditionFuzzyTime {
  optional ConditionType condition_type = 1;
  optional YesNoUnknown applies_to_ego_vehicle = 2;
  optional FuzzyTime fuzzy_time = 3;
}

message ConditionTimeOfDay {
  optional ConditionType condition_type = 1;
  optional YesNoUnknown applies_to_ego_vehicle = 2;
  optional int32 start_minutes = 3;
  optional int32 end_minutes = 4;
}

enum Weather {
  /// 未知
  WEATHER_Unknown = 0;
  /// 正常天气
  WEATHER_NoSpecial = 1;
  /// 阳光
  WEATHER_Sunshine = 2;
  /// 雨
  WEATHER_Rain = 3;
  /// 雾
  WEATHER_Fog = 4;
  /// 雪
  WEATHER_Snow = 5;
  /// 冰
  WEATHER_Ice = 6;
  /// 强风
  WEATHER_StrongWind = 7;
}

message ConditionWeather {
  optional ConditionType condition_type = 1;
  optional YesNoUnknown applies_to_ego_vehicle = 2;
  optional Weather weather = 3;
}

message ConditionDaysOfWeek {
  optional ConditionType condition_type = 1;
  optional YesNoUnknown applies_to_ego_vehicle = 2;
  optional int32 week_day_mask = 3;
}

message DayOfYear {
  optional int32 year = 1;
  optional int32 month = 2;
  optional int32 day = 3;
}

message ConditionDayRangeOfYear {
  optional ConditionType condition_type = 1;
  optional YesNoUnknown applies_to_ego_vehicle = 2;
  optional bool include_start_day = 3;
  optional bool include_end_day = 4;
  optional DayOfYear start_day = 5;
  optional DayOfYear end_day = 6;
}

enum UnitOfSpeed {
  /**
   * @brief 千米每小时
   *
   */
  KPH = 0;
  /**
   * @brief 英里每小时
   * @note 目前不支持这种数据
   */
  MPH = 1;
}

message LaneSpeedLimit {
  optional UnitOfSpeed unit = 1;
  enum LaneSpeedLimitType {
    /**
     * @brief 最高限速
     *
     */
    MAX_SPEED_LIMIT = 0;
    /**
     * @brief 最低限速
     *
     */
    MIN_SPEED_LIMIT = 1;
  }
  optional LaneSpeedLimitType type = 2;
  optional int32 value = 3;
  /**
   * @brief 生效起始点，提供起始点在lane中线的百分比0~100，默认值0
   *
   */
  optional int32 start_range = 4;
  /**
   * @brief 生效终止点，提供终止点在lane中线的百分比0~100，默认值0
   *
   */
  optional int32 end_range = 5;
  optional ConditionFuzzyTime fuzzy_time_condition = 6;
  optional ConditionTimeOfDay time_of_day_condition = 7;
  optional ConditionWeather weather_condition = 8;
  optional ConditionDaysOfWeek days_of_week_condition = 9;
  optional ConditionDayRangeOfYear day_of_year_condition = 10;
}

message PositionOnLane {
  optional Wgs84Point coordinate = 1;
  /**
   *
   * @brief 斜率，提供的每条车道线的slope，默认无效值是-10,000
   * 斜率  单位: 0.0001 度，例如： 1 度对应的值为 Slope =10000。 Slope α is the
   * tangent angle along spline direction to the horizontal plane
   *
   */
  optional int64 slope = 2;
  /**
   *
   * @brief 曲率  单位：0.000001/m，半径的倒数。右图中k为曲率，R为半径，t为
   * tangential direction，默认无效值-1,000,000.
   *
   *
   */
  optional int64 curvature = 3;

  /**
   *
   * @brief 车道线头朝向 Unit: 0.0001 degree,
   * 从正北到车道线头朝向的顺时针角度，默认值是0
   *
   *
   */
  optional int64 heading = 4;

  /**
   *
   * @brief 横向坡度  SuperElev = (Tanα)*100% ,
   * 提供的是Link的横坡定义参考SuperElevationClass，默认无效值是 -1
   * @see navinfo::sdk::SuperElevationClass
   *
   */
  enum SuperElevationClass {
    /**
     * @brief Superelevation between 4 degrees towards curb and 4 degrees
     * towards the middle of the road
     *
     */
    SUPERELEVATION_FLAT = 0;
    /**
     * @brief Superelevation more than 4 degrees and less or equal 6 degrees
     * towards the curb
     *
     */
    MORE_THAN_4_TOWARDS_CURB = 1;
    /**
     * @brief Superelevation more than 6 degrees and less or equal 8 degrees
     * towards the curb
     *
     */
    MORE_THAN_6_TOWARDS_CURB = 2;
    /**
     * @brief Superelevation more than 8 degrees towards curb
     *
     */
    MORE_THAN_8_TOWARDS_CURB = 3;
    /**
     * @brief Superelevation more than 4 degrees and less or equal 6 degrees
     * towards the middle of the road
     *
     */
    MORE_THAN_4_TOWARDS_MIDDLE = 4;
    /**
     * @brief Superelevation more than 6 degrees and less or equal 8 degrees
     * towards the middle of the road
     *
     */
    MORE_THAN_6_TOWARDS_MIDDLE = 5;
    /**
     * @brief Superelevation more than 8 degrees towards the middle of the road
     *
     */
    MORE_THAN_8_TOWARDS_MIDDLE = 6;
    /**
     * @brief invalid
     *
     */
    SUPERELEVATION_INVALID = -1;
  }
  optional SuperElevationClass super_elevation = 5;
}

message LaneUnderCon {
  /**
   * @brief 生效起始点，提供起始点在lane中线的百分比0~100，默认值0
   *
   */
  optional int32 start_range = 1;

  /**
   * @brief 生效终止点，提供终止点在lane中线的百分比0~100，默认值0
   *
   */
  optional int32 end_range = 2;

  /**
   * @brief 是否包含起始日期
   *
   */
  optional bool include_start_day = 3;

  /**
   * @brief 是否包含终止日期
   *
   */
  optional bool include_end_day = 4;

  /**
   * @brief 生效起始日期，提供起始日期，默认值0
   *
   */
  optional DayOfYear day_of_year_start = 5;

  /**
   * @brief 生效终止日期，提供终止日期，默认值0
   *
   */
  optional DayOfYear day_of_year_end = 6;
}

/**
 *
 * @brief 车道线箭头方向，定义参考LaneArrowMarking，默认值为NONE
 * @note 目前不支持这种数据
 * @see navinfo::sdk::LaneArrowMarking
 *
 */
enum LaneArrowMarking {
  /**
   * @brief 无效
   *
   */
  LANEARROWMARKING_NONE = 0;
  /**
   * @brief 直行
   *
   */
  LANEARROWMARKING_STRAIGHT = 1;
  /**
   * @brief 右前方行驶
   *
   */
  LANEARROWMARKING_SLIGHTRIGHT = 2;
  /**
   * @brief 右转
   *
   */
  LANEARROWMARKING_RIGHT = 4;
  /**
   * @brief 大角度右转>90度
   *
   */
  LANEARROWMARKING_HARDRIGHT = 8;
  /**
   * @brief Uturn
   *
   */
  LANEARROWMARKING_UTURN = 16;
  /**
   * @brief 大角度左转 >90度
   *
   */
  LANEARROWMARKING_HARDLEFT = 32;
  /**
   * @brief 左转
   *
   */
  LANEARROWMARKING_LEFT = 64;
  /**
   * @brief 左前方行驶
   *
   */
  LANEARROWMARKING_SLIGHTLEFT = 128;
  /**
   * @brief 禁止+方向
   * @note 目前不支持这种数据
   */
  LANEARROWMARKING_PROHIBIT = 4096;
  /**
   * @brief 无
   *
   */
  LANEARROWMARKING_NA = -1;
}

message LaneDetail {
  /**
   *
   * @brief 车线索引，从边界向道路中心增加，起始值为0
   *
   *
   */
  optional int32 index = 1;

  /**
   *
   * @brief 关联的DrivingSection的数量，无关联拓扑时数量为0.
   *
   *
   */
  optional int32 next_relation_num = 2;

  /**
   *
   * @brief 与各个DrivingSection的拓扑关系
   *
   *
   */
  repeated LaneRelationship next_relations = 3;

  /**
   *
   * @brief 关联的DrivingSection的数量，无关联拓扑时数量为0.
   *
   *
   */
  optional int32 pre_relation_num = 4;

  /**
   *
   * @brief 与各个DrivingSection的拓扑关系
   *
   *
   */
  repeated LaneRelationship pre_relations = 5;

  repeated LaneArrowMarking arrow_markings = 6;

  /**
   *
   * @brief 车线类型LaneType，默认值LANE_UNKNOWN
   * @see navinfo::sdk::LaneType
   *
   */
  enum LaneType {
    /**
     * @brief 未知
     *
     */
    LANETYPE_LANE_UNKNOWN = 0;
    /**
     * @brief 一般车线
     *
     */
    LANETYPE_LANE_REGULAR = 1;
    /**
     * @brief 加速车线，仅高速城快提供
     *
     */
    LANETYPE_LANE_ACCELERATION = 2;
    /**
     * @brief 减速车线，仅高速城快提供
     *
     */
    LANETYPE_LANE_DECELERATION = 4;
    /**
     * @brief 多乘车线（车中必须多于1人）
     *
     */
    LANETYPE_LANE_HOV = 8;
    /**
     * @brief 慢车线，仅高速城快提供
     *
     */
    LANETYPE_LANE_SLOW = 16;
    /**
     * @brief 管制车线，仅高速城快提供
     *
     */
    LANETYPE_LANE_REGULATED_ACCESS = 64;
    /**
     * @brief 可行驶的路肩
     *
     */
    LANETYPE_LANE_DRIVABLE_SHOULDER = 256;
    /**
     * @brief 紧急泊车线，仅高速城快提供
     *
     */
    LANETYPE_LANE_EMERGENCY_PARKING_STRIP = 512;
    /**
     * @brief 公交车线
     *
     */
    LANETYPE_LANE_BUS = 1024;
    /**
     * @brief 自行车车线
     *
     */
    LANETYPE_LANE_BICYCLE = 2048;
    /**
     * @brief 转折车线
     * @note 目前不支持这种数据
     */
    LANETYPE_LANE_TURN = 4096;
    /**
     * @brief 可逆车线，仅城区支持
     *
     */
    LANETYPE_LANE_REVERSIBLE = 8192;
    /**
     * @brief 安全脱出车线
     * @note 目前不支持这种数据
     */
    LANETYPE_LANE_TRUCK_ESCAPE_RAMP = 16384;
    /**
     * @brief 可变车线
     *
     */
    LANETYPE_LANE_VARIABLE_DRIVING = 32768;
    /**
     * @brief 泊车车线，仅高速城快提供
     *
     */
    LANETYPE_LANE_PARKING_LANE = 65536;
  }
  repeated LaneType types = 7;

  /**
   *
   * @brief 车辆通行方向与形状点存储方向的关系，定义参考DirectionType，永不为0.
   * @see navinfo::sdk::DirectionType
   *
   */
  enum DirectionType {
    /**
     * @brief 无信息
     *
     */
    DIRECTION_TYPE_NONE = 0;
    /**
     * @brief 行驶方向与Link存储方向相同
     *
     */
    DIRECTION_TYPE_POSITIVE = 1;
    /**
     * @brief 行驶方向与Link存储方向相反
     *
     */
    DIRECTION_TYPE_NEGATIVE = 2;
  }
  optional DirectionType travel_direction = 8;

  /**
   *
   * @brief 车线变换类型，定义参考LaneTransition，默认为None
   * @see navinfo::sdk::LaneTransition
   *
   */
  enum LaneTransition {
    /**
     * @brief 当前车线不变
     *
     */
    LANETRANSITION_NONE = 0;
    /**
     * @brief 车道线始点，对应lane start
     *
     */
    LANETRANSITION_OPENING = 1;
    /**
     * @brief 车道线终点，对应lane end
     *
     */
    LANETRANSITION_CLOSING = 2;
    /**
     * @brief 合流
     *
     */
    LANETRANSITION_MERGING = 3;
    /**
     * @brief 分歧
     *
     */
    LANETRANSITION_SPLITTING = 4;
  }
  optional LaneTransition transition_type = 9;

  /**
   *
   * @brief 中心线曲线，永远有效
   *
   *
   */
  optional Curve center_line = 10;

  /**
   *
   * @brief 左边界索引，多线的情况下提供距离车所在车道线最近的边界线，默认值为0
   *
   *
   */
  optional int32 left_boundary_index = 11;

  /**
   *
   * @brief 右边界索引，多线的情况下提供距离车所在车道线最近的边界线，默认值为0
   *
   *
   */
  optional int32 right_boundary_index = 12;

  /**
   *
   * @brief 车线的起始宽度(cm)，AVP情况下不提供，默认值为0
   *
   *
   */
  optional int32 start_width = 13;

  /**
   *
   * @brief 车线的结束宽度(cm)，AVP情况下不提供，默认值为0
   *
   *
   */
  optional int32 end_width = 14;

  /**
   *
   * @brief 车线长度(cm)，默认值为0
   *
   *
   */
  optional int32 length = 15;

  /**
   *
   * @brief 车线限速个数，没有限速值则为0
   *
   *
   */
  optional int32 speed_limit_cnt = 16;

  /**
   *
   * @brief 车线限速详情
   *
   *
   */
  repeated LaneSpeedLimit speed_limits = 17;

  /**
   *
   * @brief 当前车线是否可通行（考虑时间及车型限制），默认值是true
