   *
   * @brief 关系。 0 unknow、1 the composition of One Object、2 one of two more
   * traffic lights mutually exclusive
   * @note 目前不支持这种数据
   *
   */
  optional int32 relation_type = 3;
}

message IntersectionEdgeRange {
  /**
   *
   * @brief 当前边界在形状点列表中线束点的索引
   * @note 目前不支持这种数据
   *
   */
  optional int32 position_index = 1;

  /**
   *
   * @brief 边界类型 ，定义参考IntersectionEdgeType
   * @note 目前不支持这种数据
   * @see navinfo::sdk::IntersectionEdgeType
   *
   */
  enum IntersectionEdgeType {
    /**
     * @brief 车辆可通过
     *
     */
    EDGE_TYPE_PASSABLE = 0;
    /**
     * @brief 车辆不可通过
     *
     */
    EDGE_TYPE_NOT_PASSABLE = 1;
  }
  optional IntersectionEdgeType edge_type = 2;
}

message IntersectionPath {
  /**
   * @brief section的数量 based on link，默认无效值为0
   *
   */
  optional int32 section_cnt = 1;

  /**
   * @brief 各个Secttion的数据，offset，intersectionId，turnType为无效值。
   * 所提供的LaneRelationship的pathID无效值为-1.
   *
   */
  repeated DrivingSection driving_sections = 2;
}

message IntersectionNode {
  /**
   *
   * @brief 交叉点唯一标识ID，默认无效值为0，ID从1开始
   *
   *
   */
  optional int32 node_id = 1;

  /**
   *
   * @brief 进入交叉点的sections的ID，默认无效值为0,实际数据为uint64_t
   *
   *
   */
  optional int64 section_id = 2;

  /**
   *
   * @brief Intersect始点沿经路offset，单位m，默认值为0
   *
   *
   */
  optional int32 offset = 3;

  /**
   *
   * @brief 交叉点路口边界形状点情报，默认值点列为空。
   *
   *
   */
  optional Curve object_affect_shape = 4;

  /**
   *
   * @brief 相关的对象数量
   * @note 目前不支持这种数据
   *
   */
  optional int32 related_object_cnt = 5;

  /**
   *
   * @brief 相关的对象列表
   * @note 目前不支持这种数据
   *
   */
  repeated RelatedObjectInfo related_objects = 6;

  /**
   *
   * @brief 交差点对象的边界数量
   * @note 目前不支持这种数据
   *
   */
  optional int32 edge_section_cnt = 7;

  /**
   *
   * @brief 交差点对象的边界信息
   * @note 目前不支持这种数据
   *
   */
  repeated IntersectionEdgeRange edge_types = 8;

  /**
   *
   * @brief 是否是复杂交叉路口，默认值0
   *
   *
   */
  optional bool is_complex = 9;

  /**
   *
   * @brief 进入该交叉点的path个数，Node点所在Path不包含在内，默认值0
   *
   *
   */
  optional int32 enter_path_cnt = 10;

  /**
   *
   * @brief 进入交叉点PathId 列表
   *
   *
   */
  repeated int32 enter_path_id_list = 11;

  /**
   *
   * @brief 脱出该交叉点的path个数，Node点所在Path不包含在内，默认值0
   *
   *
   */
  optional int32 exit_path_cnt = 12;

  /**
   *
   * @brief 脱出交叉点PathId 列表
   *
   *
   */
  repeated int32 exit_path_id_list = 13;

  /**
   *
   * @brief 是否是虚拟路口，默认值0，
   *
   *
   */
  optional bool is_virtual = 14;

