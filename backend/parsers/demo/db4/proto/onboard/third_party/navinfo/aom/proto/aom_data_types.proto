message DrivingSection {
  /**
   *
   * @brief Section的ID，数据范围内ID唯一，默认无效值为0,实际数据为uint64_t
   *
   *
   */
  optional int64 section_id = 1;

  /**
   *
   * @brief
   * drivingSection始端沿经路offset，避免sectionID重复的case，单位m，默认值为0
   *
   *
   */
  optional int32 offset = 2;

  /**
   *
   * @brief 如果Section终点存在IntersectionNode则赋值，否则为INT_MAX
   *
   *
   */
  optional int32 intersection_id = 3;

  /**
   *
   * @brief
   * DrivingSection对应LinkID，实际数据为uint64_t,数据范围内ID唯一，默认无效值为0，E0X
   *
   *
   */
  optional int64 link_id = 4;

  /**
   *
   * @brief Section 长度，单位：cm，默认无效值为0
   *
   *
   */
  optional int32 length = 5;

  /**
   *
   * @brief 当前DrivingSeciton种别ExternalFormOfWay，默认值Unknown
   * @see navinfo::sdk::ExternalFormOfWay
   *
   */
  repeated ExternalFormOfWay section_types = 6;

  /**
   *
   * @brief
   * 转折方向，如果当前DrivingSection为诱导经路的交叉路口进入DrivingSection，则提供经路的转折方向，定义参考LaneArrowMarking
   * ，默认值NONE，
   * 其他情况提供连续两个DrivingSection的夹角，交叉点内的DrivingSection不提供转折方向。
   * @see navinfo::sdk::LaneArrowMarking
   *
   */
  optional LaneArrowMarking turn_type = 7;

  /**
   *
   * @brief
   * 路基类型，具体指当前道路与同向或逆向道路之前是否存在物理间隔。整体式路基表示无间隔，分离式路基表示有间隔，定义参考SubgradeType，默认值0
   * @see navinfo::sdk::SubgradeType
   *
   */
  optional SubgradeType sub_grade_type = 8;

  /**
   *
   * @brief 车线数量，默认无效值0
   *
   *
   */
  optional int32 lane_num = 9;

  /**
   *
   * @brief
   * 车线详细数据，DrivingSection内保证不会发生lane个数变化，车线数发生变更点会切分DrivingSection
   *
   *
   */
  repeated LaneDetail lane_infos = 10;

  /**
   *
   * @brief 车线边界数量，默认无效值0
   *
   *
   */
  optional int32 boundary_num = 11;

  /**
   *
   * @brief 车线边界详细数据
   *
   *
   */
  repeated Boundary boundaries = 12;

  /**
   *
   * @brief 共用路基时逆向车线数量，默认值0
   *
   *
   */
  optional int32 reverse_lane_num = 13;

  /**
   *
   * @brief 共用路基时逆向车线详细数据，
   *
   *
   */
  repeated LaneDetail reverse_lane_infos = 14;

  /**
   *
   * @brief 逆向车线边界数量，默认值0
   *
   *
   */
  optional int32 reverse_boundary_num = 15;

  /**
   *
   * @brief 逆向车线边界详细数据
   *
   *
   */
  repeated Boundary reverse_boundaries = 16;

  /**
   *
   * @brief drivingsection所在楼层信息，默认无效值FLOOR_INVALID
   * @see navinfo::sdk::FloorID
   *
   */
  optional FloorID floor_id = 17;

  /**
   *
   * @brief drivingsection覆盖2根以上Link, 默认值0
   *
   *
   */
  optional bool is_shared = 18;

  /**
   *
   * @brief 数据编译日期，按UR区分，默认值为0
   *
   *
   */
  optional DayOfYear day_of_year = 19;

  /**
   *
   * @brief 表达DrivingSection是诱导 经路一部分的flag，默认值0
   *
   *
   */
  optional bool is_part_of_guided_route = 20;
}

