message RelatedObjectInfo {
  /**
   *
   * @brief ID
   *
   *
   */
  optional int32 object_id = 1;

  /**
   *
   * @brief 对象类型，定义参考ObjectType
   * @see navinfo::sdk::ObjectType
   *
   */
