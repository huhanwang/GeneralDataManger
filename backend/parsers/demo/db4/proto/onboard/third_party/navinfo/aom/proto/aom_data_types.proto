     *
     */
    DOUBLE_DASHED_STOPPING = 2;
    /**
     * @brief 根据人行横道推测的虚拟停止线,VIRTUAL_STOP_LINE
     *
     */
    VIRTUAL_STOPPING_LINE_STOPPING = 3;
    /**
     * @brief 待转停止线
     * @note 目前不支持这种数据
     */
    SINGLE_STOPPING_LINE_WAITING = 4;
  }
  optional StoppingLocationType stopping_type = 3;

  /**
   *
   * @brief 交通标志数据，对应类型OBJECT_TRAFFIC_SIGN
   *
   *
   */
  optional TrafficSignData traffic_sign_data = 4;

  /**
   *
   * @brief 交通灯数据，对应类型OBJECT_TRAFFIC_LIGHT
   *
   *
   */
  optional TrafficLightData traffic_light_data = 5;

  /**
   *
   * @brief 路面箭头方向,定义参考LaneArrowMarking，对应类型 OBJECT_ARROW
   * @see navinfo::sdk::LaneArrowMarking
   *
   */
  repeated LaneArrowMarking arrow_directions = 6;

  /**
   *
   * @brief 减速带和减速标线的高度，单位cm
   * @note 目前不支持这种数据
   *
   */
  optional int32 speed_bump_height = 7;

  /**
   *
   * @brief 杆状物详细情报，对应类型OBJECT_POLE_LIKE
   *
   *
   */
  optional PoleData pole_data = 8;

  /**
   *
   * @brief 所在位置或影响范围的形状点列表(地面投影)，默认值点列为空。
   *
   *
   */
  optional Curve object_affect_shape = 9;

  /**
   *
   * @brief Object定位外接矩形个数，默认值为0
   *
   *
   */
  optional int32 boundng_box_cnt = 10;

  /**
   *
   * @brief Object定位外接矩形数组
   *
   *
   */
  repeated BoundingBox bounding_boxes = 11;

  /**
   *
   * @brief 相关车线数量(e.g.交通灯对象对应的车线)，默认值为0
   *
   *
   */
  optional int32 related_link_lane_num = 12;

  /**
   *
   * @brief 相关车线ID列表
   *
   *
   */
  repeated RelSectionLane related_link_lanes = 13;

  /**
   *
   * @brief 相关的对象数量
   *
   *
   */
  optional int32 related_object_num = 14;

  /**
   *
   * @brief 相关的对象列表:
   * 提供停止线、红绿灯、人行横道,人行横道关联多个Path上的多个Section关系.交通灯和倒计时器的关联
   *
   *
   */
  repeated RelatedObjectInfo related_objects = 15;

  /**
   *
   * @brief 关联交叉点个数
   * @note 目前不支持这种数据
   *
   */
  optional int32 related_intersection_num = 16;

  /**
   *
   * @brief 关联交叉点ID
   * @note 目前不支持这种数据
   *
   */
  repeated int32 related_intersection_ids = 17;

  /**
   *
   * @brief Object对应drivingsection所在楼层信息，默认无效值FLOOR_INVALID,
   * 停车场外为FLOOR_INVALID
   * @see navinfo::sdk::FloorID
   *
   */
  optional FloorID floor_id = 18;
}

/**
 *
 * @brief 可通行path的定义
 * \image html DrivingPath.png
 *
 */
message DrivingPath {
  /**
   *
   * @brief DrivingPath的唯一标识，默认无效值为0，ID从1开始
   *
   *
   */
  optional int32 path_id = 1;

  /**
   *
   * @brief section的数量 based on link，默认无效值0
   *
   *
   */
  optional int32 section_cnt = 2;

  /**
   *
   * @brief 各个Secttion的数据
   *
   *
   */
  repeated DrivingSection driving_sections = 3;

  /**
   *
   * @brief path上交叉点的数量，默认值0
   *
   *
   */
  optional int32 node_cnt = 4;

  /**
   *
   * @brief 交叉点列表
   *
   *
   */
  repeated IntersectionNode node_list = 5;

  /**
   *
   * @brief Object的数量，默认值0
   *
   *
   */
  optional int32 object_cnt = 6;

  /**
   *
   * @brief Object的详细数据
   *
   *
   */
  repeated ObjectAttribute objects = 7;
}

/**
 *
 * @brief 自车前方通行空间，包括经路和 n
 * m经路上的通行空间信息，每500m更新一次，path个数max=56
 *
 *
 */
message DrivingSpace {
  /**
   *
   * @brief 数据做成时间戳ms，实际数据为uint64_t
   *
   *
   */
  optional int64 timestamp = 1;

  /**
   *
   * @brief 计算出的经路
   *
   *
   */
  optional DrivingPath guide_line = 2;

  /**
   *
   * @brief 经路关联进入Path个数，默认值0
   *
   *
   */
  optional int32 enter_path_cnt = 3;

  /**
   *
   * @brief 经路关联全部进入path列表
   *
   *
   */
  repeated DrivingPath enter_path_list = 4;

  /**
   *
   * @brief 经路关联脱出Path个数，默认值0
   *
   *
   */
  optional int32 exit_path_cnt = 5;

  /**
   *
   * @brief 经路关联全部脱出path列表
   *
   *
   */
  repeated DrivingPath exit_path_list = 6;
}

/**
 * @brief
 * 无经路情况下，自车周围Nm范围内的可到达和不可到达的路网信息。requestDataType需要设定“REQUEST_FOREST”。
 * 此时DrivingSpace中的guideline代表该方向上的mpp，N定义为500m 可配置
 *
 */
message ForestDrivingSpace {
  /**
   * @brief 数据做成时间戳ms，实际数据为uint64_t
   *
   */
  optional int64 timestamp = 1;

  /**
   * @brief 表示forest制作结果，ForestState，默认值为FOREST_STATE_UNKNOWN
   * @see navinfo::sdk::ForestState
   *
   */
  enum ForestState {
    /**
     * @brief 初始状态
     *
     */
    FOREST_STATE_UNKNOWN = 0;
    /**
     * @brief Forest制作成功
     *
     */
    FOREST_STATE_SUCCESS = 1;
    /**
     * @brief 指定范围内未找到路线
     *
     */
    FOREST_STATE_NO_ROUTE_FOUND = 2;
    /**
     * @brief Forest制作失败
     *
     */
    FOREST_STATE_FAILURE = 3;
  }
  optional ForestState forest_result = 2;

  /**
   * @brief forest中drivingSpace个数，默认值为0
   *
   */
  optional int32 driving_space_cnt = 3;

  /**
   * @brief drivingSpace的列表
   *
   */
  repeated DrivingSpace driving_space_list = 4;
}

message RouteMatchPath {
  optional int64 start_matched_link_index = 1;
  optional int64 start_shape_point_index = 2;
  optional Wgs84Point start_match_point = 3;
  optional int64 end_matched_link_index = 4;
  optional int64 end_shape_point_index = 5;
  optional Wgs84Point end_match_point = 6;
}

/**
 * @brief 调用StartRouteMatching后的路线匹配结果。用handle来标识经路
 *
 */
message RouteMatchResult {
  optional int64 timestamp = 1;  // milliseconds
  optional int32 sd_route_handle = 2;
  enum RouteMatchState {
    ROUTEMATCHSTATE_SUCCESS = 0;
    ROUTEMATCHSTATE_FAILED = 1;
  }
  optional RouteMatchState status = 3;
  optional int32 route_match_path_cnt = 4;
  repeated RouteMatchPath route_match_path_list = 5;
}

message VehiclePosition {
  optional int32 latitude = 1;
  optional int32 longitude = 2;
  optional int32 altitude = 3;
  optional int64 timestamp = 4;
  optional float heading = 5;
}

message VehicleInfo {
  optional int32 path_id = 1;
  optional int64 section_id = 2;
  optional int32 offset_on_path = 3;
  optional int32 offset_on_section = 4;
  optional float speed = 5;
  optional float probability = 6;
  optional int32 current_lane = 7;
  optional VehiclePosition position = 8;
}

message SysStateHeartBeat {
  optional int64 timestamp = 1;
  enum SystemStatus {
    /**
     * @brief 系统关闭状态
     *
     */
    SYSTEM_OFF = 0;
    /**
     * @brief 系统启动完了
     *
     */
    SYSTEM_STARTUP = 1;
    /**
     * @brief 系统可用状态
     *
     */
    SYSTEM_AVAILABLE = 2;
    /**
     * @brief 系统不可用状态
     *
     */
    SYSTEM_DISABLE = 3;
  }
  optional SystemStatus status = 2;
}

message ManeuverDetail {
  /**
   * @brief 自车到Maneuver的距离（厘米），默认值为0
   *
   */
  optional double offset_of_maneuver = 1;

  /**
   * @brief 到Maneuver的行驶时间 （秒），HMI显示用，默认值为0
   * <p>
   * 目前不支持这种数据
   *
   */
  optional int32 travel_time = 2;

  /**
   * @brief Maneuver 类型，定义参考ManeuverType，默认值为MT_INVALID
   * @see navinfo::sdk::ManeuverType
   *
   */
  optional int32 maneuver_type = 3;

  /**
   * @brief 路口的转折方向，定义参考 GuidanceManeuverDirection，默认值为INVALID
   * @see navinfo::sdk::GuidanceManeuverDirection
   *
   */
  optional int32 maneuver_direction = 4;

  /**
   * @brief 高速路出口编号，与道路编号不一致，HMI显示用
   * @note 目前不支持这种数据
   *
   */
  optional int32 exit_number = 5;

  /**
   * @brief 坐标
   *
   */
  optional Wgs84Point maneuver_pos = 6;

  /**
   * @brief
   * 交叉点前DrivingSectionID，案内Path上的sectionID，默认无效值为0,实际数据为uint64_t
   *
   */
  optional int64 driving_section_id = 7;

  /**
   * @brief
   * 关联drivingSection始端沿经路offset，避免sectionID重复的case，单位m，默认值为0
   *
   */
  optional int32 offset_on_path = 8;

  /**
   * @brief 推荐的车线情报，HMI显示用
   * @note 目前不支持这种数据
   * (NOTE(luzou): 暂不做转换)
   */
  // optional lcmbcp::RecomLaneData recom_lane_data;

  /**
   * @brief 隧道长度，单位m，提供隧道入口出口所在隧道的长度。默认值为0
   *
   */
  optional int32 tunnel_length = 9;

  /**
   * @brief 隧道group的flag,
   * group中每一个隧道的入口出口该flag都为true,其他为false,默认值为0
   *
   */
  optional int32 tunnel_group = 10;

  /**
   * @brief 针对目的地类型的Maneuver提供目的地所在车线Index，默认值0xFF
   *
   */
  optional int32 lane_idx = 11;
}

message ManeuverInfo {
  /**
   * @brief Maneuver做成时的时间戳，实际数据为uint64_t
   *
   */
  optional int64 timestamp = 1;

  /**
   * @brief Maneuver后道路编号，HMI显示用
   * @note 目前不支持这种数据
   *
   */
  optional string road_number_after_maneuver = 2;

  /**
   * @brief Maneuver后道路名称，HMI显示用
   * @note 目前不支持这种数据
   *
   */
  optional string road_name_after_maneuver = 3;

  /**
   * @brief Maneuver后的路线属性数量，HMI显示用
   * @note 目前不支持这种数据
   *
   */
  optional int32 road_properties_after_maneuver_num = 4;

  /**
   * @brief Maneuver后的路线属性，HMI显示用
   * @note 目前不支持这种数据
   *
   */
  repeated int32 road_properties_after_maneuver = 5;

  /**
   * @brief Maneuver前的路线属性数量，HMI显示用
   * @note 目前不支持这种数据
   *
   */
  optional int32 road_properties_in_front_of_maneuver_num = 6;

  /**
   * @brief Maneuver前的路线属性，HMI显示用
   * @note 目前不支持这种数据
   *
   */
  repeated int32 road_properties_in_front_of_maneuver = 7;

  /**
   * @brief Maneuver分组类型，定义参考ManeuverGroupType，默认值为0
   * @see navinfo::sdk::ManeuverGroupType
   *
   */
  optional int32 maneuver_group_type = 8;

  /**
   * @brief Maneuver案内时机，HMI显示用, 定义参考ManeuverPhase
   * @note 目前不支持这种数据
   *
   */
  optional int32 maneuver_phase = 9;

  /**
   * @brief Maneuver详细数据的数量,默认值为0
   *
   */
  optional int32 maneuver_detail_num = 10;

  /**
   * @brief Maneuver 详细数据列表
   *
   */
  repeated ManeuverDetail maneuver_details_list = 11;
}

message ManeuverUpdate {
  optional int64 timestamp = 1;
  optional int32 maneuver_num = 2;
  repeated ManeuverInfo maneuver_infos = 3;
}
