syntax = "proto2";

package snoah;

import "onboard/radar/proto/continental_408.proto";

message RadarInherentProto {
  optional Radarconfiguration_200 radar_configure = 1;
  optional int32 rms_threshold = 2;
  optional int32 prob_exist = 3;
  optional double width_threshold = 4;
  optional double len_threshold = 5;
  optional double speed_threshold = 6;
  optional int32 delay_frame = 7;
  optional string serial_no = 8;
}