  VEHICLE_LINCOLN_MKZ = 1;
  VEHICLE_LINCOLN_MKZ_AS_PACMOD = 2;
  VEHICLE_AION_LX = 3;
  VEHICLE_JINLV_MINIBUS = 4;
  VEHICLE_PIXLOOP = 5;
  VEHICLE_SKYWELL = 6;
  VEHICLE_HIGER = 7;
  VEHICLE_ZHONGTONG = 8;
  VEHICLE_BYD = 9;
  VEHICLE_ZHONGXING = 10;
  VEHICLE_TEST_BENCH = 11;
  VEHICLE_MARVELX = 12;
  VEHICLE_POLERSTAR = 13;
  VEHICLE_POLERSTAR_2 = 14;
  VEHICLE_DONGFENG = 15;
  VEHICLE_ZHONGTONG55 = 16;
  VEHICLE_SHUNFENG = 17;
  VEHICLE_MARVELR = 18;
  VEHICLE_ZHONGTONG6 = 19;
  VEHICLE_MARVELR_NEW = 20;
  VEHICLE_SNOAHVEHICLE_SUV = 21;
  VEHICLE_HIGER65_LONGZHOU_ONE = 22;
  VEHICLE_HAVAL_SUV = 23;
  VEHICLE_HYUNDAI_CAR = 24;
  VEHICLE_BYD_LONGZHOU_LONG = 25;
  VEHICLE_SF5_SUV = 26;
  VEHICLE_FOTON_LONGZHOU_LONG = 27;
  VEHICLE_AION_LX_PLUS_SUV = 28;
  VEHICLE_HYPER_GT_CAR = 29;
  VEHICLE_FUKANG_CAR = 30;
  VEHICLE_ZEV_LONGZHOU_ONE = 31;
  VEHICLE_JETOUR_SUV = 32;
  VEHICLE_HIGER85_LONGZHOU_LONG = 33;
  VEHICLE_JINLV85_LONGZHOU_LONG = 34;
  VEHICLE_SERES_SF5_SUV = 35;
  VEHICLE_HYPER_AH8_SUV = 36;
  VEHICLE_LIXIANG_SUV = 37;
  VEHICLE_LIXIANGL8_SUV = 38;
  VEHICLE_LIXIANGL9_SUV = 39;
  VEHICLE_LIXIANGL6_SUV = 40;
  VEHICLE_KIAEV6_CAR = 41;
  VEHICLE_LIXIANGW01_MPV = 42;
  VEHICLE_LIXIANGW02_MPV = 43;
  VEHICLE_LIXIANGW03_MPV = 44;
  VEHICLE_LIXIANGW04_MPV = 45;
  VEHICLE_LIXIANGW05_MPV = 46;
  VEHICLE_DONGFENG_EPI_SUV = 47;
  VEHICLE_EXCEED03_CAR = 48;
  VEHICLE_JINLVSPIRIT_LONGZHOU = 49;
  VEHICLE_FOTON_LONGZHOU_ONE = 50;
  VEHICLE_HYUNDAI_EV5_SUV = 51;
  VEHICLE_EXEED_CDM_SUV = 52;
  VEHICLE_ZONE_S_SUV = 53;
  VEHICLE_ZONE_P_CAR = 54;
  VEHICLE_REMOTE_COCKPIT = 55;
