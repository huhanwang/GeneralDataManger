syntax = "proto2";

package snoah;

import "onboard/proto/lite_camera.proto";

enum CameraModel {
  AR0231_H60 = 0;
  AR0231_H120 = 1;
  AR0233_H60 = 2;
  AR0233_H120 = 3;
  IMX490_H60 = 4;
  IMX490_H115 = 5;
  IMX424_H60 = 6;
  AR0820_H60 = 7;
  AR0820_H30 = 8;
  AR0820_H120 = 9;
  IMX490_H30 = 10;
  IMX490_H130 = 11;
  ISX031_H190 = 12;
  OX03CC_H60 = 13;
  OX03CC_H100 = 14;
  OX08BC_H30 = 15;
  OX08BC_H120 = 16;
  IMX728_H30 = 17;
  IMX728_H70 = 18;
  IMX728_H120 = 19;
  OX03CD_H100 = 20;
  OX03CD_H60 = 21;
  OX08BD_H120 = 22;
  OX08BD_H30 = 23;
  OX03CE_H60 = 24;
  OX03CE_H100 = 25;
  OX01F_H190 = 26;
  AR0820A_H120 = 27;
  AR0233A_H100 = 28;
  OX03CF_H100 = 29;
  AR0233A_H120 = 30;
  ISX021_H200 = 31;
  AR0820A_H30 = 32;
  OX8B40P_H30 = 33;
  OX8B40P_H120 = 34;
  OX3F10_H100 = 35;
  IMX623_H60 = 36;
}

message TimesSinceTrigger {
  // different fps means different arrival time since  trigger.
  optional double fps = 1;
  // The elpased time from trigger to image arrival.
  optional double arrival_time_since_trigger = 2 [default = 0.052];
}

message CameraCommonProto {
  optional int32 width = 1;
  optional int32 height = 2;

  optional CameraFormat format = 3;

  optional int32 full_fov_width = 4;
  optional int32 full_fov_height = 5;
  repeated TimesSinceTrigger times_since_trigger = 6;

  message DownscaleSetting {
    optional int32 width = 1;
    optional int32 height = 2;
    optional int32 full_fov_width = 3;
    optional int32 full_fov_height = 4;
  }

  optional DownscaleSetting downscale_setting = 7;
  optional int32 calibration_full_fov_width = 8;
  optional int32 calibration_full_fov_height = 9;
}
