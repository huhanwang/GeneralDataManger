syntax = "proto2";

package snoah;

message V2xInstallationProto {
  message OBUEntity {
    enum SubType {
      UNKNOWN = 0;
      SPAT = 1;
      PTCP = 2;
      FAULT = 3;
      DECISION = 4;
      TRAFFIC_LIGHT_IN_VEHICLE = 5;
      OBJECT_IN_VEHICLE = 6;
    }
    optional string ip = 1;
    optional int32 port = 2;
    optional bool is_send = 3;
    optional bool enabled = 4;
    optional SubType sub_type = 5;
  }
  repeated OBUEntity obu_entity = 1;
}