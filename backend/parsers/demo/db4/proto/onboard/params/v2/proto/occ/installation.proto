syntax = "proto2";

package snoah;

message OccInstallationProto {
  message OccDeviceProto {
    optional string addr_ip = 1;
  }
  message OccBrakeParamsProto {
    optional int32 brake_value = 1;
  }
  optional bool is_valid = 1 [default = false];
  optional OccDeviceProto occ_device = 2;
  optional OccBrakeParamsProto brake_params = 3;
}