syntax = "proto2";

package snoah;

message LedInstallationProto {
  message EthernetConnectionProto {
    optional string ip = 1;
    optional int32 port = 2;
  }
  message CanConnectionProto {
    optional string can_name = 1;
  }
  oneof more_connection_proto {
    EthernetConnectionProto ethernet = 1;
    CanConnectionProto can = 2;
  }
}