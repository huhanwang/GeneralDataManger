    CLUSTER_DYNPROP_CROSSING_MOVING = 6;
    CLUSTER_DYNPROP_STOPPED = 7;
  }
  // Cluster dynamic property [1] [0|7]
  optional Cluster_dynpropType cluster_dynprop = 1;
  // Cluster relative lateral velocity [m/s] [-64|63.75]
  optional double cluster_vrellat = 2;
  // Cluster RCS value (Radar cross section) [dBm\B2] [-64|63.5]
  optional double cluster_rcs = 3;
  // Cluster longitudinal distance [m] [-500|1138.2]
  optional double cluster_distlong = 4;
  // Cluster number [1] [0|255]
  optional int32 cluster_id = 5;
  // Cluster relative longitudinal velocity [m/s] [-128|127.75]
  optional double cluster_vrellong = 6;
  // Cluster lateral distance [m] [-102.3|102.3]
  optional double cluster_distlat = 7;
}

