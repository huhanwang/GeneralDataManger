  enum Radarcfg_ctrlrelay_validType {
    RADARCFG_CTRLRELAY_VALID_INVALID = 0;
    RADARCFG_CTRLRELAY_VALID_VALID = 1;
  }
  enum Radarcfg_ctrlrelayType {
    RADARCFG_CTRLRELAY_INACTIVE = 0;
    RADARCFG_CTRLRELAY_ACTIVE = 1;
  }
