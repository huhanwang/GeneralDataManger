syntax = "proto2";

package snoah;

message Radarstate_201 {
  enum Radarstate_voltage_errorType {
    RADARSTATE_VOLTAGE_ERROR_NO_ERROR = 0;
    RADARSTATE_VOLTAGE_ERROR_ERROR_ACTIVE = 1;
  }
  enum Radarstate_temporary_errorType {
    RADARSTATE_TEMPORARY_ERROR_NO_ERROR = 0;
    RADARSTATE_TEMPORARY_ERROR_ERROR_ACTIVE = 1;
  }
  enum Radarstate_temperature_errorType {
    RADARSTATE_TEMPERATURE_ERROR_NO_ERROR = 0;
    RADARSTATE_TEMPERATURE_ERROR_ERROR_ACTIVE = 1;
  }
  enum Radarstate_interferenceType {
    RADARSTATE_INTERFERENCE_NO_INTERFERENCE = 0;
    RADARSTATE_INTERFERENCE_INTERFERENCE_PRESENT = 1;
  }
  enum Radarstate_persistent_errorType {
    RADARSTATE_PERSISTENT_ERROR_NO_ERROR = 0;
    RADARSTATE_PERSISTENT_ERROR_ERROR_ACTIVE = 1;
  }
  enum Radarstate_rcs_thresholdType {
    RADARSTATE_RCS_THRESHOLD_STANDARD = 0;
    RADARSTATE_RCS_THRESHOLD_HIGH_SENSITIVITY = 1;
    RADARSTATE_RCS_THRESHOLD_ERROR = 2;
    RADARSTATE_RCS_THRESHOLD_RESERVED0 = 3;
    RADARSTATE_RCS_THRESHOLD_RESERVED1 = 4;
    RADARSTATE_RCS_THRESHOLD_RESERVED2 = 5;
    RADARSTATE_RCS_THRESHOLD_RESERVED3 = 6;
    RADARSTATE_RCS_THRESHOLD_RESERVED4 = 7;
  }
  enum Radarstate_ctrlrelaycfgType {
    RADARSTATE_CTRLRELAYCFG_INACTIVE = 0;
    RADARSTATE_CTRLRELAYCFG_ACTIVE = 1;
  }
  enum Radarstate_sendqualitycfgType {
    RADARSTATE_SENDQUALITYCFG_INACTIVE = 0;
    RADARSTATE_SENDQUALITYCFG_ACTIVE = 1;
  }
  enum Radarstate_sendextinfocfgType {
    RADARSTATE_SENDEXTINFOCFG_INACTIVE = 0;
    RADARSTATE_SENDEXTINFOCFG_ACTIVE = 1;
  }
  enum Radarstate_motionrxstateType {
    RADARSTATE_MOTIONRXSTATE_INPUT_OK = 0;
    RADARSTATE_MOTIONRXSTATE_SPEED_MISSING = 1;
    RADARSTATE_MOTIONRXSTATE_YAW_RATE_MISSING = 2;
    RADARSTATE_MOTIONRXSTATE_SPEED_AND_YAW_RATE_MISSING = 3;
  }
  enum Radarstate_outputtypecfgType {
    RADARSTATE_OUTPUTTYPECFG_NONE = 0;
    RADARSTATE_OUTPUTTYPECFG_SENDOBJECTS = 1;
    RADARSTATE_OUTPUTTYPECFG_SENDCLUSTERS = 2;
    RADARSTATE_OUTPUTTYPECFG_RESERVED_2 = 3;
  }
  enum Radarstate_radarpowercfgType {
    RADARSTATE_RADARPOWERCFG_STANDARD = 0;
    RADARSTATE_RADARPOWERCFG_3_DB_TX_GAIN = 1;
    RADARSTATE_RADARPOWERCFG_6_DB_TX_GAIN = 2;
    RADARSTATE_RADARPOWERCFG_9_DB_TX_GAIN = 3;
    RADARSTATE_RADARPOWERCFG_RESERVED0 = 4;
    RADARSTATE_RADARPOWERCFG_RESERVED1 = 5;
    RADARSTATE_RADARPOWERCFG_RESERVED2 = 6;
    RADARSTATE_RADARPOWERCFG_RESERVED3 = 7;
  }
  enum Radarstate_nvmreadstatusType {
    RADARSTATE_NVMREADSTATUS_PENDING = 0;
    RADARSTATE_NVMREADSTATUS_SUCCESSFUL = 1;
  }
  enum Radarstate_nvmwritestatusType {
    RADARSTATE_NVMWRITESTATUS_FAILED = 0;
    RADARSTATE_NVMWRITESTATUS_SUCCESSFUL = 1;
  }
  // [] [0|0]
  optional Radarstate_voltage_errorType radarstate_voltage_error = 1;
  // [] [0|0]
  optional Radarstate_temporary_errorType radarstate_temporary_error = 2;
  // [] [0|0]
  optional Radarstate_temperature_errorType radarstate_temperature_error = 3;
  // [] [0|0]
  optional Radarstate_interferenceType radarstate_interference = 4;
  // [] [0|0]
  optional Radarstate_persistent_errorType radarstate_persistent_error = 5;
  // Current sorting of object list [] [0|0]
  optional int32 radarstate_sortindex = 6;
  // Current sensitivity mode [] [0|7]
  optional Radarstate_rcs_thresholdType radarstate_rcs_threshold = 7;
  // Status of control relay message output [] [0|1]
  optional Radarstate_ctrlrelaycfgType radarstate_ctrlrelaycfg = 8;
  // Status of quality information output [] [0|1]
  optional Radarstate_sendqualitycfgType radarstate_sendqualitycfg = 9;
  // Status of extended information output [] [0|1]
  optional Radarstate_sendextinfocfgType radarstate_sendextinfocfg = 10;
  // Status of motion input signals [] [0|3]
  optional Radarstate_motionrxstateType radarstate_motionrxstate = 11;
  // Sensor ID (0 to 7) [] [0|7]
  optional int32 radarstate_sensorid = 12;
  // Current output list type [] [0|3]
  optional Radarstate_outputtypecfgType radarstate_outputtypecfg = 13;
  // Radar Tx output level (Tx attenuation) [] [0|7]
  optional Radarstate_radarpowercfgType radarstate_radarpowercfg = 14;
  // Gives the status of reading the radar configuration from EEPROM [] [0|1]
  optional Radarstate_nvmreadstatusType radarstate_nvmreadstatus = 15;
  // Gives the status of writing the radar configuration from EEPROM [] [0|1]
  optional Radarstate_nvmwritestatusType radarstate_nvmwritestatus = 16;
  // Currently configured maximum distance of far scan [] [0|2046]
  optional double radarstate_maxdistancecfg = 17;
}

