  optional Radarcfg_ctrlrelay_validType radarcfg_ctrlrelay_valid = 9;
  // Enables output of CtrlRelay message if CollDet is active [] [0|1]
  optional Radarcfg_ctrlrelayType radarcfg_ctrlrelay = 10;
