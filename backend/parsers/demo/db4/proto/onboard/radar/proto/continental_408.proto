    RADARCFG_RADARPOWER_STANDARD = 0;
    RADARCFG_RADARPOWER_3_DB_TX_GAIN = 1;
    RADARCFG_RADARPOWER_6_DB_TX_GAIN = 2;
    RADARCFG_RADARPOWER_9_DB_TX_GAIN = 3;
