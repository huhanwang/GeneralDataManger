    RADARCFG_OUTPUTTYPE_SENDOBJECTS = 1;
    RADARCFG_OUTPUTTYPE_SENDCLUSTERS = 2;
    RADARCFG_OUTPUTTYPE_RESERVED_2 = 3;
  }
