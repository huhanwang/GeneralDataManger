    RADARCFG_RADARPOWER_VALID_INVALID = 0;
    RADARCFG_RADARPOWER_VALID_VALID = 1;
  }
  enum Radarcfg_outputtype_validType {
    RADARCFG_OUTPUTTYPE_VALID_INVALID = 0;
    RADARCFG_OUTPUTTYPE_VALID_VALID = 1;
  }
