  optional Filterstate_activeType filterstate_active = 2;
}

message Speedinformation_300 {
  enum Radardevice_speeddirectionType {
    RADARDEVICE_SPEEDDIRECTION_STANDSTILL = 0;
    RADARDEVICE_SPEEDDIRECTION_FORWARD = 1;
    RADARDEVICE_SPEEDDIRECTION_REVERSE = 2;
    RADARDEVICE_SPEEDDIRECTION_RESERVED = 3;
  }
  // Speed of the radar unit [m/s] [0|163.8]
  optional double radardevice_speed = 1;
  // Speed direction of the radar unit [] [0|2]
  optional Radardevice_speeddirectionType radardevice_speeddirection = 2;
}

message Yawrateinformation_301 {
  // Yaw rate of the radar unit [\B0/s] [-327.68|327.66]
  optional double radardevice_yawrate = 1;
}

message Versionid_700 {
  enum Version_extendedrangeType {
    VERSION_EXTENDEDRANGE_STANDARD_RANGE = 0;
    VERSION_EXTENDEDRANGE_EXTENDED_RANGE = 1;
  }
  enum Version_countrycodeType {
    VERSION_COUNTRYCODE_INTERNATIONAL_VERSION = 0;
    VERSION_COUNTRYCODE_SOUTH_KOREA_JAPAN = 1;
  }
  // [] [0|0]
  optional Version_extendedrangeType version_extendedrange = 1;
  // [] [0|0]
  optional Version_countrycodeType version_countrycode = 2;
  // Major Release Number [] [0|256]
  optional int32 version_majorrelease = 3;
  // Minor Release Number [] [0|256]
  optional int32 version_minorrelease = 4;
  // Patch Level [] [0|256]
  optional int32 version_patchlevel = 5;
}

message Cluster_1_general_701 {
  enum Cluster_dynpropType {
    CLUSTER_DYNPROP_MOVING = 0;
    CLUSTER_DYNPROP_STATIONARY = 1;
    CLUSTER_DYNPROP_ONCOMING = 2;
    CLUSTER_DYNPROP_STATIONARY_CANDIDATE = 3;
