}

message Filterstate_cfg_204 {
  enum Filterstate_typeType {
    FILTERSTATE_TYPE_CLUSTER_FILTER = 0;
    FILTERSTATE_TYPE_OBJECT_FILTER = 1;
  }
  enum Filterstate_activeType {
    FILTERSTATE_ACTIVE_INACTIVE = 0;
    FILTERSTATE_ACTIVE_ACTIVE = 1;
  }
