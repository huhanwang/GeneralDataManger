  optional Radarcfg_sendquality_validType radarcfg_sendquality_valid = 11;
  // Enables output of quality message [] [0|1]
  optional Radarcfg_sendqualityType radarcfg_sendquality = 12;
  // Allows changing the MaxDistance parameter [] [0|1]
  optional Radarcfg_maxdistance_validType radarcfg_maxdistance_valid = 13;
  // Allows changing the RadarPower parameter [] [0|1]
  optional Radarcfg_radarpower_validType radarcfg_radarpower_valid = 14;
  // Allows changing the OutputType parameter [] [0|1]
  optional Radarcfg_outputtype_validType radarcfg_outputtype_valid = 15;
  // Allows changing the SensorId parameter [] [0|1]
  optional Radarcfg_sensorid_validType radarcfg_sensorid_valid = 16;
  // Maximum distance of far scan [m] [0|2046]
  optional double radarcfg_maxdistance = 17;
  // Radar Tx output power reduction (Tx attenuation) [] [0|7]
  optional Radarcfg_radarpowerType radarcfg_radarpower = 18;
  // Data output type [] [0|2]
  optional Radarcfg_outputtypeType radarcfg_outputtype = 19;
  // Sensor ID (0 to 7) [] [0|7]
  optional int32 radarcfg_sensorid = 20;
}

