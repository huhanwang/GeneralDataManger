
syntax = "proto2";

import "onboard/lite/proto/lite_common.proto";
import "onboard/proto/control_cmd.proto";

package snoah;

message LaneSupportProto {
  optional LiteHeader header = 1;

  enum LaneSupportType {
    NOT_SELECTED = 0;
    LDW = 1;
    LDW_LKA = 2;

    reserved 3;
  }

  enum FunctionState {
    UNKNOWN = 0;
    OFF = 1;
    STANDBY = 2;
    ACTIVE_LEFT = 3;
    ACTIVE_RIGHT = 4;
    FAULT = 5;
    PASSIVE = 6;
  }

  enum ActiveType {
    NONE = 0;
    WARNING = 1;
    INTERVENTION = 2;
    WARNING_INTERVENTION = 3;
  }

  enum ElkDangerType {
    NOT_EXISTED = 0;
    ROAD_EDGE = 1;
    SOLID_LINE = 2;
    ONCOMING_VEHICLE = 3;
    OVERTAKING_VEHICLE = 4;

    reserved 5, 6;
  }

  optional LaneSupportType ldw_lka_type = 2;
  // Some OEMs require combined LDW_LKA state.
  optional FunctionState ldw_lka_state = 3;
  optional FunctionState ldw_state = 12;
  optional FunctionState lka_state = 13;
  optional FunctionState elk_state = 6;

  // Not NONE when either ldw_lka_state or elk_state is ACTIVE_LEFT or
  // ACTIVE_RIGHT.
  optional ActiveType active_type = 11;

  optional ControlCommand control_cmd = 10;

  optional ElkDangerType elk_danger_type = 14;
  optional string elk_danger_object_id = 15;

  optional sfixed64 target_lane_boundary_id = 16;

  reserved 4 to 5, 7 to 9;
}
