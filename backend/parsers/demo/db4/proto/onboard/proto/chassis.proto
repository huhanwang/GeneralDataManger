// next id: 68
message Chassis {
  enum DrivingMode {
    COMPLETE_MANUAL = 0;  // human drive
    COMPLETE_AUTO_DRIVE = 1;
    AUTO_STEER_ONLY = 2;  // only steer
    AUTO_SPEED_ONLY = 3;  // include throttle and brake
    // security mode when manual intervention happens, only response status
    EMERGENCY_MODE = 4;
    PARKING_AUTO_DRIVE = 5;
    PARKING_STEER_ONLY = 6;
    PARKING_SPEED_ONLY = 7;
  }

  enum ErrorCode {
    NO_ERROR = 0;

    CMD_NOT_IN_PERIOD = 1;  // control cmd not in period

    // car chassis report error, like steer, brake, throttle, gear fault
    CHASSIS_ERROR = 2;

    // classify the types of the car chassis errors
    CHASSIS_ERROR_ON_STEER = 6;
    CHASSIS_ERROR_ON_BRAKE = 7;
    CHASSIS_ERROR_ON_THROTTLE = 8;
    CHASSIS_ERROR_ON_GEAR = 9;

    MANUAL_INTERVENTION = 3;  // human manual intervention

    // receive car chassis can frame not in period
    CHASSIS_CAN_NOT_IN_PERIOD = 4;

    UNKNOWN_ERROR = 5;
  }

  enum GearPosition {
    GEAR_NEUTRAL = 0;
    GEAR_DRIVE = 1;
    GEAR_REVERSE = 2;
    GEAR_PARKING = 3;
    GEAR_LOW = 4;
    GEAR_INVALID = 5;
    GEAR_NONE = 6;
  }

  enum DoorStatus {
    UNSPECIFIED = 0;
    OPEN = 1;
    CLOSE = 2;
  }

  enum SeatBeltStatus {
    SEAT_BELT_UNSPECIFIED = 0;
    BUCKLED = 1;
    UNBUCKLED = 2;
  }

  enum TurnLeverType {
    TURNLEVER_NONE = 0;
    TURNLEVER_DOWN = 1;            // 向左重拨
    TURNLEVER_UP = 2;              // 向右重拨
    TURNLEVER_RIGHT_SLIGHTLY = 3;  // 向右轻拨
    TURNLEVER_LEFT_SLIGHTLY = 4;   // 向左轻拨
  }

  enum AuxiliaryLeverType {
    AUXILIARYLEVER_NONE = 0;
    AUXILIARYLEVER_INWARD = 1;
    AUXILIARYLEVER_OUTWARD = 2;
    AUXILIARYLEVER_UP = 3;    // 向上重拨 or speed up
    AUXILIARYLEVER_DOWN = 4;  // 向下重拨 or speed down
    AUXILIARYLEVER_ROTATION_UP = 5;
    AUXILIARYLEVER_ROTATION_DOWN = 6;
    AUXILIARYLEVER_BUTTON_PRESSED = 7;
    AUXILIARYLEVER_UP_SLIGHTLY = 8;    // 向上轻拨
    AUXILIARYLEVER_DOWN_SLIGHTLY = 9;  // 向下轻拨
