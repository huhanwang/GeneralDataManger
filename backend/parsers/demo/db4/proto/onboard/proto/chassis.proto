message DriverOperationCheck {
  optional bool is_throttle_ready = 1 [default = true, (trans_matrix) = true];
  optional bool is_brake_ready = 2 [default = true, (trans_matrix) = true];
  optional bool is_gear_ready = 3 [default = true, (trans_matrix) = true];
  optional bool is_door_ready = 4 [default = true, (trans_matrix) = true];
  optional bool is_seat_belt_readye = 5 [deprecated = true];
  optional bool is_epb_ready = 6 [default = true, (trans_matrix) = true];
  optional bool is_vehicle_spd_ready = 7
      [default = true, (trans_matrix) = true];
  // standard gear location which allow auto driving for each vehicle
  optional Chassis.GearPosition proper_gear_location = 8
      [(trans_matrix) = true, (matrix_data_type) = INT8];
  // standard gepb position which allow auto driving for each vehicle
  optional Chassis.EpbStateType proper_epb_state = 9
      [(trans_matrix) = true, (matrix_data_type) = INT8];
  optional bool is_seat_belt_ready = 10 [default = true, (trans_matrix) = true];
}

message WheelSpeed {
  enum WheelSpeedType {
    FORWARD = 0;
    BACKWARD = 1;
    STANDSTILL = 2;
    INVALID = 3;
  }
  optional bool is_wheel_spd_rr_valid = 1 [default = false];
  optional WheelSpeedType wheel_direction_rr = 2
      [default = INVALID, (trans_matrix) = true, (matrix_data_type) = INT8];
  // unit: rad/s
  optional double wheel_spd_rr = 3 [default = 0.0, (trans_matrix) = true];
  optional bool is_wheel_spd_rl_valid = 4 [default = false];
  optional WheelSpeedType wheel_direction_rl = 5
      [default = INVALID, (trans_matrix) = true, (matrix_data_type) = INT8];
  // unit: rad/s
  optional double wheel_spd_rl = 6 [default = 0.0, (trans_matrix) = true];
  optional bool is_wheel_spd_fr_valid = 7 [default = false];
  optional WheelSpeedType wheel_direction_fr = 8
      [default = INVALID, (trans_matrix) = true, (matrix_data_type) = INT8];
  // unit: rad/s
  optional double wheel_spd_fr = 9 [default = 0.0, (trans_matrix) = true];
  optional bool is_wheel_spd_fl_valid = 10 [default = false];
  optional WheelSpeedType wheel_direction_fl = 11
      [default = INVALID, (trans_matrix) = true, (matrix_data_type) = INT8];
  // unit: rad/s
  optional double wheel_spd_fl = 12 [default = 0.0, (trans_matrix) = true];

  optional double wheel_spd_rr_pls = 13 [default = 0.0, (trans_matrix) = true];
  optional double wheel_spd_rl_pls = 14 [default = 0.0, (trans_matrix) = true];
  optional double wheel_spd_fr_pls = 15 [default = 0.0, (trans_matrix) = true];
  optional double wheel_spd_fl_pls = 16 [default = 0.0, (trans_matrix) = true];
}

message VcuStatus {
  enum VcuDrivingMode {
    UNKNOWN = 0;
    MANUAL = 1;
    REMOTE_DRIVE = 2;
    AUTO_DRIVE = 3;
  }

  optional VcuDrivingMode driving_mode = 1 [default = UNKNOWN];
  optional bool force_stop = 2 [default = false];
}

message DmsInfo {
  enum DmsAvailable {
    DMS_INIT = 0;
    DMS_AVAILABLE = 1;
    DMS_UNAVAILABLE = 2;
  }

  enum DmsTRiggerNotify {
    DMS_NO_TRIGGER = 0;
    DMS_DISTRACTED = 1;
    DMS_TIRED = 2;
  }

  enum DmsCamBlockNotify {
    DMS_NO_BLOCK = 0;
    DMS_CAMERA_OR_PARTLY_BLOCK = 1;
    DMS_INFRARED_BLOCK = 2;
    DMS_HAT_BLOCK = 3;
  }
  optional DmsAvailable dms_available_status = 1;

  optional DmsTRiggerNotify dms_trigger_notify = 2;

  optional DmsCamBlockNotify dms_cam_block_notify = 3;
}

message InclementWeatherInfo {
  enum FrontWiperStatus {
    FRONT_WIPER_OFF = 0;
    FRONT_WIPER_AUTO_L1 = 1;
    FRONT_WIPER_AUTO_L2 = 2;
    FRONT_WIPER_LOW_SPEED = 3;
    FRONT_WIPER_HIGH_SPEED = 4;
  }

  enum WiperSpeed {
    WIPER_SPEED_OFF = 0;
    WIPER_SPEED_INTERMITTENT = 1;
    WIPER_SPEED_LOW_SPEED = 2;
    WIPER_SPEED_HIGH_SPEED = 3;
  }

  optional FrontWiperStatus front_wiper_status = 1
      [(trans_matrix) = true, (matrix_data_type) = INT8];
  optional WiperSpeed wiper_speed = 2
      [(trans_matrix) = true, (matrix_data_type) = INT8];
  optional uint32 rain_intensity = 3;
}
