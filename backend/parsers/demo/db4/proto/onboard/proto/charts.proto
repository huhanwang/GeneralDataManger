
syntax = "proto2";

package snoah.vis.vantage;

import "onboard/vis/common/proto/color.proto";
import "onboard/lite/proto/lite_common.proto";
import "onboard/math/geometry/proto/affine_transformation.proto";

message ChartSeriesDataProto {
  optional string name = 1;
  optional ColorRGBAProto color = 2;
  optional double scale = 3 [default = 1.0];
  optional double offset = 4;  // Plotted value = (value + offset) * scale.

  // Special handling specified by the attributes:
  // Value interpretation:
  // - timestamp_us: the value is interpreted as a timestamp (microsecond).
  //                 scale and offset will be ignored.
  // - timestamp_ms: timestamp in milliseconds.
  // - timestamp_s:  timestamp in seconds.
  // - angle_rad:    the value is treated with periodicity 2pi and plotted
  //                 continuously. scale and offset will be ignored.
  // - angle_deg:    the value is treated with periodicity 360 and plotted
  //                 continuously. scale and offset will be ignored.
  //
  // Unary operation:
  // - inverse:      the value is inverted before being plotted.
  // - log:          the value is logarithmed (natural) before being plotted.
  // - log10:        the value is logarithmed (base-10) before being plotted.
  // - square:       the value is squared before being plotted.
  // - integral:     the value is integrated before being plotted.
  // - ema10:        the value is smoothed with Exponential Moving Average with
  //                 N=10. The EMA formula is given by:
  //                 ema(i) = value(i) * (1 - alpha) + ema(i-1) * alpha
  //                 alpha = 2 / (N + 1)
  // - ema3:         EMA with N=3.
  repeated string attributes = 5;

  // Please use the field `values` following this deprecated field.
  repeated double deprecated_values = 6;
  repeated float values = 10 [packed = true];

  repeated string tips = 7;
  enum PenStyle {
    SOLIDLINE = 0;
    DASHLINE = 1;
    DOTLINE = 2;
    DASHDOTLINE = 3;
    DASHDOTDOTLINE = 4;
  }
  optional PenStyle pen_style = 8 [default = SOLIDLINE];
  optional bool axis_equal_scales = 9 [default = false];
}

message ChartAxisValueConfig {
  optional double begin = 1;
  optional sint32 size = 4;
  optional double interval = 3;

  reserved 2;
}

enum ChartType {
  NORMAL = 0;
  PERCEPTION = 1;
  OBJECTANDRADAR = 2;
  RAWRADAR = 3;
}

message ChartSubchartDataProto {
  optional string x_name = 1;
  // See ChartSeriesConfigProto for attributes.
  repeated string x_attributes = 2;

  // Please use the field `values` or `x_values_config` following this
  // deprecated field.
  // You are strongly encouraged to use `x_value_config` to further save space.
  repeated double deprecated_x_values = 3;
  repeated float x_values = 6 [packed = true];
  optional ChartAxisValueConfig x_value_config = 5;

  repeated ChartSeriesDataProto y = 4;
}

message ChartDataProto {
  optional string title = 1;
  repeated ChartSubchartDataProto subcharts = 2;
  optional ChartType type = 3 [default = NORMAL];
}

message ChartDataBundleProto {
  repeated ChartDataProto charts = 1;
}

message Chart3DDataProto {
  optional string title = 1;
  optional string x_name = 2;
  optional string y_name = 3;
  optional string z_name = 4;
  repeated double x_values = 5;
  repeated double y_values = 6;
  repeated double z_values = 7;
  optional Vec2dProto force_x_range = 8;
  optional Vec2dProto force_y_range = 9;
  optional Vec2dProto force_z_range = 10;
}

message ChartsDataProto {
  optional LiteHeader header = 1;
  repeated ChartDataProto charts = 2;
  repeated ChartDataBundleProto est_chart_bundles = 4;

  reserved 3;
}
