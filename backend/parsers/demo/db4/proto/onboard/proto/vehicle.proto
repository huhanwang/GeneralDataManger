enum LidarPointsIgnoranceBoxUsageV1 {
  ENABLE_ALL_FILTERS_V1 = 0;
  FILTER_OCCLUDED_POINTS_V1 = 1;
  FILTER_INSIDE_POINTS_V1 = 2;
}

// Next ID: 16
message VehicleParamsProto {
  optional string car_id = 5;
  repeated LidarParamsProto lidar_params = 2;
  repeated CameraParamsProto camera_params = 3;
  optional ImuParamsProto imu_params = 4;
  optional GnssParamsProto gnss_params = 12;
  optional CanParamsProto can_params = 6;
  optional VehicleGeometryParamsProto vehicle_geometry_params = 8;
  optional VehicleDriveParamsProto vehicle_drive_params = 9;
  optional VehicleInfoProto vehicle_info = 10;
  optional ControllerConf controller_conf = 13;

  optional OmcConfigProto omc_config = 11;
  optional ObcConfigProto obc_config = 15;

  optional SpeedometerParamsProto speedometer_params = 16;
  repeated RadarParamsProto radar_params = 18;
  optional V2xParamsProto v2x_params = 19;

  optional NodesRunConfig nodes_run_config = 20;
  repeated AABox3dProto lidar_points_ignorance_boxes = 21;
  optional LidarPointsIgnoranceBoxUsageV1 lidar_points_ignorance_boxes_usage =
      22;
  repeated LidarPointsIgnoranceBoxWithUsageV1
      lidar_points_ignorance_boxes_with_usage_v1 = 23;

  optional string vehicle_plan = 24;  // Only supports conversion from v2 to v1
  // Deprecated.
  optional string vehicle_name = 1;

  reserved 14;
}
