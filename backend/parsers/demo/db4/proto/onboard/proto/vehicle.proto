    JINLV_MINIBUS = 4;
    PIXLOOP = 5;
    SKYWELL = 6;
    HIGER = 7;
    ZHONGTONG = 8;
    BYD = 9;
    ZHONGXING = 10;
    TEST_BENCH = 11;
    MARVELX = 12;
    POLERSTAR = 13;
    VEHICLE_POLERSTAR_2 = 14;
    DONGFENG = 15;
    ZHONGTONG55 = 16;
    SHUNFENG = 17;
    MARVELR = 18;
    VEHICLE_ZHONGTONG6 = 19;
    MARVELR_NEW = 20;
    SNOAHVEHICLE_SUV = 21;
    HIGER65_LONGZHOU_ONE = 22;
    HAVAL_SUV = 23;
    HYUNDAI_CAR = 24;
    BYD_LONGZHOU_LONG = 25;
    SF5_SUV = 26;
    FOTON_LONGZHOU_LONG = 27;
    AION_LX_PLUS_SUV = 28;
    HYPER_GT_CAR = 29;
    FUKANG_CAR = 30;
    ZEV_LONGZHOU_ONE = 31;
    JETOUR_SUV = 32;
    HIGER85_LONGZHOU_LONG = 33;
    JINLV85_LONGZHOU_LONG = 34;
    SERES_SF5_SUV = 35;
    VEHICLE_HYPER_AH8_SUV = 36;
    VEHICLE_LIXIANG_SUV = 37;
    VEHICLE_LIXIANGL8_SUV = 38;
    VEHICLE_LIXIANGL9_SUV = 39;
    VEHICLE_LIXIANGL6_SUV = 40;
    VEHICLE_KIAEV6_CAR = 41;
    VEHICLE_LIXIANGW01_MPV = 42;
    VEHICLE_LIXIANGW02_MPV = 43;
    VEHICLE_LIXIANGW03_MPV = 44;
    VEHICLE_LIXIANGW04_MPV = 45;
    VEHICLE_LIXIANGW05_MPV = 46;
    VEHICLE_DONGFENG_EPI_SUV = 47;
    VEHICLE_EXCEED03_CAR = 48;
    VEHICLE_JINLVSPIRIT_LONGZHOU = 49;
