
syntax = "proto2";

package snoah;

import "onboard/logging/proto/lite_run.proto";
import "onboard/lite/proto/lite_common.proto";

// This message defines lite run info
message LiteRunInfoProto {
  optional LiteHeader header = 1;
  repeated string init_timeout_modules = 2;
  repeated ModuleStartDuration module_start_durations = 3;
  optional int64 node_start_ok_timestamp = 4;
  optional int64 autonomy_module_ok_timestamp = 5;
}
