
syntax = "proto2";
package snoah;

import "onboard/lite/proto/lite_common.proto";

message LogItemProto {
  enum LogSeverity {
    INFO = 0;
    WARNING = 1;
    ERROR = 2;
    FATAL = 3;
    QISSUE = 4;
  }

  optional string file_name = 1;
  optional int32 file_line = 2;
  optional LogSeverity severity = 3;
  optional string module_name = 4;
  optional int64 capture_timestamp_ms = 5;
  optional string thread_id = 6;
  optional string msg = 7;
}

message LogProto {
  optional LiteHeader header = 1;
  repeated LogItemProto log_item = 2;
}
