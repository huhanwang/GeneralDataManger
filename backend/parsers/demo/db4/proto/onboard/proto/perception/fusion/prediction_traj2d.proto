syntax = "proto2";

package snoah;


message PredictionTraj2dProto {
  optional float probability = 1;
  repeated float x = 2 [packed = true];
  repeated float y = 3 [packed = true];
  repeated float t = 4 [packed = true];  // Time offset to current timestamp.
}
