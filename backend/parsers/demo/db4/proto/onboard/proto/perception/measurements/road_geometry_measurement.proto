syntax = "proto2";

package snoah;


import "onboard/proto/lite_camera.proto";
import "onboard/math/geometry/proto/affine_transformation.proto";
import "onboard/perception/tracker/multi_camera_fusion/proto/multi_camera_fusion.proto";
import "onboard/proto/perception/types/vision_lane_type.proto";
import "onboard/proto/perception/vision/bev_road_geometry.proto";
import "onboard/proto/perception/fusion/fused_bev_road_geometry.proto";
import "onboard/proto/perception/fusion/point_score.proto";

message RoadGeometryLaneProto {
  optional int32 lane_id = 1;
  optional VisionLaneType lane_type = 2;
  repeated PointScoreProto points = 3;
}

message RoadGeometryMeasurementProto {
  optional RoadGeometryLaneProto road_geometry_lane_proto = 1;
  repeated Vec2dProto points_on_main_camera = 2;
  optional multi_camera_fusion.CurveFittingProto curve_fitting = 3;
  optional CameraId camera_id = 4;
  optional double camera_center_timestamp = 5;
  optional VisionLaneType road_line_type = 6;
  optional BevLaneProto bev_lane_proto = 7 [deprecated = true];
  optional int32 measurement_id = 8;
  optional multi_camera_fusion.RoadLaneRelativePosition relative_position = 9
      [deprecated = true];
  optional multi_camera_fusion.LaneAssignmentType lane_assignment_type = 10
      [deprecated = true];
  optional CameraId origin_camera_id = 11;
  enum RoadLineMeasTypeSource {
    RLMTS_2D = 0;
    RLMTS_BEV = 1;
  }
  message BevRoadLineParameteredInfo {
    optional multi_camera_fusion.RoadLineParameteredInfo road_line_para_info =
        1;
    repeated VisionLaneType road_line_types = 2;
    optional FusedBevRoadGeometryProto.ParameterizedLaneInfo.PositionIndex
        position_index = 3;
    repeated FusedBevRoadGeometryProto.LaneSection vehicle_bev_lane_sections =
        4;
    repeated multi_camera_fusion.CameraIdWithRoadLineParameteredInfo
        bev_road_line_projection_infos = 5;
  }
  optional BevRoadLineParameteredInfo bev_road_line_parametered_info = 12;
  optional RoadLineMeasTypeSource type_source = 13;
}
