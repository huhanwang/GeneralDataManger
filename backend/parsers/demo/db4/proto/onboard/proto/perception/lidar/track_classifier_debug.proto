syntax = "proto2";

package snoah;


import "onboard/lite/proto/lite_common.proto";
import "onboard/math/geometry/proto/box2d.proto";
import "onboard/proto/perception/types/measurement_type.proto";

message TrackClassifierDebugProto {
  enum Method {
    VOTING = 0;
    MODEL = 1;
  }
  message TrackClassifierInfo {
    optional Method adopted_method = 1;
    optional MeasurementType voting_cls = 2;
    optional MeasurementType model_cls = 3;
    optional Box2dProto bounding_box = 4;
    optional double model_score = 5;
  }
  optional LiteHeader header = 1;
  repeated TrackClassifierInfo track_classifier_info = 2;
  optional double timestamp = 3;
}
