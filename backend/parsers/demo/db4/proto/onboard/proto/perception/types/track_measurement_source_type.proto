syntax = "proto2";

package snoah;


enum TrackMeasurementSourceType {
  TMST_LO = 0;   // Lidar only.
  TMST_VO = 1;   // Vision only.
  TMST_RO = 2;   // Radar only.
  TMST_LV = 3;   // Lidar and vision.
  TMST_LR = 4;   // Lidar and radar.
  TMST_VR = 5;   // Vision and radar.
  TMST_LVR = 6;  // Lidar, vision and radar.
}
