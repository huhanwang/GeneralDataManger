syntax = "proto2";

package snoah;

import "onboard/lite/proto/lite_common.proto";
import "onboard/proto/vehicle_pose.proto";
import "onboard/math/geometry/proto/affine_transformation.proto";
import "onboard/proto/perception/types/measurement_type.proto";

// Next ID: 19
message ExternalCamera3dMeasurementProto {
  // 3D pos and heading, vel in vcs.
  optional Vec3dProto pos = 1;
  optional double heading = 2;
  optional double heading_rate = 3;
  optional Vec2dProto vel = 4;
  optional Vec2dProto acc = 5;
  // 3D Size.
  optional double width = 6;
  optional double length = 7;
  optional double height = 8;
  // Capture timestamp.
  optional double timestamp = 9;
  // Detection confidence.
  optional double existence_confidence = 10;
  // Position, heading, size, covariance in vcs.
  optional Mat2dProto pos_covariance = 11;
  optional double heading_variance = 12;
  optional Mat2dProto vel_covariance = 13;
  optional Mat3dProto size_covariance = 14;
  optional int32 track_id = 15;
  optional float tracking_period = 16 [default = 0.0];
  enum TrackingStatus {
    kInvalid = 0;
    kNew = 1;
    kUpdated = 2;
    kCoasted = 3;
  }
  optional TrackingStatus tracking_status = 17 [default = kInvalid];
  optional int32 aeb_conf = 18;
}

// Next ID: 5
message ExternalMeasurementProto {
  optional int32 id = 1;
  optional double timestamp = 2;
  optional MeasurementType type = 3;
  oneof Measurement {
    ExternalCamera3dMeasurementProto camera3d_measurement = 4;
  }
}

// Next ID: 6
message ExternalMeasurementsProto {
  optional LiteHeader header = 1;
  repeated ExternalMeasurementProto measurements = 2;
  optional double min_timestamp = 3 [default = -1.0];
  optional double max_timestamp = 4 [default = -1.0];
  optional VehiclePoseProto vehicle_pose = 5;
}
