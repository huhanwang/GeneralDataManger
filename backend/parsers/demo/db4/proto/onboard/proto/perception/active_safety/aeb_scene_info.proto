syntax = "proto2";

package snoah;


message AebSceneInfo {
  enum AnomalyScene {
    kDefault = 0;
    kAnomalyVel = 1;
    kAnomalyAcc = 2;
    kAnomalyHeading = 3;
    kAnomalyFp = 4;
  }
  optional AnomalyScene anomaly_scene = 1 [default = kDefault];
  enum CriticalScene {
    kUnknown = 0;
    kDensePed = 1;
    kPedCloseToVehicle = 2;
  }
  optional CriticalScene critical_scene = 2 [default = kUnknown];
}
