syntax = "proto2";

package snoah;


// This is only for internal use, will convert to mapping.TrafficLightShape when
// publishing TrafficLightStateProto.
enum TrafficLightShape {
  TL_SHAPE_UNKNOWN = 0;
  TL_ROUND = 1;
  TL_LEFT_ARROW = 2;
  TL_RIGHT_ARROW = 3;
  TL_UP_ARROW = 4;
  TL_DOWN_ARROW = 5;
  TL_COUNTDOWN = 6;
  TL_UTURN = 7;
  TL_SHAPE_OTHER = 8;
}
