syntax = "proto2";

package snoah;


import "onboard/proto/perception/types/vision_lane_type.proto";

message BevPointProto {
  optional float x = 1;
  optional float y = 2;
  optional float z = 3 [default = 0];
  optional float score = 4;
  optional float type_score = 5;
  optional VisionLaneType vision_lane_type = 6;
  optional bool slowdown = 7;
  optional float pred_shift = 8;
}
