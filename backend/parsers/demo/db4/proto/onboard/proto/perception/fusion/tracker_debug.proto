syntax = "proto2";

package snoah;


import "onboard/lite/proto/lite_common.proto";
import "onboard/math/geometry/proto/affine_transformation.proto";
// import "onboard/proto/perception/types/object_type.proto";
import "onboard/proto/perception/fusion/object.proto";
import "onboard/perception/tracker/proto/tracker.proto";
import "onboard/proto/perception/types/measurement_type.proto";
import "onboard/perception/tracker/motion_filter_2/proto/bev_stat.proto";
import "onboard/proto/perception/types/track_measurement_source_type.proto";
import "onboard/proto/perception/types/fine_grained_type.proto";
import "onboard/proto/perception/fusion/objects.proto";
import "onboard/perception/tracker/motion_filter_2/proto/meas_model.proto";
import "onboard/proto/perception/fusion/fused_bev_road_geometry.proto";
import "onboard/proto/lite_camera.proto";
import "onboard/perception/tracker/association/proto/associator_config.proto";
import "onboard/perception/tracker/motion_filter_2/proto/motion_filter.proto";
import "onboard/proto/perception/lidar/track_classifier_debug.proto";
import "onboard/proto/perception/measurements/measurements.proto";

enum SensorGroupType {
  SGT_LIDAR = 0;
  SGT_RADAR = 1;
  SGT_CAMERA = 2;
  SGT_MULTI_CAMERA = 3;
  SGT_KEY_POINT = 4;
  SGT_BEV_CAMERA = 5;
}

enum TrackLifeState {
  kIdle = 0;
  kInit = 1;
  kConfirmed = 2;
  kLost = 3;
}
// Track bbox, contour source type.
enum TrackShapeSourceType {
  TSST_NONE = 0;
  TSST_LIDAR = 1;
  TSST_RADAR = 2;
  TSST_CAMERA = 3;
}

enum MergeSplitType {
  MST_NONE = 0;
  MST_MERGED_BY_OTHER_TRACK = 1;
  MST_MERGE_OTHER_TRACK = 2;
  MST_SPLIT = 3;
}

message TrackerDebugProto {
  message TrackStateDebugProtoInfo {
    optional int32 id = 1 [deprecated = true];
    optional MeasurementType type = 2 [deprecated = true];
    optional FineGrainedType fine_grained_type = 52;
    optional int32 ref_point_type = 3;
    optional double last_timestamp = 4;
    optional bool offroad = 5;
    optional double vel = 6 [deprecated = true];
    optional bool in_parking_area = 7;
    optional TrackLifeState life_state = 8;
    optional bool is_merged = 9 [deprecated = true];
    optional bool is_splited = 10 [deprecated = true];
    optional int32 motion_filter_type = 11;
    optional MotionFilterParamType motion_filter_param_type = 121;
    optional ObjectProto.MovingStateProto moving_state = 13;
    optional bool is_certain_static_track = 14;
    optional bool is_radar_only = 15 [deprecated = true];
    optional TrackMeasurementSourceType measurement_source_type = 24;
    optional bool updated_with_camera = 23 [deprecated = true];
    optional bool updated_with_icp_velocity = 16;
    optional bool updated_with_radar_velocity = 17 [deprecated = true];
    optional bool updated_with_fen_velocity = 18;
    optional bool updated_with_ace_velocity = 30 [deprecated = true];
    optional Vec2dProto ace_vel = 31 [deprecated = true];
    optional Vec2dProto reset_offset = 19;
    repeated double m_timestamp = 20 [packed = true];
    repeated MeasurementType m_type = 21 [packed = true];
    repeated int32 m_sensor_type = 22 [deprecated = true];
    repeated MeasurementTypeSource measurement_source_types = 51;
    repeated int32 m_sensor_id = 25 [packed = true];
    repeated int32 m_id = 26 [packed = true];
    repeated MeasModelProto.Type measurement_model_type = 45 [packed = true];
    repeated Vec6dProto measurement_value = 50;
    optional ObjectProto.PosSourceType pos_source_type = 27 [deprecated = true];
    optional ObservationState observation_state = 28;
    optional bool is_small_partially_observed_track = 29;
    optional double ref_point_jitter_dist_base_fen_vel = 33 [deprecated = true];
    optional double ref_point_jitter_dist_base_average_vel = 34
        [deprecated = true];
    optional double is_abnormal_ref_point = 35 [deprecated = true];
    optional double vel_from_speed_filter = 36 [deprecated = true];
    optional float vel_lite = 37;
    optional float ref_point_jitter_dist_base_fen_vel_lite = 38;
    optional float ref_point_jitter_dist_base_average_vel_lite = 39;
    optional bool is_abnormal_ref_point_lite = 40;
    optional float vel_from_speed_filter_lite = 41;
    optional MergeSplitType merge_split_type = 42;
    optional bool use_output_of_speed_filter = 43;
    optional ObjectPositionCategory object_position_category = 44;
    optional BevStatInCell bev_stat_info = 46 [deprecated = true];
    repeated float motion_model_probs = 47 [packed = true];
    map<int32, Vec4dProto> line_riding_infos = 48;
    optional FusedBevRoadGeometryProto.ParameterizedLaneInfo.PositionIndex
        riding_line = 49;

    message BevStatInCellLite {
      optional BevStatInCell.Type category = 1;
      optional uint32 x_index = 2;
      optional uint32 y_index = 3;
      optional uint32 occlusion_index = 4;
    }
    optional BevStatInCellLite bev_stat_info_lite = 53;
    repeated int32 pre_fusion_radar_id = 54 [packed = true];
    // Next id: 55
  }
  message TrackInfo {
    message HistoryInfo {
      optional Vec2dProto pos = 1;
      optional string history_info = 2;
    }

    repeated HistoryInfo track_history_info = 1 [deprecated = true];
    repeated Vec2dProto track_contour = 2;
    optional ObjectType track_type_deprecated = 3 [deprecated = true];
    optional MeasurementType track_type = 21;
    // Keep it for backward compatibility.
    repeated Vec2dProto track_cov_ellipse = 4 [deprecated = true];
    optional Vec2dProto laser_association_centroid = 5;
    optional Vec2dProto camera_association_centroid = 6;
    optional bool merged_by_other_track = 7;
    optional Vec2dProto radar_association_centroid = 8;
    optional Vec2dProto ref_point = 9;
    // State covariance.
    optional Mat2dProto pos_cov = 10 [deprecated = true];
    optional Mat2dProto pos_measurement_noise_cov = 11 [deprecated = true];

    // Vel_cov and acc_cov is for point model.
    optional Mat2dProto vel_cov = 12 [deprecated = true];
    optional Mat2dProto acc_cov = 13 [deprecated = true];
    optional Mat2dProto vel_measurement_noise_cov = 14 [deprecated = true];

    optional double heading_variance = 15 [deprecated = true];
    optional double heading_measurement_noise_variance = 16 [deprecated = true];
    optional double vel_variance = 17 [deprecated = true];
    optional double vel_measurement_noise_variance = 18 [deprecated = true];
    optional double acc_variance = 19 [deprecated = true];
    // Save track heading.
    optional double heading = 20 [deprecated = true];
    optional int32 track_id = 22;
    optional OutputGuarderDebugInfoProto guarder_debug_info = 23;
    optional Vec2dProto state_pos = 24;
    optional TrackStateDebugProtoInfo track_state_debug_info = 25;
    optional float heading_variance_lite = 26;
    optional float heading_measurement_noise_variance_lite = 27;
    optional float vel_variance_lite = 28;
    optional float vel_measurement_noise_variance_lite = 29;
    optional float acc_variance_lite = 30 [deprecated = true];
    optional float heading_lite = 31 [deprecated = true];

    optional Mat2fProto pos_cov_lite = 32;
    optional Mat2fProto pos_measurement_noise_cov_lite = 33;

    optional Mat2fProto vel_cov_lite = 34;
    optional Mat2fProto acc_cov_lite = 35 [deprecated = true];
    optional Mat2fProto vel_measurement_noise_cov_lite = 36;
  }
  message OutputGuarderDebugInfoProto {
    optional string moving_state_debug = 1 [deprecated = true];
    optional string shooter_state_debug = 2 [deprecated = true];
    optional MovingStateDebugProto moving_state_debug_lite = 3;
    optional ShooterStateDebugProto shooter_state_debug_lite = 4;
  }
  message AssociationDebugInfoProto {
    enum PairType {
      NOBODY = 0;
      CANDIDATE = 1;
      MATE = 2;
    }
    message BasicTrackInfoProto {
      optional int32 track_id = 1;
      optional ObjectType track_type_deprecated = 2 [deprecated = true];
      repeated Vec2dProto contour = 3;
      optional MeasurementType track_type = 4;
    }
    message MultiSensorMeasurementProto {
      message AssoLaserMeasurementProto {
        optional Vec2dProto pos = 1;
        repeated Vec2dProto contour = 2;
      }
      message AssoCamera3dMeasurementProto {
        optional Vec2dProto pos = 1;
        optional double heading = 2 [deprecated = true];
        optional double width = 3 [deprecated = true];
        optional double length = 4 [deprecated = true];
        optional double height = 5 [deprecated = true];
        optional float heading_lite = 6;
        optional float width_lite = 7;
        optional float length_lite = 8;
        optional float height_lite = 9 [deprecated = true];
      }
      message AssoRadarMeasurementProto {
        optional Vec2dProto pos = 1;
        optional Vec2dProto vel = 2;
        optional Mat2dProto pos_cov = 3 [deprecated = true];
        optional Mat2dProto vel_cov = 4 [deprecated = true];
        optional double orientation_variance = 5 [deprecated = true];
        optional float orientation_variance_lite = 6 [deprecated = true];
        optional Mat2fProto pos_cov_lite = 7;
        optional Mat2fProto vel_cov_lite = 8;
      }

      oneof Measurement {
        AssoLaserMeasurementProto m_laser = 1;
        AssoCamera3dMeasurementProto m_camera = 2;
        AssoRadarMeasurementProto m_radar = 3;
      }
      optional int32 measurement_id = 4;
      optional MeasurementType measurement_type = 5;
      optional double timestamp = 6;
    }
    // Deprecated
    message BasicMeasurementInfoProto {
      optional int32 measurement_id = 1;
      optional ObjectType measurement_type_deprecated = 2 [deprecated = true];
      repeated Vec2dProto contour = 3;
      optional MeasurementType measurement_type = 4;
      optional Vec2dProto centroid = 5;
      // Radar covariance.
      optional Mat2dProto pos_cov = 6;
      optional Mat2dProto vel_cov = 7;
      optional double orientation_variance = 8 [deprecated = true];
      optional float orientation_variance_lite = 9 [deprecated = true];
    }
    // Get full info of track or measurement from track_id and measurement_id
    message SimilarityInfoProto {
      optional int32 track_id = 1;
      optional int32 measurement_id = 2;
      optional PairType pair_type = 3;
      repeated double gate_vals = 4 [deprecated = true];
      repeated double metric_vals = 5 [deprecated = true];
      optional Vec2dProto track_centroid = 6;
      optional Vec2dProto measurement_centroid = 7;
      optional Vec2dProto predicted_vector = 8;
      optional double track_timestamp = 9;
      optional double measurement_timestamp = 10;
      optional CameraId camera_id = 11 [deprecated = true];
      repeated float gate_vals_lite = 12 [packed = true];
      repeated float metric_vals_lite = 13 [packed = true];
    }

    message AceAssociationMatch {
      optional bool is_matched_by_ace = 1 [default = false];
      optional int32 measurement_id = 2;
      repeated Vec2dProto measurement_contour = 3;
      optional double match_score = 4 [deprecated = true];
      optional float match_score_lite = 5;
    }

    // Basic track information.
    repeated BasicTrackInfoProto track_infos = 1 [deprecated = true];
    repeated BasicMeasurementInfoProto measurement_infos_deprecated = 2
        [deprecated = true];
    repeated MultiSensorMeasurementProto m_infos = 6 [deprecated = true];
    // Associator config.
    optional tracker.association.AssociationProto config = 3;
    // Similarity information.
    repeated SimilarityInfoProto similarity_infos = 4;
    optional SensorGroupType sensor_group_type = 5;
    optional double timestamp = 7 [deprecated = true];
    repeated AceAssociationMatch ace_association_infos = 8 [deprecated = true];
  }
  message TrackNumScoreInfo {
    optional int32 id = 1;
    optional int32 rank = 2;
    optional double total_score = 3;
    repeated double scores = 4;
  }
  optional LiteHeader header = 1 [deprecated = true];
  repeated TrackInfo track_info = 2;
  repeated TrackInfo deleted_track_info = 3;
  optional AssociationDebugInfoProto association_debug_info = 4;
  optional OutputGuarderDebugInfoProto guarder_debug_info = 5
      [deprecated = true];
  repeated MotionFilterProto motion_filter_info = 6 [deprecated = true];
  optional TrackClassifierDebugProto classifier_debug_info = 7
      [deprecated = true];
  optional MeasurementsProto.GroupType group_type = 8;
  optional double group_min_timestamp = 9;
  optional double group_max_timestamp = 10;
  optional int32 group_index = 11;
  optional int32 group_num = 12;
  optional bool is_rollback_group = 13;
  repeated TrackNumScoreInfo track_num_score_info = 14;
}

message TrackerDebugProtoWithRollback {
  optional LiteHeader header = 1;
  repeated TrackerDebugProto group_debug_proto = 2;
}
