syntax = "proto2";

package snoah;


message BevDetectionKeypointProto {
  optional float confidence = 1;
  enum BevDetectionKeypointType {
    FRONT_CENTER = 1;
    REAR_CENTER = 2;
  }
  optional BevDetectionKeypointType type = 2;
  optional float x = 3;
  optional float y = 4;
}
