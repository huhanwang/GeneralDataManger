syntax = "proto2";

package snoah;


import "onboard/lite/proto/lite_common.proto";
import "onboard/math/geometry/proto/affine_transformation.proto";
import "onboard/proto/vehicle_pose.proto";
import "onboard/proto/perception/types/vision_lane_type.proto";
import "onboard/proto/perception/vision/bev_road_geometry.proto";
import "onboard/proto/perception/fusion/bev_static_perception_ego_trajectory_path.proto";

// Road geometry tracker output.
message FusedBevRoadGeometryProto {
  optional LiteHeader header = 1;
  optional double mid_center_timestamp = 2;
  optional VehiclePoseProto vehicle_pose = 3;
  enum CurbType {
    NOT_CURB = 0;
    FLAT_CURB = 1;
    LOW_CURB = 2;
    HIGH_CURB = 3;
  }
  message LaneSection {
    optional VisionLaneType bev_lane_type = 1;
    repeated Vec3dProto bev_points = 2;
    optional CurbType bev_curb_type = 3 [default = NOT_CURB];
  }
  message ParameterizedLaneInfo {
    enum PositionIndex {
      HOST_LEFT = 0;
      HOST_RIGHT = 1;
      LEFT_NEIGHBOR_LANE_LEFT = 2;
      LEFT_NEIGHBOR_LANE_RIGHT = 3;
      RIGHT_NEIGHBOR_LANE_LEFT = 4;
      RIGHT_NEIGHBOR_LANE_RIGHT = 5;
      REAR_RIGHT = 6;
      REAR_LEFT = 7;
      ROAD_EDGE_LEFT = 8;
      ROAD_EDGE_RIGHT = 9;
      DEFAULT = 255;
    }
    optional PositionIndex lane_position_index = 1 [default = DEFAULT];
    // The range is 0~1.
    optional double confidence = 2;
    // The ooefficient of cubic curve.
    optional float c0 = 3;
    optional float c1 = 4;
    optional float c2 = 5;
    optional float c3 = 6;
    optional Vec3dProto start_point = 7;
    optional Vec3dProto end_point = 8;
    repeated LaneSection lanes = 9;
    // Track id.
    optional int32 lane_id = 10;

    enum YShapeSemanticType {
      NORMAL = 0;
      FORK_LEFT_BRANCH = 1;
      FORK_RIGHT_BRANCH = 2;
      MERGE_LEFT_BRANCH = 3;
      MERGE_RIGHT_BRANCH = 4;
      COMMON_BRANCH = 5;
      FORK_LEFT_WITH_COMMON_BRANCH = 6;
      FORK_RIGHT_WITH_COMMON_BRANCH = 7;
      MERGE_LEFT_WITH_COMMON_BRANCH = 8;
      MERGE_RIGHT_WITH_COMMON_BRANCH = 9;
    }
    optional YShapeSemanticType y_shape_semantic_type = 11;
    // state timestamp - born timestamp
    optional float life_time = 12;
    // vehicle coord
    repeated double y_shape_intersection_x = 13 [packed = true];
    optional double lateral_error = 14;  // m/s
    optional double length = 15;         // meter
  }

  repeated ParameterizedLaneInfo smooth_bev_lanes = 4;

  repeated ParameterizedLaneInfo vehicle_bev_lanes = 5;
  // TODO(zheng): Add center line results.
  repeated BevGroundMarkingProto ground_markings = 6;
  repeated CrosswalkProto crosswalks = 7;
  repeated BevKeypointProto bev_keypoints = 8;
  repeated BevStaticPerceptionEgoTrajectoryPathProto ego_trajectory_paths = 9;
  repeated BevCenterLineProto center_lines = 10;
  repeated RoadIntersectionProto roadintersections = 11;
  // Bev ego centerline
  repeated BevEgoCenterLineProto bev_ego_center_lines = 12;
  repeated BevStaticPerceptionEgoTrajectoryPathProto
      ego_trajectory_paths_smooth = 13;
  repeated BevCenterLineProto center_lines_smooth = 14;
  repeated BevEgoCenterLineProto bev_ego_center_lines_smooth = 15;
}
