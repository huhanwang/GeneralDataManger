
syntax = "proto2";

package snoah;


import "onboard/lite/proto/lite_common.proto";
import "onboard/math/geometry/proto/affine_transformation.proto";
import "onboard/proto/perception/parking/parking_base.proto";
import "onboard/lite/proto/proto_field_option.proto";

// Next id: 9
message UssObjectProto {
  optional uint32 id = 1 [(trans_matrix) = true];
  optional double timestamp = 2 [(trans_matrix) = true];
  enum ObjectType {
    OT_UNKNOWN = 0;
    OT_POINT = 1;
    OT_STRAIGHT_0_CORNER = 2;
    OT_STRAIGHT_1_CORNER = 3;
    OT_STRAIGHT_2_CORNER = 4;
    OT_LEFT_OBJ = 5;
    OT_RIGHT_OBJ = 6;
  }
  optional ObjectType type = 3
      [(trans_matrix) = true, (matrix_data_type) = INT8];
  enum HeightStatus {
    HS_UNKNOWN = 0;
    HS_LOW = 1;
    HS_HIGH = 2;
    HS_TRAVERSABLE = 3;
  }
  optional HeightStatus height_status = 4
      [(trans_matrix) = true, (matrix_data_type) = INT8];
  optional float height_prob = 5 [(trans_matrix) = true];
  optional float exist_prob = 6 [(trans_matrix) = true];
  optional Vec2fProto start = 7 [(trans_matrix) = true];
  optional Vec2fProto end = 8 [(trans_matrix) = true];
}

// Next id: 4
message UssSpotPoint {
  enum PointType {
    PT_UNKNOWN = 0;
    PT_VIRTUAL = 1;
    PT_REAL = 2;
  }
  optional PointType type = 1
      [(trans_matrix) = true, (matrix_data_type) = INT8];
  optional Vec2fProto location = 2 [(trans_matrix) = true];
  optional float angle = 3 [(trans_matrix) = true];
}

// Next id: 10
message UssParkingSpotProto {
  optional uint32 id = 1 [(trans_matrix) = true];
  optional double timestamp = 2 [(trans_matrix) = true];
  optional SpotState status = 3
      [(trans_matrix) = true, (matrix_data_type) = INT8];
  optional SpotType type = 4 [(trans_matrix) = true, (matrix_data_type) = INT8];
  enum SpotObjectType {
    POT_UNKNOWN = 0;
    POT_CURB = 1;
    POT_WALL = 2;
    POT_VIRTUAL = 3;
    POT_LOW = 4;
    POT_HIGH = 5;
  }
  optional SpotObjectType object_type = 5
      [(trans_matrix) = true, (matrix_data_type) = INT8];
  optional float length = 6 [(trans_matrix) = true];
  optional float depth = 7 [(trans_matrix) = true];
  repeated UssSpotPoint spot_points = 8 [(trans_matrix) = true];

  enum PasSlotStatus {
    PSS_NONE = 0;
    PSS_OK = 1;
    PSS_RESERVED1 = 2;
    PSS_RESERVED2 = 3;
  }
  optional PasSlotStatus slot_status = 9;
}

// Next id: 3
message UssReflectionResponse {
  repeated float ce = 1;
  repeated float de = 2;
}

// Next id: 3
message UssDistance {
  enum DistanceValidStatus {
    DVS_VALID = 0;
    DVS_NO_OBJECT = 251;
    DVS_INVALID = 511;
  }
  optional DistanceValidStatus distance_valid_status = 1;
  optional float distance = 2;
}

// Next id: 6
message UssPointProto {
  optional float prob = 1;
  enum PointHeightType {
    PHT_LOW = 0;
    PHT_HIGH = 1;
    PHT_TRAVERSIBLE = 2;
    PHT_UNKNOW = 3;
  }
  optional PointHeightType height_type = 2;
  optional float height_prob = 3;
  optional Vec2fProto location = 4;

  enum PointType {
    PT_NONE = 0;
    PT_POINT = 1;
    PT_STRAIGHT0_CORNER = 2;
    PT_STRAIGHT1_CORNER = 3;
    PT_STRAIGHT2_CORNER = 4;
    PT_RESERVED1 = 5;
    PT_RESERVED2 = 6;
  }
  optional PointType point_type = 5;
}

message HeaderDDS {
  optional uint64 seq = 1;
  optional uint64 sec = 2;
  optional uint64 nanosec = 3;
  optional string frame_id = 4;
};

// Next id: 11
message UssProto {
  optional LiteHeader header = 1;
  optional CoordinateType coordinate_type = 2
      [(trans_matrix) = true, (matrix_data_type) = INT8];
  repeated UssObjectProto objects = 3 [(trans_matrix) = true];
  repeated UssParkingSpotProto spots = 4 [(trans_matrix) = true];

  // adapt lixiang idls
  enum PasStatus {
    PAS_OFF = 0;
    PAS_STANDBY = 1;
    PAS_ACTIVE = 2;
    PAS_FRONT_ACTIVE_REAR_FAILURE = 3;
    PAS_FRONT_FAILURE_REAR_ACTIVE = 4;
    PAS_SYSTEM_FAILURE = 5;
    PAS_RESERVED1 = 6;
    PAS_RESERVED2 = 7;
  }
  optional PasStatus pas_status = 5;

  enum PasTrailerHitchStatus {
    THS_NO = 0;
    THS_YES = 1;
    THS_UNKNOW = 2;
  }
  optional PasTrailerHitchStatus trailer_hitch_status = 6;
  repeated UssDistance uss_distance = 7;
  optional UssReflectionResponse reflection_response = 8;
  repeated UssPointProto points = 9;

  optional HeaderDDS header_dds = 10;  // dds msg header
}
