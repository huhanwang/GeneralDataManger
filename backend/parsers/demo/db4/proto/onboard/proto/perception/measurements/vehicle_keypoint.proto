syntax = "proto2";

package snoah;


import "onboard/proto/lite_camera.proto";
import "onboard/proto/perception/fusion/point_score.proto";
import "onboard/math/geometry/proto/affine_transformation.proto";

message VehicleGroundPointProto {
  enum VehicleGroundPointType {
    VGP_FRONT_LEFT = 0;
    VGP_FRONT_RIGHT = 1;
    VGP_REAR_LEFT = 2;
    VGP_REAR_RIGHT = 3;
  }
  optional PointScoreProto point = 1;
  optional VehicleGroundPointType type = 2;
  optional Vec2dProto bev_point = 3;
}

message VehicleKeypointProto {
  optional CameraId camera_id = 1;
  optional double timestamp = 2;
  repeated VehicleGroundPointProto vehicle_ground_points = 3;
  // instance confidence
  optional double instance_score = 4;
}
