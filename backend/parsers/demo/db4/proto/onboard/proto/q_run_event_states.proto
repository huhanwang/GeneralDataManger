
syntax = "proto2";

package snoah;

import "onboard/lite/proto/lite_common.proto";
import "onboard/proto/q_run_event.proto";

message QRunEventStatesProto {
  enum BinaryState {
    BINARY_STATE_UNKNOWN = -1;
    BINARY_STATE_ON = 0;
    BINARY_STATE_OFF = 1;
    BINARY_STATE_CANCEL = 2;
    BINARY_STATE_TURNING_ON = 3;
    reserved 4;
  }

  enum StateType {
    STATE_TYPE_ENGAGE = 0;
    STATE_TYPE_DOOR = 1;
    STATE_TYPE_TRAFFIC_LIGHT_IGNORE = 2;
    STATE_TYPE_LANE_CHANGE_STATIONARY_OBJECTS = 3;
    STATE_TYPE_PULL_OVER = 4;
    STATE_TYPE_LEFT_BLINKER = 5;
    STATE_TYPE_RIGHT_BLINKER = 6;
    STATE_TYPE_EMERGENCY_BLINKER = 7;

    STATE_TYPE_COM_LANE_CHANGE_LEFT = 8;
    STATE_TYPE_COM_LANE_CHANGE_RIGHT = 9;
    STATE_TYPE_COM_LANE_CHANGE_FORCE_KEEP = 10;
    STATE_TYPE_COM_LANE_CHANGE_CANCEL = 11;
    STATE_TYPE_COM_NEXT_STATION = 12;
    STATE_TYPE_COM_DRIVE_NOTE = 13;
    STATE_TYPE_COM_DRIVE_MISSION = 14;
    STATE_TYPE_COM_SEMANTIC_MAP_MODIFIER = 15;
    STATE_TYPE_COM_REQUEST_REMOTE_ASSIST = 16;
    STATE_TYPE_COM_PRODUCT_SETTING = 17;

    STATE_TYPE_PURPOSE = 18;
    STATE_TYPE_DRIVER = 19;
    STATE_TYPE_ENGINEER = 20;
    STATE_TYPE_LOCATION = 21;
    STATE_TYPE_ROUTE_ID = 22;

    STATE_TYPE_QSTATE_KICKOUT = 23;
    STATE_TYPE_QSTATE_TAKEOVER = 24;
    STATE_TYPE_QSTATE_CRASH = 25;

    STATE_TYPE_LANE_CHANGE_IGNORE = 26;

    STATE_TYPE_COM_SPECIAL_REGION = 27;

    STATE_TYPE_QSTATE_COMMENT = 28;

    STATE_TYPE_QSTATE_REMOTE_ASSISTANCE = 29;

    STATE_TYPE_QSTATE_HARD_BRAKE = 30;

    STATE_TYPE_QSTATE_ISSUE_AFFECT_ENGAGE = 31;

    STATE_TYPE_QSTATE_QVIEW_ROUTE_INFO = 32;

    STATE_TYPE_QSTATE_EMERGENCY_STOP = 33;

    STATE_TYPE_QSTATE_LAST_STATION = 34;

    STATE_TYPE_ACC_SWITCH = 35;
    STATE_TYPE_LCC_SWITCH = 36;
    STATE_TYPE_PLC_SWITCH = 37;
    STATE_TYPE_NOA_SWITCH = 38;
    STATE_TYPE_FCW_SWITCH = 39;
    STATE_TYPE_AEB_SWITCH = 40;
    STATE_TYPE_AES_SWITCH = 41;

    STATE_TYPE_DISENGAGE = 42;
    STATE_TYPE_ACC_ENGAGE = 43;

    STATE_TYPE_SPEED_LIMIT = 44;
    STATE_TYPE_OVERSPEED = 45;
    STATE_TYPE_TRAFFIC_SIGN = 46;
    STATE_TYPE_AEB_SETTING_SWITCH = 47;
    STATE_TYPE_APA_SETTINGS_SWITCH = 48;

    STATE_TYPE_OPERATIONAL_CONDITION = 50;

    STATE_TYPE_SLA_SWITCH = 51;
    STATE_TYPE_HMA_SWITCH = 52;
    STATE_TYPE_LDW_LKA_SWITCH = 53;
    STATE_TYPE_ELK_SWITCH = 54;
    STATE_TYPE_BSD_DOW_SWITCH = 55;

    STATE_TYPE_RELEASE_TAG = 56;

    STATE_TYPE_LAEB_SETTING_SWITCH = 57;

    STATE_TYPE_ELK_W_SWITCH = 58;

    STATE_TYPE_CHILD_SEAT_SETTING_SWITCH = 59;

    STATE_TYPE_AUTONOMY_ABNORMAL_REASON = 60;

    // APA Event
    STATE_TYPE_COM_APA_START_PARKING = 61;
    STATE_TYPE_COM_APA_PARKING_RESUME_CONFIRM = 62;
    STATE_TYPE_COM_APA_PARKING_SPOT_SELECTED = 63;
    STATE_TYPE_COM_APA_PARKING_SPOT_CUSTOM = 64;
    STATE_TYPE_COM_APA_DRIVER_PARKING_PAUSE = 65;
    STATE_TYPE_COM_APA_PAUSE_CONDITION_TRIGGER = 66;

    STATE_TYPE_QEVENT_DRIVER_HANDOFF_STEER = 67;

    STATE_TYPE_APA_PARKING_SPOT_CUSTOM_MODE = 68;
    STATE_TYPE_TRAFFIC_LIGHT = 69;
    STATE_TYPE_MAI_SWITCH = 70;

    STATE_TYPE_QEVENT_DRIVER_DISCOMFORT = 1000;

    // lcc: cruising speed
    STATE_TYPE_QEVENT_LCC_CRUISING_SPEED = 1010;
    // lcc: following distance level
    STATE_TYPE_QEVENT_LCC_FOLLOWING_DISTANCE_LEVEL = 1011;
    // noa: cruising speed
    STATE_TYPE_QEVENT_NOA_CRUISING_SPEED = 1012;

    STATE_TYPE_QPAD_SET_CRUISING_SPEED = 1013;

    STATE_TYPE_QEVENT_CRUISING_SPEED = 1014;

    STATE_TYPE_QEVENT_START_CALIBRATE = 1015;

    STATE_TYPE_QEVENT_AUTO_LANE_CHANGE_DRIVER_CONFIRM = 1016;

    STATE_TYPE_QEVENT_LOGGING_STATUS = 1017;

    STATE_TYPE_QEVENT_SEVERE_WEATHER_MODE_INFO = 1018;
  }

  message QRunEventStateHeader {
    optional int64 send_timestamp =
        1;  // unit: us , RunEvent triggered  timestamp
    optional int64 receive_timestamp =
        2;  // unit: us , RunEvent received timestamp
  }

  message QRunEventStateValue {
    optional StateType state_type = 1;
    oneof value {
      BinaryState binary_state = 2 [default = BINARY_STATE_UNKNOWN];
    }
  }

  optional LiteHeader header = 1;
  message QRunEventState {
    optional QRunEventStateHeader run_event_state_header = 1;
    optional QRunEventStateValue run_event_state_value = 2;
    optional QRunEvent run_event = 3;
  }

  repeated QRunEventState states = 2;  // deprecated

  map<int32, QRunEventState> states_map = 3;
}
