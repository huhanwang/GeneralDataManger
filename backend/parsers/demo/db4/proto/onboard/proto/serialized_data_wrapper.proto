
syntax = "proto2";

package snoah;

import "onboard/lite/proto/lite_common.proto";

message SerializedDataWrapperProto {
  enum SerializeType {
    SERIALIZE_TYPE_NONE = 0;
    SERIALIZE_TYPE_PROTO = 1;
    SERIALIZE_TYPE_IDL_RTIDDS = 2;
    SERIALIZE_TYPE_IDL_VBS = 3;
  }
  optional LiteHeader header = 1;
  optional string topic_name = 2;
  optional bytes raw_data = 3;
  optional SerializeType type = 4;
  // Timestamp in millisecond.
  optional int64 idl_timestamp = 5;
}
