// In lite communication system, all sub/pub messages has to list as one of a
// optional fields in LiteMsg, otherwise the message won't be supported in
// tranferring between modules.
// Furthermore, the new msg has to be registered in the corresponding file under
// onboard/lite/launch_config/module_configs
// Use the commit number to set the field id to avoid confliction.
message LiteMsgWrapper {
  // The tag number of lite_msg to indicate which field is set. zero means
  // nothing is set.
  optional int32 tag_number = 1;

  // *Do not* change tag number of defined fields below, always add new field
  // with new non-conflict tag number.
  // Please keep the field name same as proto name by using '_' connect words
  // with lower cases.
  // Must be a message type.
  oneof lite_msg {
    PoseProto pose_proto = 2;

    TrajectoryProto trajectory_proto = 3;

    SystemStatusProto system_status_proto = 5;

    ShmMessageMetadata shm_message_metadata = 6;

    GnssRawReadingProto gnss_raw_reading_proto = 10;

    ImuRawReadingProto imu_raw_reading_proto = 7;

    PandarPacketProto pandar_packet_proto = 8;

    ObstaclesProto obstacles_proto = 9;

    GnssImuDriverDebugProto gnss_imu_driver_debug_proto = 11;

    CanDriverDebugProto can_driver_debug_proto = 14;

    VehicleControlStatusProto vehicle_control_status_proto = 15;

    VehicleOperationStatusProto vehicle_operation_status_proto = 16;

    PoseEstimatorDebugProto pose_estimator_debug_proto = 17;

    PositioningFilterStateProto positioning_filter_state_proto = 19;

    DepthMapsProto depth_maps_proto = 20;

    TrafficLightRegionsProto traffic_light_regions_proto = 21
        [deprecated = true];

    ChassisDetail chassis_detail = 22;

    Chassis chassis = 23;

    ControlCommand control_command = 24;

    PadMessage pad_message = 25;

    ExecutionIssueProto execution_issue_proto = 27;

    AutonomyStateProto autonomy_state_proto = 28;

    GuardianCmdProto guardian_cmd_proto = 29;

    DriverAction driver_action = 30;

    LocalizationDebugProto localization_debug_proto = 32;

    ObjectsProto objects_proto = 33;

    TrafficLightStatesProto traffic_light_states_proto = 34;

    vis.vantage.ChartsDataProto charts_data_proto = 35;

    ObjectsPredictionProto objects_prediction_proto = 37;

    SegmentsInImageProto segments_in_image_proto = 40;

    PointsInImageProto points_in_image_proto = 41;

    PerfTrace perf_trace = 42 [deprecated = true];

    PlannerDebugProto planner_debug_proto = 43;

    ReroutingRequestProto rerouting_request_proto = 44;

    RemoteAssistToCarProto remote_assist_to_car_proto = 45;

    CarToRemoteAssistProto car_to_remote_assist_proto = 46;

    CreateVirtualObjectsRequestProto create_virtual_objects_request_proto = 47;

    LidarHostTimeDiffProto lidar_host_time_diff_proto = 48;

    LocalizationPoseProto localization_pose_proto = 49;

    AudioRecordProto audio_record_proto = 50;

    TraceProto trace_proto = 51;

    CounterProto counter_proto = 52;

    SystemInfoProto system_info_proto = 53;

    labeling.LabelFrameProto label_frame_proto = 54;

    // DetectionObjectsProto is not used and its definition is removed
    // DetectionObjectsProto detection_objects_proto = 55;

    FenDetectionsProto fen_detections_proto = 56;

    LogProto log_proto = 57;

    PoseCorrectionProto pose_correction_proto = 58;

    SemanticSegmentationResultsProto semantic_segmentation_results_proto = 59;

