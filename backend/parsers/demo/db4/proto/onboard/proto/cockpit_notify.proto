
syntax = "proto2";

package snoah;

import "onboard/lite/proto/lite_common.proto";

message CockpitNotifyProto {
  optional LiteHeader header = 1;

  optional string vin_code = 2;
  optional string message_id = 3;
  optional int64 timestamp = 4;  // unit: ms
  enum NotifyType {
    NT_NONE = 0;
    // from cockpit
    NT_COCKPIT_CANCLE_TAKEOVER_RSP = 10001;
    NT_COCKPIT_CANCLE_TAKEOVER_REQ = 10002;
    NT_COCKPIT_SWITCH_TO_AUTO_DRIVE_REQ = 10003;

    // from vehicle
    NT_VEHICLE_CANCLE_TAKEOVER_REQ = 20001;
    NT_VEHICLE_CANCLE_TAKEOVER_RSP = 20002;
    NT_VEHICLE_SWITCH_TO_AUTO_DRIVE_RSP = 20003;
  }
  optional NotifyType type = 5;

  message ReqRspBody {
    optional string task_id = 1;
    optional int32 result = 2;
    optional string reason = 3;
  }
  oneof body {
    ReqRspBody req_rsp_body = 6;
  }
}