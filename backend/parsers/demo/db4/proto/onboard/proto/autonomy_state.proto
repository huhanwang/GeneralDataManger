// Run_analyzer depends on this proto.
// If you want to stop collecting this proto or change collecting frequency,
// please contact infra.

// Report current autonomy state.
message AutonomyStateProto {
  optional LiteHeader header = 1;
  enum State {
    option allow_alias = true;

    // Vehicle isn't ready to do anything.
    NOT_READY = 0;

    // Vehicle won't execute control command and is ready to engage.
    READY_TO_AUTO_DRIVE = 2;

    // Vehicle will execute control command and is engaged by the local driver.
    AUTO_DRIVE = 3;

    // Vehicle is triggering issue lead to won't execute control command and
    // need to be take over.
    EMERGENCY_TO_TAKEOVER = 4;

    // Vehicle won't execute control command and is ready to remote dirve.
    READY_TO_REMOTE_DRIVE = 5;

    // Vehicle will execute control command that is sent by the remote driver.
    REMOTE_DRIVE = 6;

    // Vehicle will execute control command and is engaged by the remote driver.
    REMOTE_ASSIST_AUTO_DRIVE = 7;

    // Vehicle is triggering issue and braking immediately.
    EMERGENCY_TO_STOP = 8;

    // Vehicle won't execute speed control command and only execute steer
    // control command.
    AUTO_STEER_ONLY = 10;

    // Vehicle won't execute steer control command and only execute speed
    // control command.
    AUTO_SPEED_ONLY = 11;

    // Vehicle is shutting down.
    SHUTDOWN = 20;

    // Vehicle is initing.
    INIT = 21;

    // Vehicle won't execute steer control command and speed control
    // command,triggered by assist drive system override.
    READY_OVERRIDE = 30;

    // Vehicle is exiting slowly
    SHORT_BRAKE = 31;

    // Deprecated.
    UNKNOWN = 0 [deprecated = true];
    MANUAL = 1 [deprecated = true];
    TAKEOVER = 1 [deprecated = true];
    CRUISE_READY = 2 [deprecated = true];
    AUTO_CRUISE = 3 [deprecated = true];
    STOP = 9 [deprecated = true];
  }

  message DisengageReason {
    // The name of failed execution issue type.
    repeated string failed_issues = 1;
    repeated QIssueProto issue = 4 [(trans_matrix) = true];
    reserved 2, 3;
  }

  optional State autonomy_state = 2;
  // Set the field, if falls from ENGAGE state to DISENGAGE_ENGAGE_NOT_READY.
  optional DisengageReason reason = 3 [(trans_matrix) = true];

  optional AssistStateProto assist_state = 4 [(trans_matrix) = true];

  optional RemoteCockpitStateProto remote_cockpit_state = 5;
}

// In guardian mode, canbus module should receive proto from this message.
message GuardianCmdProto {
  optional LiteHeader header = 1;
  optional ControlCommand control_cmd = 2 [(trans_matrix) = true];
  optional VehicleControlCommand vehicle_control_cmd = 3
      [(trans_matrix) = true];
  optional AebControlCommand aeb_control_cmd = 4 [(trans_matrix) = true];
  optional SafetyToHuiProto safety_to_hui_proto = 5 [(trans_matrix) = true];
  optional DrivingParkingModeProto driving_parking_mode_proto = 6
      [(trans_matrix) = true];
}

// Use take the note happened in car, can come from major driver or co-driver.
message EventNoteProto {
  // True if driver press the acc_off_button.
  optional bool press_note_button = 1;
  // Set if co-driver input text notes.
  optional string note = 2;
  optional int64 note_timestamp = 3;
}

message DriverAction {
  optional LiteHeader header = 1;
  optional bool press_engage_button = 2;
  optional bool press_disengage_button = 5;
  optional EventNoteProto event_note = 3;
  optional bool press_res_button = 4;
  optional bool start_modules = 6;
  optional bool stop_modules = 7;
  optional bool request_remote_assist = 8;

  enum LaneChangeCommand {
    LC_CMD_NONE = 1;
    LC_CMD_LEFT = 2;
    LC_CMD_RIGHT = 3;
    LC_CMD_CANCEL = 4;
    LC_CMD_STRAIGHT = 5;  // To fully cover LaneChangeRequestProto::Direction.
  }
  optional LaneChangeCommand lane_change_command = 9;

  enum ALCSwitcher {
    ALC_TURN_ON = 1;
    ALC_TURN_OFF = 2;
  }
  optional ALCSwitcher alc_switcher = 10;
  optional int32 press_res_button_n = 11;

  enum LCCSwitcher {
    LCC_TURN_ON = 1;
    LCC_TURN_OFF = 2;
  }
  optional LCCSwitcher lcc_switcher = 12;

  optional bool press_trace_dump_button = 13;
  optional bool press_acc_engage_button = 14;

  // Next id: 16.
  reserved 15;
}

message AudioRecordProto {
  optional LiteHeader header = 1;
  optional double sample_timestamp = 2;
  optional bytes mp3_data = 3;
  optional int64 note_timestamp = 4;
  optional string text = 5;
}

