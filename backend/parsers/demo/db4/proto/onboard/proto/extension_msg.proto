    LiteMsgSimpleProto lite_msg_simple_proto = 2;
    LitePerfTestMsgProto lite_perf_test_msg_proto = 3;
    TrajectoryProto trajectory_proto = 4;
    ShmMessageMetadata shm_message_metadata = 6;

    VioPymBufferV2Proto vio_pym_buffer_v2_proto = 7;
    PerceptionObstaclesProto perception_obstacles_proto = 8;
    PoseProto pose_proto = 9;

    EhpRawMessagesProto ehp_raw_messages_proto = 10;
    TurnByTurnProto turn_by_turn_proto = 11;
    limap.LiMapTilesProto li_map_tiles_proto = 12;

    VioPymBufferV2Proto vio_pym_buffer_fisheye_proto = 13;
    ImuRawReadingProto imu_raw_reading_proto = 14;

    HistoryMsgRequestProto history_msg_request_proto = 171;
    HistoryMsgResponseProto history_msg_response_proto = 172;
    QPowerManagerStateProto q_power_manager_state_proto = 217;

    LiParkingSpotsProto li_parking_spots_proto = 287;
    LiParkingFreespaceMsgProto li_parking_freespace_msg_proto = 298;

    FusionParkingFreespaceProto fusion_parking_freespace_proto = 214;
    ParkingSpotFinderProto parking_spot_finder_proto = 198;
    AutonomyStateProto autonomy_state_proto = 28;
    ObjectsProto objects_proto = 33;
    ObjectsPredictionProto objects_prediction_proto = 37;
    HmiContentProto hmi_content_proto = 80;
    LiFisheyeObjectProto li_fisheye_object_proto = 311;

    SuspensionProto suspension_proto = 314;
    SuspensionHeightLevelSensorProto suspension_height_level_sensor_proto = 315;
