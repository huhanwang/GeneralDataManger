
syntax = "proto2";

package snoah;
import "onboard/lite/proto/lite_common.proto";

// ExitTimeoutStack,  produced when module exit timeout.
message ExitTimeoutStackProto {
  optional LiteHeader header = 1;
  optional string module_name = 2;
  optional string node_name = 3;
  repeated string logs = 4;
}
