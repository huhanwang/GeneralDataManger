
syntax = "proto2";

package snoah;

import "onboard/lite/proto/proto_field_option.proto";
import "onboard/proto/chassis.proto";

// MRC: minimal risk condition
// MRM: minimal risk method

// minimal risk method
enum MinimalRiskMethodType {
  MINIMAL_RISK_METHOD_NONE = 0;
  MINIMAL_RISK_METHOD_IMMEDIATE_STOP = 1;  // to fault, immediately exit
  MINIMAL_RISK_METHOD_SHORT_BRAKE =
      2;  // safety stop, stop the vehicle by braking within the current lane
  MINIMAL_RISK_METHOD_EXIT = 3;
  MINIMAL_RISK_METHOD_TO_ACC = 4;
  MINIMAL_RISK_METHOD_TO_LCC = 5;
  MINIMAL_RISK_METHOD_WARNING = 6;
  MINIMAL_RISK_METHOD_SUPPRESSION = 7;
  MINIMAL_RISK_METHOD_LAT_TEMP_EXIT = 8;
}

// minimal risk condition type
enum MinimalRiskConditionType {
  MRC_TYPE_NONE = 0;
  MRC_TYPE_ACC = 1;
  MRC_TYPE_LCC = 2;
  MRC_TYPE_NOA = 3;
  MRC_TYPE_L4 = 4;
  MRC_TYPE_HMA = 5;
  MRC_TYPE_APA = 6;
  MRC_TYPE_TSR = 7;
  MRC_TYPE_RPA = 8;
  MRC_TYPE_LCA = 9;
  MRC_TYPE_HPP = 10;
}

// MRC-ODC : operational design condition for L1,L2,L2++,L4
message OperationalConditionProto {
  message SpotParkAbleInfo {
    optional string id = 1;
    optional bool is_park_able = 2;
  }

  optional double current_speed = 2;  // x, m/s

  optional bool is_vehicle_ready = 3;

  optional bool is_gear_position_d = 4;

  optional bool is_epb_release = 5;

  repeated bool is_doors_close = 6;  // FL,FR,RL,RR
  optional bool is_hood_close = 7;
  optional bool is_tailgate_close = 8;

  optional bool is_vehicle_not_slip = 9;

  optional bool is_avh_inactive = 10;
  optional bool is_aeb_inactive = 11;
  optional bool is_abs_inactive = 12;
  optional bool is_tcs_inactive = 13;
  optional bool is_vdc_inactive = 14;
  optional bool is_hdc_inactive = 15;
  optional bool is_cdp_inactive = 16;

  optional bool is_vcu_available = 17;

  optional bool is_driver_seat_belt_buckled = 18;
  optional bool is_passenger_seat_belt_buckled = 19;

  optional bool is_esc_turn_on = 20;

  optional bool is_not_brake_pedal_pressed =
      21;  // not standstill & press brake

  optional double steering_angle = 22;

  optional bool is_eps_ready = 23;

  optional double lane_width = 30 [(trans_matrix) = true];
  optional double lane_curvature_radius = 31 [(trans_matrix) = true];
  optional bool is_emergency_light_close = 32;
  optional bool is_lane_center_line_valid = 34 [(trans_matrix) = true];
  optional bool is_fcw_inactive = 35 [(trans_matrix) = true];
  optional double lane_center_line_length = 36 [(trans_matrix) = true];
  optional bool is_acc_engage_only = 37 [(trans_matrix) = true];
