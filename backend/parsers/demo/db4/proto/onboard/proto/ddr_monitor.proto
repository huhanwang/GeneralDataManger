
syntax = "proto2";

package snoah;

message DdrSummaryProto {
  optional int64 timestamp = 1;
  optional uint32 read_cpu_mb = 2;
  optional uint32 read_bpu_mb = 3;
  optional uint32 read_cv_mb = 4;
  optional uint32 read_apv_mb = 5;
  optional uint32 read_cam_mb = 6;
  optional uint32 read_total_mb = 7;
  optional uint32 read_cmd_sum = 8;
  optional uint32 write_cpu_mb = 9;
  optional uint32 write_bpu_mb = 10;
  optional uint32 write_cv_mb = 11;
  optional uint32 write_apv_mb = 12;
  optional uint32 write_cam_mb = 13;
  optional uint32 write_total_mb = 14;
  optional uint32 write_cmd_sum = 15;
}

message DdrInfoProto {
  optional string module_name = 1;
  repeated DdrSummaryProto ddr_summary_proto = 2;
}
