
syntax = "proto2";

package snoah;

import "onboard/common/proto/semantic_map_modifier.proto";
import "onboard/lite/proto/lite_common.proto";
import "onboard/maps/proto/semantic_map_meta.proto";
import "onboard/maps/proto/semantic_map.proto";

message SemanticMapModificationProto {
  optional LiteHeader header = 1;
  optional mapping.SemanticMapModifierProto modifier = 2;
}

message UpdateSemanticMapProto {
  optional LiteHeader header = 1;
  optional string map_dir = 2;
  optional mapping.SemanticMapProto map = 3 [deprecated = true];
  optional mapping.SemanticMapMetaProto map_meta = 4 [deprecated = true];
  optional string map_name = 5;
}
