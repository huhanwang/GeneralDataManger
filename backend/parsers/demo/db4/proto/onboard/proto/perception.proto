// Debug for road geometry tracker
message FusedBevRoadGeometryDebugProto {
  optional LiteHeader header = 1;
  optional double mid_center_timestamp = 2;

  repeated Vec3dProto y_shape_merge_points = 3;

  message LaneDebugInfo {
    optional int32 track_id = 1;
    optional int32 lane_point_num = 2;
  }

  // Online debug info
  message FittingDebugInfo {
    optional int32 track_id = 1;
    optional int32 fitting_point_num = 2;
    optional float c0 = 3;
    optional float c1 = 4;
    optional float c2 = 5;
    optional float c3 = 6;
    optional Vec3dProto start_point = 7;
    optional Vec3dProto end_point = 8;
    optional int32 successor_index = 9;
    optional int32 predecessor_index = 10;
  }

  message MatchDebugInfo {
    optional int32 track_id = 1;
    optional int32 measurement_id = 2;
    repeated VisionLaneType bev_lane_types = 3;
  }

  message AssociateInfo {
    optional int32 track_id = 1;
    repeated int32 measurement_ids = 2;
  }

  message GroupDebugInfo {
    optional int32 meat_id = 1;
    optional int32 bev_lane_line_group = 2;
    repeated int32 group_lanes = 3;
  }

  message MergeDebugInfo {
    optional int32 track_id = 1;
    repeated int32 association_ids = 2;
  }

  repeated LaneDebugInfo lane_debug_infos = 4;
  repeated FittingDebugInfo fitting_debug_infos = 5;
  repeated MatchDebugInfo match_debug_infos = 6;
  repeated MergeDebugInfo merge_debug_infos = 7;
  repeated MatchDebugInfo mapformer_match_debug_infos = 8;
  repeated GroupDebugInfo mapformer_group_debug_infos = 9;
  repeated BevCenterLineProto center_lines = 10;
  repeated AssociateInfo vision_associate_info = 11;
  repeated AssociateInfo mapformer_associate_info = 12;
}

