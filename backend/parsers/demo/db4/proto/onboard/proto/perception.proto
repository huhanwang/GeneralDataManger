message LightDebugProto {
  optional int32 srv_control_source_ = 1;
  optional int32 srv_lturn_lght_cmd_ = 2;
  optional int32 srv_rturn_lght_cmd_ = 3;
  optional int32 srv_flash_light_req_ = 4;
  optional int64 srv_time_ = 5;
  optional int64 recv_time_ = 6;
}

message HorizonLightDebugProto {
  optional LiteHeader header = 1;
  optional LightDebugProto light_proto = 2;
}

message HorizonIhbcHeaderProto {
  optional LiteHeader header = 1;
  optional HorizonIhbcProto ihbc_proto = 2;
}

message HorizonIhbcProto {
  enum IHBCObjectType {
    Ihbc_Type_Oncoming = 0;
    Ihbc_Type_Couple_Oncoming = 1;
    Ihbc_Type_Perceding = 2;
    Ihbc_Type_Couple_Perceding = 3;
    Ihbc_Type_Truck_Light = 4;
    Ihbc_Type_Street_Light = 5;
    Ihbc_Type_Strong_Reflector = 6;
    Ihbc_Type_Cluster = 7;
    Ihbc_Type_Invalid = 8;
  }
  message IHBCMessage {
    optional int32 object_type = 1;
    optional float distance = 2;
  }
  optional int32 cam_id = 1;
  optional int32 frame_id = 2;
  optional int64 timestamp = 3;
  optional int64 pub_timestamp = 4;
  optional uint32 object_num = 5;
  optional bool reason_preceding = 6;
  optional bool reason_oncoming = 7;
  optional bool reason_st_light = 8;
  optional float env_lux = 9;
  optional bool ihbc_decision = 10;
  repeated IHBCMessage ihbc_messages = 11;
}

