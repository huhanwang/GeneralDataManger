}

message LidarTrackerInfo {
  optional int32 id = 1;
  optional double timestamp = 2;
  optional double yaw = 3;
  optional Vec3dProto center = 4;
  optional Vec3dProto size = 5;
  enum FilterType {
    GEOMETRY_FILTER = 0;
    SEMANTIC_TRACK_FILTER = 1;
    TIME_SEQ_FILTER = 2;
    SHAPE_FILTER = 3;
    VELOCITY_FILTER = 4;
  }
