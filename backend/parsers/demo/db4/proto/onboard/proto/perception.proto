  optional bytes element_data = 5;
  optional VehiclePoseProto current_pose = 6;
  optional double pillar_resolution = 7;
}

// This is for interpreting Fen's output detection boxes.
message FenDetectionProto {
  optional Box2dProto bounding_box = 1;
  enum DetectionType {
    CAR = 1;
    PED = 2;
    CYC = 3;
    POLE = 4;
    TRI = 5;
    // This detection type just temporarily add for FEN detection prt.
    // We won't output large_vehicle detection type for FEN now, at present,
    // LARGE_VEHICLE and VEHICLE are distinguished according to their size only.
    LARGE_VEHICLE = 6;
  }
  enum DetectionAttribute {
    WATERING_TRUCK = 1;
  }
  optional DetectionType type = 2;
  repeated DetectionAttribute attributes = 27;
  // The classification score of the center point of the detection boxes.
  optional float confidence_score = 3;
  // Whether the detection boxes of FEN output is mask by PCN, which mean
  // this fen detection can ignore this fen detection if filtered or masked.
  // And PCN is a second model behind FEN, it's input is FEN's detections box
  // crop patch(both lidar point and camera image), involved information about
  // the projected image corresponding to the detection box, in order to improve
  // the precision FEN's detection box, current just open pedestrian type.
  // So if FEN output a pedestrian box, if this box's classification type in
  // pcn is unknown, we will not publish this pedestrian box.
  optional bool filtered_by_pcn = 4 [default = false];
  optional float pcn_score = 5 [default = -1];
  // Pcn_skip_info is just debug info strings for pcn model inside the
  // perception detection, containing info why not enter the pcn model
  // condition, such as "too few points" in human_pipline_manager.cc.
  optional string pcn_skip_info = 6 [default = ""];

  // Boxes masked by nms bool, refers to the detection boxes which thrown
  // by nms (See
  optional bool filtered_by_nms = 7 [default = false];
  // Velocity prediction of FEN detection boxes center.
  optional float velocity_x = 8;
  optional float velocity_y = 9;
  // The confidence of distance from the prediction center point of the four
  // boundary of detection boxes, we convert prediction center point(which
  // has offset of truly center) and 4 distant to box bounduary to box center
  // x,center y, width and length(heading is predicted separately), defined
  // in Box2dProto bounding_box, this just for model box prediction vision
  // debug.
  // All the confidence score range is 0->1.0.
  optional float front_edge_confidence = 10;
  optional float back_edge_confidence = 11;
  optional float left_edge_confidence = 12;
  optional float right_edge_confidence = 13;
  // PCN tracking result.
  optional string pcn_track_info = 14 [default = ""];
  // Heading confidence of FEN detection boxes.
  optional float heading_confidence = 15;
  // Velocity confidence of FEN detection boxes.
  optional float velocity_x_confidence = 16;
  optional float velocity_y_confidence = 17;
  // Moving confidence classification score of FEN detection boxes.
  optional float motion_state = 18;
  // The distance from the prediction center point of the detection box build to
  // the boundary of the four directions. Note:This point may has offset from
  // the truly detection box center.and it is only an intermediate result of the
  // FEN model，in order to build a final accurate box given in Box2dProto
  // bounding_box.
  optional float box_front = 19;
  optional float box_back = 20;
  optional float box_left = 21;
  optional float box_right = 22;
  optional float box_z = 23;
  optional float box_height = 24;
  optional int32 measurement_id = 25;
  optional bool box_motion_valid = 26 [default = false];
}

message FenTrackerProto {
  enum TrackState {
    INIT = 1;
    CONFIRMED = 2;
    DYING = 3;
  }

  optional FenDetectionProto detection = 1;
  optional int32 track_id = 2;
  optional int32 track_len = 3;
  optional TrackState track_state = 4;
  repeated int32 measurement_id_buf = 5;
  repeated PredictionTraj2dProto future_trajs = 6;
}

message FenDetectionsProto {
  optional LiteHeader header = 1;
  repeated FenDetectionProto detections = 2;
  repeated FenDetectionProto low_score_detections = 7;
  repeated FenTrackerProto tracks = 10;
  optional double timestamp = 3;
  optional DetectionRangeProto det_range = 4;
  optional DetectionRangeProto ped_det_range = 5;
  optional PillarSemanticResultProto pillar_semantic_result = 6;
  optional PillarSemanticResultProto pillar_semantic_score_result = 12;
  optional PillarSemanticResultProto pillar_instance_result = 8;
  optional PillarSemanticResultProto pillar_motion_result = 9;
  optional PillarSemanticResultProto occupancy_map_result = 14;
  optional bool is_motion_valid = 11 [default = false];
  optional uint32 frame_id = 13;
}

