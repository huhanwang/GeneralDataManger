message MultiCameraVisionFreespaceProto {
  optional LiteHeader header = 1;
  repeated VisionFreespaceProto single_freespaces = 2;
}

message Fused2dRoadGeometryProto {
  message LaneSection {
    optional VisionLaneType lane_type = 1;
    // image_points and bev_points with same size.
    repeated PointScoreProto image_points = 2;
    repeated BevPointProto bev_points = 3;
  }

  message ParameterizedLaneInfo {
    optional int32 lane_id = 1;
    repeated LaneSection lane_sections = 2;
  }

  optional CameraId camera_id = 1;
  optional double camera_center_timestamp = 2;
  optional VehiclePoseProto vehicle_pose = 3;
  repeated ParameterizedLaneInfo lanes = 4;
}

// 2d road geometry tracker output
message MultiCameraFusedRoadGeometryProto {
  optional LiteHeader header = 1;
  repeated Fused2dRoadGeometryProto road_geometries = 2;
}

message LongChengImageQualityProto {
  message ImageFailStatus {
    // Image Failure types
    enum ImgFailTypes {
      IMG_NORMAL = 0;
      IMG_BLUR = 1;     // Image Blur (Rain drop/Loss of focus)
      IMG_SHELTER = 2;  // Image Blockage
      IMG_FREEZE = 4;   // Image Freeze
      IMG_GLARE = 8;    // Image Glare
    };

    // Image Fail Level
    enum ImgFailLevel {
      FAIL_NONE = 0;
      FAIL_MILD = 1;
      FAIL_MODERATE = 2;
      FAIL_SEVERE = 3;
      FAIL_ALLOCC = 4;
    };

    optional int32 fail_type = 1;
    optional float score = 2;
    // Fail level on whole image.
    optional int32 level = 3;
    // Fail sub regions. currently, only glare output
    // Not used for now
    // repeated PerceptionBaseProto.Polygon regions = 4;
  }
  optional LiteHeader header = 1;
  optional int32 cam_idx = 2;
  optional int32 frame_id = 3;
  optional double timestamp = 4;
  repeated ImageFailStatus fail_status = 5;
}

message AnonymizedBoxProto {
  optional LiteHeader header = 1;
