enum ProposerType {
  PT_NONE = 0;
  PT_FIERY_EYE_NET = 1;
  PT_OBSTACLE_SEMANTIC = 2;
  PT_OUSTER_NOISE = 3;
  PT_CATEYE = 4;
  PT_BLOOMING = 5;
  PT_SEMANTIC_MAP = 6 [deprecated = true];
  PT_BARRIER = 7;
  PT_LARGE_VEHICLE = 8;
  PT_LEAF = 9;
  PT_REFLECTION = 10;
  PT_SPLASH = 11;
  PT_BPEARL_NOISE = 12;
  PT_DISTANT_CLUSTER = 13;
  PT_GROUND_OBSTACLE = 14;
  PT_MIST = 15;
  PT_VEGETATION = 16;
  PT_PLASTIC_BAG = 17;
  PT_OVERHANGING = 18;
  PT_LARGE_CLUSTER = 19;
  PT_FILTER = 20;
}
// NOTE(dong): Proposed clusters could be in different states. For example, a
// cluster may be divided into two clusters by Fen proposer. One is inside
// of the Fen box, and the other is outside. We regard the inside one as an
// inner cluster and the outside one as a outer cluster. A universal state is
// for clusters from proposers which don't really care about the proposed
// property, e.g. an L shape proposer.
enum ProposedProperty {
  PP_INBOX = 0;   // from Fen
  PP_OUTBOX = 1;  // from Fen
  PP_NOISE = 2;
}

