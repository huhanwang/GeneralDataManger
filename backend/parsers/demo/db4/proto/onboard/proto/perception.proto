    optional FilterType filter_type = 1;
    optional bool is_filtered = 2;
    optional double prob = 3;
    optional string filter_info = 4;
    optional float prob_thresh = 5;
  }
  repeated FilterRes filter_res = 6;
  optional MeasurementType raw_type = 7;
  optional MeasurementType type = 8;
  optional int32 track_id = 9;
  optional string filter_debug_info = 10;
}

message LidarTrackerDebugProto {
  optional LiteHeader header = 1;
  repeated LidarTrackerInfo lidar_tracker_info = 2;
}

