message ClusterFilterDebugProto {
  enum FilterType {
    RAIN = 0;
    MIRROR = 1;
    FOV = 2;
    SMALL = 3;
    BLOOMING = 4;
    LEAF = 5;
    GHOSTING = 6;
    MIST_CS = 7;
    DEFAULT_UNKNOWN_WITH_ITS = 8;
  }
  message ClusterInfo {
    optional string debug_info = 1;  // set default
    repeated Vec3dProto contour = 2;
    optional Vec2dProto media_centroid = 3;
    optional FilterType filter_type = 4;
  }
  optional LiteHeader header = 1;
  repeated ClusterInfo cluster_info = 2;
}

message PoseCorrectionDebugProto {
  optional LiteHeader header = 1;

  optional VehiclePoseProto origin_pose = 2;
  optional VehiclePoseProto corrected_pose = 3;
  optional Vec3dProto elevation_map_normal = 4;
  optional int32 sampled_ground_points_num = 5;
  repeated Vec3dProto sampled_ground_points = 6 [deprecated = true];
  repeated Vec3dProto gt_ground_points = 7 [deprecated = true];
  repeated Vec3dProto transformed_ground_points = 8 [deprecated = true];
  optional double mean_square_error = 9;
  optional int32 num_matched_points = 10;
  optional bool success = 11;
  optional int32 num_iteration = 12;
  optional double matching_dist = 13;
  message PointInMm {  // mm short for millimeter
    optional int32 x_mm = 1;
    optional int32 y_mm = 2;
    optional int32 z_mm = 3;
  }
  repeated PointInMm sampled_ground_points_mm = 14;
  repeated PointInMm gt_ground_points_mm = 15;
  repeated PointInMm transformed_ground_points_mm = 16;
}

