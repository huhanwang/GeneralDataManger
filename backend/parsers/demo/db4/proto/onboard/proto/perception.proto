message SegmentationStageObjectProto {
  optional ObjectType type_deprecated = 1 [deprecated = true];
  optional MeasurementType type = 7;
  optional MeasurementTypeSource type_source = 2 [default = MTS_DEFAULT];
  repeated Vec2dProto contour = 3;
  optional Vec2dProto centroid = 4;
  optional Box2dProto bounding_box = 5;
  optional ProposerType last_proposer = 6;
}

message SegmentationStageProto {
  optional ProposerType type = 1;
  repeated SegmentationStageObjectProto objects = 2;
}

message SegmentationObjectProto {
  optional uint32 id = 1;
  optional double timestamp = 2;
  optional ObjectType type_deprecated = 3 [deprecated = true];
  optional MeasurementType type = 12;
  optional MeasurementTypeSource type_source = 4 [default = MTS_DEFAULT];
  repeated Vec2dProto contour = 5;
  optional Vec2dProto centroid = 6;
  optional Box2dProto bounding_box = 7;
  repeated SegmentationStageProto history = 8;
  repeated ProposedProperty proposed_properties = 9;
  optional double proposer_score = 10;
  optional ProposerType last_proposer = 11;
}

message SegmentationObjectsProto {
  optional LiteHeader header = 1;
  repeated SegmentationObjectProto segmentation_objects = 2;
  message ProposerTreeNode {
    optional ProposerType type = 1;
    optional int32 score = 2;
    optional int32 depth = 3;
    optional ProposerType parent_type = 4;
  }
  repeated ProposerTreeNode tree_nodes = 3;
}

