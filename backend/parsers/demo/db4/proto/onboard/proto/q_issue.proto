enum QIssueSeverity {
  QIS_DEBUG = 0;  // it will collect performance information(ftrace, cpu, mem,
  // etc) for debugging issues.
  QIS_WARNING = 1;  // it will report to ui system(qpad or others), it will
  // upgrade to AIS_ERROR when something happened.
  QIS_ERROR = 2;  // the driver takeover the vehicle or the vehicle is braked by
  // occ when this issue was happened.
  QIS_FATAL = 3;  // no used
}

enum QIssueType {
  QIT_UNKNOWN = 0;
  QIT_DEVICE = 1;
  QIT_NETWORK = 2;
  QIT_CLOCK_SYNC = 3;
  QIT_RESOURCE = 4;
  QIT_PERFORMANCE = 5;
  QIT_PIPELINE = 6;
  QIT_BUSINESS = 7;
  QIT_CRASH = 8;  // must use MODULE_QISSUEX macro
  QIT_DRIVING_ZONE = 9;
  QIT_EXCEPTION = 10;  // must use MODULE_QISSUEX macro
  QIT_HEARTBEAT = 11;  // must use MODULE_QISSUEX macro
  QIT_CHANNEL_CHECKER = 12;
  QIT_MODULE_BE_KILLED = 13;  // must use MODULE_QISSUEX macro
  QIT_MODULE_NOT_OK = 14;     // must use MODULE_QISSUEX macro
  QIT_PREVENT_ENGAGE = 15;
  QIT_DATA_CHECK = 16;
}

