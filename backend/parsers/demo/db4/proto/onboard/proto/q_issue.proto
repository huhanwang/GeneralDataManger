message QIssueProto {
  optional QIssueSeverity severity = 1
      [default = QIS_ERROR, (trans_matrix) = true, (matrix_data_type) = UINT8];

  optional QIssueType type = 2 [
    default = QIT_UNKNOWN,
    (trans_matrix) = true,
    (matrix_data_type) = UINT8
  ];

  optional QIssueSubType sub_type = 3 [
    default = QIST_UNKNOWN,
    (trans_matrix) = true,
    (matrix_data_type) = UINT32
  ];

  optional string message = 4;

  optional string args_message = 5;

  optional MinimalRiskMethodType method_type = 6
      [(trans_matrix) = true, (matrix_data_type) = UINT8];

  optional MinimalRiskConditionType mrc_type = 8
      [(trans_matrix) = true, (matrix_data_type) = UINT8];

  oneof oneof_field {
    CameraId camera_id = 7 [(trans_matrix) = true];  // for camera issues;
    LidarId lidar_id = 9 [(trans_matrix) = true];    // for lidar issues;
    RadarId radar_id = 10 [(trans_matrix) = true];   // for radar issues
    UssRadarId uss_radar_id = 11
        [(trans_matrix) = true];  // for uss radar issue;
    LiteModuleName module_id = 13
        [(trans_matrix) = true];  // for module common issue;
  }

  optional int32 status = 12;
}

message QIssueRulesProto {
  enum QIssueRuleType {
    QISRT_NONE = 0;
    QISRT_ENGAGE = 1;
    QISRT_EXIT = 2;
    QISRT_LAT_TEMP_EXIT = 3;
  }
  message QIssueRuleCondition {
    optional MinimalRiskConditionType mrc_type =
        1;  // not setted or NONE: ACC/LCC/NOA
    optional QIssueRuleType rule_type =
        2;  // not setted or NONE: engage and exit
    optional double min_value = 3;
    optional double max_value = 4;
    optional double continuous_time_s = 5 [default = 1.0];
    optional MinimalRiskMethodType method = 6;
    optional string message = 7;
    optional bool is_ignore = 8 [default = false];
    optional bool is_match = 9 [default = true];
    optional bool field_not_exists = 10
        [default = false];  // is_field_not_exists_return_true
    optional bool is_suppressing_reason = 11 [default = true];
    optional int32 eq_value = 12;
    optional double interval_time_s = 13 [default = 1.0];
    optional string rule_name = 14;
    repeated string or_depends_on = 15;
    repeated string and_depends_on = 16;
  }
  message QIssueRule {
    optional QIssueType type = 1 [default = QIT_BUSINESS];
    optional QIssueSubType sub_type = 2;
    optional string message = 5;
    repeated QIssueRuleCondition conditions = 8;
    optional bool is_ignore = 9 [default = false];
    optional string odc_field_name =
        10;  // OperationalConditionProto field name

    // Deprecated.
    optional MinimalRiskMethodType method = 3;
    optional MinimalRiskConditionType mrc_type = 4;
    optional QIssueRuleType rule_type = 6;
    optional double continuous_time_s = 7 [default = 1.0];
  }
  repeated QIssueRule qissue_rules = 1;
}

message MinimalRiskODCStatus {
  optional bool is_match = 1;

  optional MinimalRiskConditionType type = 2;

  repeated QIssueProto qissues = 3;
};

enum VoltageDetail {
  VAD_NONE = 0;
  VAD_NORMAL = 1;
  VAD_OVERVOLTAGE = 2;
  VAD_UNDERVOLTAGE = 3;
};

enum TemperatureDetail {
  TAD_NONE = 0;
  TAD_NORMAL = 1;
  TAD_TOO_HIGH = 2;
  TAD_TOO_LOW = 3;
};
