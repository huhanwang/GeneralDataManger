
syntax = "proto2";
package snoah;
import "onboard/lite/proto/lite_common.proto";
import "onboard/common/proto/map_geometry.proto";

message OverlappingSection {
  optional int64 section_id = 1;
  optional double start_fraction = 2;
  optional double end_fraction = 3;
  optional int64 overlapping_section_id = 4;
}

message MppSectionsProto {
  optional LiteHeader header = 1;
  repeated int64 section_ids = 2 [packed = true];
  optional int64 ego_section_id = 3;
  optional float ego_section_fraction = 4;
  repeated OverlappingSection overlapping_sections = 5;
  optional bool overlapping_sections_precomputed = 6 [default = false];
  // section_lengths与section_ids数量一致并且一一对应，单位:米
  repeated double section_lengths = 7;
  // section_forks与section_ids数量一致并且一一对应，代表此section的终点位置是否分叉
  // subpath更新有滞后性，section_fork会随着subpath的更新而更新
  repeated bool section_forks = 8;
}

///< 坡度信息
message SlopePoint {
  optional mapping.GeoPointProto point = 1;  ///< 坐标（弧度）
  optional double slope_percent = 2;  ///< 坡度百分比:(高度差/长度)*100%
}

///< 交通拥堵信息
enum TrafficStatus {
  TRAFFIC_STATUS_UNKNOWN = 0;
  TRAFFIC_STATUS_SMOOTH = 1;       ///< 1-道路通畅
  TRAFFIC_STATUS_SLOW = 2;         //< 2-道路缓行
  TRAFFIC_STATUS_JAM = 3;          ///< 3-道路阻塞
  TRAFFIC_STATUS_VERY_JAM = 4;     ///< 4-道路严重阻塞
  TRAFFIC_STATUS_VERY_SMOOTH = 5;  ///< 5-道路非常顺畅
}

///< 导航主动作
enum MainAction {
  MAIN_ACTION_NULL = 0;             ///< 无基本导航动作
  MAIN_ACTION_TURN_LEFT = 1;        ///< 左转
  MAIN_ACTION_TURN_RIGHT = 2;       ///< 右转
  MAIN_ACTION_SLIGHT_LEFT = 3;      ///< 向左前方行驶
  MAIN_ACTION_SLIGHT_RIGHT = 4;     ///< 向右前方行驶
  MAIN_ACTION_TURN_HARD_LEFT = 5;   ///< 向左后方行驶
  MAIN_ACTION_TURN_HARD_RIGHT = 6;  ///< 向右后方行驶
  MAIN_ACTION_UTURN = 7;            ///< 左转调头
  MAIN_ACTION_CONTINUE = 8;         ///< 直行
  MAIN_ACTION_MERGE_LEFT = 9;       ///< 靠左
  MAIN_ACTION_MERGE_RIGHT = 10;     ///< 靠右
  MAIN_ACTION_ENTRY_RING = 11;      ///< 进入环岛
  MAIN_ACTION_LEAVE_RING = 12;      ///< 离开环岛
  MAIN_ACTION_DRIVE_SLOW = 13;      ///< 减速行驶
  MAIN_ACTION_PLUG_CONTINUE = 14;   ///< 插入直行（特有）
}

///< 辅助动作
enum AssistAction {
  ASSIST_NULL = 0;                 ///< 无辅助导航动作
  ASSIST_ENTRY_MAIN = 1;           ///< 进入主路
  ASSIST_ENTRY_SIDE_ROAD = 2;      ///< 进入辅路
  ASSIST_ENTRY_FREEWAY = 3;        ///< 进入高速
  ASSIST_ENTRY_SLIP = 4;           ///< 进入匝道
  ASSIST_ENTRY_TUNNEL = 5;         ///< 进入隧道
  ASSIST_ENTRY_CENTER_BRANCH = 6;  ///< 进入中间岔道
  ASSIST_ENTRY_RIGHT_BRANCH = 7;   ///< 进入右岔路
  ASSIST_ENTRY_LEFT_BRANCH = 8;    ///< 进入左岔路
  ASSIST_ENTRY_RIGHT_ROAD = 9;     ///< 进入右转专用道
  ASSIST_ENTRY_LEFT_ROAD = 10;     ///< 进入左转专用道

  ASSIST_ENTRY_MERGE_CENTER = 11;  ///< 进入中间道路
  ASSIST_ENTRY_MERGE_RIGHT = 12;   ///< 进入右侧道路
  ASSIST_ENTRY_MERGE_LEFT = 13;    ///< 进入左侧道路

  ASSIST_ENTRY_MERGE_RIGHT_SILD = 14;   ///< 靠右行驶进入辅路
  ASSIST_ENTRY_MERGE_LEFT_SILD = 15;    ///< 靠左行驶进入辅路
  ASSIST_ENTRY_MERGE_RIGHT_MAIN = 16;   ///< 靠右行驶进入主路
  ASSIST_ENTRY_MERGE_LEFT_MAIN = 17;    ///< 靠左行驶进入主路
  ASSIST_ENTRY_MERGE_RIGHT_RIGHT = 18;  ///< 靠右行驶进入右转专用道

  ASSIST_ALONG_ROAD = 23;  ///< 沿当前道路行驶
  ASSIST_ALONG_SILD = 24;  ///< 沿辅路行驶
  ASSIST_ALONG_MAIN = 25;  ///< 沿主路行驶

  ASSIST_ARRIVE_EXIT = 32;          ///< 到达出口
  ASSIST_ARRIVE_SERVICE_AREA = 33;  ///< 到达服务区
  ASSIST_ARRIVE_TOLLGATE = 34;      ///< 到达收费站
  ASSIST_ARRIVE_WAY = 35;           ///< 到达途经地
  ASSIST_ARRIVE_DESTINATION = 36;   ///< 到达目的地的

  ASSIST_ENTRY_RING_LEFT = 48;       ///< 绕环岛左转
  ASSIST_ENTRY_RING_RIGHT = 49;      ///< 绕环岛右转
  ASSIST_ENTRY_RING_CONTINUE = 50;   ///< 绕环岛直行
  ASSIST_ENTRY_RING_UTURN = 51;      ///< 绕环岛右转
  ASSIST_SMALL_RING_NOT_COUNT = 52;  ///< 小环岛不数出口

  ASSIST_RIGHT_BRANCH_1 = 64;  ///< 到达复杂路口，走右边第一出口
  ASSIST_RIGHT_BRANCH_2 = 65;  ///< 到达复杂路口，走右边第二出口
  ASSIST_RIGHT_BRANCH_3 = 66;  ///< 到达复杂路口，走右边第三出口
  ASSIST_RIGHT_BRANCH_4 = 67;  ///< 到达复杂路口，走右边第四出口
  ASSIST_RIGHT_BRANCH_5 = 68;  ///< 到达复杂路口，走右边第五出口

  ASSIST_LEFT_BRANCH_1 = 69;  ///< 到达复杂路口，走左边第一出口
  ASSIST_LEFT_BRANCH_2 = 70;  ///< 到达复杂路口，走左边第二出口
  ASSIST_LEFT_BRANCH_3 = 71;  ///< 到达复杂路口，走左边第三出口
  ASSIST_LEFT_BRANCH_4 = 72;  ///< 到达复杂路口，走左边第四出口
  ASSIST_LEFT_BRANCH_5 = 73;  ///< 到达复杂路口，走左边第五出口
}

// 车道转向信息
enum LaneAction {
  LANE_ACTION_AHEAD = 0;                  ///< 直行
  LANE_ACTION_AHEAD_LEFT = 2;             ///< 直行+左转
  LANE_ACTION_AHEAD_LEFT_LU_TURN = 16;    ///< 直行+左转+左掉头
  LANE_ACTION_AHEAD_LEFT_RIGHT = 7;       ///< 直行+左转+右转
  LANE_ACTION_AHEAD_LU_TURN = 9;          ///< 直行+左掉头
  LANE_ACTION_AHEAD_RIGHT = 4;            ///< 直行+右转
  LANE_ACTION_AHEAD_RIGHT_RU_TURN = 19;   ///< 直行+右转+左掉头
  LANE_ACTION_AHEAD_RU_TURN = 10;         ///< 直行+右掉头
  LANE_ACTION_BUS = 21;                   ///< 公交车道
  LANE_ACTION_EMPTY = 22;                 ///< 空车道
  LANE_ACTION_LEFT = 1;                   ///< 左转
  LANE_ACTION_LEFT_IN_AHEAD = 13;         ///< 直行+扩展
  LANE_ACTION_LEFT_IN_LEFT_LU_TURN = 14;  ///< 左转+左掉头+扩展
  LANE_ACTION_LEFT_LU_TURN = 11;          ///< 左转+左掉头
  LANE_ACTION_LEFT_LU_TURN_EX = 20;       ///< 左转+右掉头
  LANE_ACTION_LEFT_RIGHT = 6;             ///< 左转 + 右转
  LANE_ACTION_LEFT_RU_TURN = 18;          ///< 左转+右转+左掉头
  LANE_ACTION_LU_TURN = 5;                ///< 左掉头
  LANE_ACTION_NULL = 255;                 ///< 无对应车道
  LANE_ACTION_RESERVED = 15;              ///< 保留
  LANE_ACTION_RIGHT = 3;                  ///< 右转
  LANE_ACTION_RIGHT_RU_TURN = 12;         ///< 右转+右掉头
  LANE_ACTION_RIGHT_RU_TURN_EX = 17;      ///< 右转+左掉头
  LANE_ACTION_RU_TURN = 8;                ///< 右掉头
  LANE_ACTION_VARIABLE = 23;              ///< 可变车道
}

message RoadFacility {
  enum SignPostType {
    FACILITY_TYPE_NULL = 0;      ///< 无效值
    LEFT_INTERFLOW = 1;          ///< 左侧合流
    RIGHT_INTERFLOW = 2;         ///< 右侧合流
    SHARP_TURN = 3;              ///< 急转弯
    REVERSE_TURN = 4;            ///< 反向转弯
    LINKING_TURN = 5;            ///< 连续转弯
    ACCIDENT_AREA = 6;           ///< 事故多发地
    FALLING_ROCKS = 7;           ///< 注意落石
    RAILWAY_CROSS = 8;           ///< 铁路道口
    SLIPPERY = 9;                ///< 易滑
    MAX_SPEED_LIMIT = 10;        ///< 最大限速标志
    MIN_SPEED_LIMIT = 11;        ///< 最小限速标志
    VILLAGE = 12;                ///< 村庄
    LEFT_NARROW = 13;            ///< 左侧变窄
    RIGHT_NARROW = 14;           ///< 右侧变窄
    DOUBLE_NARROW = 15;          ///< 两侧变窄
    CROSSWIND_AREA = 16;         ///< 横风区
    SCHOOL_ZONE = 17;            ///< 前方学校
    OVERTAKE_FORBID = 18;        ///< 禁止超车
    NARROW_BRIDGE = 19;          ///< 窄桥
    DOUBLE_DETOUR = 20;          ///< 左右绕行
    LEFT_DETOUR = 21;            ///< 左侧绕行
    RIGHT_DETOUR = 22;           ///< 右侧绕行
    LEFT_DANGEROUS = 23;         ///< 左侧傍山险路
    RIGHT_DANGEROUS = 24;        ///< 右侧傍山险路
    UPPER_STEEP = 25;            ///< 上陡坡
    DOWN_STEEP = 26;             ///< 下陡坡
    WATER_PAVEMENT = 27;         ///< 过水路面
    IRREGULARITY_PAVEMENT = 28;  ///< 路面不平
    AMBLE = 29;                  ///< 慢行
    ATTENTION_DANGER = 30;       ///< 注意危险
    ZEBRA_CROSSING = 31;         ///< 人行横道
    LEFT_SHARP_TURN = 46;        ///< 左急转弯
    RIGHT_SHARP_TURN = 47;       ///< 右急转弯
    LEFT_FALLING_ROCKS = 48;     ///< 注意左侧落石
    RIGHT_FALLING_ROCKS = 49;    ///< 注意右侧落石
    RAILWAY_CROSS_EXTEND = 50;   ///< 铁道路口
    RAILWAY_WITH_GATES = 51;     ///< 有人看管的铁道路口
    RAILWAY_WITHOUT_GATES = 52;  ///< 无人看管的铁道路口
    VARIABLE_SPEED = 53;         ///< 可变限速标志
    VARIABLE_OVER_PASS = 58;     ///< 天桥
    TRUCK_HEIGHT_LIMIT = 81;     ///< 货车限高
    TRUCK_WIDTH_LIMIT = 82;      ///< 货车限宽
    TRUCK_WEIGHT_LIMIT = 83;     ///< 货车限重
    CHECK_POINT = 91;            ///< 货车检查站(数据里存32)
    BUS_LANE = 92;               ///< 公交车道设施
    WINTER_OLYMPICS_LANE = 128;  ///< 冬奥专用设施
  }

  optional SignPostType sign_post_type = 1;  ///< 交通标志牌type
  enum SignPosition {
    UNKNOWN = 1;
    LEFT_SIDE = 2;   // 道路左侧
    RIGHT_SIDE = 3;  // 道路右侧
    ON_ROAD = 4;     // 道路中间
  }

  optional SignPosition sign_position = 2;
  ///< 在第几个车道上，从1开始，tip:可能无效
  optional int32 lane_index = 3;
  // e.g. The description of a RoadSign
  optional string info = 4;                  // 文字说明 tip:无效
  optional mapping.GeoPointProto point = 5;  ///< 交通标志牌的坐标（弧度）
}

message TrafficMessageChannel {  ///< tmc，交通拥堵信息
  optional TrafficStatus traffic_status = 1;
  optional int32 length = 2;                  ///< 拥堵路段长度(米)
  repeated mapping.GeoPointProto points = 3;  ///<  形状点，弧度
}

///< 电子眼/连续拍照
enum SubCameraExtType {
  SUB_CAMERA_EXT_TYPE_NULL = 0;      ///< 无效值
  ILLEGAL_USE_LIGHT = 1;             ///< 违规用灯
  ILLEGAL_USE_SAFETY_BELT = 2;       ///< 不系安全带
  DO_NOT_FOLLOW_LANE = 3;            ///< 违规占车道
  ILLEGAL_PASS_CROSS = 4;            ///< 违规过路口
  DIAL_PHONE_WHEN_DRIVING = 5;       ///< 开车打手机
  LANE_LIMIT_SPEED = 6;              ///< 分车道限速
  ULTRAHIGH_SPEED = 7;               ///< 超高速
  VERY_LOW_SPEED = 8;                ///< 超低速
  VARIABLESPEED = 9;                 ///< 可变限速
  TRAFFIC_LIGHT = 10;                ///< 闯红灯
  END_NUMBER_LIMIT = 11;             ///< 尾号限行
  ENVIRONMENTAL_LIMIT = 12;          ///< 环保限行
  BREACH_PROHIBITION_SIGN = 13;      ///< 违反禁令标志
  VIOLATE_PROHIBITED_MARKINGS = 14;  ///< 违反禁止标线
  COURTESY_CROSSING = 15;            ///< 礼让行人
  REVERSE_DRIVING = 16;              ///< 逆向行驶
  ILLEGAL_PARKING = 17;              ///< 违章停车
  BICYCLELANE = 18;                  ///< 占用非机动车道
  BUSWAY = 19;                       ///< 占用公交专用车道
  EMERGENCY_LANE = 20;               ///< 占用应急车道
  HONK = 21;                         ///< 禁止鸣笛
  FLOW_SPEED = 22;                   ///< 流动测速
  COURTESY_CAR_CROSSING = 23;        ///< 路口不让行-让车
  RAILWAY_CROSSING = 24;             ///< 违规过铁路道口
  INTERVALVELOCITY_START = 25;       ///< 区间测速起点
  INTERVALVELOCITY_END = 26;         ///< 区间测速终点
  INTERVALVELOCITY_START_END = 27;   ///< 区间测速起终点
  CAR_SPACING = 28;                  ///< 车间距抓拍
  HOV_LANE = 29;                     ///< HOV车道
  OCCUPIED_LINE = 30;                ///< 压线抓拍
  ETC = 99;                          ///< ETC拍照
  BREAK_RULE = 100;                  ///< 无细类的违章
  SURVEILLANCE = 101;                ///< 视频监控
}

///< 导航过程中的电子眼信息
message CameraMonitor {
  message SubCameraInfo {
    optional SubCameraExtType sub_camera_ext_type = 1;  ///< 电子眼细类
    optional int32 lane_index = 2;  ///< 电子眼所在车道
  }
  repeated SubCameraInfo sub_camera_infos = 1;  ///< 电子眼信息
  optional int32 distance = 2;  ///< 车辆到电子眼距离，仅诱导过程中有效
  optional int32 nav_index = 3;             ///< 在导航段中索引
  optional int32 link_index = 4;            ///< 在link中索引
  optional int32 distance_to_link_end = 5;  ///< 距离link终点距离
  optional int32 road_class = 6;            ///< 道路等级
  optional bool is_hidden = 7;              ///< 隐藏电子眼
  message RangeSpeedMonitorInfo {           ///< 区间限速
    repeated int32 speed = 1;               ///< 限速值
    optional int32 length = 2;              ///< 区间长度
    optional int32 average_speed = 3;  ///< 已行驶测速区间的平均速度
    optional int32 remain_distance = 4;  ///< 剩余距离
  }
  optional RangeSpeedMonitorInfo range_speed_monitor_info = 8;
  optional mapping.GeoPointProto point = 9;  ///< 坐标（弧度）
}

enum TrafficLightState {
  TRAFFIC_LIGHT_STATE_UNKOWN = 1;           ///< 未知状态或无状态
  TRAFFIC_LIGHT_STATE_RED = 2;              ///< 红灯
  TRAFFIC_LIGHT_STATE_YELLOW = 3;           ///< 黄灯
  TRAFFIC_LIGHT_STATE_GREEN = 4;            ///< 绿灯
  TRAFFIC_LIGHT_STATE_RED_FLASHING = 5;     ///< 红灯闪烁
  TRAFFIC_LIGHT_STATE_YELLOW_FLASHING = 6;  ///< 黄灯闪烁
  TRAFFIC_LIGHT_STATE_GREEN_FLASHING = 7;   ///< 绿灯闪烁
}

message SDLink {
  optional int32 length = 1;  ///< link长度
  enum FunctionalRoadClass {
    FREEWAY = 0;        ///<        高速公路
    NATIONALROAD = 1;   ///<        国道
    PROVINCEROAD = 2;   ///<        省道
    COUNTYROAD = 3;     ///<        县道
    RURALROAD = 4;      ///<        乡公路
    INCOUNTYROAD = 5;   ///<        县乡村内部道路
    CITYSPEEDWAY = 6;   ///<        主要大街、城市快速道
    MAINROAD = 7;       ///<        主要道路
    SECONDARYROAD = 8;  ///<        次要道路
    COMMONROAD = 9;     ///<        普通道路
    NONNAVIROAD = 10;   ///<        非导航道路
  };
  optional FunctionalRoadClass road_class = 2;

  // third_party/navinfo/aom/proto/route_match_data.proto里有更详细的解释
  enum FormOfWay {
    NONE = 0;                 ///<        无效
    DIVISEDLINK = 1;          ///<        主路
    CROSSLINK = 2;            ///<        复杂节点内部道路
    JCT = 3;                  ///<        高架
    ROUNDCIRCLE = 4;          ///<        环岛
    SERVICEROAD = 5;          ///<        辅助道路
    SLIPROAD = 6;             ///<        匝道
    SIDEROAD = 7;             ///<        辅路
    SLIPJCT = 8;              ///<        匝道
    EXITLINK = 9;             ///<        出口
    ENTRANCELINK = 10;        ///<        入口
    TURNRIGHTLINEA = 11;      ///<        右转专用道
    TURNRIGHTLINEB = 12;      ///<        右转专用道
    TURNLEFTLINEA = 13;       ///<        左转专用道
    TURNLEFTLINEB = 14;       ///<        左转专用道
    COMMONLINK = 15;          ///<        普通道路
    TURNLEFTRIGHTLINE = 16;   ///<        左右转专用道
    SERVICEJCTROAD = 53;      ///<        高架
    SERVICESLIPROAD = 56;     ///<        匝道
    SERVICESLIPJCTROAD = 58;  ///<        匝道
  }
  optional FormOfWay form_of_way = 3;

  enum Type {
    COMMON = 0;      ///<        普通道路
    FERRY = 1;       ///<        航道
    TUNNEL = 2;      ///<        隧道
    BRIDGE = 3;      ///<        桥梁
    ELEVATEDRD = 4;  ///<        高架路
  };
  optional Type road_type = 4;                ///< 道路类型
  optional string road_name = 5;              ///< 道路名称
  repeated mapping.GeoPointProto points = 6;  ///< 形状点
  optional int64 link_id = 7;         ///< 道路id，仅同源数据有效
  optional int32 average_speed = 8;   //< 平均速度 km/h （disntance/time）
  optional int32 speed_limit = 9;     ///< 限速信息 km/h
  optional bool is_inner_road = 10;   ///< 是否是内部路
  optional bool is_restricting = 11;  ///< 是否限行
  optional bool is_parking_road = 12;     ///< 是否是停车场
  optional bool is_toll = 13;             ///< 是否收费
  repeated SlopePoint slope_points = 14;  ///< 道路坡度
  ///< 道路的分层信息，例如高架的1 2 3... 层
  optional int32 elevation_level = 15;    ///< tip:无效
  optional int32 link_direction = 16;     ///< link通行方向
  optional bool is_over_head = 17;        ///< 是否是高架路
  optional bool is_parallel_road = 18;    ///< 是否平行路
  optional bool is_mulit_out = 19;        ///< 是否多岔路
  optional bool is_traffic_light = 20;    ///< 是否有红绿灯
  optional bool is_mix_fork = 21;         ///< 是否混淆路口
  optional bool is_at_service = 22;       ///< 是否服务区
  optional string service_name = 23;      ///< 服务区名称
  optional int32 lane_num = 24;           ///< link的车道数
  repeated RoadFacility facilities = 25;  ///< link附属道路设施信息
  message TrafficLight {
    enum TrafficLightType {
      UNKOWN = 1;
      CROSS_LIGHT = 2;       ///< 交叉口控制灯
      PEDESTRAIN_LIGHT = 3;  //<< link中间行人控制红绿灯
    }
    optional TrafficLightType type = 1;        ///< tip: 可能无效
    optional mapping.GeoPointProto point = 2;  ///< 坐标(弧度)
  }
  optional TrafficLight traffic_light = 26;    ///< 交通灯，最多1个
  optional TrafficStatus traffic_status = 27;  ///< 交通拥堵状态
  message TurnInfo {  ///< 转向信息，tip:可能无效
    optional bool traffic_light_contronl = 1;  ///< 红绿灯控制
    optional bool is_restrict = 2;             ///< 禁转向
    optional MainAction main_action = 3;       ///< 主动作
    repeated int32 lane_index = 4;             ///< 允许转向的车道序号
  }
  repeated TurnInfo turn_info = 28;  ///< 转向信息
  ///< 线路link上的电子眼信息
  repeated CameraMonitor camera_monitors = 29;
}

message SDSection {
  optional int32 length = 1;                       ///< link 长度(米)
  optional mapping.GeoPointProto start_point = 2;  ///< 路线起点
  optional mapping.GeoPointProto end_point = 3;    ///< 路线终点
  repeated SDLink sd_links = 4;                    ///< link 集合
}

message SDRouteProto {
  optional LiteHeader header = 1;  ///< 仅snoah内部通信标识，tip:无效
  optional uint64 route_id = 2;    ///< 请求唯一标识
  enum Status {
    CREATE = 0;  ///< 规划路线
    DELETE = 1;  ///< 清除导航路线
  };
  optional Status status = 3;
  optional int32 length = 4;           ///< 路线总长度(米)
  repeated SDSection sd_sections = 5;  ///< 完整路线，类似PathInfo
  repeated mapping.GeoPointProto way_points = 6;  ///<  途径点（含起终点）

  message NavigationSegment {
    optional int32 nav_index = 1;  ///<  当前为第几个导航段,从序号0开始
    optional int32 link_index = 16;    ///<  first sd link 的序号
    optional int32 distance = 3;       ///<  导航段的距离(米)
    optional int32 toll_distance = 4;  ///<  导航段收费的距离(米)
    optional int32 eta = 5;            ///<  导航段预估旅行时间(秒)
    optional int32 traffic_light_count = 6;  ///<  红绿灯总数
    ///< 导航主动作{如左转，右转}等,
    optional MainAction main_action = 7;
    ///< 导航辅助动作{进入主路,匝道}等
    optional AssistAction assist_action = 8;
    optional string exit_direction_info = 9;     ///< 高速出口方向
    optional string exit_name = 10;              ///< 高速出口名称
    optional string instruction = 11;            //< 导航动作文字描述
    repeated mapping.GeoPointProto points = 12;  ///< 形状点，弧度
    optional string crossing_name = 13;          ///< 导航段路口名称
    optional string guide_board_name = 14;       ///< 路牌名称
    optional int32 link_count = 15;              ///< link数量
    reserved 2;
  }
  repeated NavigationSegment navigation_segments = 7;  ///<  详细导航段
  optional int32 eta = 8;  ///<  总里程预估旅行时间(秒)
  ////< 路线规划原因{ 1 首次请求，2 偏航重算，3 主动切换路线}
  enum RequestReason {
    FIRST_COMMON = 1;
    REROUTE = 2;
    SWTICH_ROUTE = 3;
  }
  optional RequestReason request_reason = 9;
  ///< 动态交通路况信息 tmc
  repeated TrafficMessageChannel traffic_message_channels = 10;
}

message TimeAndDist {
  optional double travel_time = 1;  ///< 预计时间（秒）
  optional double distance = 2;     ///< 预计距离（米）
}

//<< 导航过程中的回调数据
message RouteGuidanceProto {
  enum Status {
    NO_START = 1;    ///< 尚未启动导航
    ON_ROUTE = 2;    ///< 在导航路线上
    OFF_ROUTE = 3;   ///< 不在导航路线上，偏航
    EIXT_ROUTE = 4;  ///< 退出导航路线
  }
  optional Status status = 1;  ///< 导航状态
  message NaviInfo {
    optional int32 link_index = 1;       ///< 当前在link index，从0开始
    optional string road_name = 2;       ///< 当前道路名称
    optional string next_road_name = 3;  ///< 下一道路名称
    optional int32 distance_to_seg_end = 4;  ///< 当前导航段剩余距离（米）
    optional int32 eta_to_seg = 5;  ///< 当前导航段预计通行时间（秒）
    optional int32 distance_to_end = 6;  ///< 剩余距离（米）
    optional int32 eta_to_end = 7;       ///< 剩余预计通行时间（秒）
    optional int32 remain_light_count = 8;  ///< 剩余红绿灯数量
    ///< 到达剩余途径点距离与时间
    repeated TimeAndDist distance_to_waypoints = 9;
    ///< 在SDRoutProto中详细导航段的索引序号，从0开始
    optional int32 cur_seg_index = 10;
    optional int32 cur_point_index = 11;  ///< 当前导航段上link中点索引
    optional bool is_split = 12;          ///< 导航段是否拆分

    message ExitDirectionInfo {
      repeated string exit_name_info = 1;  // 出口名称
      repeated string direction_info = 2;  // 出口方向
    }
    ///< 高速出口路牌信息，仅用于提示
    optional ExitDirectionInfo exit_direction_info = 13;
    ///< 车道信息
    message LaneInfo {
      optional int32 lane_count = 1;
      repeated LaneAction background_lanes = 2;
      repeated LaneAction front_lanes = 3;
    }
    optional LaneInfo lane_info = 14;
    ///<  ManeuverIconType
    enum ManeuverIconType {
      ICON_TYPE_NONE = 0;
      ICON_TYPE_DEFAULT = 1;  ///< carself
      LEFT = 2;
      RIGHT = 3;
      LEFT_FRONT = 4;
      RIGHT_FRONT = 5;
      LEFT_BACK = 6;
      RIGHT_BACK = 7;
      LEFT_TURN_AROUND = 8;
      STRAIGHT = 9;
      ARRIVED_WAYPOINT = 10;
      ENTER_ROUNDABOUT = 11;
      OUT_ROUNDABOUT = 12;
      ARRIVED_SERVICE_AREA = 13;
      ARRIVED_TOLLGATE = 14;
      ARRIVED_DESTINATION = 15;
      ARRIVED_TUNNEL = 16;
      ENTRY_LEFT_RING = 17;
      LEAVE_LEFT_RING = 18;
      U_TURN_RIGHT = 19;
      SPECIAL_CONTINUE = 20;
      ENTRY_RING_LEFT = 21;
      ENTRY_RING_RIGHT = 22;
      ENTRY_RING_CONTINUE = 23;
      ENTRY_RING_UTURN = 24;
      ENTRY_LEFT_RING_LEFT = 25;
      ENTRY_LEFT_RING_RIGHT = 26;
      ENTRY_LEFT_RING_CONTINUE = 27;
      ENTRY_LEFTRINGU_TURN = 28;
      CROSSWALK = 29;
      OVERPASS = 30;
      UNDERPASS = 31;
      SQUARE = 32;
      PARK = 33;
      STAIRCASE = 34;
      LIFT = 35;
      CABLEWAY = 36;
      SKY_CHANNEL = 37;
      CHANNEL = 38;
      WALK_ROAD = 39;
      CRUISE_ROUTE = 40;
      SIGHTSEEING_BUSLINE = 41;
      SLIDEWAY = 42;
      LADDER = 43;
      SLOPE = 44;
      BRIDGE = 45;
      FERRY = 46;
      SUBWAY = 47;
      ENTER_BUILDING = 48;
      LEAVE_BUILDING = 49;
      BY_ELEVATOR = 50;
      BY_STAIR = 51;
      BY_ESCALATOR = 52;
      LOW_TRAFFIC_CROSS = 53;
      LOW_CROSS = 54;             ///< 非导航段通过普通路口
      HOUSING_ESTATE_INNER = 55;  ///< 小区内部路偏航抑制态
      WAY_CHARGE_STATIO = 64;     ///< 到达充电站图标
      MERGE_LEFT = 65;            ///< 靠左图标
      MERGE_RIGHT = 66;           ///< 靠右图标
    }
    optional ManeuverIconType icon_type = 15;  ///< 导航动作的icon类型
    optional mapping.GeoPointProto start_point = 16;  ///< 导航动作开始位置坐标
    ///< 自车到充电站的距离（米）和时间（秒)
    repeated TimeAndDist dist_to_charge_station = 17;
    optional int32 ring_out_cnt = 18;  ///< 环岛出口序号
    ///< 电子眼/违章连续拍照/
    repeated CameraMonitor camera_monitors = 19;
    optional int32 distance_to_traffic_light = 20;  ///< 车辆到红绿灯距离
    optional TrafficLightState traffic_light_state = 21;  ///< 交通灯状态
    optional int32 traffic_light_count_down = 22;  ///< 交通灯倒计时
  }
  optional NaviInfo cur_navi_info = 2;   ///< 当前导航段信息
  optional bool arrive_destination = 3;  ///< 到达终点
  optional int32 arrive_waypoint = 4;  ///< 到达途径点的索引，序号从0开始,-1:NA
  optional mapping.GeoPointProto av_pos = 5;  ///< 当前车辆位置
}

message SdRouteResponse {
  optional uint64 route_id = 1;
  optional SDRouteProto.Status status = 2;
  optional bool is_success = 3;
  optional string error_message = 4;
}

message SdRouteMatchPoint {
  optional int64 link_index = 1;  // SDRouteProto中的section.links()的index
  optional int32 link_point_index = 2;
  optional mapping.GeoPointProto point = 3;
}

message SdRouteMatchSegment {
  optional SdRouteMatchPoint start = 1;
  optional SdRouteMatchPoint end = 2;
}

message SdRouteMatchResultProto {
  optional LiteHeader header = 1;
  optional uint64 route_id = 2;
  repeated SdRouteMatchSegment segments = 3;
}
