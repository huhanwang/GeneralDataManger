
syntax = "proto2";

package snoah;

import "onboard/lite/proto/lite_common.proto";

message CheckListProto {
  optional LiteHeader header = 1;
  oneof CheckItem {
    CanbusCheckProto canbus_check = 2;
    LocalizerCheckProto localizer_check = 3;
  }
}

message CanbusCheckProto {
  optional bool ready = 1;
  optional string error_msg = 2;
}

message LocalizerCheckProto {
  optional bool ready = 1;
  optional string error_msg = 2;
}
