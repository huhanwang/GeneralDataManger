
syntax = "proto2";

package snoah;

import "onboard/lite/proto/lite_common.proto";

// corresponding proto message for LiAuto::pas_idls::OdoMessage
// only keep necessary fields
message PasOdometryProto {
  optional LiteHeader header = 1;
  optional double timestamp = 2;
  optional double cal_timestamp = 3;
  optional float kappa = 4;
  optional float x = 5;
  optional float y = 6;
  optional float yaw = 7;
  optional float sHA = 8;
}
