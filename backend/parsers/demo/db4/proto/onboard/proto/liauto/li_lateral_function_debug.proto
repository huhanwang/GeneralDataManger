
syntax = "proto2";

package snoah.li;

message ElkReThreatAssessResult {
  optional uint64 id = 1;
  optional uint32 type = 2;
  optional float timeToCollision = 3;
  optional float lonPosition = 4;
  optional float latPosition = 5;
  optional uint32 conf = 6;
};

