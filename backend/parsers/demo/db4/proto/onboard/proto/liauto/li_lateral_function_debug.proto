message TrajDebug {
  optional uint32 fusion_id = 1;
  repeated float px = 2;
  repeated float py = 3;
}

message ObstacleDebug {
  optional uint32 fusion_id = 1;
  optional float px = 2;
  optional float py = 3;
  optional float heading = 4;
  optional float width = 5;
  optional float length = 6;
  optional float height = 7;
  optional float velocity = 8;
  optional float acceleration = 9;
  optional uint32 type = 10;
  optional float ttc = 11;
}

message TaDebug {
  optional uint32 slots_occupancy = 1;
  optional uint32 flags_targets = 2;
  optional uint32 flags_boundaries = 3;
  repeated uint32 fusion_ids = 4;
  optional uint32 flags_elk_road_edge_suppression = 5;
  repeated uint32 debug_flags_vector = 6;
  repeated float debug_values_vector = 7;
  optional TrajDebug ego_traj = 8;
  repeated TrajDebug target_trajs = 9;
  repeated ObstacleDebug ego_obstacles = 10;
  repeated ObstacleDebug target_obstacles = 11;
  repeated ElkReThreatAssessResult elkre_threat = 12;
}

message LatPlanDebug {
  optional int32 debug_intervention_type = 1;
  optional bool debug_elk_decel_ena = 2;
  optional float debug_elk_decel_req = 3;
  optional int32 debug_elkre_intervention_state = 4;
  optional int32 debug_elkre_intervention_side = 5;
  optional int32 debug_elkre_warning_side = 6;
  optional uint32 dubug_elkre_bit = 7;
  optional float debug_elkre_lat_posn = 8;
  optional float debug_elkre_lat_velocity = 9;
  optional bool debug_elkre_traj_found = 10;
  optional bool debug_elkre_zerotraj_found = 11;
  optional bool deubg_left_roadedge_ok = 12;
  optional bool debug_right_roadedge_ok = 13;
  optional uint32 dubug_ldp_bit = 14;
  optional int32 debug_ldp_intervention_state = 15;
  optional int32 debug_ldp_intervention_side = 16;
  optional int32 debug_ldp_warning_side = 17;
  optional float debug_ldp_lat_posn = 18;
  optional float debug_ldp_lat_velocity = 19;
  optional bool debug_ldp_traj_found = 20;
  optional bool debug_ldp_zerotraj_found = 21;
  optional bool deubg_left_laneline_ok = 22;
  optional bool debug_right_laneline_ok = 23;
  optional int32 debug_control_refrence_side = 24;
  repeated float debug_path_cp = 25;
  repeated float debug_path_dt = 26;
  optional float debug_path_time = 27;
  optional float debug_active_duration_time = 28;
  optional float debug_target_lane_offset = 29;
  optional float debug_start_lane_offset = 30;
  optional float debug_start_lateral_speed = 31;
  // 以下信号为初始版本信号
  optional int32 debug_ldp_intervene_type = 32;
  optional int32 debug_ldp_intervene_state = 33;
  repeated float debug_ldp_path_cp = 34;
  repeated float debug_ldp_path_dt = 35;
  optional float debug_ldp_path_time = 36;
  optional int32 debug_ldp_control_refrence_side = 37;
  optional int32 debug_ldp_intervene_side = 38;
  optional float debug_ldp_active_duration_time = 39;
  optional float debug_ldp_target_lane_offset = 40;
  optional float debug_ldp_start_lane_offset = 41;
  optional float debug_ldp_start_lateral_speed = 42;
  optional int32 debug_hod_status = 43;
  optional uint64 debug_elkre_bit = 44;
  optional uint64 debug_ldp_bit = 45;
}

message LatCtrlDebug {
  repeated float debug_ldp_lane_line_coeff = 1;
  optional int32 debug_lateral_control_mode = 2;
  optional float debug_local_offset = 3;
  optional float debug_local_heading = 4;
  optional float debug_look_ahead_offset = 5;
  optional float debug_vlat_request = 6;
  optional float debug_vlat_real = 7;
  optional float debug_alat_request = 8;
  optional float debug_yawrate_request = 9;
  optional float debug_curvature_desired = 10;
  optional float debug_ff_angle_request = 11;
  optional float debug_bf_angle_request = 12;
  optional int32 debug_angle_ratelimit_active = 13;
  optional float debug_total_angle_request = 14;
  optional float debug_vlatpid_p = 15;
  optional float debug_vlatpid_i = 16;
  optional float debug_vlatpid_d = 17;
  repeated float debug_path_x = 18;
  repeated float debug_path_y = 19;
  optional float debug_look_ahead_dist = 20;
  optional bool debug_reset_controller = 21;
  optional bool debug_dil_factor_decreased = 22;
  optional float debug_vlat_error = 23;
}

message LaneLineFit {
  optional uint32 line_id = 1;
  optional uint32 original_line_id = 2;
  optional uint32 line_type = 3;
  repeated float coeffs = 4;
  optional float range_start_px = 5;
  optional float range_end_px = 6;
}

message LateralCommonDebug {
  optional TaDebug target_debug = 1;
  optional LatPlanDebug lateral_plan_debug = 2;
  optional LatCtrlDebug lateral_control_debug = 3;
  repeated LaneLineFit lane_line_fit = 4;
}

message LateralFunctionDebug {
  optional LdwDebug ldw_debug = 1;
  optional LdpDebug ldp_debug = 2;
  optional ElkEdgeDebug elk_edge_debug = 3;
  optional ElkTargetDebug elk_target_debug = 4;
  optional LateralCommonDebug lateral_common_debug = 5;
}
