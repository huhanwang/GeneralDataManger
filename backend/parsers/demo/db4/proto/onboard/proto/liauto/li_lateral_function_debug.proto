  optional uint32 debug_ldw_target_line_id = 1;
  optional uint32 debug_ldw_suppress_condition = 2;
  optional int32 debug_ldw_ldw_state = 3;
  optional uint32 debug_ldw = 4;
  optional float debug_ldw_target_line_distance_to_body_edge = 5;
  optional float debug_ldw_odd_when_active = 6;
  optional int32 debug_ldw_closest_leftline_index = 7;
  optional int32 debug_ldw_closest_rightline_index = 8;
  optional uint32 debug_ldw_countdown_turnlight_suppress = 9;
  optional uint32 debug_ldw_countdown_since_ldw_actived = 10;
  optional int32 debug_ldw_haptic_activecnt = 11;
  optional int32 debug_ldw_force_active_state = 12;
  optional uint64 debug_ldw_abort_reason = 13;
  optional uint64 debug_ldw_supp_reason = 14;
  optional int32 debug_ldw_notavail_reason = 15;
  optional int32 debug_ldw_active_reason = 16;
  optional int32 debug_ldw_complete_reason = 17;
  optional int32 debug_ldw_warn_side_req = 18;
  repeated float debug_ldw_reserve_signals = 19;
  optional int32 debug_ldw_algo_version = 20;
}

