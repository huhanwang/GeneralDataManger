
syntax = "proto2";

package snoah;

import "onboard/lite/proto/lite_common.proto";
import "onboard/proto/vehicle_pose.proto";

message SafetyFuncPosition {
  optional float px = 1;
  optional float py = 2;
  optional float pz = 3;
}

message SafetyFuncPositionStd {
  optional float px_std = 1;
  optional float py_std = 2;
}

message SafetyFuncVelocity {
  optional float vx = 1;
  optional float vy = 2;
}

message SafetyFuncVelocityStd {
  optional float vx_std = 1;
  optional float vy_std = 2;
}

message SafetyFuncAccelerate {
  optional float ax = 1;
  optional float ay = 2;
}

enum MotionMovementStatus {
  MovementStatus_NEVER_MOVED = 0;
  MovementStatus_STOPED_FROM_MOVING = 1;
  MovementStatus_MOVING = 2;
  MovementStatus_ON_COMING = 3;
  MovementStatus_STOPED_FROM_ONCOMING = 4;
}

message SafetyFuncMotion {
  optional SafetyFuncPosition motion_pos = 1;
  optional SafetyFuncPositionStd motion_pos_std = 2;
  optional SafetyFuncVelocity motion_vel = 3;
  optional SafetyFuncVelocityStd motion_vel_std = 4;
  optional SafetyFuncVelocity motion_abs_vel = 5;
  optional SafetyFuncAccelerate motion_acc = 6;
  optional SafetyFuncAccelerate motion_abs_acc = 7;
  optional MotionMovementStatus motion_movement_status = 8;
}

message SafetyFuncPoint2F {
  optional float x = 1;
  optional float y = 2;
}

message SafetyFuncPose {
  optional SafetyFuncPoint2F pose_center = 1;
  optional float pose_length = 2;
  optional float pose_width = 3;
  optional float pose_height = 4;
  optional float pose_heading = 5;
  optional float pose_length_std = 6;
  optional float pose_width_std = 7;
  optional float pose_height_std = 8;
  optional float pose_heading_std = 9;
}

enum ObjectTypeConstants {
  OBJECT_TYPE_UNKNOWN = 0;
  OBJECT_CAR = 1;
  OBJECT_TRUCK = 2;
  OBJECT_MOTORCYCLE = 3;
  OBJECT_TRICYCLE = 4;
  OBJECT_SPECIAL_SHAPED_VEHICLE = 5;
  OBJECT_BUS = 6;
  OBJECT_MINIVEHICLE = 7;
  OBJECT_CONSTRUCTION_VEHICLE = 8;
  OBJECT_TRAILER = 9;
  OBJECT_PEDESTRIAN_CHILD = 10;
  OBJECT_PEDESTRIAN_ADAULT = 11;
  OBJECT_ELECTRICAL_BICYCLE = 12;
  OBJECT_BICYCLE = 13;
  OBJECT_WHEELCHAIR = 14;
  OBJECT_CONE = 15;
  OBJECT_BARRIER = 16;
  OBJECT_SAFETY_TRIANGLE = 17;
  OBJECT_PARKING_LOCK = 18;
  OBJECT_SPACE_LIMITER = 19;
  OBJECT_UNKNOWN_MOVABLE = 20;
  OBJECT_UNKNOWN_UNMOVABLE = 21;
}

