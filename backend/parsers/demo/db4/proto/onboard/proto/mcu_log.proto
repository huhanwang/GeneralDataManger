
syntax = "proto2";

package snoah;

import "onboard/lite/proto/lite_common.proto";
import "onboard/lite/proto/proto_field_option.proto";

// Represents an onboard issue.
message McuLogProto {
  optional LiteHeader header = 1;
  optional uint32 log_len = 2
      [(trans_matrix) = true, (matrix_data_type) = UINT16];
  optional string log_data = 3 [(trans_matrix) = true];
}
