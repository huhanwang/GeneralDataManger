
syntax = "proto2";

package snoah;

import "onboard/lite/proto/lite_common.proto";
import "onboard/proto/lite_camera.proto";
// import "onboard/proto/perception.proto";
import "onboard/proto/perception/types/traffic_light_color.proto";
import "onboard/proto/perception/types/traffic_light_shape.proto";

message DepthMapProto {
  optional CameraId camera_id = 1;

  message DepthMapPixel {
    optional uint32 row = 1;
    optional uint32 col = 2;
    optional uint32 depth_cm = 3;
    optional uint32 intensity = 4;
  }
  repeated DepthMapPixel pixels = 2;
  optional double timestamp = 3;
}

message DepthMapsProto {
  optional LiteHeader header = 1;
  repeated DepthMapProto depth_maps = 2;
}

// Deprecated.
message TrafficLightRegionProto {
  optional CameraId camera_id = 1;
  optional TrafficLightColor raw_color = 2;
  optional TrafficLightColor color = 7;
  optional bool flashing = 10 [default = false];
  optional bool occluded = 11 [default = false];
  optional int64 traffic_light_id = 8;
  optional int32 x = 3;
  optional int32 y = 4;
  // Rescaled size after the region recroped to avoid the overlap.
  optional int32 width = 5;
  optional int32 height = 6;
  optional float score = 9;
  optional TrafficLightShape shape = 12;
  optional float shape_score = 13;
  optional double camera_trigger_timestamp = 14 [deprecated = true];
  optional double camera_center_timestamp = 17;
  optional double tl_yaw_diff = 15;
  optional double distance = 16;
  // Origin size before the region recroped.
  optional int32 original_height = 18;
  optional int32 original_width = 19;
}

// Deprecated.
message TrafficLightRegionsProto {
  optional LiteHeader header = 1;
  repeated TrafficLightRegionProto traffic_light_regions = 2;
}

message PointImagePatchCoord {
  optional int32 x = 1;
  optional int32 y = 2;
}

message PcnRegionProto {
  optional CameraId camera_id = 1;
  optional int32 x = 2;
  optional int32 y = 3;
  optional int32 width = 4;
  optional int32 height = 5;
  enum ClassificationResult {
    PCN_UNKNOWN = 0;
    PCN_PEDESTRIAN = 1;
    PCN_CYCLIST = 2;
  };
  optional ClassificationResult classification_result = 6;
  optional float score = 7;
  optional double camera_trigger_timestamp = 8;
  repeated PointImagePatchCoord points_image_patch_coord = 9;
  optional float max_ped_distance = 10;
}

message PcnRegionsProto {
  optional LiteHeader header = 1;
  repeated PcnRegionProto pcn_regions = 2;
}

message SegmentInImageProto {
  optional int32 start_x = 1;
  optional int32 start_y = 2;
  optional int32 end_x = 3;
  optional int32 end_y = 4;
  optional int32 color = 5;  // Color in RGBA
  optional CameraId camera_id = 6;
}

message SegmentsInImageProto {
  optional LiteHeader header = 1;
  repeated SegmentInImageProto segments = 2;
}

message PointInImageProto {
  optional int32 x = 1;
  optional int32 y = 2;
  optional int32 color = 3;  // Color in RGBA
  optional CameraId camera_id = 4;
}

message PointsInImageProto {
  optional LiteHeader header = 1;
  repeated PointInImageProto points = 2;
}
