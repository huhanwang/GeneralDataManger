
syntax = "proto2";

package snoah;

import "onboard/lite/proto/lite_common.proto";
import "onboard/lite/proto/proto_field_option.proto";

// FaultTable version
message FaultTableVersion {
  optional uint32 version_high = 1
      [(trans_matrix) = true, (matrix_data_type) = UINT8];
  optional uint32 version_mid = 2
      [(trans_matrix) = true, (matrix_data_type) = UINT8];
  optional uint32 version_low = 3
      [(trans_matrix) = true, (matrix_data_type) = UINT8];
  optional uint32 factory_code = 4
      [(trans_matrix) = true, (matrix_data_type) = UINT8];
  optional uint32 car_mode_code = 5
      [(trans_matrix) = true, (matrix_data_type) = UINT8];
  optional uint64 timestamp = 6 [(trans_matrix) = true];
}

// Represents an onboard issue.
message FaultTableProto {
  optional LiteHeader header = 1;
  optional FaultTableVersion version = 2 [(trans_matrix) = true];
  optional uint32 fault_counter = 3 [(trans_matrix) = true];
  repeated uint32 fault_data = 4
      [(trans_matrix) = true, (matrix_data_type) = UINT8];
}
