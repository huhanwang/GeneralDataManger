
syntax = "proto2";

package snoah;
import "onboard/lite/proto/lite_common.proto";

// Represents an issue.
message GacDiagMsgData {
  optional uint32 dtc = 1;
  message Timestamp {
    optional uint32 sec = 1;
    optional uint32 nsec = 2;
    optional bool is_valid = 3;
  }
  optional Timestamp timestamp = 2;
  enum DataType {
    ISSUE_TRIGGER = 1;
    ISSUE_CLEAR = 2;
  }
  optional DataType data_type = 3;
}

message GacDiagMsgProto {
  optional LiteHeader header = 1;
  optional GacDiagMsgData gac_diag_msg_data = 2;
}
