
syntax = "proto2";

package snoah.hpp_mapping;

import "onboard/math/geometry/proto/affine_transformation.proto";
import "onboard/proto/vehicle_pose.proto";
import "onboard/proto/lite_camera.proto";
import "onboard/hpp/hpp_mapping/protos/map_common.proto";
import "onboard/lite/proto/lite_common.proto";
import "onboard/proto/calibration.proto";
import "onboard/params/v2/proto/assembly/vehicle.proto";
import "onboard/proto/localization.proto";

message FeaturePointIndexProto {
  optional uint32 frame_id = 1;
  optional CameraId camera_id = 2;
  optional uint32 feature_point_id = 3;
}

message MapPointProto {
  optional uint32 map_point_id = 1;
  optional Vec3dProto xyz = 2;
  repeated FeaturePointIndexProto feature_points_index = 3;
}

message FeaturePointProto {
  optional uint32 feature_point_id = 1;
  optional Vec2dProto uv = 2;
  repeated float descriptors = 3;
  optional uint32 map_point_id = 4;
  optional string int8_descriptors = 5;
}

// image_pose = smooth_compensation * odometry_pose * imu_extrinsic *
// camera_extrinsic
message ImageFeatureProto {
  optional double timestamp = 1;
  optional CameraId camera_id = 2;
  optional uint32 frame_id = 3;
  // Imu based smooth pose
  optional VehiclePoseProto smooth_compensation = 4;
  repeated FeaturePointProto feature_points = 5;
}

message MultiCameraFeatureProto {
  optional double timestamp = 1;
  optional uint32 frame_id = 2;
  optional VehiclePoseProto smooth_pose = 3;
  optional VehiclePoseProto odometry_pose = 4;
  repeated ImageFeatureProto images_feature = 5;
  optional VehiclePoseProto mapping_pose = 6;
}

message ImageIdProto {
  optional uint32 frame_id = 1;
  optional CameraId camera_id = 2;
}

message LoopClosureImagePairProto {
  optional ImageIdProto source_image_id = 1;
  optional ImageIdProto ref_image_id = 2;
  optional VehiclePoseProto relative_transform = 3;
}

message FeatureMapProto {
  optional LiteHeader header = 1;
  optional MapMetaProto meta_data = 2;
  repeated MapPointProto map_points = 3;
  repeated MultiCameraFeatureProto multi_camera_features = 4;
  repeated CameraParametersProto camera_params = 5;
  optional ImuExtrinsicsProto imu_extrinsic = 6;
  optional LocalizationTransformProto localization_transform = 7;
  repeated LoopClosureImagePairProto loop_closure_image_pairs = 8;
}

// for indexing bow database
message BowIndexProto {
  optional uint32 entry_id = 1;
  optional uint32 frame_id = 2;
  optional CameraId camera_id = 3;
}

message BowDatabaseIndexingProto {
  optional string database_name = 1;
  repeated BowIndexProto bow_index_list = 2;
}
