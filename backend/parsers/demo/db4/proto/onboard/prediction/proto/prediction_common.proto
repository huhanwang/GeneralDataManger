syntax = "proto2";

package snoah;

import "onboard/math/geometry/proto/affine_transformation.proto";
import "onboard/proto/trajectory_point.proto";
import "onboard/proto/autonomy_state.proto";
import "onboard/proto/assist_state.proto";
import "onboard/proto/localization.proto";
import "onboard/planner/scheduler/proto/lane_change.proto";
import "onboard/common/proto/map_geometry.proto";
import "onboard/maps/proto/semantic_map.proto";
import "onboard/proto/online_map.proto";

// VOID means object relation not assigned or failed to be analyzed. Will be
// masked in datasets.
enum ObjectRelation {
  OR_VOID = 0;
  OR_YIELD = 1;
  OR_PASS = 2;
  OR_NO_RELATION = 3;
}

// Oracle relation analysis result proto.
message ObjectRelationProto {
  optional ObjectRelation av_relation = 1;
  optional double av_s = 2 [deprecated = true];
  optional double object_s = 3 [deprecated = true];
  optional ApolloTrajectoryPointProto av_point = 4;
  optional ApolloTrajectoryPointProto obj_point = 5;
  repeated ApolloTrajectoryPointProto av_path = 6;
  repeated ApolloTrajectoryPointProto obj_path = 7;
}

message PredictedTrajectoryPointProto {
  // Spatial quantities.
  optional Vec2dProto pos = 1;
  optional double s = 2;      // Arc length (starting from first point).
  optional double theta = 3;  // Facing orientation.
  optional double kappa = 4;  // dtheta/ds.

  // Temporal quantities.
  optional double t = 5;  // Time (relative to first point).
  optional double v = 6;  // Speed. Can not be negative.
  optional double a = 7;  // dv/dt.

  // Nll uncertainty.
  optional Vec2dProto nll_cov = 12;
  optional double nll_angle = 13;
  reserved 8, 9, 10, 11;
}

enum ObjectRoadStatus {
  ORS_NONE = 0;
  ORS_OFF_ROAD = 1;
  ORS_ON_ROAD = 2;
}
enum ObjectIntersectionStatus {
  OIS_NONE = 0;
  OIS_OUT_INTERSECTION = 1;
  OIS_IN_INTERSECTION = 2;
}
enum ObjectOppositeLaneStatus {
  OOLS_NONE = 0;
  OOLS_OPPOSITE_SIDE = 1 [deprecated = true];
  OOLS_CURB_SEPARATE_LEFT = 2;
  OOLS_CURB_SEPARATE_RIGHT = 3;
}

enum ObjectMapStatus {
  OMS_NO_MAP = 0;
  OMS_PERCEPTION_MAP = 1;
  OMS_NOA_MAP = 2;
  OMS_HD_MAP = 3;
}

message ObjectPredictionScenario {
  // Relation to road/lane.
  optional ObjectRoadStatus road_status = 1;
  // Relation to intersection.
  optional ObjectIntersectionStatus intersection_status = 2;
  // Support information: nearest lane id.
  optional int64 nearest_lane_id = 3;
  // Distance to nearest lane if exists.
  optional double abs_dist_to_nearest_lane = 4;
  // Support information: nearest intersection id.
  optional int64 nearest_intersection_id = 5;
  // Distance to nearest intersection if exists.
  optional double abs_dist_to_nearest_intersection = 6;
  // Whether object is on opposite lane relative to AV.
  optional ObjectOppositeLaneStatus opposite_lane_status = 7;
}

enum ObjectPredictionPriority {
  OPP_P0 = 0;  // Interactive agents.
  OPP_P1 = 1;  // Cautious agents.
  OPP_P2 = 2;  // Normal agents.
  OPP_P3 = 3;  // Low.
  reserved 97, 93, 94, 95, 96, 98, 99, 100, 911, 999;
}

enum PredictionMapType {
  PMT_UNDEFINED = 0;
  PMT_HD = 1;
  PMT_VISION = 2;
  PMT_FUSE = 3;
}

message NearDrivePassageInfo {
  repeated int32 dp_id = 1;
  repeated double distance = 2;
}

message NearDrivePassageInfoV2 {
  optional int32 dp_id = 1;
  repeated float s = 2 [packed = true];
  repeated float l = 3 [packed = true];
  repeated float project_point_x = 4 [packed = true];
  repeated float project_point_y = 5 [packed = true];
  repeated float valid_mask = 6 [packed = true];
  optional PredictionMapType map_type = 7;
}

// NEXT ID: 17
message TrajectoryGroundTruth {
  optional string object_id = 1;
  repeated PredictedTrajectoryPointProto gt_points = 2;
  optional ObjectRelation av_relation = 3;
  repeated float speeds = 4 [packed = true];
  repeated float s = 5 [packed = true];
  repeated float path_x = 7 [packed = true];
  repeated float path_y = 8 [packed = true];
  repeated float headings = 9 [packed = true];
  // Unsmoothed and not cut-off at near static speed.
  repeated PredictedTrajectoryPointProto gt_raw_points = 10;
  repeated float gt_s = 11 [packed = true];
  repeated float gt_raw_s = 12 [packed = true];
  // Offset in s to interaction point.
  repeated float s_offset = 13 [packed = true];

  // Distanceto dp;
  repeated NearDrivePassageInfo gt_points_near_dp_infos = 14
      [deprecated = true];
  // projection to dp
  repeated NearDrivePassageInfoV2 gt_points_near_dp_infos_v2 = 15;
  repeated AvStateLabelsProto av_states = 16;

  reserved 6;
}

// NEXT ID: 16
enum PredictionObjectType {
  POT_UNSPECIFIED = 0;
  POT_UNKNOWN_STATIC = 1;
  POT_VEHICLE = 2;
  POT_MOTORCYCLIST = 3;
  POT_PEDESTRIAN = 4;
  POT_CYCLIST = 5;
  POT_FOD = 6;
  POT_UNKNOWN_MOVABLE = 7;
  POT_VEGETATION = 8;
  POT_BARRIER = 9;
  POT_CONE = 11;
  POT_WARNING_TRIANGLE = 14;
  POT_TRICYCLIST = 15;
  // Reserve OT_ROAD, OT_MIST, OT_BIRD respectively.
  // Use old-fashioned reserved to avoid warning.
  reserved 10, 12, 13;
}

// Read scaling config from params.
message FeatureScaleConfigProto {
  optional string feature_name = 1;
  repeated float scale = 2;
  repeated float zero = 3;
  optional bool clamp = 4 [default = false];
  repeated float min = 5;
  repeated float max = 6;
}

message ModelScaleParam {
  optional string model_name = 1;
  repeated FeatureScaleConfigProto feature_scales = 2;
}

message DrivePassageInfoProto {
  optional int32 id = 1;
  repeated Vec2dProto center = 2;
  optional PredictionMapType map_type = 3;
}

// AV interactive object intention for prediction consistency and downstream.
enum ObjectRelativeAvIntention {
  UNKNOWN_INTENTION = 0;
  PARALLEL_INTENTION = 1;
  CUTIN_INTENTION = 2;
  MERGE_INTENTION = 3;
  CROSS_INTENTION = 4;
  LATENT_CUTIN_INTENTION = 5;  // Occure before certain cutin.
}

message AvStateLabelsProto {
  optional AssistStateProto.AssistDriveSystemState av_assist_state = 1;
  optional AutonomyStateProto.State av_autonomy_state = 2;
  optional LocalizationTransformProto.LocStatus av_loc_status = 3;
  optional double dist_to_stopline = 4;
  optional bool onboard_use_psmm_vision = 5;
  optional LaneChangeStateProto lc_state = 6;
  // Check assist state proto for disengage reason.
  optional bool disengage = 7;
  optional ObjectIntersectionStatus intersection_status = 8;
}

// Related to scenario/traj behavior labels.
message TrajBehaviorLabel {
  enum TrajBehaviorType {
    STRAIGHT = 0;
    STRAIGHT_LEFT = 1;
    STRAIGHT_RIGHT = 2;
    LEFT = 3;
    RIGHT = 4;
    LEFT_UTURN = 5;
    RIGHT_UTURN = 6;
    STATIONARY = 7;
    UNKNOWN = 8;
  }

  message TrajLaneChangeBehavior {
    message LaneChangeInfo {
      optional double time = 1;
      optional double rel_distance = 2;
    }
    enum LaneChangeType {
      SINGLE = 0;
      CONSECUTIVE = 1;
      TYPE_NONE = 99;
    }
    enum LaneChangeTime {
      UPCOMING = 0;
      FUTURE = 1;
      FAR_FUTURE = 2;
      TIME_NONE = 99;
    }
    repeated LaneChangeInfo lane_changes = 1;
    optional LaneChangeType lane_change_type = 2 [default = TYPE_NONE];
    optional LaneChangeTime lane_change_time = 3 [default = TIME_NONE];
  }
  message TrajStoplineBehavior {
    enum RelativeToStoplineBehavior {
      STOP_BEFORE_SL = 0;
      STARTUP_TO_CROSS_SL = 1;
      CROSS_SL = 2;
      NONE = 99;
    }

    enum TrafficLightColor {
      UNKNOWN = 0;
      RED = 1;
      GREEN = 2;
      YELLOW = 3;
    }
    optional RelativeToStoplineBehavior rel_to_sl = 1 [default = NONE];
    optional TrafficLightColor tl_color = 2 [default = UNKNOWN];
  }

  enum TrajStartupStopBehavior {
    STARTUP_WITH_LEAD = 0;
    STARTUP_WITHOUT_LEAD = 1;
    STOP_WITH_LEAD = 2;
    STOP_WITHOUT_LEAD = 3;
    NONE = 99;
  }

  enum TrajDriveMode {
    FULL_AUTO = 0;
    FULL_MANUAL = 1;
    PART_MANUAL = 2;
    EMERGENCY = 3;
    ABNORMAL = 4;
  }

  enum TrajSpeedBehavior {
    HARD_BRAKE = 0;
    HARD_ACC = 1;
    SLOW_MOVING = 2;
  }

  optional TrajLaneChangeBehavior lc_behavior = 1;
  optional TrajStoplineBehavior sl_behavior = 2;
  optional TrajStartupStopBehavior startup_stop = 3 [default = NONE];
  repeated TrajDriveMode drive_mode = 4;
  repeated TrajSpeedBehavior speed_behavior = 5;  // Might have multiple types.
  optional TrajBehaviorType traj_direction = 6 [default = UNKNOWN];
}

message PredictionScenarioLabel {
  // Road type, lane type, road elements related.
  enum RoadElementType {
    INTERSECTION = 0;
    CURB = 1;
    CROSSWALK = 2;
    SPEED_BUMP = 3;
    STOPLINE = 4;
  }
  optional string city = 1;
  repeated RoadElementType nearby_road_elements = 2;
  optional mapping.SectionProto.RoadClass road_class = 3;
  optional mapping.SectionProto.Type road_type = 4;
  optional mapping.LaneProto.Type lane_type = 5;
  optional mapping.LaneProto.Direction lane_direction = 6;

  optional ObjectIntersectionStatus av_intersection_status = 7
      [default = OIS_OUT_INTERSECTION];
  optional OnlineMapProto.DataSource onboard_map_source = 8;

  // Object, obstacles related. Brief sum from odd.proto ObjectElement.
  enum ObjectDensityLevel {
    LIGHT = 0;  // < 3
    DENSE = 1;  // >= 4?
  }

  enum ObjectType {
    VEHICLE = 0;
    VEHICLE_LARGE = 1;
    CYCLIST = 2;
    PEDESTRIAN = 3;
    STATIC_OBSTACLE = 4;
    UNKNOWN_MOVING = 5;
    UNKNOWN_STATIC = 6;
  }

  enum ObjectDistanceType {
    GENERAL = 0;
    NEAR = 1;  // Immediate front/rear, left/right.
    RELEVANT = 2;
  }

  message ObjectDensity {
    optional ObjectDensityLevel density_level = 1;
    optional ObjectType object_type = 2;
    optional ObjectDistanceType object_distance = 3;
  }
  repeated ObjectDensity objects_density = 9;

  // Next id 10.
}
