message QTriggerEventProto {
  optional QTriggerEventType event_type = 1;
  optional QTriggerEventSubType event_sub_type = 2;
  optional int64 header_timestamp = 3;
  optional int64 event_offset_us = 4;
  optional int32 trigger_rule_id = 5;
  optional string trigger_version = 6;
  enum TriggerSourceType {
    TST_COMPOSITE = 1;
    TST_RUN_EVENT = 2;
    TST_QISSUE = 3;
    TST_QEVENT = 4;
  }
  optional TriggerSourceType source_type = 7;
  oneof proto_msg {
    QRunEvent q_run_event = 21;
    QEventProto q_event = 22;
    QIssueProto q_issue = 23;
    // QContextInfoProto q_context_info = 24;
  }
}

message QMatchingResultSnippetProto {
  message SnippetDurationProto {
    optional bool is_valid = 1;
    optional int64 start_offset_us = 2 [default = -1];
    optional int64 end_offset_us = 3 [default = -1];
  }
  optional SnippetDurationProto lite_duration = 2;
  optional SnippetDurationProto lidar_duration = 3;
  optional SnippetDurationProto camera_duration = 4;
  optional SnippetDurationProto camera_low_duration = 5;
  optional MessageFilterProto message_filter = 6;
  optional string tag_number_whitelist = 7;
  optional int32 priority = 8;
}

message QMatchingResultTagProto {
  repeated string labels = 1;
}

message QMatchingResultEventProto {
  optional string event_type = 1;
}

message QMatchingResultProto {
  optional QMatchingMergedSnippetsProto matching_merged_snippets = 1;
  optional QMatchingCounterStatsProto matching_counter_stats = 2;
  optional QMatchingTagsProto matching_tags = 3;

  // context
  optional string run_name = 11;
  optional string route_id = 12;
  optional string purpose = 13;
  optional string release_info = 14;
  optional string trigger_module = 15;
  optional string comments = 16;
  optional QTriggerEventProto trigger_event = 17;
  optional TriggerQTriageProto trigger_qtriage = 18;
  optional QContextInfoProto.QEgoStatusProto ego_status = 19;
  repeated QContextInfoProto.QNeighboringObjectProto neighboring_objects = 20;

  // action
  optional QMatchingResultSnippetProto matching_result_snippet = 21;
  optional QMatchingResultTagProto matching_result_tag = 22;
  optional bool save_as_event = 23 [deprecated = true];
  optional QMatchingResultEventProto matching_result_event = 24;
  optional bool is_vhr_event = 25 [default = false];
}

message QMatchingResultsProto {
  repeated QMatchingResultProto matching_results = 2;
}

// there are many snippets who have overlaps, we should merge them
// in order to reduce network i/o
// next id: 23
message QMatchingMergedSnippetsProto {
  optional string run_name = 1;

  // physical aspect: snippet file duration
  message SnippetDurationProto {
    optional bool is_valid = 1;
    optional int64 start_offset_us = 2 [default = -1];
    optional int64 end_offset_us = 3 [default = -1];
    optional int64 real_start_offset_us = 4 [deprecated = true];
  }
  optional SnippetDurationProto lite_duration = 2;
  optional SnippetDurationProto lidar_duration = 3;
  optional SnippetDurationProto camera_duration = 4;
  optional SnippetDurationProto camera_low_duration = 5;
  optional int32 priority = 6;
  optional string route_id = 7;
  optional string purpose = 20;
  optional string release_info = 21;
  // camera down sampling actually
  // TODO(kg): diff events with diff filter actually
  optional MessageFilterProto message_filter = 8;

  // logical aspect: events meta
  // next id: 24
  message QTriggerEventProto {
    optional QTriggerEventType event_type = 1;
    optional int64 header_timestamp = 2;
    optional int64 event_offset_us = 3;
    optional int32 priority = 4;
    optional QTriggerEventSubType event_sub_type = 5;

    // meta that directly copied from source message
    optional int32 trigger_rule_id = 9;
    optional string trigger_version = 23;
    enum TriggerSourceType {
      TST_COMPOSITE = 1;
      TST_RUN_EVENT = 2;
      TST_QISSUE = 3;
      TST_QEVENT = 4;
    }
    optional TriggerSourceType source_type = 10;
    oneof proto_msg {
      QRunEvent q_run_event = 11;
      QEventProto q_event = 12;
      QIssueProto q_issue = 13;
    }
    optional QContextInfoProto.QEgoStatusProto ego_status = 20;
    optional TriggerQTriageProto trigger_qtriage = 21;
    optional AutonomyStateProto autonomy_state = 22 [deprecated = true];
    enum VhrTriggerType {
      VHR_AEB = 1;
      VHR_RAEB = 2;
      VHR_FCTB = 3;
      VHR_RCTB = 4;
      VHR_ELK = 5;
    }
    optional VhrTriggerType vhr_type = 19;
  }
  // events included in this merged proto
  repeated QTriggerEventProto trigger_events = 15;
  // pass-through attributes
  optional string tag_number_whitelist = 16;
  optional string comments = 17;
  optional string trigger_module = 18;

  // lc date reflow customized field
  optional TriggerSignalProto customized_trigger_signal_proto = 22;
}

message QMatchingCounterStatsProto {
  optional int64 timestamp = 1;  // unix time
  optional string run_name = 2;
  optional string car_id = 3;
  optional int64 start_time_s = 4;  // unix time

  message QMatchingCounterStatProto {
    optional string label_name = 1;
    optional int32 inc_count = 2;
    optional int32 total_count = 3;
  }
  repeated QMatchingCounterStatProto matching_counter_stats = 5;

  optional QContextInfoProto context_info = 6;
}

message QMatchingTriggerStatsProto {
  optional int64 timestamp = 1;  // unix time
  optional string run_name = 2;
  optional string car_id = 3;
  optional int64 start_time_s = 4;  // unix time

  optional int32 total_trigger_count = 5;
  optional int32 inc_trigger_count = 6;

  message QMatchingTriggerPerRuleStatProto {
    optional int32 trigger_id = 1;
    optional string trigger_version = 4;
    optional int32 inc_count = 2;
    optional int32 total_count = 3;
  }
  repeated QMatchingTriggerPerRuleStatProto matching_trigger_stats = 10;
}

// next: 14
message QMatchingTagsProto {
  optional string run_name = 1;
  optional int64 offset = 2;
  optional int64 header_timestamp = 3;
  repeated string labels = 4;
  optional QContextInfoProto.QEgoStatusProto ego_status = 5;
  optional string route_id = 6;
  optional QContextInfoProto context_info = 7;
  optional int32 trigger_rule_id = 10;
  optional string trigger_version = 13;
  optional string purpose = 14;
  optional string release_info = 15;
  optional bool save_as_event = 11;
  optional TriggerQTriageProto trigger_qtriage = 12;
  optional AutonomyStateProto autonomy_state = 21 [deprecated = true];
}

message ProductionEventDumpConfigsProto {
  message ProductionEventDumpConfigProto {
    optional QTriggerEventType type = 1 [default = QTET_UNKNOWN];
    optional QTriggerEventSubType sub_type = 2 [default = QTEST_UNKNOWN];
    optional int32 priority = 3;
    optional uint64 backward_duration_us = 4 [default = 5000000];
    optional uint64 forward_duration_us = 5 [default = 5000000];
    optional bool dump_camera = 6 [default = false];
    optional bool dump_lidar = 7 [default = false];
    optional string tag_number_whitelist = 8;
    optional int64 sleep_duration_us = 9 [default = 2000000];
  }
  repeated ProductionEventDumpConfigProto configs = 1;
}

message RuleMatcherResultProto {
  optional LiteHeader header = 1;
  optional QMatchingResultProto result = 2;
}
