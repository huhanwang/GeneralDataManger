  QTEST_CHASSIS_STATE_BAD = 1;
  QTEST_CHASSIS_PROTO_CHASSIS_TIMEOUT = 2;
  QTEST_CHASSIS_PROTO_CHASSIS_WHEEL_SPEED_TIMEOUT = 3;
  QTEST_CHASSIS_STATE_ENGAGE_FALLBACK = 4;
  QTEST_IMU_STATE_ROLL_UNACCEPTABLE = 5;
  QTEST_IMU_STATE_PITCH_UNACCEPTABLE = 6;
  QTEST_IMU_STATE_TIMEOUT_PROCESS = 7;
  QTEST_IMU = 8;
  QTEST_GNSS_STATE_AVAILABLE_CHECK_TIMEOUT = 9;
  QTEST_RADAR_STATE_RECEIVE_ERROR = 10;
  QTEST_RADAR_PROCESSOR = 11;
  QTEST_LIDAR_STATE_POLL_TIMEOUT = 12;
  QTEST_LIDAR_STATE_FRAME_STALE = 13;
  QTEST_LIDAR_STATE_SYSTEM_CLOCK_ASYNC = 14;
  QTEST_LOCALIZATION_STATE_LOCALIZER_FAILED = 15;
  QTEST_LOCALIZATION_LOCALIZER_DISTANCE_TOO_FAR = 16;
  QTEST_LOCALIZATION_VISUAL_PERCEPTION_TIME_OUT = 17;
  QTEST_CONTROL_STEER_ANGLE_SPEED_TOO_FAST = 18;
  QTEST_CONTROL_STEER_FEEDBACK_BIG_DIFF = 19;
  QTEST_CONTROL_LATERAL_ERROR_TOO_LARGE = 20;
  QTEST_CONTROL_STATION_FORWARD_ERROR_TOO_LARGE = 21;
  QTEST_CONTROL_STATION_BACKWARD_ERROR_TOO_LARGE = 22;
  QTEST_CONTROL_HEADING_ERROR_TOO_LARGE = 23;
  QTEST_CONTROL_SPEED_ERROR_TOO_LARGE = 24;
  QTEST_PLANNER_PROTO_POSE_TIMEOUT = 25;
  QTEST_PLANNER_PROTO_TRAJECTORY_EMPTY = 26;
  QTEST_PLANNER_PROTO_TRAJECTORY_TIMEOUT = 27;
  QTEST_PLANNER_PROCESS_TIMEOUT = 28;
  QTEST_PLANNER_TRAJECTORY_INVALID = 29;
  QTEST_PLANNER_TRAJECTORY_TOO_SHORT = 30;
  QTEST_PLANNER_NO_ROUTE_WHEN_DRIVING = 31;
  QTEST_PLANNER_EMERGENCY_BRAKE = 32;
  QTEST_PLANNER_ROUTING_REQUEST_FAILED = 33;
  QTEST_PLANNER_ROUTING_UPDATE_FAILED = 34;
  QTEST_PREDICTION_PROCESS_TIMEOUT = 35;
  QTEST_SYSTEM_AUTONOMY = 36;
  QTEST_TAKEOVER = 37;
  QTEST_TAKEOVER_WITH_BRAKE = 38;
  QTEST_TAKEOVER_WITH_WHEEL = 39;
  QTEST_TAKEOVER_WITH_THROTTLE = 40;
  QTEST_TAKEOVER_WITH_LEVER = 41;
  QTEST_CONTROL_LATERAL_ACC_TOO_LARGE = 42;
