  LINE_LEFT = 0;
  LINE_RIGHT = 1;
  LINE_LEFT_LEFT = 2;
  LINE_RIGHT_RIGHT = 3;
  LINE_LEFT_OUTER = 4;
  LINE_RIGHT_OUTER = 5;
  LINE_RAMP = 6;
  LINE_DOUBLE = 7;
