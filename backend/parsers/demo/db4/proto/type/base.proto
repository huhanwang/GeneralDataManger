  LINE_ROAD_UNPARALLEL = 22;
  LINE_TYPE_PATH = 23;
}

message Header {
  int32 cam_idx = 1;
  int32 frame_id = 2;
  int64 time_stamp = 3;
}

message Rect {
  float left = 1;
  float top = 2;
  float right = 3;
  float bottom = 4;
}

message BasePoint {
  float x = 1;
  float y = 2;
  float z = 3;
}

message BasePolygon {
  repeated BasePoint pts = 1;
}

message Box3D {
  BasePoint lower_lt = 1;
  BasePoint lower_lb = 2;
  BasePoint lower_rb = 3;
  BasePoint lower_rt = 4;
  BasePoint upper_lt = 5;
  BasePoint upper_lb = 6;
  BasePoint upper_rb = 7;
  BasePoint upper_rt = 8;
  float conf = 9;
}

message Category {
  int32 property_type = 1;
  int32 property = 2;
  string property_name = 3;
  float property_conf = 4;
}

message Index {
  uint64 x = 1;
  uint64 y = 2;
  uint64 z = 3;
}

message Link {
  uint32 id = 1;
  float offset = 2;
  float end_offset = 3;
}

message Number {
  float value = 1;
  float cov = 2;
}

message String {
  string str = 1;
  float cov = 2;
}

message NdmPoint {
  double x = 1;
  double y = 2;
  double z = 3;
}

message Wgs84 {
  uint64 stamp = 1;
  double lat = 2;
  double lon = 3;
  uint64 height = 4;
  double yaw = 5;
}

message Cylinder {
  repeated NdmPoint points = 1;
  repeated NdmPoint pred_points = 2;
  repeated NdmPoint succ_points = 3;
  Number radius = 4;
}

message Circle {
  NdmPoint center = 1;
  NdmPoint normal = 2;
  Number radius = 3;
  float edgeline_width = 4;
}

message NdmPolygon {
  repeated NdmPoint points = 1;
  NdmPoint normal = 2;
  float edgeline_width = 3;
  NdmPoint orientation = 4;
  repeated bool visibles = 5;
}

message SpeedLimit {
  SpeedLimitType limit_type = 1;
  float speed_value = 2;
  SpeedLimitSource source = 3;
  float offset = 4;
  float end_offset = 5;
}

message TimeLimit {
  float time_begin = 1;
  float time_end = 2;
}

message NdmBaseVehicleType {
  enum Type {
    VEHICLE_TYPE_UNKNOWN = 0;
    CAR = 1;
    MOTORCYCLE = 2;
    BICYCLE = 3;
    TRUCK = 4;
    TAXI = 5;
    BUS = 6;
    PEDESTRAIN = 7;
    CABLE_CAR = 8;
  }
  Type type = 1;
  float conf = 2;
}

message ParkingSpaceRestriction {
  Number number_limit = 1;
  repeated TimeLimit time_limits = 2;
  repeated NdmBaseVehicleType vehicle_types = 3;
}

message GlobalData {
  uint32 country_code = 1;
  uint32 region_code = 2;
  DrivingSide driving_side = 3;
  UnitOfSystem unit = 4;
  uint32 protocol_version = 5;
  uint32 hardware_version = 6;
  uint32 map_version = 7;
  uint32 map_age = 8;
  MapProvider map_provider = 9;
  MapStatus map_status = 10;
  int32 time_zone_offset = 11;
  uint32 mapping_version = 12;
  uint32 aggregation_version = 13;
  uint32 ota_status = 14;
}

message NdmTrajectory {
  uint64 stamp = 1;
  uint32 seq_id = 2;
  repeated Odometry odoms = 3;
  repeated uint32 road_ids = 4;
  repeated uint32 lane_ids = 5;
}

message NdmHeader {
  string version = 1;
  string date = 2;
  uint64 timestamp = 3;
  uint64 seq_id = 4;
  string projection = 5;
  string utm_zone = 6;
  NdmPoint base_offset = 7;
  GlobalData global_data = 8;
}

enum ExtraPointType {
  EXTRA_POINT_TYPE_UNSPECIFIED = 0;
  // extra point type properties
  EXTRA_POINT_TYPE_UNKNOWN = 1;       // default type
  EXTRA_POINT_TYPE_DIVISION = 2;      // 分流点, ramp division point
  EXTRA_POINT_TYPE_MERGE = 3;         // 合流点, ramp merge point
  EXTRA_POINT_TYPE_LANENUM_CHANGE_START = 4;    // 匝道分割或合并起点
  EXTRA_POINT_TYPE_LANENUM_CHANGE_END = 5;     // 匝道分割或合并端点
  EXTRA_POINT_TYPE_UTURN = 6;        // 指向方向区域汽车可以折返
  EXTRA_POINT_TYPE_CHANGE_POINT = 7; // 虚实线变化点
  EXTRA_POINT_TYPE_S_CURVE = 8;     // S弯道曲率最大点
  EXTRA_POINT_TYPE_HIGHTWAY_OUT = 9;   // 汇出点，分流+宽虚线
  EXTRA_POINT_TYPE_HIGHTWAY_IN = 10;    // 汇入点，合流+宽虚线
}

message ExtraPoints {
  repeated NdmPoint extra_points = 1;
  repeated ExtraPointType extra_points_type = 2;
  repeated uint32 extra_ids = 3;
}

enum VertexType {
  VERTEX_UNKNOWN = 0;
  NO_VERTEX = 1;
  VERTEX_DIST = 2;
  VERTEX_YAW = 3;
  VERTEX_PITCH = 4;
}

message VehiclePose {
  /// @brief Position
  Vector3f position = 1;
  /// @brief Orientation (roll; pitch; yaw)
  Vector3f orientation = 2;
}
