  TRAFFICFLOWSTATUS_UNKNOWN = 0;
  TRAFFICFLOWSTATUS_SMOOTH = 1;
  TRAFFICFLOWSTATUS_AMBLE = 2;
  TRAFFICFLOWSTATUS_CONGESTION = 3;
  TRAFFICFLOWSTATUS_BLOCKAGE = 4;
  TRAFFICFLOWSTATUS_NOTRAFFICFLOW = 5;
  TRAFFICFLOWSTATUS_OTHER = 6;
}

