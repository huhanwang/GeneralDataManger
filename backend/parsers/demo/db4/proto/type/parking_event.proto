/**
 * Booking related messages.
 *
 * This file is used to communicate between statemachine and hmi
 *
 */

syntax = "proto3";
package autodrive.workflow.proto;

/**
 * msg from hmi to vpa statemachine
 */
enum VpaUserEventType {
  VPA_USER_EVENT_TYPE_NONE = 0;
  // user touch weak active notification to active map function
  VPA_USER_EVENT_TYPE_ACTIVE_MAP_FUNC = 1;
  // user touch weak active notification to active vpa function
  VPA_USER_EVENT_TYPE_ACTIVE_VPA_FUNC = 2;
  // user confirm to start build map
  VPA_USER_EVENT_TYPE_START_MAP_BUILD = 3;
  // user confirm to start rebuild map
  VPA_USER_EVENT_TYPE_START_MAP_REBUILD = 4;
  // user confirm to start vpa (cruise to parking space)
  VPA_USER_EVENT_TYPE_START_VPA = 5;
  VPA_USER_EVENT_TYPE_SCREEN_OCCUPIED = 6;  // HMI VPA screen occupied
  VPA_USER_EVENT_TYPE_CANCEL_VPA = 7;       // user cancel vpa
  VPA_USER_EVENT_TYPE_CONTINUE_VPA = 8;     // user click vpa continue btn
  // user click finish btn after map complete
  VPA_USER_EVENT_TYPE_FINISH_MAP = 9;
  VPA_USER_EVENT_TYPE_SELECT_SLOT = 10;   // user select slot
  VPA_USER_EVENT_TYPE_SHIFT_INVALID = 11; // only hdc: shitf invalid mod
  VPA_USER_EVENT_TYPE_SHIFT_BOTH = 12;    // only hdc: shitf both mod
  VPA_USER_EVENT_TYPE_SHIFT_PARK = 13;    // only hdc: shitf park mod
  VPA_USER_EVENT_TYPE_SHIFT_DRIVE = 14;   // only hdc: shitf drive mod
  VPA_USER_EVENT_TYPE_SHIFT_NEITHER = 15; // only hdc: shitf neither mod
}

/**
