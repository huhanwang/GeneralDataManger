syntax = "proto3";
import "common/common_msg.proto";
import "type/type.proto";
package autodrive.workflow.proto;

message Extrinsic {
  float x = 1;
  float y = 2;
  float z = 3;
  float roll = 4;
  float pitch = 5;
  float yaw = 6;
  CameraID cam_id = 7;
  uint32 num_extrinsic = 8;
}

message CameraExtrinsicsMsg {
  // Header
	MsgHeader header = 1;
  // Error
	Error error = 2;
  // Extrinsics
  repeated Extrinsic extrinsics = 3;
}