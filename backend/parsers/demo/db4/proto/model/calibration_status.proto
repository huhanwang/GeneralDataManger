syntax = "proto3";
import "common/common_msg.proto";
package autodrive.workflow.proto;

enum CalibrationStatus {
  CALIBRATION_UNKNOWN = 0;
  CALIBRATION_WAIT = 1;
  CALIBRATION_START = 2;
  CALIBRATION_FINSHED = 3;
}

message CalibrationStatusMsg {
  // Header
	MsgHeader header = 1;
  // Error
	Error error = 2;
  // Status
  CalibrationStatus status = 3;
}