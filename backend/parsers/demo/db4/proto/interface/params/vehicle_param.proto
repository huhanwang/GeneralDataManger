syntax = "proto3";
import "common/common_msg.proto";
package autodrive.workflow.proto;

enum VehicleColor {
  DEFAULT = 0;
  Black = 1;               // 黑
  WHITE = 2;               // 白
  GREY = 3;                // 灰
  SILVER = 4;              // 银
  RED = 5;                 // 红
  ORANGE = 6;              // 橙
  YELLOW = 7;              // 黄
  GREEN = 8;               // 绿
  CYAN = 9;                // 青
  BLUE = 10;               // 蓝
  PURPLE = 11;              // 紫
}

message VehiclePoint {
  int32 x = 1;
  int32 y = 2;
}

message VehicleParam {
  float length = 1;
  float width = 2;
  uint32 pulse_counter_max_value = 3;
  float front_overhang = 4;
  float rear_overhang = 5;
  float wheel_base = 6;
  float wheel_width = 7;
  uint32 ackerman_num = 8;
  uint32 ackerman_id = 9;
  float pos_error = 10;
  float max_left_angle = 12;
  float max_right_angle = 13;
  repeated float tread = 14;
  VehicleColor color = 15;
  uint32 param_status = 16;
  repeated float ackerman_coe = 17;
  VehiclePoint img_rear_axle = 18;
  repeated VehiclePoint img_vehicle_corner = 19;
}

message VehicleParamMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  // Param
  VehicleParam param = 3;
}