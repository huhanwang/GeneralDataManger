syntax = "proto3";
import "common/common_msg.proto";
package autodrive.workflow.proto;

message DaqInfo {
  // Data version
  string data_version = 1;
  // Data type
  string data_type = 2;
  // description
  string description = 3;
}

message DaqInfoMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  // Info
  DaqInfo daq_info = 3;
}