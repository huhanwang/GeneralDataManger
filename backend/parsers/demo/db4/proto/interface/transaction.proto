syntax = "proto3";
import "common/common_msg.proto";
package autodrive.workflow.proto;


message Transaction {
  // topic
  string topic = 1;
  // frame id
  uint32 data_frame_id = 2;
  // DAG id
  uint32 dag_id = 3;
  // enter DAG time
  uint64 enter_time = 4;
}

message TransactionMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  // Transaction
  repeated Transaction transaction = 3;
}