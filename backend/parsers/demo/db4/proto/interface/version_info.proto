syntax = "proto3";
import "common/common_msg.proto";
package autodrive.workflow.proto;

message VersionInfo {
  string alg = 1;
  string version = 2;
  string commit = 3;
}

message ProcessVisionInfo {
  string process_name = 1;
  repeated VersionInfo version_info = 2;
}

message VersionsInfo {
  repeated ProcessVisionInfo versions = 1;
}

message VersionsInfoMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  // VersionsInfo
  VersionsInfo versions_info = 3;
}