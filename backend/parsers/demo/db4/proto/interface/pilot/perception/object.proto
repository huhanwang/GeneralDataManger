message ParkingPoseInfo {
  float width = 1;
  float length = 2;
  float angle = 3;
  float yaw_vcs = 4;
  BasePoint center_vcs = 5;
  repeated BasePoint poly_vcs = 6;
}

message ParkingLockInfo {
  bool valid = 1;
  BasePoint position_vcs = 2;
  ParkingLockStatus lock_status = 3;
}

message ParkingOccupyInfo {
  ParkingOccupyStatus occupy_status = 1;
  ParkingLockInfo lock_info = 2;
}

message ParkingRodInfo {
  bool valid = 1;
  repeated BasePoint end_vcs = 2;
}

message ParkingBoundaryInfo {
  repeated BasePoint point_vcs = 1;
}

message ParkingSlotAttr {
  int32 verify = 1;
  int32 source = 2;
  ParkingType type = 3;
  ParkingPoseInfo pose = 4;
  ParkingOccupyInfo occupy_info = 5;
  ParkingRodInfo rod_info = 6;
  ParkingBoundaryInfo boundary = 7;
}

message NdmObject {
  int32 id = 1;
  NdmPolygon border = 2;
  int32 type = 3;
  int32 sub_type = 4;
  int32 conf = 5;
  int32 life_time = 6;
  int32 age = 7;
  ObjectAttr attr = 8;
  repeated int64 child_ids = 9;
  NdmPoint position = 10;
  repeated int32 child_types = 11;
  bool in_cur_lane = 12;
  bool drive_start_up = 13;
  int64 generation_time = 14;
  int32 submap_id = 15;
  uint32 section_id = 16;
}

message ObjectAttr {
  int32 shape = 1;
  string value = 2;
  float cycle_time = 3;
  bool dynamic = 4;
  int32 traversable = 5;
  float height = 6;
  float radius = 7;
  int32 status = 8;
  ImageSpaceInfo img_info = 9;
  repeated Condition conditions = 10;
  OrientationType orientation = 11;
  TrafficLightStructType struct_type = 12;
  TrafficLightBulbSpotMode spot_mode = 13;
  repeated TrafficLightBulbSpotMode spot_modes = 14;
  ObjectStage stage = 15;
  float pole_lift_angle = 16;
  ParkingSlotAttr parking_slot_attr = 17;
}

message Objects {
  Header header = 1;
  repeated NdmObject objects = 2;
  float conf_scale = 3;
}

message ConditionNumeric {
  uint32 value = 1;
}

message ConditionVehicleType {
  uint32 vehicleTypeMask = 1;
}

message ConditionLoad {
  Load value = 1;
}

message ConditionTimeOfDay {
  uint32 startMinutes = 1;
  uint32 endMinutes = 2;
}

message ConditionWeather {
  uint32 weather = 1;
}

message ConditionFuzzyTime {
  FuzzyTime fuzzyTime = 1;
}

message ConditionTurnDirection {
  LaneArrowMarking direction = 1;
}

message Condition {
  ConditionType type = 1;
  YesNoUnknown applies_to_ego_vehicle = 2;
  oneof condition {
      ConditionNumeric condition_numeric = 3;
      ConditionVehicleType condition_vehicleType = 4;
      ConditionLoad condition_load = 5;
      ConditionTimeOfDay condition_timeOfDay = 6;
      ConditionWeather condition_weather = 7;
      ConditionFuzzyTime condition_fuzzyTime = 8;
      ConditionTurnDirection condition_turnDirection = 9;
  }
}
