syntax = "proto3";
import "type/base.proto";
import "type/odometry_type.proto";
package autodrive.workflow.proto;

enum PointCloudType {
  POINTCLOUD_TYPE_UNKNOWN = 0;
  POINTCLOUD_TYPE_NORMAL = 1;
  POINTCLOUD_TYPE_SKELETON = 2;
}

enum SemanticPointType {
  SEMANTICPOINT_TYPE_UNKNOWN = 0;
  SEMANTICPOINT_TYPE_ROAD = 1;
  SEMANTICPOINT_TYPE_LANE_LINE = 2;
  SEMANTICPOINT_TYPE_PARKING_LINE = 3;
  SEMANTICPOINT_TYPE_PARKING_SLOT = 4;
  SEMANTICPOINT_TYPE_ARROW = 5;
  SEMANTICPOINT_TYPE_GUIDE_LINE = 6;
  SEMANTICPOINT_TYPE_CROSSWALK_LINE = 7;
  SEMANTICPOINT_TYPE_NO_PARK_SIGN_LINE = 8;
  SEMANTICPOINT_TYPE_STOP_LINE = 9;
  SEMANTICPOINT_TYPE_SPEED_BUMP = 10;
  SEMANTICPOINT_TYPE_OTHER = 11;
  SEMANTICPOINT_TYPE_PARKING_LOCK_OPEN = 12;
  SEMANTICPOINT_TYPE_PARKING_LOCK_CLOSED = 13;
  SEMANTICPOINT_TYPE_TRAFFIC_CONE = 14;
  SEMANTICPOINT_TYPE_PARKING_ROD = 15;
  SEMANTICPOINT_TYPE_CURB = 16;
  SEMANTICPOINT_TYPE_CEMENT_COLUMN = 17;
  SEMANTICPOINT_TYPE_IMMOVABLE_OBSTACLE = 18;
  SEMANTICPOINT_TYPE_MOVABLE_OBSTACLE = 19;
  SEMANTICPOINT_TYPE_BACKGROUND = 20;
  SEMANTICPOINT_TYPE_GENERALIZED_CURB = 21;
}

message SemanticPoint {
  NdmPoint position = 1;
  int32 type = 2;
}

message PointCloud {
  NdmHeader header = 1;
  int32 id = 2;
  int32 type = 3;
  repeated SemanticPoint points = 4;
  float point_size = 5;
  Odometry reference_pose = 6;
}
