syntax = "proto3";
import "type/base.proto";
import "type/basic.proto";
import "interface/pilot/perception/bev_lane_base.proto";
package autodrive.workflow.proto;

message LaneSection {
  BevLaneLineType bev_lane_type = 1;
  repeated BasePoint bev_points = 2;
  CurbType bev_curb_type = 3;
}

enum PositionIndex {
  HOST_LEFT = 0;
  HOST_RIGHT = 1;
  LEFT_NEIGHBOR_LANE_LEFT = 2;
  LEFT_NEIGHBOR_LANE_RIGHT = 3;
  RIGHT_NEIGHBOR_LANE_LEFT = 4;
  RIGHT_NEIGHBOR_LANE_RIGHT = 5;
  REAR_RIGHT = 6;
  REAR_LEFT = 7;
  ROAD_EDGE_LEFT = 8;
  ROAD_EDGE_RIGHT = 9;
  POSITION_INDEX_DEFAULT = 255;
}

enum YShapeSemanticType {
  YSHAPE_NORMAL = 0;
  FORK_LEFT_BRANCH = 1;
  FORK_RIGHT_BRANCH = 2;
  MERGE_LEFT_BRANCH = 3;
  MERGE_RIGHT_BRANCH = 4;
  YSHAPE_COMMON_BRANCH = 5;
  FORK_LEFT_WITH_COMMON_BRANCH = 6;
  FORK_RIGHT_WITH_COMMON_BRANCH = 7;
  MERGE_LEFT_WITH_COMMON_BRANCH = 8;
  MERGE_RIGHT_WITH_COMMON_BRANCH = 9;
}

message ParameterizedLaneInfo {
  PositionIndex lane_position_index = 1;
  float confidence = 2;
  int32 lane_id = 3;
  float life_time = 4;
  YShapeSemanticType y_shape_semantic_type = 5;
  repeated float coeffs = 6;
  repeated LaneSection lanes = 7;
  Vector3f start_point = 8;
  Vector3f end_point = 9;
  repeated float y_shape_intersection_x = 10;
  float lateral_error = 11;
  float length = 12;
}

enum BevGroundMarkingType {
  BEV_GROUND_MARKING_TYPE_STRAIGHT = 0;
  STRAIGHT_LEFT = 1;
  STRAIGHT_RIGHT = 2;
  STRAIGHT_U_TURN = 3;
  BEV_GROUND_MARKING_TYPE_LEFT = 4;
  BEV_GROUND_MARKING_TYPE_LEFT_U_TURN = 5;
  BEV_GROUND_MARKING_TYPE_MERGE_TO_LEFT = 6;
  BEV_GROUND_MARKING_TYPE_RIGHT = 7;
  BEV_GROUND_MARKING_TYPE_MERGE_TO_RIGHT = 8;
  LEFT_RIGHT = 9;
  BEV_GROUND_MARKING_TYPE_U_TURN = 10;
  FORBID_LEFT = 11;
  FORBID_RIGHT = 12;
  FORBID_U_TURN = 13;
  STRAIGHT_LEFT_RIGHT = 14;
  STRAIGHT_U_TURN_LEFT = 15;
  RIGHT_U_TURN = 16;
  FORBID_STRAIGHT = 17;
  INDICATING_ARROW = 18;
  INDICATING_STRAIGHT = 19;
  TEXT = 20;
  BUS_LANE = 21;
  VARIABLE_ORIENTATION_LANE = 22;
  ARROW_OTHER = 23;
  NUMBER = 24;
  OTHER = 25;
  MAX_SPEED_LIMIT = 26;
  MIN_SPEED_LIMIT = 27;
  TIME = 28;
  YIELD_AHEAD_TRIANGLE = 29;
  YIELD_AHEAD_HOV = 30;
  NON_MOTORIZED = 31;
}

message Box2d {
  float x = 1;
  float y = 2;
  float heading = 3;
  float width = 4;
  float length = 5;
}

message BevGroundMarking {
  Box2d bbox = 1;
  BevGroundMarkingType ground_marking_type = 2;
  float score = 3;
  int32 id = 4;
}

enum CrosswalkType {
  UNCONTROLLED = 0;
  TRAFFIC_LIGHT_CONTROLLED = 1;
  MUST_YEILD = 2;
}

message Crosswalk {
  Box2d bbox = 1;
  CrosswalkType crosswalk_type = 2;
  float score = 3;
  int32 id = 4;
}

enum BevKeypointType {
  ARROW_VERTEX = 0;
  DASHED_LINE_ENDPOINT = 1;
  POLE = 2;
  Y_CROSS_POINT = 3;
}

message BevPoint {
  float x = 1;
  float y = 2;
  float z = 3;
  float score = 4;
}

message BevKeypoint {
  BevKeypointType bev_keypoint_type = 1;
  repeated BevPoint bev_points = 2;
}

enum BevCenterLineDirection {
  kBevCenterLineDirectionStraight = 0;
  kBevCenterLineDirectionLeft = 1;
  kBevCenterLineDirectionRight = 2;
  kBevCenterLineDirectionUTurn = 3;
  kBevCenterLineDirectionUnknown = 127;
}

enum BevCenterLineType {
  kMotorVehicle = 0;
  kNonMotorVehicle = 1;
  kBus = 2;
  kBevCenterLineTypeUnknown = 127;
}

message BevCenterLine {
  int32 id = 1;
  BevCenterLineType center_line_type = 2;
  bool is_virtual = 3;
  bool is_merging = 4;
  bool is_in_intersection = 5;
  repeated BevCenterLineDirection directions = 6;
  repeated PointConfidence center_line_points = 7;
  repeated int32 incoming_lane_ids = 8;
  repeated int32 outgoing_lane_ids = 9;
  int32 left_lane_id = 10;
  int32 right_lane_id = 11;
  int32 left_boundary_id = 12;
  int32 right_boundary_id = 13;
}

enum RoadIntersectionType {
  ROAD_INTERSECTION = 0;
}

message RoadIntersection {
  int32 id = 1;
  float score = 2;
  RoadIntersectionType road_intersection_type = 3;
  Box2d bbox = 4;
}

message FusedRoadGeometry {
  VehiclePose vehicle_pose = 1;
  repeated ParameterizedLaneInfo smooth_bev_lanes = 2;
  repeated ParameterizedLaneInfo vehicle_bev_lanes = 3;
  repeated BevGroundMarking ground_markings = 4;
  repeated Crosswalk crosswalks = 5;
  repeated BevKeypoint bev_keypoints = 6;
  repeated BevCenterLine center_lines = 7;
  repeated BevCenterLine center_lines_smooth = 8;
  repeated RoadIntersection road_intersections = 9;
}
