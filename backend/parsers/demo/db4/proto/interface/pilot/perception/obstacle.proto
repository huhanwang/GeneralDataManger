  TRAJ_PRED_STATUS_TYPE_PED_LABEL_UNSTABLE = 5;
  TRAJ_PRED_STATUS_TYPE_OBSTACLE_TOO_FAR = 6;
  TRAJ_PRED_STATUS_TYPE_OBSTACLE_STATIONARY = 7;
  TRAJ_PRED_STATUS_TYPE_OBSTACLE_DRIFTING = 8;
