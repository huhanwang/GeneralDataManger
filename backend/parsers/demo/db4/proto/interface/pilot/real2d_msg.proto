syntax = "proto3";
import "common/common_msg.proto";
import "type/obstacle_raw.proto";
import "type/perception_base.proto";
package autodrive.workflow.proto;

message Real2DCameraValid {
  perception_base.ImageId sensor_id = 1;
  bool obstacle_valid = 2;
}

message Real2DMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  repeated Real2DCameraValid camera_flag_data = 3;
  repeated ObstacleRawsData obstacle_raw_data = 4;
}