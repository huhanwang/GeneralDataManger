syntax = "proto3";
import "common/common_msg.proto";
import "type/base.proto";
import "interface/pilot/perception/physical_layer.proto";
import "interface/pilot/perception/logical_layer.proto";
import "interface/pilot/perception/topological_layer.proto";
import "interface/pilot/perception/dynamic_layer.proto";
import "interface/pilot/perception/ego_layer.proto";
import "interface/pilot/perception/ref_line_layer.proto";
package autodrive.workflow.proto;

enum DrivingConditionType {
  UNSPECIFIED = 0;
  HIGHWAY = 1;
  URBAN = 2;
}

message Statistics {
  string name = 1;
  string type = 2;
  float value = 3;
}

message MapEnvStatistics {
  uint32 id = 1;
  uint64 stamp = 2;
  uint32 seq_id = 3;
  uint32 duration = 4;
  float distance = 5;
  repeated Statistics stats = 6;
}

message MapEnvMsg {
	MsgHeader header = 1;
	Error error = 2;
  NdmHeader ndm_header = 3;
  PhysicalLayer physical_layer = 4;
  LogicalLayer logical_layer = 5;
  TopologicalLayer topological_layer = 6;
  DynamicLayer dynamic_layer = 7;
  EgoLayer ego_layer = 8;
  MapEnvStatistics statistics = 9;
  uint32 status = 10;
  uint32 diag_code = 11;
  RefLineLayer refline_layer = 12;
  uint32 loc_main_level = 13;
  uint32 loc_sub_level = 14;
  DrivingConditionType driving_condition = 15;
}
