syntax = "proto3";
import "common/common_msg.proto";
package autodrive.workflow.proto;

message McuHeartbeat {
  uint32 heartbeat_counter = 1;                   //  0~255
  uint32 cpu_core0_usage = 2;                     //  mcu core usage rate %
  uint32 cpu_core1_usage = 3;                     //  reserved
  uint32 cpu_core2_usage = 4;                     //  reserved
  uint32 cpu_core3_usage = 5;                     //  reserved
  uint32 cpu_core4_usage = 6;                     //  reserved
  int32 cpu_temprature = 7;                       //  -40~125 C
  uint32 fault_code = 8;
  string sw_ver_ecu_ext = 9;              // external software version of ecu
  string sw_ver_soc_int = 10;              // internal software version of ecu
  string vin_code = 11;
  string hw_ver_ecu_ext = 12;              // external hardware version of ecu
  string sw_ver_mcu_int = 13;              // internal software version of ecu
  string sw_tim_mcu_bud = 14;
}

message McuHeartbeatMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  // Heartbeat
  McuHeartbeat mcu_heartbeat = 3;
}