syntax = "proto3";
import "common/common_msg.proto";
package autodrive.workflow.proto;

message LinkTriggerInfo {
  uint32 dag_id = 1;
  uint32 status = 2;
  uint32 link_id = 3;
  uint64 trigger_time = 4;
};

message ModuleSpinInfo {
  uint32 dag_id = 1;
  uint32 status = 2;
  uint32 module_id = 3;
  uint64 start_time = 4;
  uint64 end_time = 5;
};

message DagTriggerInfoMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  // whether link is triggered
  bool link_is_triggered = 3;
  // link trigger info
  LinkTriggerInfo link_trigger_info = 4;
  // whether module is executed
  bool module_is_executed = 5;
  // module spin info
  ModuleSpinInfo module_spin_info = 6;
}