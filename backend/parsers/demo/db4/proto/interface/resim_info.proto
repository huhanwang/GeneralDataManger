syntax = "proto3";
import "common/common_msg.proto";
package autodrive.workflow.proto;

message ResimFrame {
  string topic_name = 1;
  int64 timestamp = 2;
  int64 frame_id = 3;
}

message ResimInfoMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  int64 start_timestamp = 3;
  int64 end_timestamp = 4;
  repeated ResimFrame resim_frames = 5;
}