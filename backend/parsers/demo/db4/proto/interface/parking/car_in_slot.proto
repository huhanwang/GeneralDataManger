syntax = "proto3";
import "common/common_msg.proto";
package autodrive.workflow.proto;

enum HpaParkingType {
  HPA_PARKING_TYPE_UNKNOWN = 0;
  HPA_PARKING_TYPE_VERTICAL_PARKING = 1;
  HPA_PARKING_TYPE_PARALLEL_PARKING = 2;
  HPA_PARKING_TYPE_OBLIQUE_PARKING = 3;
}

message ParkingSlotInfo {
  int32 id = 1;
  HpaParkingType type = 2;  // parking type
}

message CarInSlotMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  bool in_slot = 3;
  ParkingSlotInfo vslot_info = 4;
}