syntax = "proto3";
import "common/common_msg.proto";
import "type/parking_slot.proto";
import "interface/parking/fusion_obstacle.proto";
import "interface/parking/fusion_freespace.proto";
import "interface/parking/uss_tracking.proto";
package autodrive.workflow.proto;

message FusionParkingSlots {
  int64 timestamp = 1;
  repeated parking_slot.ParkingSlotInfo parking_slots_info = 2;
  repeated int32 certified_slots = 3;
}

message FusionResultMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  FreespaceFusion fusion_freespace = 3;
  FusionObstacles fusion_obstacles = 4;
  FusionParkingSlots fusion_parking_slots = 5;
  UssTrackingMode fusion_uss_tracking = 6;
}