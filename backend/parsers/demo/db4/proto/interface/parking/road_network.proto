syntax = "proto3";

import "type/basic.proto";
import "common/common_msg.proto";
package autodrive.workflow.proto;

enum RoadKeyPointType {
  kUnknown = 0;
  kNormal = 1;
  kTJunction = 2;
  kCrossroad = 3;
}

message CenterPoint {
  Vector3f point = 1;
  float offset = 2;
}

message RoadCenterLine {
  uint32 line_id = 1;
  repeated CenterPoint points = 2;
}

message BoundaryLine {
  uint32 line_id = 1;
  repeated Vector3f points = 2;
}

message RoadLaneInfo {
  uint32 lane_id = 1;
  uint32 road_id = 2;
  uint32 lane_no = 3;
  float lane_width = 4;
  uint32 center_line_id = 5;
  uint32 left_boundary_id = 6;
  uint32 right_boundary_id = 7;
}

message RoadInfo {
  uint32 road_id = 1;
  repeated RoadLaneInfo lanes = 2;
}

message RoadKeyPoint {
  Vector3f position = 1;
  float offset = 2;
  RoadKeyPointType type = 3;
}

message CrossInfo {
  RoadKeyPoint key_point = 1;
  repeated RoadInfo cross_roads = 2;
}

message RoadNetwork {
  RoadInfo road_info = 1;
  repeated CrossInfo cross_infos = 2;
  repeated RoadCenterLine center_lines = 3;
  repeated BoundaryLine boundary_lines = 4;
  uint32 host_center_line_id = 5;
}

message RoadNetworkMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  // RoadNetwork
  RoadNetwork road_network = 3;
}