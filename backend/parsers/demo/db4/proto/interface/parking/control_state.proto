syntax = "proto3";
import "common/common_msg.proto";
package autodrive.workflow.proto;

enum ControlState {
  CTL_RUNNING = 0;
  CTL_STOP = 1;
  CTL_WAITING = 2;
  CTL_FINISH = 3;
  ERR_NO_DATA = 4;
  ERR_INDEX_OUT = 5;
  ERR_TRACK_OUT = 6;
  ERR_AVOID_STOP_TIMEOUT = 7;
  ERR_AVOID_STOP_CLIP = 8;
  ERR_BUMP_STOP = 9;
  ERR_CONTROL_Mode = 10;
  ERR_HANDSHAKE_INTERRUPT = 11;
  ERR_DRV_EPB_INTERRUPT = 12;
  DRV_GEAR_INTERRUPT = 13;
  DRV_STEER_INTERRUPT = 14;
  HANDSHAKE_TIMEOUT = 15;
  ERR_USS_TIMESTAMP = 16;
}

enum CtlStopReason {
  DRV_STEER_INTERRUPT_STOP = 0;
  DRV_GEAR_INTERRUPT_STOP = 1;
  DRV_BRAKE_INTERRUPT = 2;
  DRV_EPB_INTERRUPT = 3;
  AVOID_STOP_REACH_TARGET = 4;
  AVOID_STOP_NOT_REACH_TARGET = 5;
  BLOCK_DETECT = 6;
  BRAKE_STOP = 7;
  WAIT_PARK_SUCCESS = 8;
  WAIT_GEAR = 9;
  WAIT_STEER = 10;
  NONE_STOP = 11;
  AVOID_STOP_IN_BLIND_AREA = 12;
  AVOID_STOP_USS_SLOT = 13;
}

enum LatControlState {
  LAT_WAIT_START = 0;
  LAT_WAIT_FEEDBACK = 1;
  LAT_RUNNING = 2;
  LAT_CLOSE = 3;
  LAT_ERR = 4;
}

enum LonControlState {
  LON_WAIT_START = 0;
  LON_WAIT_STEERArrival = 1;
  LON_WAIT_GEARArrival = 2;
  LON_RUNNING = 3;
  LON_COMFORT_BRAKE = 4;
  LON_EMERGENCY_BRAKE = 5;
  LON_PARKING_SUCCESS = 6;
  LON_WAIT_NEXT_TRAJ = 7;
  LON_ERR = 8;
}

enum BrakeReason {
  CONTROL_NORMAL_STOP = 0;
  CONTROL_TRACK_OUT = 1;
  CONTROL_STOP_BY_VERTICAL_SLOT = 2;
  CONTROL_STOP_BY_VERTICAL_SLOT_OR_WHEELBAR = 3;
  CONTROL_STOP_BY_PARALLEL_TPM = 4;
  CONTROL_STOP_BY_VERTICAL_NEAR_WHEELBAR = 5;
  CONTROL_STOP_BY_PARALLEL_WHEELBAR = 6;
  CONTROL_STOP_BY_HANDSHAKE = 7;
  COLLISION_OOC_NORMAL = 8;
  COLLISION_USS_DISTANCE = 9;
  COLLISION_PARALLEL_BOUNDARY = 10;
  COLLISION_WHEELBAR_DISTANCE = 11;
  DECISION_CMD_PSM_PAUSE = 12;
  DECISION_CMD_TERMINATE = 13;
  DECISION_CMD_DYN_OBS_PEDESTRAIN = 14;
  DECISION_CMD_DYN_OBS_VEHICLE = 15;
  DECISION_CMD_STATIC_OBS = 16;
  DECISION_CMD_OCCUPIED = 17;
  DECISION_CMD_STOP_EARLY_PARALLEL_ADJUST_TO_ZERO = 18;
  DECISION_CMD_VERTICAL_STOP_BY_USS_DISTANCE = 19;
  DECISION_CMD_RUNNING_PLAN_FAILED = 20;
  DECISION_CMD_VERTICAL_STOP_BY_USS_DISTANCE_SIDE_LEFT = 21;
  DECISION_CMD_VERTICAL_STOP_BY_USS_DISTANCE_SIDE_RIGHT = 22;
  COLLISION_OOC_OUT_RANGE = 23;
  DECISION_CMD_STOP_EARLY_BY_OTHER_WHEELBAR = 25;
  DECISION_CMD_PARALLEL_STOP_BY_USSDISTANCE = 26;
  DECISION_CMD_PARALLEL_STOP_BY_BOUNDARY_LAT_DISTANCE = 27;
  DECISION_CMD_DYN_OBS_CYCLIST = 28;
  DECISION_CMD_DRIVER_EPB_OR_BRAKE = 29;
  DECISION_CMD_USS_SLOT_CORRECTION_STOP = 30;
  BRAKE_REASON_MAX = 50;
}

message TotalControlState {
  ControlState control_state = 1;
  CtlStopReason stop_reason = 2;
  LatControlState lat_control_state = 3;
  LonControlState lon_control_state = 4;
  bool control_enable = 5;
  BrakeReason brake_reason = 6;
}

message ControlStateMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  // ControlState
  TotalControlState control_state = 3;
}