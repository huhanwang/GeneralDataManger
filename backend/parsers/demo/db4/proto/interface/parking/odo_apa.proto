syntax = "proto3";
import "common/common_msg.proto";
package autodrive.workflow.proto;

message OdoApa {
  float x = 1;
  float y = 2;
  float yaw = 3;
  float speed = 4;
  float yaw_rate = 5;
  float longtitude_acc = 6;
  float lateral_acc = 7;
  bool collision_flag = 8;
  int64 time_stamp = 9;
}

message OdoApaMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  // OdoApa
  OdoApa odo_apa = 3;
}