syntax = "proto3";
import "common/common_msg.proto";
package autodrive.workflow.proto;

message Handshake {
  uint32 avoid_status = 1;
  uint32 esp_state = 2;
  uint32 eps_state = 3;
  uint32 acc_state = 4;
  float avoid_distance = 5;
  uint32 avoid_uss_id = 6;
}

message HandshakeMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  // Handshake
  Handshake handshake = 3;
}