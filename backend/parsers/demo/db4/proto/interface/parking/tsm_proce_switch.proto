syntax = "proto3";
import "common/common_msg.proto";
package autodrive.workflow.proto;

enum ProceSW {
  SW_DEFAULT_MODE = 0;
  SW_ADAS_MODE = 1;
  SW_APA_MODE = 2;
  SW_HPA_MODE = 3;
}

message SwitchData {
  ProceSW proce_sw = 1;
}

message TsmProceSwitchMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  // Switch Data
  SwitchData switch_data = 3;
}
