syntax = "proto3";
import "common/common_msg.proto";
package autodrive.workflow.proto;

message ApaCtrlInfo {
  float proj_cro_err = 1;
  float proj_yaw_err = 2;
  float cur_index = 3;
  float yaw_error = 4;
  float looptime = 5;
  float runtime = 6;
  float dist_remain = 7;
  float cro_error = 8;
  float psi_omega = 9;
  float axlang_kappa = 10;
  float axlang_yawerr = 11;
  float axlang_croerr = 12;
  float axlang = 13;
  float strang_kappa = 14;
  float strang_yawerr = 15;
  float strang_croerr = 16;
  float strang_raw = 17;
  float traj_pre_yaw = 18;
  float traj_pre_kappa = 19;
  float proj_yaw = 20;
  float proj_kappa = 21;
  float veh_pre_yaw = 22;
  float veh_pre_kappa = 23;
  float self_yaw = 24;
}

message ApaControlInfoMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  // ApaCtrlInfo
  ApaCtrlInfo apa_ctrl_info = 3;
}