syntax = "proto3";
import "common/common_msg.proto";
package autodrive.workflow.proto;

message CpuInfo {
  float total = 1;
  float usr = 2;
  float sys = 3;
  float iowait = 4;
}

message MemoryInfo {
  uint32 total = 1;
  uint32 free = 2;
  uint32 used = 3;
  uint32 cache = 4;
  float used_percent = 5;
}

message ProcessInfo {
  string process_name = 1;
  uint32 pid = 2;
  float cpu_occupy = 3;     // %
  float mem_occupy = 4;     // %
  float io_read_speed = 5;  // MB/s
  float total_io_read = 6;  // MB
  float io_write_speed = 7; // MB/s
  float total_io_write = 8; // MB
}

message SystemInfoMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  // cpu info
  CpuInfo cpu_info = 3;
  // mem info
  MemoryInfo mem_info = 4;
  // process info
  repeated ProcessInfo process_info = 5;
}