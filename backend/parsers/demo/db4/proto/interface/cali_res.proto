syntax = "proto3";
import "common/common_msg.proto";
package autodrive.workflow.proto;

enum CaliRespondType {
  CALI_RES_UNKNOWN = 0;
  STAIC_ENTRY_SUCCEED = 1;
  STAIC_ENTRY_FAILED = 2;
  DYNAMIC_ENTRY_SUCCEED = 3;
  DYNAMIC_ENTRY_FAILED = 4;
}

message CaliResMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  // Cali respond
  CaliRespondType res = 3;
}