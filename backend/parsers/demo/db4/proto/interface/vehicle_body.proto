  // 悬架高度标定状态
  AltitudeStatus altitude_uncalibrated = 16;
  // READY指示灯
  ReadyIndicatLight dyvcu_ready_indicat_light = 17;
  // 充电枪连接状态
  BmcChargeStatus bmc_charge_guncon_sts = 18;
  // EPS驾驶员干预状态
  EpsInterferdetd epsinterferdetd = 19;
  // 油门深度信号有效性
