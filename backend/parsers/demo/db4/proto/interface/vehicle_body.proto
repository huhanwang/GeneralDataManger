  // 牵引力控制系统激活状态
  Active ptc_actv = 26;
  // ESP激活状态
  Active esp_actv = 27;
  // 电子制动力分配系统激活状态
  Active ebd_actv = 28;
  // 车辆动态控制系统激活
  Active vdc_actv = 29;
  // 悬架是否配置信号
