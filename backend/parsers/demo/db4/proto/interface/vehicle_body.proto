  /* 驱动系统响应状态Whether torque control respond */
  bool PCU_PowerControlResponse = 55;
  // 变速箱实际挡位
  GearPos actual_gear_position = 56;
  //变速箱目标挡位
  GearPos target_gear_position = 57;
  //变速箱出于换挡过程中
  bool TCU_Shift_InProgress = 58;
  // 转向系统响应状态
  bool EPS_SteeringControlResponse = 59;
  // 驾驶员手力矩，左正右负，N.M
  float steering_wheel_torque = 60;
  // 制动主缸压力
  float brake_mas_cyl_pressure = 61;
  bool esp_tcs_active = 62;
  bool pcu_acc_available = 63;
  bool pcu_acc_active = 64;
  bool esp_driver_override = 65;
  bool esp_hands_off_error = 66;
  bool esp_driver_hands_off = 67;
  bool esp_available= 68;
  // 制动控制系统是否支持
  Valid esp_system_valid = 69;
  // 转向控制系统是否支持
  Valid eps_system_valid = 70;
  // 换档控制系统是否支持
  Valid vcu_system_valid = 71;
  // 动力控制系统是否支持
  Valid powertrain_control_system_valid = 72;
  // 车身控制系统是否支持
