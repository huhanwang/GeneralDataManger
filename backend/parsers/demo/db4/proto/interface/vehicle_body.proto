message VehiclePadParking {
  // 蓝牙连接状态
  BleConnStatus ble_conn_sts = 1;
  // AVM状态
  PadParkingStatus pad_parking_sts = 2;
  // APA泊车模式选择开关
  PadParkMode pad_apa_park_mode_state = 3;
  // RPA泊车模式选择开关
  PadParkMode pad_rpa_park_mode_state = 4;
  // 用户选择的车位
  PadPslSelected pad_psl_selected = 5;
  // 用户选择的泊出方向
  SelectParkOutDir sel_prkg_out_dir_req = 6;
  // 开始泊入按钮
  Request pad_park_instart_req = 7;
  // 开始泊出按钮
  Request pad_parkout_start_req = 8;
  // 暂停按钮
  Request pad_pause_req = 9;
  // 继续按钮
  Request contn_prkg_req = 10;
  // 确定按钮
  Request pad_confirm_req = 11;
  // PAD和APP故障状态
  PadAppStatus pad_app_sts = 12;
  // 自动泊车模式
  ApaMode apa_mode = 13;
  // RPA开始, 暂停泊车信号
  RemoteModeStatus remote_mode_sts = 14;
  // RPA泊出方向选择
  SelectParkOutDir prkout_mode_sel_rmt = 15;
  // RPA取消泊车按键
  Request park_abort_req_rmt = 16;
  // 自选车位x坐标
  int32 x_cordofoptsp = 17;
  // 自选车位y坐标
  int32 y_cordofoptsp = 18;
  // 自选车位角度
  int32 opt_park_ang = 19;
  // RPA手势控制
  PrkgSlidRmt prkg_slid_req_rmt = 20;
  // RPA开始泊车按键
  Request prkg_sync_strt_req_rmt = 21;
}

message VehiclePadDriving {
  /* AEBS main switch */
  bool BCM_AEBSMainSwitch = 1;
  /* Signal of trunk  (0:closed 1:open) */
  bool BCM_BackTrunkStatus = 2;
  /* Signal of front hatch cover (0:closed 1:open) */
  bool BCM_FrontHoodStatus = 3;
    /* Brake light status */
  bool BCM_BrakeLightStatus = 4;
  bool BCM_FrontFrogLight = 5;
  bool BCM_RearFrogLight = 6;
  /* FCW main swtich */
  bool BCM_FCWSMainSwitch = 7;
  /* 0:Reserved 1:Level1 2:Level2 3:Level3 */
  uint32 BCM_FCWSensiLevel = 8;
  /* 0:Reserved 1:Level1 2:Level2 3:Level3 */
  uint32 LDWSensiSet = 9;
  /* LKA main switch */
  bool BCM_LKASMainSwitch = 10;
  /* LDW main switch */
  bool BCM_LDWSMainSwitch = 11;
  /* LCA main switch */
  bool BCM_LCASMainSwitch = 12;
  /* LCC main switch */
  bool BCM_LCCS_MainSwitch = 13;
  /*ELK main switch 0:off 1:on */
  bool BCM_ELK_MainSwitch = 14;
  /* BSD main switch */
  bool BCM_BSDSMainSwitch = 15;
  /* RCTA main switch */
  bool BCM_RCTAMainSwtich = 16;
  /* FCTA main switch */
  bool BCM_FCTAMainSwitch = 17;
  /* DOW main switch */
  bool BCM_DOWSMainSwitch = 18;
  /* RCW main switch */
  bool BCM_RCW_MainSwitch = 19;
  /* IHBC main switch */
  bool BCM_IHC_MainSwitch = 20;
  /* TSR main switch */
  bool TSR_MainSwitch= 21;
  /* AutoLaneChange main switch */
  bool BCM_ALC_MainSwitch = 22;
  /* NOP main switch */
  bool BCM_NOP_MainSwitch = 23;
  /* AutoLaneChange need driver confirm or not? 1:yes;0:NO*/
  bool BCM_ALC_ReqDrvConfirmSWSet = 24;
  /*BCM_CruiseModeSwSet--中控上设置的巡航功能状态0：acc;1：IACC，2：off*/
  uint32 BCM_CruiseModeSwSet = 25;
  /* Indicate the cruise switch */
  bool BCM_CruiseSwValid = 26;
  /* BCM_CruiseSwCancel */
  bool BCM_CruiseSwCancel = 27;
  /* Cruise Resume Switch;Speed Up */
  bool BCM_CruiseSwResume = 28;
  /* Cruise Set Switch;Speed Down */
  bool BCM_CruiseSwSet = 29;
  /* To increase the TimeGapSet */
  bool BCM_CruiseSwTimeGapPlus = 30;
  /* To decrease the TimeGapSet */
  bool BCM_CruiseSwTimeGapMinus = 31;
  /* BCM_ACC MainSwitchStatus */
  bool BCM_CruiseSwMain = 32;
  /* BCM_LIMMainSwitchSts */
  bool BCM_CruiseSwLimitMain = 33;
  /* AutoLaneChange driver confirm button*/
  bool BCM_ALC_DrvConfirmButtonSt = 34;
  /* BCM_DM_TargetModeReq(0:Normal;1:Sport; 2:Eco;other:Reserve) */
  uint32 BCM_DriveMode = 35;
  /* BCM_PositionLight */
  bool BCM_PositionLight = 36;
  bool esp_raeb_available = 37;
  bool esp_raeb_active = 38;
  uint32 bcm_raeb_switch = 39;
  uint32 esp_vdc_fault_sts = 40;
  uint32 bcm_usage_mode = 41;
  bool bcm_kl15_sts = 42;
  uint32 bcm_veh_mode_sts = 43;
  uint32 bcm_supply_voltage_fault_sts = 44;
}

message VehicleBody {
