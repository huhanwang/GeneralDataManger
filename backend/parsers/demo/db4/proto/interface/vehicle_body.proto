  bool DayNightStatus = 41;
  float BCM_display_speed = 42;  /*表显车速kph*/
  float BCM_Vf_km_ODO = 43;/**仪表里程数km*/
  /* Hazard flashing status */
  bool BCM_HazardFlasingStatus = 44;
  bool BCM_CrashStatus = 45; //
  // 驱动系统最大扭矩
  float PCU_EngineTrqLmtMax = 46;
  // 驱动系统最小扭矩
  float PCU_EngineTrqLmtMin = 47;
  /* 驱动系统转速 Engine speed */
  float PCU_EngineSpeed = 48;
  /* 驾驶员期望输出扭矩 Driver's desired torque */
  float PCU_DriverDemandTorque = 49;
  /* 驱动系统实际扭矩Actual engine torque */
  float PCU_ActualEngineTorque = 50;
  /* 加速踏板位置 Actual pedal opening degree， unit % */
