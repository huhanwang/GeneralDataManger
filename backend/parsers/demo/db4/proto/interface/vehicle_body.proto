  // 制动系统故障状态
  EspStatus esp_status = 76;
  // 转向拨杆
  TurnLightStatus turn_light = 77;
  // VCU防盗认证状态
  VcuBpStatus vcu_bp_ready_flg = 78;
  // 表显车速有效性
  Valid BCM_display_speed_valid = 79;
  // 表显车速类型
  DispSpdUnitType disp_spd_unit_type = 80;
  // 超声静音激活
  Active avh_actv = 81;
  // 主驾座状态
  Active front_seat_sts = 82;
  // 动力电池电量百分比
  uint32 power_bat_soc = 83;
}

message VehicleBodyMsg {
  // Header
  MsgHeader header = 1;
  // Error
  Error error = 2;
  // Vehicle parking
  VehiclePadParking vehicle_parking = 3;
  // Vehicle drive
  VehiclePadDriving vehicle_driving = 4;
  // Vehicle Body
  VehicleBody vehicle_body = 5;
}