  /*灯光开关状态*/
  bool BCM_AutoLighStatus = 34;
  /* Low beam status */
  bool BCM_LowBeamSwitch = 35;
  /* High beam status */
  bool BCM_HighBeamSwitch = 36;
    /* Left turning signal status */
  bool BCM_LeftTurningLightState = 37;
  /* Right turning signal status */
  bool BCM_RightTurningLightState = 38;
  /* Wiper Switch */
  bool BCM_WiperSwitch = 39;
  /* 0:off  1:low  speed  2:high speed */
