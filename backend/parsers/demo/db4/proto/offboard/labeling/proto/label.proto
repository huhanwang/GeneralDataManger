// Next ID: 57
message Label {
  // Box3d info
  optional int32 object_id = 1;

  message MiscIds {
    optional int32 detection_id = 1;
  }
  optional MiscIds misc_ids = 45;

  optional double x = 2;
  optional double y = 3;
  optional double z = 9;
  optional double width = 4;
  // The shrunk width by cutting of rearview mirror of cars.
  optional double shrinked_width = 32;
  // width with rearview mirrors, only apply to cars and tricyclists
  optional double width_with_rvm = 42;
  optional double length = 5;
  optional double height = 10;
  optional double heading = 6;
  optional double pitch = 49;
  optional double roll = 50;
  optional float confidence_score = 23 [default = 1.0];
  optional double timestamp = 51;
  // This indicates if the object is stationary in ***THE WHOLE SCENE***.
  optional bool stationary_track = 52 [default = false];
  // Category enum element ids has to be consecutive and zero-based numbering.
  // Next ID: 23
  enum Category {
    CAR = 0;
    PED = 1;
    CHILD = 2;
    BICYCLIST = 3;
    MOTORCYCLIST = 4;
    TRICYCLIST = 5;
    TRAILER = 6;
    ANIMAL = 7;
    CAR_DOOR = 8;
    // Obstacles that's on-road but not belong to any of the categories above.
    // NOTE(yu): This is SAIC specific.
    UNKNOWN = 10;
    POLE = 11;
    ROAD_BARRIER = 12;
    TROLLEY = 14;
    TRAFFIC_SIGN = 15;
    IMAGE_ANONYMIZATION = 16;
    IMAGE_ANOMALIES = 17;
    TRAFFIC_LIGHT = 18;
    LIGHT_SOURCE = 19;
    SCENE_TYPE = 20;
    TRAFFIC_LIGHT_BULB = 21;
    LANE = 22;
    // deprecated fields
    CONE = 9 [deprecated = true];
    UNMANNED_TRICYCLE = 13 [deprecated = true];
  }
  optional Category category = 7;
  optional bool fake = 29 [default = false];
  // Whether the engineering vehicle is in the expand state.
  optional bool is_expanded = 30 [default = false];
  // Whether the double-decker trucks loaded cars.
  optional bool is_loaded = 31 [default = false];

  optional int32 connected_id = 8 [default = -1];

  enum OcclusionType {
    NO_OCCLUSION = 0;
    // Less than 40% area got occluded.
    OCCLUSION = 1;
    // More than 40% area got occluded.
    HEAVY_OCCLUSION = 2;
    UNKNOWN_OCCLUSION = 3;
  }
  optional OcclusionType occlusion_type = 12;

  optional VehicleType veh_type = 14;

  optional PedestrianType ped_type = 15;

  repeated VehicleAttribute veh_attr = 17;

  repeated PedestrianAttribute ped_attr = 19;

  optional ImageVisibility image_visibility = 22;

  // use lidar id as key, enum can't be used as map key, use int32 instead
  map<int32, int32> num_points_per_lidar = 24;

  optional RoadBarrierType road_barrier_type = 25;

  // This is for stf gerneration only, not use for labeling
  optional Vec3dProto velocity = 26;    // Generate stf only.
  optional Vec3dProto accelerate = 27;  // Generate stf only.

  // Onroad and NOT on opposite lanes. Onroad: 1, offroad: -1, Not set: 0
  optional int32 is_on_road = 33 [default = 0];

  // Auto Labelling meta info
  enum LabelSource {
    HUMAN = 0;
    AUTO_LABEL_LIDAR = 1;
    AUTO_LABEL_RADAR = 2;
  }
  message MetaInfo {
    optional bool virtual = 1 [default = false];
    optional bool valid = 2 [default = true];
    optional LabelSource source = 3;
  }
  optional MetaInfo meta_info = 34;
  // Occluded score in bev space, is different from occluded_ratio in
  // ImageLabel.
  optional float occluded_score = 35;
  optional double yaw_rate = 38;
  repeated int32 merged =
      39;  // records ids of all objects that are merged into this one.

  message ConfidenceScores {
    optional float box_score = 1;
    optional float track_max_score = 2;
    optional float refined_score = 3;
    optional float refined_track_score = 4;
  }
  optional ConfidenceScores scores = 41;

  enum LaneCrossingStatus {
    LANE_CROSSING_STATUS_INVALID = 0;
    LANE_CROSSING_STATUS_TRUE = 1;
    LANE_CROSSING_STATUS_FALSE = 2;
    LANE_CROSSING_STATUS_UNKNOWN = 3;
  }
  optional LaneCrossingStatus lane_crossing_status = 43;
  optional double lane_crossing_ratio = 44 [default = 0.0];

  // map<VehicleLightType, VehicleLightStatus>
  map<string, VehicleLightStatus> vehicle_lights_status = 46;

  optional bool is_driver_missing = 47 [default = false];
  // Only for 110/119/120
  optional bool is_emergency = 48 [default = false];

  optional BarrierGateStatus barrier_gate_status = 53;

  map<string, VehicleLightSeqStatus> vehicle_lights_seq_status = 54;

  // deprecated fields
  optional XcyclistType xcy_type = 16 [deprecated = true];
  optional VehicleLampAttribute veh_lamp_attr = 18 [deprecated = true];
  optional StaticObjectType sta_type = 20 [deprecated = true];
  optional OtherObjectType oth_type = 21 [deprecated = true];
  // Fine-grained classification of vehicle (car as its legacy name).
  // This is only valid for Category::CAR and Category::TRAILER.
  enum CarType {
    CARTYPE_CAR = 0;
    CARTYPE_VAN = 1;
    // Including construction vehicles, freight trucks, buses.
    CARTYPE_TRUCK = 2;
  }
  optional CarType car_type = 11 [deprecated = true];
  optional int32 num_points = 13 [deprecated = true];
  optional LabelSource source = 28 [deprecated = true];
  // velocity along x / y
  optional double vx = 36 [deprecated = true];
  optional double vy = 37 [deprecated = true];
  enum ScoreType {
    BOX_SCORE = 0;
    TRACK_MAX_SCORE = 1;
  }
  map<string, float> confidence_scores = 40 [deprecated = true];

  enum CriticalObjectType {
    COT_INVALID = 0;
    COT_UNKNOWN = 1;
    COT_CIPV = 2;
    COT_SCIPV = 3;
  }
  enum ObjectCrossingLine {
    OCL_INVALID = 0;
    OCL_UNKNOWN = 1;
    OCL_CROSSING_LINE = 2;
    OCL_NOT_CROSSING_LINE = 3;
  }
  enum FollowingStateType {
    FS_INVALID = 0;
    FS_UNKNOWN = 1;
    FOLLOWING = 2;
    UNFOLLOWING = 3;
  }
  optional CriticalObjectType critical_object_type = 55 [default = COT_INVALID];
  optional ObjectCrossingLine object_crossing_line = 56 [default = OCL_INVALID];
  optional FollowingStateType following_state = 57 [default = FS_INVALID];
}

// Next ID: 3
message LabelOr {
  optional double timestamp = 1;
  optional Label label = 2;
}

// Next ID: 6
message Zone {
  repeated double xs = 1;
  repeated double ys = 2;
  enum ZoneType {
    BLACK = 0;  // No labeling here
    WHITE = 1;  // Everything labeled here
    MIST = 2;   // Zone [LOOSE] containing mist/exhaust/rain/etc

    REFLECTION = 3;     // Zone [TIGHT] containing reflection points
    STATIC_OBJECT = 4;  // Zone [TIGHT] containing static objects
    BARRIER = 6;        // Zone [TIGHT] containing barrier
    CURB = 7;           // Zone [TIGHT] containing curb

    // Note that the difference between VEGETATION and GREEN_BELT is that
    // GREEN_BELT denotes a piece of area where bushes interleaved with other
    // trees and high grass. Take it out to save effort of labeling.
    VEGETATION = 5;    // Zone [TIGHT] containing vegetation
    GREEN_BELT = 8;    // Zone [TIGHT] containing a whole area of vegetation
    CONSTRUCTION = 9;  // Zone [TIGHT] containing construction area
    CROWD = 10;        // Zone [TIGHT] containing a whole area of crowd
    DRIVABLE = 11;     // PRT evaluation area, ground connecting to self-car

    // Zone marking all verticals (obstacles) has been labeled inside
    // the zone. What's not being labeled by above zones or traffic
    // participants are horizontals (surface).
    // Note that traffic participants or object zones (reflection, static or
    // vegetation) above don't have to be necessarily inside a FULL_SEMANTIC
    // zone but all verticals have to be labeled inside a FULL_SEMANTIC zone.
    FULL_SEMANTIC = 100;
  }
  optional ZoneType type = 3;
  repeated double zs = 4;
  optional int32 object_id = 5;
}

message MiscLabel {
  message MiscLableInfo {
    optional string version = 1;
    optional string comment = 2;
  }
  optional MiscLableInfo info = 1;
  repeated Label labels = 2;
  repeated Zone zones = 3;
}

// Next ID: 6
message Frame {
  optional int32 frame_id = 1;
  repeated Label labels = 2;
  repeated Zone zones = 3;
  map<string, MiscLabel> misc_labels = 4;
  optional bool has_lane_crossing_status = 5;
}

// Next ID: 30
enum LabelingPolicyVersion {
  V_UNKNOWN = 0;
  V_21_7_21 = 1;    // Added details on car door label.
  V_21_8_9 = 2;     // Added curb and enlarge full semantic to offroad.
  V_21_8_30 = 3;    // Added greenbelt.
  V_21_10_22 = 4;   // Update image type and attributes.
  V_21_10_26 = 5;   // Use 3D det, simplify semantic zone, discard static cars.
  V_21_11_05 = 6;   // Added the attributes of traffic light and traffic sign.
  V_21_12_10 = 7;   // Added other static and bicycle traffic light type.
  V_21_12_29 = 8;   // Added object id for polygon labeled objects.
  V_22_01_28 = 9;   // Set the default ped heading as unknown.
  V_22_02_28 = 10;  // Added pole label
  V_22_03_03 = 11;  // DBQ camera and lidar union label, ignore the attributes
                    // of car & ped to speed up labeling.
  V_22_03_14 = 12;  // PBQ  with lot of non-labeling zone
  V_22_05_10 = 13;  // Lite version, including (ped, cyc, car), with 1Hz lidar.
  V_22_05_11 = 14;  // Added unified catagory
  V_22_05_12 = 15;  // Update the unified label in image, with 10Hz lidar.
  V_22_05_24 = 16;  // DPC unified label.
  V_22_05_25 = 17;  // Update lamp attribute.
  V_22_07_13 = 18;  // Added weather and scene
  V_22_08_26 = 19;  // Added tank truck and garbage truck
  V_22_08_28 = 20;  // Use tl_label_v2 for traffic light
  V_22_08_31 = 21;  // Add attributes of cone class of 2D image
  V_22_09_07 = 22;  // Add image_name attribute in ImageLabels, for 2d detection
                    // labelling only.
  V_22_09_22 = 23;  // Add CONSTRUCTION & CROWD ZoneType in Label.
  V_22_11_08 = 24;  // Add ROAD_BARRIER for lidar label
  V_22_11_29 = 25;  // add scene label for each frame
  V_22_12_15 = 26;  // Revise finetype and attribute label
  V_22_12_22 = 27;  // Add HEADLIGHT_AREA for 2d detection
  V_23_05_22 = 28;  // Add more road barrier type and vechile type
  V_23_07_04 = 29;  // Add more vehicle type, add double consignment vehicle and
                    // froklift vehicle.
  V_23_07_10 = 30;  // Add expand and loaded bool for labeling.
  V_23_10_24 = 31;  // Add more fine-grained categories, unmanned tricycle, mini
                    // vehicle, ped with assistive device, ped in wheelchair
}

