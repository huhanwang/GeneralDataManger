// Next ID: 6
enum ImageVisibility {
  NO_IMAGE = 0;
  IMAGE_ALL_VISIBLE = 1;
  // The object occluded by other object and visible part is more than 50% in
  // the image.
  IMAGE_PARTIAL_OCCLUSION = 2;
  // The object occluded by other object and visible part is less than 50% in
  // the image.
  IMAGE_HEAVY_OCCLUSION = 3;
  // The object is in the border of image and truncated less than 50%
  IMAGE_PARTIAL_TRUNCATED = 4;
  // The object is in the border of image and truncated more than 50%
  IMAGE_HEAVY_TRUNCATED = 5;
}

// Next ID: 6
enum OcclusionLevel {
  NO_OCCLUSION = 1;
  // The object occluded by other object and occulued part is less than 25% in
  // the image.
  OCCLUSION_25PERCENT = 2;
  // The object occluded by other object and occulued part is more than 25% and
  // less than 50% in the image.
  OCCLUSION_50PERCENT = 3;
  // The object occluded by other object and occulued part is more than 50% and
  // less than 75% in the image.
  OCCLUSION_75PERCENT = 4;
  // The object occluded by other object and occulued part is more than 75% in
  // the image.
  HEAVY_OCCLUSION = 5;
}

// Next ID: 4
enum TruncatedLevel {
  NO_TRUNCATED = 1;
  // The object is in the border of image and truncated less than 50%.
  TRUNCATED_50PERCENT = 2;
  // The object is in the border of image and truncated more than 50%.
  HEAVY_TRUNCATED = 3;
}

