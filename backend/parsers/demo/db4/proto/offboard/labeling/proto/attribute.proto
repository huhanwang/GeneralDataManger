// Next ID: 42
enum VehicleLampType {
  // front
  LAMP_FRONT_POSITION = 10;  // front lamps which always on, including dipped
                             // beam, main beam and front position lamps
  LAMP_DAYTIME_RUNNING = 11;
  LAMP_FRONT_TURN_LEFT = 12;
  LAMP_FRONT_TURN_RIGHT = 13;
  LAMP_FRONT_FLASHERS = 14;
  LAMP_FRONT_FOG = 15;
  // rear
  LAMP_REAR_POSITION = 20;  // the red light in the tail
  LAMP_REAR_STOP = 21;
  LAMP_REAR_TURN_LEFT = 22;
  LAMP_REAR_TURN_RIGHT = 23;
  LAMP_REAR_FLASHERS = 24;
  LAMP_REAR_FOG = 25;
  LAMP_REAR_REVERSING = 26;
  LAMP_ALWAYS_OFF = 30;
  LAMP_UNKNOWN_UNKNOWN = 40;  // can't specify the type of lamps or whether the
                              // lamps are on because low quality image
  LAMP_UNKNOWN_START = 41;    // sequence is too short to get state
}

// Next ID: 8
message VehicleLampAttribute {
  repeated VehicleLampType lamp_type = 1;
  optional int32 front_lamp_number = 2;  // the number of front lamps on
  optional int32 rear_lamp_number = 3;   // the number of rear lamps on
  optional bool is_complex = 4;  // area of vehicle < 50% of total image area
  optional bool is_occulued =
      5;  // > 30% of vehicle is occulued by other objects
  optional bool is_out_of_roi = 6;
  optional bool is_lateral_view = 7;
  optional bool is_flashing_off = 8;
}

