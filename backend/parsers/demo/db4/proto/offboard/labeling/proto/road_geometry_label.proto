message FakeDriveBoundaryInfo {
  enum FilterReason {
    NOT_FILTERED = 0;
    NO_SD_PATH = 1;          // No pocr_link_ids or cannot get start/goal point
    INVALID_POLYGON = 2;     // Cannot build valid polygon from drive boundary
    NOT_CONTAIN_ORIGIN = 3;  // Polygon does not contain origin (0, 0)
    CLUSTER_GOAL_INCONSISTENT =
        4;                  // Goal points within cluster are too spread out
    SAME_LINK_LOW_IOU = 5;  // Same pocr_link_ids but IoU < threshold
  }

  optional sfixed64 id = 1;
  optional ego_trajectory.EgoTrajectory ego_trajectory_points = 2;
  // optional SdMapMatchInputProto sd_map_match_input_proto = 3;
