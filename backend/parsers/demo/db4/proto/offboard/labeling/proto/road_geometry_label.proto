  V_22_11_29 = 6;   // Add scene label for each frame.
  V_23_01_11 = 7;   // Add ground marking.
  V_23_01_17 = 8;   // Add special type for 2D intersection annotation.
  V_23_01_18 = 9;   // Add movable curb.
  V_23_02_01 = 10;  // Add barrier type for 2D intersection annotation.
  V_23_02_20 = 11;  // Add camera center timestamp.
  V_23_03_01 = 12;  // Add new feature for auto labeling.
  V_23_05_09 = 13;  // Add new image scene country road.
  V_23_06_07 = 14;  // Add line width.
  V_23_08_11 = 15;  // Add new lane type & attribute
}

message IntersectionInfo {  // Only enabled at intersection regions.
  enum Scale {
    SMALL = 1;
    MEDIUM = 2;
    BIG = 3;
  }

  enum DrivingType {
    STRAIGHT = 1;
    TURN_LEFT = 2;
    TURN_RIGHT = 3;
    U_TURN = 4;
  }

  // Should be self-intersection-free, but not necessarily convex.
  message Polygon2d {
    repeated float x = 1 [packed = true];
    repeated float y = 2 [packed = true];
  }

  optional Scale scale = 1;
  optional DrivingType driving_type = 2;
  optional double area = 3;
  // Nearest or current intersection id.
  optional sfixed64 intersection_id = 4;
  // Pose distance to nearest intersection.
  optional double distance = 5;
  // Polygon nearest to ego pose.
  optional Polygon2d polygon = 6;
  repeated string exit_fsdmap_ids = 7;     // Exit fsdmap ids
  repeated string entry_fsdmap_ids = 8;    // Entry fsdmap ids
  optional string fsdmap_junction_id = 9;  // Fsdmap id
}

message CrosswalkInfo {
  optional sfixed64 id = 1;
  enum Type {
    UNCONTROLLED = 1;
    TRAFFIC_LIGHT_CONTROLLED = 2;
    // If pedestrain is offroad and in crosswalk will treat it as onroad.
    MUST_YEILD = 3;
  }
  optional Type type = 2;
  repeated double x = 3;
  repeated double y = 4;
  repeated double z = 5;
  optional int32 visibility = 6;
  optional bool is_filtered = 7 [default = false];
  optional int32 visible_ground_points = 8;
  optional int32 visible_marker_points = 9;
  optional int32 total_points = 10;
}

message SpeedBumpInfo {
  optional sfixed64 id = 1;
  optional uint32 speed_limit_mph = 2;
  optional uint32 speed_limit_kph = 3;
  repeated double x = 4;
  repeated double y = 5;
  repeated double z = 6;
  enum Type {
    UNKNOWN = 1;
    RAISED = 2;
    FLAT = 3;
  }
  optional Type type = 7 [default = UNKNOWN];
}

message BusStationStopArea {
  optional sfixed64 id = 1;
  repeated double x = 2;
  repeated double y = 3;
  repeated double z = 4;
}

message GroundMarkingInfo {
  optional sfixed64 id = 1;
  enum Type {
    OTHER = 99;
    TEXT = 100;
    BUS_LANE = 101;
    VARIABLE_ORIENTATION_LANE = 102;
    ARROW = 200;
    STRAIGHT = 201;
    STRAIGHT_LEFT = 202;
    STRAIGHT_RIGHT = 203;
    STRAIGHT_U_TURN = 204;
    LEFT = 205;
    LEFT_U_TURN = 206;
    MERGE_TO_LEFT = 207;
    RIGHT = 208;
    MERGE_TO_RIGHT = 209;
    LEFT_RIGHT = 210;
    U_TURN = 211;
    FORBID_LEFT = 212;
    FORBID_RIGHT = 213;
    FORBID_U_TURN = 214;
    STRAIGHT_LEFT_RIGHT = 215;
    STRAIGHT_U_TURN_LEFT = 216;
    RIGHT_U_TURN = 217;
    FORBID_STRAIGHT = 218;
    INDICATING_ARROW = 250;
    INDICATING_STRAIGHT = 251;
    NUMBER = 300;
    MAX_SPEED_LIMIT = 301;
    MIN_SPEED_LIMIT = 302;
    TIME = 303;
    SIGN = 400;
    OTHER_LINE_MARKING = 500;
    YIELD_AHEAD_TRIANGLE = 1000;  // 让行三角标志
    YIELD_AHEAD_HOV = 1001;       // 菱形减速标志
    NON_MOTORIZED = 1002;         // 非机动车标志
    DANGER_ZONE = 1003;           // 危险区域标志
    REVERSIBLE_LANE = 1004;       // 可变车道标志
  }
  optional Type type = 2;
  // For example, when the type is a number, it is an Arabic number.
  // For example, when the type is text, it is likely to be Chinese characters.
  optional string text = 3;
  // There are only four points and are stored counterclockwise from the upper
  // left point.
  repeated double x = 4;
  repeated double y = 5;
  repeated double z = 6;
  // For example, when the type is arrow, it is the corner of the arrow.
  repeated double keypoint_x = 7;
  repeated double keypoint_y = 8;
  repeated double keypoint_z = 9;
  optional bool is_filtered = 10 [default = false];
  optional int32 visibility = 11;
  optional int32 visible_ground_points = 12;
  optional int32 visible_marker_points = 13;
  optional int32 total_points = 14;
}

// Next ID: 8
message OnOffRoadInfo {
  // NOTE(xiangxiang): start_x, start_y define as
  // right bottom point in the vehicle coord.
  optional float start_x = 1;
  optional float start_y = 2;
  optional float grid_size_x = 3;
  optional float grid_size_y = 4;
  optional int32 width = 5;
  optional int32 height = 6;
  optional bytes mask = 7;
}

message DriveBoundaryFilterInfo {
  optional double chnoa_db_length = 1;
  optional double min_pt_distance = 2;
  optional double max_pt_distance = 3;
  optional bool cross_vis_range = 4;
  optional bool self_cross = 5;
  optional bool db_paired = 6;
}

message FilterInfo {
  optional bool is_filtered = 1 [default = false];
  repeated string filtered_message = 2;
  optional float wide_projection_pixel_avg = 3 [deprecated = true];  // unit: cm
  optional float wide_projection_pixel_std = 4 [deprecated = true];  // unit: cm

  // Pose used for finally projected.
  enum PoseType {
    RTK_TYPE = 1;
    LOC_TYPE = 2;
    MAPPING_TYPE = 3;
  }
  enum FilterType {
    INVALID = 0;
    RESERVED = 1;
    NO_MAP_ELEMENT = 2;
    LANE_MISSING = 3;
    CURB_MISSING = 4;
    TOO_MANY_ELEVATION_OUTLIERS = 5;
    TOO_MANY_MATCH_OUTLIERS = 6;
    PROJECT_DEVIAITON = 7;
    OUTSIDE_THE_SECTION_MAP = 8;
    EGO_TRAJECTORY_CROSS_CURB = 9;
    IN_NOT_LABEL_ZONE = 10;
  }
  enum DeviationType {
    DEVIAITON_INVALID = 0;
    FRONT_LANE_AT30M_MORE_THAN_THRESHOLD = 1;
    FRONT_LANE_AT60M_MORE_THAN_THRESHOLD = 2;
    FRONT_LANE_AT120M_MORE_THAN_THRESHOLD = 3;
    FRONT_CURB_AT30M_MORE_THAN_THRESHOLD = 4;
    FRONT_CURB_AT60M_MORE_THAN_THRESHOLD = 5;
