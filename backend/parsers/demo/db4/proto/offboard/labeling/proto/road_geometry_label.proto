

syntax = "proto2";

package snoah.road_geometry_label;

import "offboard/labeling/proto/scene_label.proto";
import "onboard/maps/proto/sd_map.proto";
import "onboard/proto/vehicle_pose.proto";
// import "onboard/maps/map_match/proto/sd_map_match.proto";
import "offboard/labeling/proto/ego_trajectory.proto";

message KeypointInfo {
  enum KeypointType {
    DASHED_LINE_ENDPOINT = 0;
    ARROW_VERTEX = 1;
    Y_SHAPE_NODE = 2;
    V_SHAPE_NODE = 3;
  }
  enum KeypointAttribute {
    VISIBLE = 0;
    INVISIBLE = 1;
  }
  optional int32 keypoint_id = 1;
  optional double x = 2;
  optional double y = 3;
  optional double z = 6;  // Only bev space need.
  optional KeypointType keypoint_type = 4;
  optional KeypointAttribute keypoint_attribute = 5;
}

message PoleInfo {
  enum PoleType {
    TRUNK = 0;
    TRAFFIC_SIGN = 1;
    TRAFFIC_LIGHT = 2;
    STREET_LIGHT = 3;
    OTHER = 4;
  }
  optional int32 pole_id = 1;
  repeated double x = 2;
  repeated double y = 3;
  repeated double z = 5;  // Only bev space need.
  optional PoleType pole_type = 4;
}

enum PanonetClass {
  UNKNOWN = 0;
  CAR = 1;
  BI_CYCLIST = 2;
  TRI_CYCLIST = 3;
  PEDESTRIAN = 4;
  CONE = 5;
  TRAFFIC_LIGHT = 6;
  SIGN = 7;
  VEGETATION = 8;
  ROAD = 9;
  GROUND = 10;
  ROAD_MARKER = 11;
  LANE_MARKER = 12;
  OBJECT = 13;
  SKY = 14;
  EGO_VEHICLE = 15;
}

message LaneInfo {
  // Next ID: 18
  enum LaneType {
    SINGLE_SOLID_LINE = 0;
    SINGLE_DASHED_LINE = 1;
    DOUBLE_SOLID_LINE = 2;
    DOUBLE_DASHED_LINE = 3;
    LEFT_SOLID_RIGHT_DASHED = 4;
    LEFT_DASHED_RIGHT_SOLID = 5;
    CURB = 6;
    STOP_LINE = 7;
    SPEED_BUMP = 8;
    VARIABLE_DIRECTION_LINE = 9;
    TIDAL_LINE = 10;
    GUIDE_LINE = 11;
    MOVABLE_CURB = 12;
    BARRIER = 13;  // NOTE(xiangxiang, zhenye): Barrier reprent fence.
    CHANNELIZING = 14 [deprecated = true];  // Moved to extra type
    UNCERTAIN_LINE = 15;
    _TRIPLE_LINE = 16;
    _QUADRUPLE_LINE = 17;
    CENTER_LINE = 18;
    OTHER_LINE = 19;
    SECTION_OTHER_LINE = 20;
    DRIVE_BOUNDARY = 21;
  }
  enum LaneColor {
    YELLOW = 0;
    WHITE = 1;
    ORANGE = 2;
    BLUE = 3;
    RED = 4;
    GREEN = 5;
    LEFT_YELLOW_RIGHT_WHITE = 8;
    LEFT_WHITE_RIGHT_YELLOW = 9;
    OTHER_COLOR = 10;
  }
  enum LaneBoundaryAttribute {
    LONGITUDINAL_SPEED_REDUCTION = 0
        [deprecated = true];  // Moved to extra type
  }

  // Just for 2D instersection annotation.
  // Next ID: 3
  enum LaneSpecialType {
    PV_NORMAL_LINE = 0;
    PV_GUIDE_LINE = 1;
    PV_WAITING_LINE = 2;
  }
  // Generated id start from 1, -1 for filtered lane
  optional int32 lane_id = 1;
  repeated int32 connected_id = 2;  // Currently not used
  repeated double x = 3;
  repeated double y = 4;
  repeated double z = 7;  // Only bev space need.
  optional LaneType lane_type = 5;
  optional LaneColor lane_color = 6;
  // Unique id in current frame, end with map_element_id
  optional sfixed64 autolabel_id = 8;
  repeated sfixed64 autolabel_connected_ids = 9;  // Currently not used
  optional LaneSpecialType lane_special_type = 10 [default = PV_NORMAL_LINE];

  // In order to provide data for the perception model, the curb type is
  // subdivided.
  enum CurbType {
    NONE = 1;
    GENERAL_LOW_CURB = 2;
    FENCE = 3;
    CEMENT_PIER = 4;
    GENERAL_HIGH_CURB = 5;
    WALL = 6;
    SURFACE = 7;
    DITCH = 8;
    OBSTACLE = 9;
    VIRTUAL = 10;
    OTHER_CURB = 11;
    MOVABLE_CURB_TYPE = 12;
    HIGH_CURB = 13 [deprecated = true];
    LOW_CURB = 14 [deprecated = true];
    FLAT_CURB = 15;
    WALKING_STREET = 16;
  }
  optional CurbType curb_type = 11 [default = NONE];

  // Describes the type of lane boundary attachment line.
  enum ExtraType {
    NORMAL = 1;
    VARIABLE_DIRECTION = 2;
    LEAD = 3;                   // CHANNELIZING
    SLOW_DOWN = 4;              // LONGITUDINAL_SPEED_REDUCTION
    TRIPLE_LINE = 5;            // 三线
    TRIPLE_LINE_INNER = 6;      // 三线内侧线
    TRIPLE_LINE_OUTER = 7;      // 三线外侧线
    QUADRUPLE_LINE = 8;         // 四线
    QUADRUPLE_LINE_INNER = 9;   // 四线内侧线
    QUADRUPLE_LINE_OUTER = 10;  // 四线外侧线
    SHADED_AREA = 11;           // max数据转换而来
    VIRTUAL_LINE = 12;          // max数据转换而来
    UNSET_TYPE = 13;            // max数据转换而来
    LEFT_TURN_WAIT = 14;        // max数据转换而来
    LINEAR_SAFE_ISLAND = 15;    // max数据转换而来
    OTHER_TURN_WAIT = 16;
    DECELERATE = 17;  // 减速让行线
    RIGHT_TURN_WAIT = 18;
    STRAIGHT_WAIT = 19;
    U_TURN = 20;
    VARIABLE_LANE = 21;
    ROAD_SPLIT_LANE = 22;  // 道路分隔线，指在导流线后方相连的虚线
    OLD_LINE = 23;         // 旧线
  }
  optional ExtraType extra_type = 12 [default = NORMAL];

  // If the lines are connected, even if they are not of the same lane_type or
  // lane_id, they will be assigned the same aggregate_id.
  optional int32 aggregate_id = 13;
  repeated bool visible = 14;

  // Describe the relation of lane boundary and center line;
  // layout from left to right: left-left, left, <center>, right, right-right
  enum NeighborLaneBoundaryType {
    INVALID = 0;
    LEFT_LEFT = 1;
    LEFT_RIGHT = 2;
    HOST_LEFT = 3;
    HOST_RIGHT = 4;
    RIGHT_LEFT = 5;
    RIGHT_RIGHT = 6;
  }
  optional NeighborLaneBoundaryType neighbor_lane_boundary_type = 15
      [default = INVALID];
  optional float line_width = 16;
  repeated PanonetClass panonet_class = 17;
  // If the line is filtered, it still be output but set is_filtered true.
  optional bool is_filtered = 18 [default = false];
  optional float line_length = 19;
  repeated LaneBoundaryAttribute lane_boundary_attributes = 20;
  optional sfixed64 map_element_id = 21;  // Element id from semantic map proto
  optional int32 visibility =
      22;  // https://qcraft.feishu.cn/wiki/WtY4wcDgAivtkMkmMkXcSWSnn9g
  optional int32 vision_count = 23 [deprecated = true];
  optional float vision_meter = 24;
  optional LaneType multi_lane_type = 25;
  optional int32 lane_line_count = 26;
  optional string fsdmap_id = 27;
  optional double ratio_in_intersection = 28;
  optional string fsdmap_group_id = 29;
  optional string group_id = 30;

  // Just for PRT.
  enum Direction {
    DIRECTION_UNKNOWN = 0;
    STRAIGHT = 1;
    LEFT_TURN = 2;
    RIGHT_TURN = 3;
    UTURN = 4;
  }
  repeated Direction directions = 31;

  optional CenterLineInfo.Type center_line_type = 32;
  optional DriveBoundaryInfo.DriveBoundaryPointType drive_boundary_point_type =
      33;
}

message MapformerLaneInfo {
  enum CoarseLaneType {
    LANE_LINE = 0;
    CURB_LINE = 1;
    STOP_LINE = 2;
    SECTION_OTHER_LINE = 4;
  }
  enum FineLaneType {
    FINELANETYPE_UNKNOWN = 0;
    SINGLE_SOLID_LINE = 1;
    SINGLE_DASHED_LINE = 2;
    DOUBLE_SOLID_LINE = 3;
    DOUBLE_DASHED_LINE = 4;
    LEFT_SOLID_RIGHT_DASHED = 5;
    LEFT_DASHED_RIGHT_SOLID = 6;
    TRIPLE_LINE = 7;
    QUADRUPLE_LINE = 8;
    VIRTUAL_LINE = 9;
    UNSET_TYPE = 10;
  }
  enum ExtraLaneType {
    GENERAL = 0;
    SLOW_DOWN = 1;
    LEAD = 2;
    LEFT_TURN_WAIT = 3;
    OTHER_TURN_WAIT = 4;
    SHORT_DASHED = 5;
    SHADED_AREA = 6;
    VARIABLE_DIRECTION = 7;
    LINEAR_SAFE_ISLAND = 8;
    DECELERATE = 9;
    RIGHT_TURN_WAIT = 10;
    STRAIGHT_WAIT = 11;
    U_TURN = 12;
    VARIABLE_LANE = 13;
    ROAD_SPLIT_LANE = 14;
    QUADRUPLE_LINE_OUTER = 15;
    OLD_LINE = 16;
  }
  enum LaneColor {
    COLOR_UNKNOWN = 0;
    YELLOW = 1;
    WHITE = 2;
    LEFT_YELLOW_RIGHT_WHITE = 3;
    LEFT_WHITE_RIGHT_YELLOW = 4;
    OTHER_COLOR = 5;
  }
  enum CurbType {
    CURB_UNKNOWN = 0;
    GENERAL_LOW_CURB = 1;
    FENCE = 2;
    CEMENT_PIER = 3;
    GENERAL_HIGH_CURB = 4;
    WALL = 5;
    SURFACE = 6;
    DITCH = 7;
    OBSTACLE = 8;
    VIRTUAL_CURB = 9;
    OTHER_CURB = 10;
    MOVABLE_CURB = 11;
    HIGH_CURB = 12 [deprecated = true];
    LOW_CURB = 13 [deprecated = true];
    FLAT_CURB = 14;
    WALKING_STREET = 15;
  }
  enum EndpointType {
    HEAD = 0;
    TAIL = 1;
  }
  message Connection {
    optional EndpointType self_endpoint_type = 1;
    optional EndpointType target_endpoint_type = 2;
    optional string target_fsd_id = 3;
    optional double delta_angle = 4;
    optional double delta_distance = 5;
  }
  message PointWithType {
    optional double x = 1;
    optional double y = 2;
    optional double z = 3;
    optional LaneColor color = 4;
    optional FineLaneType fine_type = 5;
    optional ExtraLaneType extra_type = 6;
    optional CurbType curb_type = 7;
    optional bool is_ground_point = 8;
    optional double line_width =
        9;  // 单线宽度为0cm,双线为两根线中间到最外侧线的距离,以此类推
    optional bool is_occluded_by_curb = 10;
  }
  optional string fsd_id = 1;
  optional CoarseLaneType coarse_lane_type = 2;
  repeated PointWithType points = 3;
  optional bool is_polygon = 4;
  optional bool is_in_intersection = 5;
  optional bool is_filtered = 6 [default = false];
  repeated Connection connections = 7;
  repeated string prev_connected_stop_line_ids = 8;
  repeated string post_connected_stop_line_ids = 9;
  optional bool is_junction_non_driveway_line =
      10;  // 是否是路口中非机动车道的边线，主要是便于过滤路口中一些横向的白线
  optional bool is_uturn_virtual_line =
      11;  // 是否是掉头的虚拟线，lpai数据中会有一些掉头的虚拟线
  optional string group_id = 12;
}

enum SectionDirection {
  STRAIGHT = 1;
  LEFT_TURN = 2;
  RIGHT_TURN = 3;
  UTURN = 4;
  LEFT_TURN_WAITING = 5;
  STRAIGHT_WAITING = 6;
  RIGHT_TURN_WAITING = 7;
}

message CenterLineInfo {
  optional sfixed64 id = 1;
  enum Type {
    GENERAL = 1;  // General for any passenger vehicle
    BICYCLE_ONLY = 2;
    BUS_ONLY = 3;
    VIRTUAL = 4;
    EMERGENCY = 5;
    RAMP = 6;
    WALKING_STREET = 7;
    PARKING = 8;             // Parking lane: can drive on it, if not occupied
    MIXED_WITH_CYCLIST = 9;  // Basically means GENERAL + BICYCLE_ONLY
    UNKNOWN = 10;            // from lx fsdmap data
    ACCELERATION = 11;       // from lx fsdmap data
    DECELERATION = 12;       // from lx fsdmap data
    SPEED_CHANGE = 13;       // from lx fsdmap data
    HOV = 14;                // from lx fsdmap data
    NON_DRIVEWAY = 15;       // from lx fsdmap data
    LEFT_TURN_WAIT = 16;     // from lx fsdmap data
    JUNCTION_VIRTUAL = 17;   // from lx fsdmap data
    JUNCTION_OTHER = 18;     // from lx fsdmap data
    ROUNDABOUT = 19;         // from lx fsdmap data
    TUNNEL = 20;             // from lx fsdmap data
    U_TURN = 21;             // from lx fsdmap data
    TIDAL = 22;              // from lx fsdmap data
    OTHER_TURN_WAIT = 23;
    VARIABLE_DIRECTION = 24;
    MAIN_AUX_ROAD_SWITCH = 25;
    EXTENDED = 26;
  }
  optional Type type = 2;
  enum Direction {
    DIRECTION_UNKNOWN = 0;
    STRAIGHT = 1;
    LEFT_TURN = 2;
    RIGHT_TURN = 3;
    UTURN = 4;
  }
  enum CrossIntersectionType {
    OTHER_TYPE = 0;
    INGOING = 1;
    OUTGOING = 2;
    IN_OUT_GOING = 3;
  }
  optional Direction direction = 3;
  repeated sfixed64 incoming_lanes = 4;
  repeated sfixed64 outgoing_lanes = 5;
  repeated double x = 6;
  repeated double y = 7;
  repeated double z = 8;
  optional bool is_virtual = 9 [deprecated = true];
  repeated bool visible = 10;
  repeated PanonetClass panonet_class = 11;
  // If the center line is filtered, it still be output but set is_filtered
  // true.
  optional bool is_filtered = 12 [default = false];
  optional sfixed64 map_element_id = 13;  // Element id from semantic map proto
  optional float fsdmap_curvature = 14;   // from lx fsdmap data
  optional bool fsdmap_is_current_lane = 15;      // from lx fsdmap data
  optional string fsdmap_center_lane_id = 16;     // from lx fsdmap data
  repeated string fsdmap_left_boundary_id = 17;   // from lx fsdmap data
  repeated string fsdmap_right_boundary_id = 18;  // from lx fsdmap data
  repeated string fsdmap_left_lane_id = 19;       // from lx fsdmap data
  repeated string fsdmap_right_lane_id = 20;      // from lx fsdmap data
  repeated string fsdmap_pred_lane_id = 21;       // from lx fsdmap data
  repeated string fsdmap_succ_lane_id = 22;       // from lx fsdmap data
  optional bool fsdmap_is_outjunction_lane = 23;  // from lx fsdmap data
  optional float fsdmap_relative_yaw_angle = 24;  // from lx fsdmap data
  repeated Direction fsdmap_direction = 25;       // from lx fsdmap data
  optional string fsdmap_group_id = 26;           // from lx fsdmap data
  optional CrossIntersectionType cross_intersection_type = 27;
  repeated double lane_width = 28;
  repeated bool is_ground_point = 29;
  repeated bool is_occluded_by_curb = 30;
  repeated SectionDirection section_directions = 31;
}

message ReferenceLineInfo {
  enum Scene {
    UNKNOWN = 0;
    IN_INTERSECTION = 1;
    BEFORE_INTERSECTION = 2;
  }
  optional Scene scene = 1;
  repeated double x = 2;
  repeated double y = 3;
  repeated double z = 4;
  optional string succ_fsdmap_center_lane_id = 5;
  optional string succ_fsdmap_group_id = 6;
  optional bool lane_matched_by_trajectory = 7;
  optional bool group_matched_by_trajectory = 8;
}

message StaticReferenceLineInfo {
  repeated double x = 1;
  repeated double y = 2;
  repeated double z = 3;
  optional bool is_line_valid = 4;
  optional bool is_dataset_valid = 5;
}

message DriveBoundaryInfo {
  enum DriveBoundaryType {
    BOUNDARY_UNKNOWN = 0;
    BOUNDARY_CNOA = 1;
    BOUNDARY_CHNOA = 2;  // for current use: intersection scene same as CNOA,
                         // highway lead lane scene will extend reference lanes
  }
  enum DriveBoundaryPointType {
    UNKNONWN = 0;
    CURB = 1;
    LANE_BOUNDARY = 2;
    LEAD = 3;
    VIRTUAL = 4;
  }
  repeated double x = 1;
  repeated double y = 2;
  repeated double z = 3;
  optional bool is_filtered = 4;
  optional double length = 5;
  optional DriveBoundaryType type = 6;
  repeated DriveBoundaryPointType point_type = 7;
}

message DriveBoundaryLaneInfo {
  optional LaneInfo lane = 1;
  optional bool is_lead_lane = 2 [default = false];
}

message DriveBoundaryReferenceLane {
  repeated LaneInfo left_lanes = 1 [deprecated = true];
  repeated LaneInfo right_lanes = 2 [deprecated = true];
  repeated DriveBoundaryLaneInfo left_db_lanes = 3;
  repeated DriveBoundaryLaneInfo right_db_lanes = 4;
  repeated DriveBoundaryLaneInfo debug_lanes = 5;
}

// Next ID: 15
enum RoadGeometryLabelPolicyVersion {
  V_UNKNOWN = 0;
  V_22_02_28 = 1;   // Add keypoint, pole, lane.
  V_22_04_27 = 2;   // Add image scene, remove low resolution lanes, remove
                    // unneccessary lanes.
  V_22_07_08 = 3;   // Add bev space proto.
