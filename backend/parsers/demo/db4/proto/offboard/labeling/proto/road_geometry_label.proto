message SdMapInfo {
  message SdNodeInfo {
    optional mapping.SdNodeProto sd_node_proto = 1;
    optional double x = 2;
    optional double y = 3;
    optional double z = 4;
  }
  repeated SdNodeInfo sd_node_info = 1;
  message SdLinkInfo {
    optional mapping.SdLinkProto sd_link_proto = 1;
    repeated double x = 2;
    repeated double y = 3;
    repeated double z = 4;
    optional bool is_pocr_link = 5 [default = false];
  }
  repeated SdLinkInfo sd_link_info = 2;
  repeated sfixed64 pocr_link_ids = 3;
}

message NotForLabelZoneInfo {
  optional sfixed64 id = 1;
  repeated double x = 3;
  repeated double y = 4;
  repeated double z = 5;
  enum ZoneType {
    NORMAL = 0;
    ONLY_FOR_MOVABLE_CURB = 1;
    CONVERT_INCOMPLETE = 2;    // 转换规格差异(for lpai data)
    NO_MAP = 3;                // 地图不全(for lpai data)
    NO_MAIN_SIDE_CONNECT = 4;  // 主辅路连接缺失(for lpai data)
    UNKNOWN = 5;               // 未知(for lpai data)
  }
  optional ZoneType zone_type = 6;
}

message LabelZoneInfo {
  optional sfixed64 id = 1;
  repeated double x = 3;
  repeated double y = 4;
  repeated double z = 5;
}

message IntersectionSceneInfo {
  required double area = 1;
  optional double radius = 2;
  optional int32 crosswalk_num = 3;
  optional double ego_car_to_intersection_center =
      4;  // distance between ego car and intersection center
  // stop line info calculated only when ego car not in intersection polygon
  optional double ego_car_to_stop_line =
      5;  // distance between ego car and nearest stop line, positive means stop
          // line in front, negative at the rear
  optional double ego_car_to_stop_line_horizontal_distance =
      6;  // the y-axis coordinate of the nearest stop line in car body
          // coordinate system, the same as the horizontal distance, positive
          // for left and negative for right
  optional double ego_car_to_stop_line_vertical_distance =
      7;  // the x-axis coordinate of the nearest stop line in car body
          // coordinate system, the same as the vertical distance, positive for
          // front and negative for rear
  optional int32 ego_incoming_lanes_num = 8;
  optional bool has_guide_line = 9;
  optional bool has_waiting_line = 10;
  optional bool is_in_intersection = 11;
  optional GroundMarkingInfo.Type ego_lane_direction =
      12;  // the first ground marks on the ego lane sort by x-axis on vehicle
           // coordinate system (ago lane means absolute value of y-axis on
           // vehicle coordinate system less than lane_width-0.5, x-axis not in
           // intersection and greater than -30 so not too far behind)
}

message LateralCurbInfo {
  optional float lateral_curb_length = 1 [default = 0.0];
  optional float max_lateral_curb_angle = 2 [default = 0.0];
  optional float ego_car_to_lateral_curb =
      3;  // distance between ego car and nearest lateral curb point
  optional float ego_car_to_lateral_curb_horizontal_distance =
      4;  // y-axis of nearest lateral curb point in car body coordinate system,
          // the same as horizontal distance
  optional float ego_car_to_lateral_curb_vertical_distance =
      5;  // x-axis of nearest lateral curb point in car body coordinate system,
          // the same as vertical distance
}

message KeepClearZoneProto {
  optional sfixed64 id = 1;
  repeated double x = 3;
  repeated double y = 4;
  repeated double z = 5;
}

message NaviInfo {
  enum DrivableType {
    DRIVE_UNKNOWN = 0;
    DRIVE_IGNORE = 1;   // 导航无关中心线
    DRIVE_VALID = 2;    // 导航方向中心线
    DRIVE_INVALID = 3;  // 非导航方向中心线
  }
  repeated string fsdmap_center_lane_id = 1;
  repeated DrivableType drivable_type = 2;
  repeated double drivable_distance = 3;
}

