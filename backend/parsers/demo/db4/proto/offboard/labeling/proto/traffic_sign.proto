// Next ID: 6
message ImageLabels {
  repeated ImageLabel labels = 1;
  repeated ImageZone zones = 2;
  optional double center_timestamp = 3;
  optional string image_name = 4;
  optional int32 current_lane_id = 5;
}

// Next ID: 3
message CameraFrame {
  optional int32 frame_id = 1;
  // the key of this map(camera id : int32) follows what's defined in the
  // labeling data
  map<int32, ImageLabels> image_frames = 2;
}
// Next ID: 2
message CameraFrames {
  repeated CameraFrame camera_frame = 1;
}
