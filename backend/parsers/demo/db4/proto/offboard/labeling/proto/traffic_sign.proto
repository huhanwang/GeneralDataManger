  optional int32 instance_id = 2;
  optional double x = 3;
  optional double y = 4;
  optional double width = 5;
  optional double length = 6;
  optional float confidence_score = 16 [default = 1.0];

  // Next ID: 9
  message Box3d {
    optional double x = 1;
    optional double y = 2;
    optional double z = 3;
    optional double length = 5;
    optional double width = 4;
    optional double height = 6;
    optional double heading = 7;
    optional bool visible = 8 [default = false];
