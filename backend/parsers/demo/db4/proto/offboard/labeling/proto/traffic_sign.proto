

syntax = "proto2";

package snoah.traffic_sign;

import "offboard/labeling/proto/attribute.proto";
import "onboard/math/geometry/proto/affine_transformation.proto";

// Next ID: 2
enum LabelingPolicyVersion {
  V_UNKNOWN = 0;
  V_23_10_09 = 1;  // Add speed limit number 5 and 10
  V_25_3_17 = 2;   // Add speed limit number 5 and 10
}

// Next ID: 4
message PacketLabels {
  optional string packet_name = 1;
  repeated CameraFrames camera_frames = 2;
  optional LabelingPolicyVersion version = 3 [default = V_UNKNOWN];
}

// Image label proto starts from here
// Next ID: 4
message ImageZone {
  // Next ID: 2
  enum ZoneType {
    BLACK = 0;  // No labeling here
    WHITE = 1;  // Everything labeled here
  }
  repeated double xs = 1;
  repeated double ys = 2;
  optional ZoneType type = 3;
}
// Next ID: 11
