syntax = "proto2";

package snoah.tl_data_v2;
option go_package = "qcraft-proto.ai/offboard/labeling/proto/tl_data";

message TLRegion {
  // center x and center y of light region
  optional int32 x = 1;
  optional int32 y = 2;
  optional int32 width = 3;
  optional int32 height = 4;
  optional int32 traffic_light_id = 5;
}

message CameraImageForLabeling {
  optional string camera_name = 1;
  optional int32 camera_id = 2;
  optional bytes image_data = 3;
  optional int32 width = 4;
  optional int32 height = 5;
  optional double center_timestamp = 6;
  repeated TLRegion regions = 7;
}

message FrameData {
  optional int32 frame_id = 1;
  optional double frame_timestamp = 2;
  repeated CameraImageForLabeling camera_images = 3;
}

message TLDataForLabeling {
  optional string run_name = 1;
  optional double start_offset = 2;
  optional double duration = 3;
  repeated FrameData frames_data = 4;
}

// temporal message for generating the data from stf
message GeneratedTLDatas {
  map<string, CameraImageForLabeling> frames_data = 1;
}