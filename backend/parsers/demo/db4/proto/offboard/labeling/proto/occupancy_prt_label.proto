
syntax = "proto2";

package snoah.occupancy_prt;
option go_package = "qcraft-proto.ai/offboard/labeling/proto/occupancy_prt_label";
import "onboard/proto/perception.proto";
import "onboard/proto/vehicle_pose.proto";
import "onboard/proto/perception/parking/li_parking_base.proto";
import "onboard/math/geometry/proto/affine_transformation.proto";

message OccupancyWhiteList {
  optional string id = 1;
  repeated Vec2dProto contour = 2;
}

message OccupancyPrtLabelProto {
  // occupancy_parking_3d&occupancy_parking_3d_near&occupancy_parking_3d are
  // converted to labels from preds
  optional DenseOccupancyProto occupancy_parking_3d = 1;
  optional DenseOccupancyProto occupancy_parking_3d_near = 4;
  optional DenseOccupancyProto occupancy_parking_bev = 2;
  optional DenseOccupancyProto occupancy_parking_bev_near = 5;
  optional string pcd_label_serialize = 3;
  optional string pcd_label_near_serialize = 6;
  repeated ObjectPolylineProto fusion_object_polyline = 7;
  optional VehiclePoseProto fusion_vehicle_pose = 8;
  repeated LiBoundaryClusterProto boundary_cluster = 9;
  repeated OccupancyWhiteList occupancy_white_list = 10;
}
