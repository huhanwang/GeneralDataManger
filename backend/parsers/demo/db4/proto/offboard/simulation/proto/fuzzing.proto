syntax = "proto2";

package snoah;

// Represents the chosen value of a fuzzed param.
message FuzzedValue {
  oneof Type {
    int32 int32_val = 1;
    double double_val = 2;
  }
}

// Represents the range of a fuzzed integral param.
message Int32ValueType {
  // Start of the range.
  optional int32 start = 1;
  // End of the range.
  optional int32 end = 2;
}

// Represents the range of a fuzzed double param.
message DoubleValueType {
  optional double start = 1;
  optional double end = 2;
}

// Represents a fuzzed param value type.
message FuzzedValueType {
  // Number of the variations of hte param value.
  optional int32 increments = 1;

  oneof Type {
    Int32ValueType int32_val_type = 2;
    DoubleValueType double_val_type = 3;
  }
}

// Represents a fuzzed param.
message FuzzedParam {
  oneof Name {
    string field_name = 1;
    string extension_name = 2;
  }

  oneof Value {
    FuzzedValueType value_type = 3;
    FuzzedValue value = 4;
  }
}

// Represents a list of fuzzed params.
message FuzzedParams {
  repeated FuzzedParam params = 1;
  // When true, all parameters use the same index value (synchronized mode).
  // When false, generates Cartesian product of all parameter combinations.
  optional bool is_synchronized_params = 2 [default = false];
}
