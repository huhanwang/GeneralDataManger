syntax = "proto2";

package snoah;

message ScenarioTag {
  // tag key
  optional string tag_key = 1;

  // tag value
  optional string tag_value = 2;
}

// DO NOT EDIT/ADD THIS FIELD TO SCENARIO PROTO FOR INTERNAL USE. This
// attributes is used for external projects ONLY.
message ExternalScenarioAttribute {
  repeated ScenarioTag tags = 1;
  repeated string commandline_flags = 6;
}
