syntax = "proto2";
package snoah;

import "onboard/common/proto/map_geometry.proto";
import "onboard/math/geometry/proto/affine_transformation.proto";
import "onboard/proto/sim_trajectory.proto";

message SimPointProto {
  oneof position_type {
    Vec3dProto pos_smooth = 1;
    FrenetPositionProto pos_frenet = 2;
    mapping.GeoPointProto pos_global = 3;
  }
}

// A message for distance range.
message DistanceWindow {
  optional double min = 1;
  optional double max = 2;
}
