message ScenarioEditHistory {
  // Editing timestamp in micro seconds.
  optional int64 edit_timestamp = 1;
  // Editing logs.
  optional string log = 2;
  // Author
  optional string author = 3;
  // Version
  optional string version = 4;
}

// Includes scenario human editing attributes
message ScenarioEdit {
  // The description of scenario.
  optional string description = 1;

  // A scenario can have multiple text tags, for fast searching later.
  // Each tag can be present as two kind of formats:
  // 1, pure text without ':' in the string.
  // 2, A key-value format,  key str + ':' + value str, if multiple ':' in the
  // tag, first one will be used as the delimiter.
  map<string, string> labels = 2 [deprecated = true];

  // Scenario edit history.
  repeated ScenarioEditHistory edit_history = 3;

  // Test sets this scenario belongs to.
  repeated string test_sets = 4 [deprecated = true];

  // LDAPs of the owners of the scenario
  repeated string assignees = 5;

  reserved 6;
}

// Lite modules configurations runs in simulation.
message SimModule {
  optional LiteModuleName module = 1;
  // The instance name of lite module registered, if empty use the defined
  // field name with upper case format.
  optional string instance_name = 2;

  oneof RunMode {
    // Will run this module in simulation, all output messages from this module
    // will be suppressed in all playback sources.
    bool enable = 3;
    // Won't run this module in simulation, all output messages from this module
    // will be suppressed in all playback source if not required.
    bool disable = 4;
    // Won't run this module in simulation, but all output messages from this
    // module will be played back from one of the playback source ids.
    int32 playback_source_id = 5;
  }
  optional SimModuleConf module_conf = 6;

  optional string lite_module_config_filename = 8;

  // Define the message channels that are suppressed during playback.
  repeated string suppressed_channels = 9;

  // it will override the default playback source using specific playback source
  // for given channels, only works when RunMode is playback_source_id
  message PlaybackOverrideChannels {
    repeated string channels = 1;
    required int32 playback_source_id = 2;
  }
  repeated PlaybackOverrideChannels playback_override_channels = 10;

  // Define the state channel forwarding pairs
  repeated ModuleStateChannelPair state_channel_pairs = 7 [deprecated = true];
}

