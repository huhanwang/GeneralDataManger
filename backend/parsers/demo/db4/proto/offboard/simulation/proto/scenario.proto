message PlaybackSource {
  // The lite run name or a single stf file path.
  optional string run_or_stf_path = 1;
  // The total playback duration in seconds.
  optional double duration = 2 [default = 20.0];
  oneof start_type {
    // The start offset in seconds relative to the beginning of the logged file.
    double start_offset = 3 [default = 0.0];
    // The start timestamp in micro seconds.
    int64 start_timestamp = 7 [default = 0];
  }
  // Additional duration to add to the start of the playback, in seconds.
  optional double start_delta = 4 [default = 0.0];

  // Run Source mode
  enum SourceType {
    UNKNOWN = 0;
    RUN = 1;
    SCENARIO = 2;
    SNAPSHOT = 3;
  };
  optional SourceType source_type = 5 [default = UNKNOWN];
  optional int32 planner_state_seq_num = 6;
}

message ScenarioExecution {
  // The simulation's running duration in seconds, should be >=
  // max(playback sources' duration).
  optional double sim_duration = 1 [default = 20.0];
  // The playback sources used in simulation. It supports playbacking different
  // lite msgs from various saved sources.
  // The sources can be empty, if simulation is running in a purely virtual
  // world.
  repeated PlaybackSource playback_sources = 2;
  // List out all lite modules here, named same as module name without.
  optional SimulationModules sim_modules = 3;
  // List of message modifiers to invoke for the simulation.
  repeated MessageModifierProto modifiers = 4;
  // Name of the run conf.
  optional string run_conf_name = 5;
  // Git hash of the map to be used for the simulation
  optional string map_version = 6;
  // List the lite modules as an array.
  repeated SimModule sim_module_list = 7;
  // When set, upload the sim log to the specified path under log bucket.
  optional string sim_log_output_path = 8;
}

// The major proto to drive simulation.
message ScenarioProto {
  enum Status {
    UNKNOWN = 0;
    DRAFT = 1;
    STABLE = 2;
  }
  // Name of scenario, it's a unique name.
  optional string name = 1;

  // The unique id of scenario, usually it's a fingerprint of the name.
  optional uint64 uid = 2;

  optional ScenarioEdit edit_attr = 3;

  optional ScenarioExecution execution = 4;

  repeated Metric metrics = 5;

  // flags to apply to the simulation. Must be in the form of "--flag=value".
  // Note that flags specified directly on the commandline will still take
  // precedence.
  repeated string commandline_flags = 6;

  // A list of scenario params which can be fuzzed to generate variations of the
  // current scenario.
  optional FuzzedParams fuzzed_params = 8;

  reserved 7;

  // for DB maintenance
  optional int64 record_created_timestamp = 9;

  // for DB maintenance
  optional int64 record_updated_timestamp = 10;

  // for history record
  optional string version = 11;

  // for DB maintenance, quickly locate the latest version
  optional bool is_latest = 12;

  // Deprecated. Use status instead.
  optional bool is_stable = 13 [deprecated = true];

  optional ExternalScenarioAttribute external_attribute = 14;
  optional Status status = 15;
  optional string name_default_suffix = 16;
}

// Request for creating a new lite message in simulation.
message CreateMessageRequestProto {
  optional string channel = 1;
  optional string domain = 2;
  optional LiteMsgWrapper msg = 3;
}

// Sim header extends regular lite message header, used for storing additional
// information during simulation.
message SimLiteHeaderProto {
  extend LiteHeader {
    optional SimLiteHeaderProto sim_lite_header = 10000;
  }
  repeated CreateMessageRequestProto create_message_requests = 1;
}

message SimVehicleConf {
  extend SimModuleConf {
    optional SimVehicleConf sim_vehicle_conf = 10002;
  }
  // Engage start time, relative to the start of the scenario.
  optional double engage_start_time = 1;
  // Engage buffer time, in seconds. Used to check whether the car has engaged
  // quickly, i.e. whether the car has entered cruise within
  // `engage_buffer_secs` from the time when the engage button is pushed.
  optional double engage_buffer_secs = 2 [default = 1.0];
  // Initial pose. Useful for ab inito simulations with no playback source.
  optional PoseProto initial_pose = 3;
  // If true will not publish chassis info, it's used for position scenario
  // test.
  optional bool no_publish_chassis = 4;
  // Set AV pose in a variety of ways
  optional SimPointProto initial_pose_additional = 5;
}

message RealTimePlaybackConf {
  extend SimModuleConf {
    optional RealTimePlaybackConf realtime_playback_conf = 10003;
  }
  // If true will start playback by caller, otherwise will start in constructor.
  optional bool manual_start_playback = 1;
}

message SimWorldConfProto {
  message TrafficLightControl {
    message TrafficLightStatePeriod {
      optional double start_time = 1 [default = 0.0];
      optional double end_time = 2 [default = inf];
      optional TrafficLightStateProto state = 3;
    }
    repeated TrafficLightStatePeriod tl_periods = 1;
  }
  optional TrafficLightControl tl_control = 1;

  optional bool publish_tl_states = 2 [default = false];

  optional PlaybackSource playback_source = 3;
}

message VirtualObjectsConfProto {
  extend SimModuleConf {
    optional VirtualObjectsConfProto virtual_objects_conf = 10004;
  }

  repeated VirtualObjectConfProto objects = 2;

  optional SimWorldConfProto sim_world_conf = 3;

  reserved 1;
}

message OracleConfProto {
  extend SimModuleConf {
    optional OracleConfProto oracle_conf = 10005;
  }

  optional PlaybackSource playback_source = 1;
}

message SimEventsConfProto {
  extend SimModuleConf {
    optional SimEventsConfProto sim_events_conf = 10006;
  }

  repeated SimEventProto events = 1;
}

message SimAccLccConf {
  extend SimModuleConf {
    optional SimAccLccConf sim_acc_lcc_conf = 10007;
  }
  optional int32 button_acc_distance = 1;
  optional double acc_following_speed = 2;
  optional double acc_cruise_speed = 3;
}

message HumanDrivingConfProto {
  extend SimModuleConf {
    optional HumanDrivingConfProto human_driving_conf = 10008;
  }
  optional PathModeConfigProto path_mode_config = 1;
  optional agents.SpeedModeConfigProto speed_mode_config = 2;
  optional SimWorldConfProto sim_world_conf = 3;
  optional Chassis.DrivingMode driving_mode = 4;
  optional SimControlConfigProto sim_control_config = 5;
}

message OffboardPredictionConfProto {
  extend SimModuleConf {
    optional OffboardPredictionConfProto offboard_prediction_conf = 10009;
  }
  optional PlaybackSource playback_source = 1;
}
