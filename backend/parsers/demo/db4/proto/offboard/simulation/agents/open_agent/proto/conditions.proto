syntax = "proto2";

package snoah.agents;
option go_package = "qcraft-proto.ai/offboard/simulation/agents/open_agent/proto/conditions";

import "onboard/math/geometry/proto/affine_transformation.proto";
import "offboard/simulation/agents/open_agent/proto/agent_common.proto";
import "onboard/proto/perception/types/traffic_light_color.proto";

message TriggerProto {
  enum ConditionEdge {
    RISING = 0;
    FALLING = 1;
    RISING_OR_FALLING = 2;
  }
  optional ConditionEdge edge = 1;
  optional ConditionProto condition = 2;
}

message ConditionProto {
  oneof type {
    bool bool_condition = 1;
    AbsolutePositionConditionProto absolute_position_condition = 2;
    TimeToCollisionStillConditionProto time_to_collision_still = 8;
    TrafficLightConditionProto traffic_light_condition = 10;
    StartOffsetConditionProto start_offset_condition = 11;
    RelativePositionConditionProto relative_position_condition = 12;
    TraveledDistanceConditionProto traveled_distance_condition = 13;
    FutureCollisionConditionProto future_collision_condition = 14;
    TimeToReachConditionProto time_to_reach_condition = 15;
    AutoCollisionConditionProto auto_collision_condition = 16;
    AutoLaneChangeConditionProto auto_lane_change_condition = 17;
  }
  reserved 3, 4, 5, 6, 7, 9;
}

message ConditionCommonProto {
  enum Relation {
    EQUAL = 0;
    NOT_EQUAL = 1;
    LESS_OR_EQUAL = 2;
    GREATER_OR_EQUAL = 3;
    LESS = 4;
    GREATER = 5;
  }
  enum RegionRelation {
    INSIDE = 0;
    OUTSIDE = 1;
  }
}

message AbsolutePositionConditionProto {
  message Region {
    optional PointListProto region_corners = 1;
    optional MatchingOptions.DetectionApproach approach = 2;
    optional ConditionCommonProto.RegionRelation relation = 4;
  }
  optional string name = 1;
  optional string agent_id = 2;
  repeated Region regions = 3;
}

message RelativePositionConditionProto {
  optional string name = 1;
  optional string agent_id = 2;
  optional string target_agent_id = 3;
  optional double distance_threshold = 4;
  optional ConditionCommonProto.Relation relation = 5;
  optional bool is_longit = 6;
}

message TimeToCollisionStillConditionProto {
  optional string name = 1;
  optional string agent_id = 2;
  optional double time_threshold = 4;
  optional ConditionCommonProto.Relation relation = 5;
}

message TrafficLightConditionProto {
  optional string name = 1;
  optional int64 traffic_light_id = 2;
  optional ConditionCommonProto.Relation relation = 3;
  optional TrafficLightColor target_color = 4;
}

message StartOffsetConditionProto {
  optional string name = 1;
  optional double start_offset = 2;
  optional ConditionCommonProto.Relation relation = 3;
}

message TraveledDistanceConditionProto {
  optional string name = 1;
  optional double distance = 2;
  optional ConditionCommonProto.Relation relation = 3;
}

message FutureCollisionConditionProto {
  optional string name = 1;
}

message TimeToReachConditionProto {
  optional string name = 1;
  optional string agent_id = 2 [default = 'SIM_AV'];
  optional double expected_time = 3;
  optional double expected_pos = 4 [deprecated = true];
  optional Vec2dProto expected_position = 5;
}

message AutoCollisionConditionProto {
  optional string name = 1;
  optional double lateral_offset_percentage = 2;
  optional double accel_time = 3 [default = 0];
  optional double target_vel_body = 4;
  enum CollisionMode {
    LATERAL = 0;
    LONGITUDINAL = 1;
  }
  optional CollisionMode collision_mode = 5 [default = LATERAL];
  optional double expected_collision_time = 6;
  optional double vertical_offset = 7;
}

message AutoLaneChangeConditionProto {
  optional string name = 1;
  optional int64 lane_id = 2;
  optional double lateral_offset = 3;
  optional double longit_distance = 4;
  optional double remaining_collision_time = 5;
}
