syntax = "proto2";

package snoah.agents;
option go_package = "qcraft-proto.ai/offboard/simulation/agents/proto/sim_agent";

import "onboard/maps/proto/lane_path.proto";
import "offboard/simulation/agents/open_agent/proto/open_agent.proto";

// Simplistic agent that follows lanes and always travels at lane speed limit,
// capable of accelerating/decelerating infinitely quickly.
message LaneSpeedLimitAgentConfigProto {
  optional mapping.LanePathProto route = 1;
}

// intelligent cruise control agent
message ICCAgentConfigProto {
  optional string object_id = 1;
}

message ShyAgentConfigProto {
  optional string object_id = 1;
}

message SimAgentConfigProto {
  oneof AgentType {
    LaneSpeedLimitAgentConfigProto lane_speed_limit_agent = 1;
    ICCAgentConfigProto icc_agent = 3;
    ShyAgentConfigProto shy_agent = 4;
    OpenAgentConfigProto open_agent = 5;
  }
  reserved 2;
}
