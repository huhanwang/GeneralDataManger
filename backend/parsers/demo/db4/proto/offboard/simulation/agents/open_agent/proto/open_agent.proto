syntax = "proto2";

package snoah.agents;
option go_package = "qcraft-proto.ai/offboard/simulation/agents/open_agent/proto/open_agent";

import "offboard/simulation/agents/open_agent/proto/actions.proto";
import "offboard/simulation/agents/open_agent/proto/controllers.proto";
import "offboard/simulation/agents/open_agent/proto/conditions.proto";

import "onboard/maps/proto/lane_path.proto";
import "offboard/simulation/agents/open_agent/proto/agent_common.proto";
import "onboard/proto/sim_trajectory.proto";
import "onboard/proto/perception/fusion/objects.proto";

message EventProto {
  optional TriggerProto trigger = 1;
  optional ActionProto action = 2;
}

message AgentStateProto {
  optional ObjectProto object = 1;
  optional SpeedStateProto speed_state = 2;
  oneof RouteType {
    mapping.LanePathProto lane_path_route = 3;
    DrownWaypointRouteProto waypoint_route = 4;
    ReachDestinationPathProto reach_destination_route = 5;
  }
}

message OpenAgentConfigProto {
  optional TriggerProto start_trigger = 1;
  optional TriggerProto stop_trigger = 2;
  optional ControllerProto default_controller = 3;
  repeated EventProto events = 4;
  optional AgentStateProto initial_state = 5 [deprecated = true];
}
