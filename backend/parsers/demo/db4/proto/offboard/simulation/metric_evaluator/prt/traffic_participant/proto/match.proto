
syntax = "proto2";

package snoah;

enum MatchType {
  GREEDY = 1;
  HUNGARY = 2;
  GREEDY_LANE = 3;
}

message TrafficParticipantMatchConfig {
  optional MatchType match_type = 1 [default = GREEDY];
  repeated TrafficParticipantMatchMethods must_pass_methods = 2;
  repeated TrafficParticipantMatchMethods score_methods = 3;
}

message TrafficParticipantMatchMethods {
  oneof type {
    EuclideanDistanceMatch euclidean_distance_match = 1;
    PolarDistanceMatch polar_distance_match = 2;
    Iou3DMatch iou_3d_match = 3;
    IouImageMatch iou_image_match = 4;
    TypeMatch type_match = 5;
    OverlapImageMatch overlap_image_match = 6;
    Overlap3dMatch overlap_3d_match = 7;
    LaneIouImageMatch lane_iou_image_match = 8;
  }
}

enum TypeLevel {
  Level1 = 1;
  Level2 = 2;
}

message TypeMatch {
  optional TypeLevel type_level = 1 [default = Level1];
}

enum DistanceType {
  Box2Box = 1;
  Center2Center = 2;
}

enum ThresholdType {
  ThresholdTypeValue = 1;
  Proportion = 2;
}

message DistanceThreshold {
  optional DistanceType distance_type = 1 [default = Box2Box];
  optional ThresholdType threshold_type = 2 [default = ThresholdTypeValue];
  optional double threshold = 3;
}

message EuclideanDistanceMatch {
  optional DistanceThreshold distance_threshold = 1;
}

message PolarDistanceMatch {
  optional DistanceThreshold lateral_distance_threshold = 1;
  optional DistanceThreshold longitude_distance_threshold = 2;
  optional DistanceThreshold longitude_begin_threshold = 3;
}

message Iou3DMatch {
  optional double iou_threshold = 1 [default = 0.1];
}

message IouImageMatch {
  optional double iou_threshold = 1 [default = 0.2];
}

message OverlapImageMatch {
  optional double overlap_rate_threshold = 1 [default = 0.1];
}

message Overlap3dMatch {
  optional double overlap_rate_threshold = 1 [default = 0.8];
}

message LaneIouImageMatch {
  optional double iou_threshold = 1 [default = 0.5];
  optional int32 line_width = 2 [default = 4];
  optional int32 image_width = 3 [default = 4968];
  optional int32 image_height = 4 [default = 2048];
}