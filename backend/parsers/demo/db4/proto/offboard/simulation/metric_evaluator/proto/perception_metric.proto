message FrontCameraVelocityMetric {
  message GroundTruth {
    optional double min_speed = 1;
    optional double max_speed = 2;
    optional double min_acc = 7;
    optional double max_acc = 8;
    optional double min_relative_speed = 9;
    optional double max_relative_speed = 10;
    optional double min_relative_acc = 11;
    optional double max_relative_acc = 12;
    optional double heading_radian = 3;
    optional double min_lateral_speed = 13;
    optional double max_lateral_speed = 14;
    optional double min_longitudinal_speed = 15;
    optional double max_longitudinal_speed = 16;
    oneof heading_buffer_type {
      // Use Degree instead of Radian on buffer, for easy labeling.
      // The valid number should be [0, 180)
      double heading_buffer_degree = 4;
      double heading_buffer_radian = 5;
    }
    optional ObjectFilter object_filter = 6;
  }
  repeated GroundTruth truths = 1;
}

