}

enum FusedChannelSource {
  FUSED_BEV_ROAD_GEOMETRY_PROTO = 0;
  FUSED_MAPFORMER_BEV_ROAD_GEOMETRY_PROTO = 1;
}

message RoadGeometryLabelsProto {
  message RoadGeometryTruthProto {
    optional int64 timestamp = 1;
    optional road_geometry_label.RoadGeometryLabelProto road_geo_label = 2;
  }
  optional string run_name = 1;
  repeated RoadGeometryTruthProto road_geo_truths = 2;
}

