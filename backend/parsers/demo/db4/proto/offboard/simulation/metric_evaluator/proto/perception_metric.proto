message ObjectFilter {
  enum PolygonFilterMethod {
    INVALID = 0;
    OVERLAP = 1;
    CONTAIN_CONTOUR = 2;
    CONTAIN_POS = 3;  // use object_proto.pos()
    OVERLAP_BY_RATIO = 4;
    LINE_OVERLAP = 5;
    LINE_CONTAIN = 6;
    OVERLAP_BY_IOU = 7;
  }

  enum MsgType {
    OBJECT_PROTO = 0;
    FUSION_OBJECT_PROTO = 1;
    RADAR_MEASUREMENT_PROTO = 2;
    FRONT_CAMERA_MEASUREMENT_PROTO = 3;
    FUSION_OUTPUS_PROTO = 4;
    TRAFFIC_LIGHT_STATES_PROTO = 5;
    LSAEB_FREESPACE_PROTO = 6;
    FUSION_FREESAPCE_PROTO = 7;
    FUSION_PARKING_SPOTS_PROTO = 8;
    OCCUPANCY_PARKING_PROTO = 9;
    LIDAR_MEASUREMENT_PROTO = 10;
    LI_PARKING_LIMITERS_PROTO = 11;
    FRONT_MONO_MEASUREMENT_PROTO = 12;
    AEB_MONO_MEASUREMENT_PROTO = 13;
    LIDAR_PERCEPTION_NET_RESULT_PTORO = 14;
    FISHEYE_BEV_TRACKER_PROTO = 15;
    VISION_BEV_ROAD_GEOMETRY_PROTO = 16;
    FRONT_MOVABLE_FUSION_MEASUREMENTS = 17;
    TRAFFIC_SIGN_AND_INTELLIGENT_SPEED_PROTO = 18;
    FUSION_OCC_OBJECTS_PROTO = 19;
    STATIC_FUSED_MEASUREMENTS = 20;
    VISION_BEV_RESULTS_PROTO = 21;
  }

  optional PointListProto polygon = 1;
  optional PolygonFilterMethod polygon_filter_method = 2 [default = OVERLAP];
  optional TimeWindow time_window = 3;
  optional double allow_error_time = 6 [default = 0.0];  // default:0.0 seconds
  optional MsgType msg_type = 4;
  optional double overlap_by_ratio = 5;  // default:0.8 in c++ code
  optional double overlap_by_iou = 7 [
    deprecated = true
  ];  // deprecated: use overlap_by_ratio instead, default:0.7 in c++ code
}

message OccupancyDrivingClassificationMetric {
  message GroundTruth {
    optional ObjectFilter object_filter = 1;
    // repeated auto_labeling.Voxel.LXVoxelType expected_object_types = 2;
    // repeated auto_labeling.Voxel.LXVoxelType rejected_object_types = 3;
  }
  repeated GroundTruth truths = 1;
}

message OccupancyDrivingFalseNegativeMetric {
  message GroundTruth {
    optional ObjectFilter object_filter =
        1;  // overlap_by_ratio default 0.5 in c++ code
    // depth_threshold_ratio: Depth deviation tolerance ratio for distance
    // filtering
    //   C++ default: 0.1 (10%)
    optional double depth_threshold_ratio = 2;
    // error_frame_rate_threshold: Maximum allowed failed frame ratio
    // If failed frame ratio exceeds this threshold, the evaluation fails
    //   C++ default: 0.05 (5%)
    optional double error_frame_rate_threshold = 3 [default = 0.05];
  }
  repeated GroundTruth truths = 1;

  // Depth-aware evaluation mode configuration
  // C++ default: true (enabled by default)
  optional bool enable_depth_aware = 2;
  // Distance threshold in meters for enabling depth-aware logic
  // C++ default: 30.0
  optional double depth_aware_distance_threshold = 3;
}

message OccupancyDrivingFalsePositiveMetric {
  message GroundTruth {
    optional ObjectFilter object_filter =
        1;  // overlap_by_ratio default 0.4 in c++ code
  }
  repeated GroundTruth truths = 1;
}

