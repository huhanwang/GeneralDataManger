message HilLoadDiffMetric {}

message FrontCameraAccJumpRateMetric {}

// The critical metric name list.
// The value equals to the fieldname of `one of Type` in `Metric`
message CriticalMetrics {
  repeated string metrics = 1;
}

// A metric that checks whether the AV has entered cruise during the
// simulation.
message EnterCruiseMetric {}

// A metric that checks whether there is any execution issue after the AV
// entered the cruise (i.e. "kickout").
message ExecutionIssueMetric {
  repeated ExecutionIssueProto execution_issue_whitelist = 1;
  optional bool only_entered_cruise = 2;
  // Will check all lite modules if no expected modules.
  repeated LiteModuleName expected_modules = 3;

  optional TimeWindow time_window = 4;
}

// This metric is for pose divergence event.
message PoseDivergenceMetric {
  // Reports an event when the simulated pose and shadow pose's distance is
  // larger than this threshold.
  optional double min_pos_difference = 1;  // Meters.
  // Reports an event when the simulated pose's yaw and shadow pose's yaw is
  // larger than this threshold.
  optional double min_yaw_difference = 2;  // Radians.
}

// This metric is to compare the simulated pose and shadow pose's lateral
// deviation.
message LateralDeviationMetric {
  // Reports an event when the simulated pose and the shadow pose's lateral
  // deviation respecting to lane center line is more than this threshold.
  optional double min_lateral_deviation_difference = 1;
}

// This metric is to compare the object nudge distance difference.
message NudgeDistanceMetric {
  // Reports an event when the simulated pose and the shadow pose's nudge
  // distance difference is more than this threshold.
  optional double min_nudge_distance_difference = 1;  // Meters.
}

// This metric is for brake divergence event. It reports an event when the
// simulated longitudinal acceleration and shadow pose's longitudinal
// acceleration are different than the provided threshold.
message AccelerationDivergenceMetric {
  // A threshold to trigger an event when the simulated acceleration is smaller
  // than shadow pose's acceleration.
  optional double min_under_acceleration_difference = 1;
  // A threshold to trigger an event when the simulated acceleration is larger
  // than shadow pose's acceleration.
  optional double min_over_acceleration_difference = 2;
}

// This metric is for steer divergence event. It will reports an event when the
// difference between the simulated chassis steer and the shadow chassis steer
// beyond the threshold.
message SteerDivergenceMetric {
  // A threshold to trigger an event when simulated chassis steer's absolute
  // value is smaller than the shadow chassis steer percentage.
  optional double min_under_steer_difference = 1;  // percentage.
  // A threshold to trigger an event when simulated chassis steer's absolute
  // value is larger than the shadow chassis steer percentage.
  optional double min_over_steer_difference = 2;  // percentage.
}

// This metric produces a QEvent when the simulated distance and shadow distance
// with an front side object matches the conditions.
message FollowDistanceMetric {
  // This number should be larger than 1.0. It reports an event when sim pose's
  // follow distance is longer than shadow pose's follow distance times this
  // value.
  optional double longer_follow_distance_ratio = 1;
  // This number should be between 0.0 and 1.0. It reports an event when sim
  // pose's follow distance is shorter than shadow pose's follow distance times
  // this value.
  optional double shorter_follow_distance_ratio = 2;
  optional double max_follow_distance_diff = 3;
  optional TimeWindow time_window = 4;
  optional double max_standstill_distance = 5;
  optional double min_standstill_distance = 6;
}

// This metric produces a QEvent when the simulated travel distance diverges
// with shadow travel distance.
message ProgressDivergenceMetric {
  // A threshold to trigger an event when the simulated pose goes further on
  // route than the shadow pose.
  optional double min_further_distance_difference = 1;
  // A threshold to trigger an event when the simulated pose goes shorter on
  // route than the shadow pose.
  optional double min_shorter_distance_difference = 2;
}

// This metric reports whether the simulated AV reproduces shadow AV's behavior
// with limited divergence (under certain thresholds)
// and reports potential cause of that reproduce divergence
message ReproduceDivergenceMetric {
  optional double pos_diff_thres = 1;
  optional double vel_diff_thres = 2;
  optional double acc_diff_thres = 3;
