  message GroundTruth {
    optional mapping.SpeedLimitRangeType range_type = 1;
    optional double speed_limit_kph = 2;
    optional double allow_error_time = 3;
  }
  repeated GroundTruth truths = 1;
  optional TimeWindow time_window = 2;
}

message LiMcuToSoaFailsafeDetectionMetric {
  message LiMcuToSoaFailsafeTruth {
    optional TimeWindow time_window = 1;
    repeated LiMcuToSoaFailsafeProto li_mcu_to_soa_failsafe_protos = 2;
    optional double allow_error_time = 3;  // C++ defaults to 0.0
  }
  repeated LiMcuToSoaFailsafeTruth li_mcu_to_soa_failsafe_truths = 1;
}

message TsrTargetSpeedMetric {
  message GroundTruth {
    optional mapping.EhpSpeedLimitRangesProto.TsrType tsr_type = 1;
    optional int32 tsr_speed_limit_kph = 2;
    optional double allow_error_time = 3;
    optional TimeWindow time_window = 4;
  }
  repeated GroundTruth truths = 1;
}

message QIssueToAutonomyStateDelayMetric {
  message GroundTruth {
    optional TimeWindow time_window = 1;
    optional QIssueSeverity q_issue_severity = 2;  // C++ defaults to QIS_FATAL
    optional ExecutionIssueProto q_issue_protos = 3;
    repeated AutonomyStateProto autonomy_state_protos = 4;
    repeated EmergencyBrakeProto emergency_brake_protos = 6;
    optional LaneSupportProto lane_support_proto = 7;
    optional double max_allowed_delay = 5;  // seconds, C++ defaults to 0.0
  }
  repeated GroundTruth ground_truths = 1;
}

message HmiVelocityFlowSafetyMetric {
  message GroundTruth {
    optional TimeWindow time_window = 1;
    optional bool is_vehicle_flow_safety = 2;
  }
  repeated GroundTruth truths = 1;
}

message GuardianCmdDetectionMetric {
  message GuardianCmdTruth {
    optional TimeWindow time_window = 1;
    repeated GuardianCmdProto guardian_cmd_protos = 2;
    optional bool is_triggered = 3 [default = false];
  }
  repeated GuardianCmdTruth guardian_cmd_truths = 1;
}

message QRunEventStatesDetectionMetric {
  message QRunEventStatesTruth {
    optional TimeWindow time_window = 1;
    repeated QRunEventStatesProto q_run_event_states_protos = 2;
    optional bool is_triggered = 3 [default = false];
  }
  repeated QRunEventStatesTruth q_run_event_states_truths = 1;
}

message HppMappingVprMetric {
  optional double trip_distance_threshold = 1 [default = 50.0];      // Meters.
  optional double euclidean_distance_threshold = 2 [default = 2.0];  // Meters.
  optional double precision_threshold = 3
      [default = 0.8];  // Precision threshold (0.0-1.0).
  optional double recall_threshold = 4
      [default = 0.8];  // Recall threshold (0.0-1.0).
}
