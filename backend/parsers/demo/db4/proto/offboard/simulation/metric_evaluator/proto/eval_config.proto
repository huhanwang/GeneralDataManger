  enum Type {
    ACCEL = 0;
    DECEL = 1;
  }
  optional TimeWindow time_window = 1;
  optional Type type = 2;
  optional double lower_bound = 3;
  optional double upper_bound = 4;
  optional TimeWindow peak_val_time_window = 5;
}

