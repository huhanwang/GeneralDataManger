// This metric counts the occurrences of enum field values in specified proto
// messages
message ProtoEnumCountMetric {
  // List of proto message types to monitor
  repeated ProtoEnumTarget proto_targets = 1;

  message ProtoEnumTarget {
    // Channel name of the proto message (corresponds to lite message field
    // name)
    optional string proto_channel = 1;

    // List of enum fields to count
    repeated EnumFieldTarget enum_fields = 2;
  }

  message EnumFieldTarget {
    // Complete path to the enum field, using "." to seperate levels
    // Examples: "status", "filed.status"
    optional string field_path = 1;

    // Whether to count all enum values
    optional bool count_all_values = 2 [default = true];

    // If count_all_values = false, specify which enum values to count
    repeated string specific_enum_values = 3;

    // Optional time window to filter messages by relative time offset
    optional TimeWindow time_window = 4;
  }
}

