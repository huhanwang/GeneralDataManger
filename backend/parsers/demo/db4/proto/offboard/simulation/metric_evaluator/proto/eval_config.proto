// AccelRangeMetric defines a metric for measuring acceleration or deceleration
// events within a specified range. The type field specifies whether the
// metric is for acceleration or deceleration, and the low and high fields
// define the acceptable range of acceleration or deceleration values. The
// time_window field specifies the duration of the time window for measuring the
// acceleration or deceleration events.
