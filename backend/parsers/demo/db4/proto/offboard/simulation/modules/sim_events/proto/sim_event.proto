syntax = "proto2";

package snoah;

import "offboard/simulation/modules/sim_events/proto/trigger.proto";
import "offboard/simulation/modules/sim_events/proto/actions.proto";

message SimEventProto {
  optional SimTriggerProto trigger = 1;
  optional SimActionListProto action_list = 2;
  optional string name = 4;
  reserved 3;
}
