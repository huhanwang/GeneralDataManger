syntax = "proto2";

package snoah;

// Input to the import runs script.
message ImportRunsFileProto {
  message Row {
    // Path to the run directory, which should contain the lite run info
    // binary proto file.
    optional string lite_run_dir = 1;
    message Label {
      optional string key = 1;
      optional string value = 2;
    }
    // Labels to add to the imported run.
    repeated Label labels = 2;
    optional string task_run_name = 3;
  }
  repeated Row rows = 1;
}