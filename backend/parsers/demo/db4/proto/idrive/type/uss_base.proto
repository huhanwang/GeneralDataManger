message PerFusUssHeader
{
    sint64 mcu_send_stamp_si64 = 1;
    sint64 mcu_send_wave_stamp_si64 = 2;
    uint32 mesa_group_tx_mask_ui16 = 3;
    uint32 mesa_group_rx_mask_ui16 = 4;
    UssHeaderGroupIdEn uss_header_group_id = 5;
    FreqModeEn uss_header_freq_mode = 6;
}

message UssPointSi32
{
    sint32 x_si32 = 1;
    sint32 y_si32 = 2;
}

message UssPointSi16
{
    sint32 x_si16 = 1;
    sint32 y_si16 = 2;
    uint32 id = 3;
}

message UssStateMachine
{
    PlvState plv_state = 1;
    PsuState psu_state = 2;
    OdoState odo_state = 3;
}

message UssRodInfo
{
    repeated UssPointSi32 end_points_vcs = 1;
    uint32 num_end_points = 2;
    bool valid = 3;
}

message PerFusUssPs
{
    uint32 uss_ps_id_ui8 = 1;
    UssPsStatusEn uss_ps_status_en = 2;
    UssPsTypeEn uss_ps_type_en = 3;
    UssPsOrientationEn uss_ps_orientation_en = 4;
    UssPsBoundaryTypeEn uss_ps_1st_boundary_type_en = 5;
    UssPsBoundaryTypeEn uss_ps_2nd_boundary_type_en = 6;
    UssPsBoundaryTypeEn uss_ps_cross_boundary_type_en = 7;
    UssPsBoundaryTypeEn uss_ps_cross_second_boundary_type_en = 8;
    UssPsBoundaryExternTypeEn uss_ps_1st_boundary_ext_type_en = 9;
    UssPsBoundaryExternTypeEn uss_ps_2nd_boundary_ext_type_en = 10;
    UssPsBoundaryExternTypeEn uss_ps_cross_boundary_ext_type_en = 11;
    sint32 vison_ps_id = 12;
    uint32 uss_ps_depth_ui16 = 13;
    uint32 uss_ps_length_ui16 = 14;
    sint32 uss_ps_angle_i16 = 15;
    UssPointSi32 uss_ps_1st_corner = 16;
    UssPointSi32 uss_ps_2nd_corner = 17;
    UssPointSi32 uss_ps_3st_corner = 18;
    UssPointSi32 uss_ps_4nd_corner = 19;
    UssPointSi32 uss_ps_1st_corner_gcs = 20;
    UssPointSi32 uss_ps_2nd_corner_gcs = 21;
    UssPointSi32 uss_ps_3st_corner_gcs = 22;
    UssPointSi32 uss_ps_4nd_corner_gcs = 23;
    UssPointSi16 uss_ps_boundary_1st_info = 24;
    UssPointSi16 uss_ps_boundary_2nd_info = 25;
    UssPointSi16 uss_ps_boundary_3rd_info = 26;
    UssPointSi16 uss_ps_boundary_4th_info = 27;
    sint64 uss_ps_finish_timestamp = 28;
    float uss_ps_1st_angle = 29;
    float uss_ps_2nd_angle = 30;
    float uss_ps_3st_depth = 31;
    float uss_ps_4th_depth = 32;
    UssRodInfo uss_rod_info = 33;
}

message UssPointWholeSi16
{
    sint32 x_si16 = 1;
    sint32 y_si16 = 2;
    LpTypeGenEn point_gen_type = 3;
    PerFusSnsID point_send_sensor = 4;
    PerFusSnsID point_recive_sensor = 5;
    uint32 group_id = 6;
    uint32 tracking_time = 7;
    uint32 life_time = 8;
    DetectStatus detect_status = 9;
    CloudPointType type = 10;
    UssHeightEn height = 11;
}

