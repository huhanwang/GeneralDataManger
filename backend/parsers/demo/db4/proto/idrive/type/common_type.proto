message CovariancePoint
{
    float x = 1;
    float y = 2;
    float z = 3;
    repeated float covariance_matrix = 4;
    uint32 num_covariance_matrix = 5;
}

message CovarianceMatrix
{
    repeated float covariance_matrix = 1;
    uint32 num_rows = 2;
    uint32 num_columns = 3;
}

message PathPoint
{
    Vector3f position = 1;
    float theta = 2;
    float kappa = 3;
    float s = 4;
    float dkappa = 5;
    float ddkappa = 6;
    float x_derivative = 7;
    float y_derivative = 8;
    uint32 lane_id = 9;
}

message TrajectoryPoint
{
    PathPoint path_point = 1;
    float speed = 2;
    float acceleration = 3;
    float derivative_acceleration = 4;
    float steer_angle = 5;
    sint32 relative_time = 6;
}

message PointSslidar
{
    float x = 1;
    float y = 2;
    float z = 3;
    uint32 intensity = 4;
    sint64 timestamp = 5;
}

