message PropertyPerceptionBBox
{
    uint32 num_category = 1;
    Rect rect = 2;
    float conf = 3;
    sint32 type = 4;
    repeated Category category = 5;
}

message KeyPoint
{
    Vector3f pt = 1;
    float type = 2;
    float conf = 3;
    float boundary_conf_x = 4;
    float boundary_conf_y = 5;
}

message TrackingFeatureRaw
{
    sint32 model_id = 1;
    uint32 num_data = 2;
    bytes data = 3;
}

message PoseNetRaw
{
    float roll_raw = 1;
    float roll_filter = 2;
    float pitch_raw = 3;
    float pitch_filter = 4;
    float yaw_raw = 5;
    float yaw_filter = 6;
    sint32 type = 7;
    float conf = 8;
}

message KeyPointsLight
{
    sint32 task_type = 1;
    uint32 num_key_points = 2;
    repeated KeyPoint key_points = 3;
}

message PRFromGround
{
    float roll = 1;
    float pitch = 2;
    Global2peResultType type = 3;
}

message ObstacleRaw
{
    Rect rect = 1;
    float conf = 2;
    sint32 model = 3;
    sint32 source = 4;
    uint32 num_category = 5;
    uint32 num_property_bbox = 6;
    uint32 num_key_points = 7;
    uint32 num_key_points_raw = 8;
    repeated Category category = 9;
    repeated PropertyPerceptionBBox property_bbox = 10;
    repeated KeyPoint key_points = 11;
    repeated KeyPointsLight key_points_raw = 12;
}

message ObstacleRawsData
{
    Category category = 1;
    float conf_scale = 2;
    uint32 num_obstacle_raws = 3;
    repeated ObstacleRaw obstacle_raws = 4;
}

message FullObstacleRawsData
{
    Category category = 1;
    float conf_scale = 2;
    uint32 num_obstacle_raws = 3;
    repeated ObstacleRaw obstacle_raws = 5;
}

