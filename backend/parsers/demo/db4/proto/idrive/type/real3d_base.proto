syntax = "proto3";
import "type/dynamic_obstacle.proto";
import "type/basic.proto";
import "type/common_type.proto";
import "type/perception_base.proto";
package idrive.workflow.proto;

enum Real3DObsType
{
    Real3DObsType_kPedestrian = 0;
    Real3DObsType_kVehicle = 1;
    Real3DObsType_kCyclist = 2;
}

enum Roi3DMapType
{
    Roi3DMapType_kPtUndistortMap = 0;
    Roi3DMapType_kPtDistortMap = 1;
    Roi3DMapType_kEqflUMap = 2;
    Roi3DMapType_kEqflVMap = 3;
}

enum CoordinateType
{
    CoordinateType_kUnknown = 0;
    CoordinateType_kPinhole = 1;
    CoordinateType_kFisheye = 2;
    CoordinateType_kCyl = 3;
    CoordinateType_kVcs = 4;
    CoordinateType_kCamera = 5;
    CoordinateType_kCameraNew = 6;
}

message Real3DResult
{
    BevObstacle bev_obstacle = 1;
    Box3DInt img_3dbox = 2;
    Rect img_rect = 3;
    Real3DObsType type = 4;
    VehicleSubType sub_type = 5;
}

message Real3D
{
    PerceptionHeader header = 1;
    CoordinateType coordinate_type = 2;
    uint32 num_real3d_result = 3;
    repeated Real3DResult real3d_result = 4;
}

message FullReal3D
{
    PerceptionHeader header = 1;
    CoordinateType coordinate_type = 2;
    uint32 num_real3d_result = 3;
    repeated Real3DResult real3d_result = 4;
}

