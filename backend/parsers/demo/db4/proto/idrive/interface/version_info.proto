syntax = "proto3";
import "common/common_msg.proto";
package idrive.workflow.proto;

message VersionInfo_VersionInfo
{
    uint32 num_version = 1;
    uint32 num_commit = 2;
    uint32 num_alg = 3;
    string alg = 4;
    string version = 5;
    string commit = 6;
}

message VersionInfo_ProcessInfo
{
    uint32 num_process_name = 1;
    uint32 num_version = 2;
    string process_name = 3;
    repeated VersionInfo_VersionInfo version_info = 4;
}

message VersionInfo_VersionsInfo
{
    uint32 num_versions = 1;
    repeated VersionInfo_ProcessInfo versions = 2;
}

message VersionInfoMsg 
{
    CommonMsgMsg common_msg = 1;
    VersionInfo_VersionsInfo versions_info = 2;
}

