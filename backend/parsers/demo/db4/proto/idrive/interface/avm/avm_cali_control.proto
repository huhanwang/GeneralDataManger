}

message AvmCaliControl_Hmi3DCarModel
{
    uint32 valid = 1;
    sint32 hor_direct = 2;
    sint32 hor_angle = 3;
    sint32 ver_percent = 4;
    sint32 rotation_speed = 5;
}

message AvmCaliControl_Command
{
    AvmCaliControl_AvapMode avm_mode = 1;
    AvmCaliControl_CaliMode cali_mode = 2;
    AvmCaliControl_CaliCmd cali_cmd = 3;
    AvmCaliControl_DebugVisionCtrl debug = 4;
    AvmCaliControl_VisionCtrl vision_ctrl = 5;
    AvmCaliControl_TransparentChassis transparent_chassis = 6;
    uint32 trajectory_swt = 7;
    AvmCaliControl_Hmi3DCarModel car_model = 8;
}

message AvmCaliControlMsg 
{
    CommonMsgMsg common_msg = 1;
    AvmCaliControl_Command command = 2;
}

