}

enum AvmCaliControl_CaliMode 
{
    AvmCaliControl_CaliMode_NONE = 0;
    AvmCaliControl_CaliMode_FACT = 1;
    AvmCaliControl_CaliMode_SERV = 2;
    AvmCaliControl_CaliMode_AUTO = 3;
}

enum AvmCaliControl_CaliCmd 
{
    AvmCaliControl_CaliCmd_NONE = 0;
    AvmCaliControl_CaliCmd_START = 1;
