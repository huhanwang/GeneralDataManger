syntax = "proto3";
import "common/common_msg.proto";
package idrive.workflow.proto;

message DbgHandShake_DbgHandShake
{
    uint32 outEPS_Sts_Handshake_u = 1;
    uint32 outESP_Sts_Handshake_en = 2;
    uint32 VeHD_APA_Control_Sts_en = 3;
    bool outAPA_GearReqEnable = 4;
    bool outAPA_GearReqValid = 5;
    uint32 outAPA_GearReq = 6;
    uint32 outAPA_EPBrequest = 7;
    bool outAPA_EPBrequestValid = 8;
