    float box_width = 28;
    float nearside_pos_x = 29;
    float nearside_pos_y = 30;
    float s_gap = 31;
    float l_gap = 32;
    float overlap = 33;
    float ttc = 34;
    float a_lat_req = 35;
    float a_lgt_req = 36;
    float OBJ_debug_reserved3 = 37;
    float OBJ_debug_reserved4 = 38;
}

message AlgDebugAeb_AlgDebugAEB
{
    AlgDebugHeader header = 1;
    AlgDebugSoftwareInfo software_info = 2;
    AlgDebugAeb_AlgDebugAEBInfo aeb_info = 3;
    AlgDebugAeb_AlgDebugFCWInfo fcw_info = 4;
    AlgDebugAeb_AlgDebugAEBEgoInfo ego_info = 5;
    repeated AlgDebugAeb_AlgDebugAEBObstacle obstacles = 6;
}

message AlgDebugAebMsg
{
    CommonMsgMsg common_msg = 1;
    AlgDebugAeb_AlgDebugAEB alg_debug_aeb = 2;
}

