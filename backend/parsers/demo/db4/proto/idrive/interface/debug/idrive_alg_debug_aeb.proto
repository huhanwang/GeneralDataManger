message AlgDebugAeb_AlgDebugAEBObstacle
{
    uint32 obs_scene = 2;
    uint32 fct_scene_type = 3;
    uint32 motion_type = 4;
    uint32 type = 5;
    uint32 sub_type = 6;
    uint32 side_near = 7;
    uint32 pos_type = 8;
    uint32 select_in_path = 9;
    uint32 possible_manoeuvres = 10;
    uint32 OBJ_debug_reserved1 = 11;
    uint32 OBJ_debug_reserved2 = 12;
    bool use_predict_long = 13;
    bool use_predict_short = 14;
    bool inpath_predict_long = 15;
    bool inpath_predict_short = 16;
    bool inpath_current_long = 17;
    bool inpath_current_short = 18;
    bool use_strict_inpath_short = 19;
    bool use_strict_inpath_long = 20;
