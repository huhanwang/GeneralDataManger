syntax = "proto3";
import "common/common_msg.proto";
import "interface/debug/idrive_debug_common.proto";
package idrive.workflow.proto;

message AlgDebugAeb_PathEstimateSeg
{
    float p0_lgt = 1;
    float p0_lat = 2;
    float p1_lgt = 3;
    float p1_lat = 4;
    float p2_lgt = 5;
    float p2_lat = 6;
    float p3_lgt = 7;
    float p3_lat = 8;
}

