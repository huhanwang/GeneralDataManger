    bool aeb_hold_request = 13;
    bool aeb_epb_request = 14;
    bool aeb_hba_request = 15;
    bool fullbrake_threat = 16;
    bool prebrake_threat = 17;
    bool prefill_threat = 18;
    bool eba_threat = 19;
    bool hba_threat = 20;
    bool ugly_prim_tar_aeb = 21;
    bool steer_threat_fb = 22;
    bool steer_threat_pb = 23;
    bool aeb_debug_reserved5 = 24;
    bool aeb_debug_reserved6 = 25;
    uint32 aeb_target_id = 4;
    uint32 aeb_unavailable_reason = 26;
    uint32 aeb_quit_reason = 27;
    uint32 aeb_suppression_reason = 28;
