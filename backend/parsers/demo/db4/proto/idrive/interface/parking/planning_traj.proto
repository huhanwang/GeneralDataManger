syntax = "proto3";
import "common/common_msg.proto";
package idrive.workflow.proto;

enum PlanningTraj_PlanningStatus
{
    PlanningTraj_PlanningStatus_SUCCESS_NEAR_THE_END = 0;
    PlanningTraj_PlanningStatus_SUCCESS_ON_THE_WAY = 1;
    PlanningTraj_PlanningStatus_FAIL_USE_HISTORY = 2;
    PlanningTraj_PlanningStatus_FAIL_HISTORY_COLLIDE = 3;
    PlanningTraj_PlanningStatus_PLANNING_INVALID = 100;
}

message PlanningTraj_PlanningPoint
{
    sint64 timestamp = 1;
    float x = 2;
    float y = 3;
    float z = 4;
    float yaw = 5;
    float pitch = 6;
    float roll = 7;
    float s = 8;
    float l = 9;
    float k = 10;
    float speed = 11;
    float acc = 12;
    float jerk = 13;
    float speed_limit = 14;
    sint32 gear = 15;
    sint32 direction = 16;
    sint32 detect_status = 17;
    float dk_ds = 18;
    float dl_ds = 19;
    float ddl_ds2 = 20;
    float ds_dt = 21;
    float dds_dt2 = 22;
}

message PlanningTraj_Traj
{
    repeated PlanningTraj_PlanningPoint trajectory = 1;
    uint32 num_trajectory = 2;
    PlanningTraj_PlanningStatus planning_status = 3;
    sint32 method = 4;
}

message PlanningTrajMsg
{
    CommonMsgMsg common_msg = 1;
    PlanningTraj_Traj planning_traj = 2;
}

