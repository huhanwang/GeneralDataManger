syntax = "proto3";
import "common/common_msg.proto";
package idrive.workflow.proto;

message PlanTrajToMcu_CtrlPointToMcu
{
    float time = 1;
    float x = 2;
    float y = 3;
    float yaw = 4;
    float s = 5;
    float kappa = 6;
    float speed = 7;
    float acc = 8;
}

message PlanTrajToMcu_PlanTrajToMcu
{
    repeated PlanTrajToMcu_CtrlPointToMcu track_to_mcu = 1;
    uint32 num_trajectory = 2;
    sint32 last_driving_flag = 3;
}

message PlanTrajToMcuMsg
{
    CommonMsgMsg common_msg = 1;
    PlanTrajToMcu_PlanTrajToMcu plan_traj = 2;
}

