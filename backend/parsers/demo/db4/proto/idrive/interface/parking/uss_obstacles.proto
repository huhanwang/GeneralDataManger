message UssObstacles_PerFusUssObj
{
    uint32 uss_obj_x_id_ui8 = 1;
    uint32 uss_obj_x_cfd_ui8 = 2;
    UssObstacles_UssObjXTypeEn uss_obj_x_type_en = 3;
    UssObstacles_UssObjXExternTypeEn uss_obj_x_ext_type_en = 4;
    uint32 uss_obj_height_cfd = 16;
    sint64 finish_timestamp_si64 = 5;
    UssObstacles_UssObjXHeightEn uss_obj_x_height_en = 6;
    UssObstacles_UssObjXOnCourseEn uss_obj_x_on_course_en = 7;
    uint32 uss_obj_start_index = 8;
    uint32 uss_obj_end_index = 9;
    uint32 tracking_time = 17;
    uint32 life_time = 18;
    UssPointSi16 uss_obj_x_pos_1 = 10;
    UssPointSi16 uss_obj_x_pos_2 = 11;
    UssPointSi16 uss_obj_world_pos_1 = 12;
    UssPointSi16 uss_obj_world_pos_2 = 13;
    UssPointSi16 uss_obj_x_err_pos_1 = 14;
    UssPointSi16 uss_obj_x_err_pos_2 = 15;
}

message UssObstacles_PerFusUSSPointCluster
{
    uint32 num_uss_objs_points = 1;
    sint64 cluster_send_timestamp_si64 = 2;
    repeated UssPointWholeSi16 uss_obj_points = 3;
}

message UssObstacles_RadarStatus
{
    uint32 rada_dis_xx = 1;
    uint32 rada_dis_xy = 2;
    uint32 rada_dis_xz = 3;
    uint32 rada_err = 4;
    sint64 de_first_timestamp = 5;
    uint32 de_first_level = 6;
    uint32 de_first_width = 7;
    uint32 de_first_id = 8;
    uint32 de_second_level = 9;
    uint32 de_second_width = 10;
    uint32 de_second_id = 11;
    uint32 de_second_dis = 12;
    uint64 de_second_timestamp = 13;
    uint64 ce_right_first_timestamp = 14;
    uint64 ce_left_first_timestamp = 15;
    uint64 ce_right_second_timestamp = 16;
    uint64 ce_left_second_timestamp = 17;
    uint32 ce_right_first_id = 18;
    uint32 ce_left_first_id = 19;
    uint32 ce_right_second_id = 20;
    uint32 ce_left_second_id = 21;
    uint32 de_right_second_dis = 22;
    uint32 de_left_second_dis = 23;
}

message UssObstacles_UssObstacles
{
    sint32 version = 1;
    uint32 num_uss_header = 2;
    uint32 num_uss_obj = 3;
    uint32 num_radar_status = 4;
    repeated PerFusUssHeader uss_header = 5;
    UssObstacles_PerFusUSSPointCluster uss_objs_cluster_points = 6;
    repeated UssObstacles_PerFusUssObj uss_obj = 7;
    UssStateMachine state_machine = 8;
    sint64 sensor_stamp = 9;
    sint64 sample_stamp = 10;
    repeated UssObstacles_RadarStatus radar_states = 11;
}

message UssObstaclesMsg
{
    CommonMsgMsg common_msg = 1;
    UssObstacles_UssObstacles uss_obstacles = 2;
}

