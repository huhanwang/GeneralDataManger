syntax = "proto3";
import "common/common_msg.proto";
import "type/basic.proto";
import "type/common_type.proto";
import "type/uss_base.proto";
package idrive.workflow.proto;

enum FusionObstacle_FusionObstacleType
{
    FusionObstacle_FusionObstacleType_kVehicle = 0;
    FusionObstacle_FusionObstacleType_kPedestrain = 1;
    FusionObstacle_FusionObstacleType_kCyclist = 2;
    FusionObstacle_FusionObstacleType_kAnimal = 3;
    FusionObstacle_FusionObstacleType_kCyclistNoPed = 4;
    FusionObstacle_FusionObstacleType_kTrafficCone = 50;
    FusionObstacle_FusionObstacleType_kCementColumn = 51;
    FusionObstacle_FusionObstacleType_kParkingLock = 52;
    FusionObstacle_FusionObstacleType_kAFrameSign = 53;
    FusionObstacle_FusionObstacleType_kCurb = 54;
    FusionObstacle_FusionObstacleType_kFence = 55;
    FusionObstacle_FusionObstacleType_kWaterBarrier = 56;
    FusionObstacle_FusionObstacleType_kTrolley = 57;
    FusionObstacle_FusionObstacleType_kWall = 58;
    FusionObstacle_FusionObstacleType_kParkLimiter = 59;
    FusionObstacle_FusionObstacleType_kParkLimiterPole = 60;
    FusionObstacle_FusionObstacleType_kSpeedBump = 61;
    FusionObstacle_FusionObstacleType_kRodeEdge = 62;
    FusionObstacle_FusionObstacleType_kTrafficBollard = 63;
    FusionObstacle_FusionObstacleType_kMovableObstacle = 64;
    FusionObstacle_FusionObstacleType_kImmovableObstacle = 65;
    FusionObstacle_FusionObstacleType_kUnknown = 100;
}

enum FusionObstacle_FusionObstacleStaticSubType
{
    FusionObstacle_FusionObstacleStaticSubType_kParkLockTypeUnknown = 0;
    FusionObstacle_FusionObstacleStaticSubType_kParkLockTypeOpen = 1;
    FusionObstacle_FusionObstacleStaticSubType_kParkLockTypeClose = 2;
    FusionObstacle_FusionObstacleStaticSubType_kFireHydrantTypeAir = 3;
    FusionObstacle_FusionObstacleStaticSubType_kFireHydrantTypeGnd = 4;
}

message FusionObstacle_TwoPoints
{
    Vector3f pos1 = 1;
    Vector3f pos2 = 2;
}

message FusionObstacle_USSObjId
{
    uint32 uss_obj_id = 1;
    uint32 uss_point_start_index = 2;
    uint32 uss_point_end_index = 3;
    TrackingStatus tracking_status = 4;
    uint32 age = 5;
}

message FusionObstacle_FusionObstacleOutPut
{
    uint32 age = 1;
    bool is_updated = 2;
    uint32 sensor_source = 3;
    CipvType cipv_type = 4;
    CutType cut_type = 5;
    uint32 id = 6;
    uint32 tracking_count = 7;
    uint32 vision_id = 8;
    uint32 detect_type = 38;
    uint32 num_uss_obj_id = 39;
    uint32 uss_age = 42;
    uint32 f_radar_id = 10;
    uint32 fr_radar_id = 11;
    uint32 rr_radar_id = 12;
    uint32 rl_radar_id = 13;
    uint32 fl_radar_id = 14;
    Vector3f pos = 15;
    Vector3f vel = 16;
    Vector3f acc = 17;
    float heading = 18;
    float obstacle_conf = 19;
    float width = 20;
    float length = 21;
    float height = 22;
    FusionObstacle_FusionObstacleType type = 23;
    VehicleSubType veh_sub_type = 24;
    FusionObstacle_FusionObstacleStaticSubType static_sub_type = 25;
    MotionStatus motion_state = 26;
    PedestrianSubtype pedestrian_subtype = 27;
    PedestrianOrientation pedestrian_orientation = 28;
    BrakeIndicator brake_indicator = 29;
    TurnIndicator turn_indicator = 30;
    LaneAssignment lane_assignment = 31;
    TrackingStatus tracking_status = 32;
    uint32 uss_obj_start_index = 33;
    uint32 uss_obj_end_index = 34;
    FusionObstacle_TwoPoints uss_pos = 35;
    Vector3f vel_abs = 36;
    Vector3f acc_abs = 37;
    repeated FusionObstacle_USSObjId uss_obj_id = 41;
}

message FusionObstacle_FusionObstacles
{
    sint64 timestamp = 1;
    uint32 num_uss_objs_points = 2;
    uint32 num_obstacle_list = 3;
    repeated FusionObstacle_FusionObstacleOutPut obstacle_list = 4;
    repeated UssPointWholeSi16 uss_obj_points = 5;
}

message FusionObstacleMsg
{
    CommonMsgMsg common_msg = 1;
    FusionObstacle_FusionObstacles fusion_obstacle = 2;
}

