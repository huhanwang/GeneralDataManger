syntax = "proto3";
import "common/common_msg.proto";
package idrive.workflow.proto;

enum UssDiagnose_FailedReason
{
    UssDiagnose_FailedReason_NONE = 0;
    UssDiagnose_FailedReason_POWER = 1;
    UssDiagnose_FailedReason_EEPROM = 2;
    UssDiagnose_FailedReason_Reserved = 3;
}

message UssDiagnose_ErrorFlag
{
    bool rsr_error = 1;
    bool rrm_error = 2;
    bool rlm_error = 3;
    bool rsl_error = 4;
    bool fsl_error = 5;
    bool flm_error = 6;
    bool frm_error = 7;
    bool fsr_error = 8;
    bool fr_error = 9;
    bool fl_error = 10;
    bool rl_error = 11;
    bool rr_error = 12;
}

message UssDiagnose_ErrorCode
{
    uint32 rsr = 1;
    uint32 rrm = 2;
    uint32 rlm = 3;
    uint32 rsl = 4;
    uint32 fsl = 5;
    uint32 flm = 6;
    uint32 frm = 7;
    uint32 fsr = 8;
    uint32 fr = 9;
    uint32 fl = 10;
    uint32 rl = 11;
    uint32 rr = 12;
}

message UssDiagnose_Diagnose
{
    uint32 req = 1;
    uint32 type = 2;
    UssDiagnose_FailedReason failure = 3;
    UssDiagnose_ErrorFlag error_flag = 4;
    UssDiagnose_ErrorCode error_code = 5;
}

message UssDiagnoseMsg
{
    CommonMsgMsg common_msg = 1;
    UssDiagnose_Diagnose diagnose = 2;
}

