    FusionParkingInfo_ParsingType_LANE_LINE = 1;
    FusionParkingInfo_ParsingType_PARKING_LINE = 2;
    FusionParkingInfo_ParsingType_PARKING_SLOT = 3;
    FusionParkingInfo_ParsingType_ARROW = 4;
    FusionParkingInfo_ParsingType_GUIDE_LINE = 5;
    FusionParkingInfo_ParsingType_CROSSWALK_LINE = 6;
    FusionParkingInfo_ParsingType_NO_PARKING_LINE = 7;
    FusionParkingInfo_ParsingType_STOP_LINE = 8;
    FusionParkingInfo_ParsingType_SPEED_BUMP = 9;
    FusionParkingInfo_ParsingType_OTHERS = 10;
    FusionParkingInfo_ParsingType_PARKING_LOCK_OPEN = 11;
    FusionParkingInfo_ParsingType_PARKING_LOCK_CLOSED = 12;
    FusionParkingInfo_ParsingType_TRAFFIC_CONE = 13;
    FusionParkingInfo_ParsingType_PARKING_ROD = 14;
    FusionParkingInfo_ParsingType_CURB = 15;
    FusionParkingInfo_ParsingType_CEMENT_COLUMN = 16;
    FusionParkingInfo_ParsingType_IMMOVABLE_OBSTACLE = 17;
    FusionParkingInfo_ParsingType_MOVABLE_OBSTACLE = 18;
    FusionParkingInfo_ParsingType_BACKGROUND = 19;
    FusionParkingInfo_ParsingType_SIDEWALK = 20;
    FusionParkingInfo_ParsingType_PAINTED_WALL_ROOT = 21;
    FusionParkingInfo_ParsingType_PEDESTRIAN = 50;
    FusionParkingInfo_ParsingType_DYNAMIC_OBSTACLE = 51;
    FusionParkingInfo_ParsingType_OBSTACLE_PEDESTRIAN = 52;
    FusionParkingInfo_ParsingType_OBSTACLE_CYCLIST = 53;
    FusionParkingInfo_ParsingType_STOPPED_VEHICLE = 54;
    FusionParkingInfo_ParsingType_MOVING_VEHICLE = 55;
    FusionParkingInfo_ParsingType_USS_OBJ = 27;
    FusionParkingInfo_ParsingType_USS_CROSSPOINT = 28;
    FusionParkingInfo_ParsingType_UNKNOWN = 100;
    FusionParkingInfo_ParsingType_MONO_ROAD = 110;
    FusionParkingInfo_ParsingType_MONO_IMMOVABLE_OBSTACLE = 120;
    FusionParkingInfo_ParsingType_MONO_MOVABLE_OBSTACLE = 130;
