enum FusionParkingInfo_PtCloudSource
{
    FusionParkingInfo_PtCloudSource_POINT_MAP = 0;
    FusionParkingInfo_PtCloudSource_POINT_USS = 1;
    FusionParkingInfo_PtCloudSource_POINT_PARSING = 2;
    FusionParkingInfo_PtCloudSource_OBJ_USS_PT = 3;
    FusionParkingInfo_PtCloudSource_OBJ_USS_TWO_PT = 4;
    FusionParkingInfo_PtCloudSource_POINT_REAL3D = 5;
