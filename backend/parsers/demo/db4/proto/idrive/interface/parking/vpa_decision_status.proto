syntax = "proto3";
import "common/common_msg.proto";
package idrive.workflow.proto;

enum VpaDecisionStatus_VpaControlCmdType
{
    VpaDecisionStatus_VpaControlCmdType_STANDBY = 0;
    VpaDecisionStatus_VpaControlCmdType_NORMAL = 1;
    VpaDecisionStatus_VpaControlCmdType_GOAL = 2;
    VpaDecisionStatus_VpaControlCmdType_INTERRUPT = 3;
    VpaDecisionStatus_VpaControlCmdType_COMFBRK = 4;
    VpaDecisionStatus_VpaControlCmdType_EMERGBRK = 5;
    VpaDecisionStatus_VpaControlCmdType_APAINCHARGE = 6;
