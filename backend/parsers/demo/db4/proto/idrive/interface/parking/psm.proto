syntax = "proto3";
import "common/common_msg.proto";
import "type/system_type_base.proto";
package idrive.workflow.proto;

enum Psm_ApsWorkSts
{
    Psm_ApsWorkSts_Disable = 0;
    Psm_ApsWorkSts_Standby = 1;
    Psm_ApsWorkSts_Searching = 2;
    Psm_ApsWorkSts_Guidance = 3;
    Psm_ApsWorkSts_Completed = 4;
    Psm_ApsWorkSts_Failed = 5;
    Psm_ApsWorkSts_Pause = 6;
    Psm_ApsWorkSts_Terminated = 7;
    Psm_ApsWorkSts_Restart = 8;
}

enum Psm_FadsFuncSts
{
    Psm_FadsFuncSts_Standby = 0;
    Psm_FadsFuncSts_Active = 1;
    Psm_FadsFuncSts_Disable = 2;
    Psm_FadsFuncSts_Reserved = 3;
}

enum Psm_RadsFuncSts
{
    Psm_RadsFuncSts_Standby = 0;
    Psm_RadsFuncSts_Active = 1;
    Psm_RadsFuncSts_Disable = 2;
    Psm_RadsFuncSts_Reserved = 3;
}

