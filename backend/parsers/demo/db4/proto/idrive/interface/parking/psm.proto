{
    Psm_VcuReadyReqType_VCUREADY_REQUEST_NONE = 0;
    Psm_VcuReadyReqType_VCUREADY_REQUEST_ON = 1;
    Psm_VcuReadyReqType_VCUREADY_REQUEST_OFF = 2;
    Psm_VcuReadyReqType_VCUREADY_REQUEST_HOLD = 3;
}

message Psm_StateMachine
{
    Psm_ApsWorkSts aps_work_sts = 1;
    Psm_FadsFuncSts fads_func_sts = 2;
    Psm_RadsFuncSts rads_funct_sts = 3;
    Psm_FunctWorkSts funct_work_sts = 4;
    Psm_ApaState apa_state = 5;
    Psm_VpaState vpa_state = 6;
    Psm_VpaStateFunctionType vpa_state_ft = 7;
    TraStateDetailType tra_state = 8;
    NpaStateDetailType npa_state = 9;
    Psm_VcuReadyReqType vcu_ready_req = 10;
    uint32 odo_reset = 11;
    uint32 odo_reset_count = 12;
}

message PsmMsg
{
    CommonMsgMsg common_msg = 1;
    Psm_StateMachine state_machine = 2;
}

