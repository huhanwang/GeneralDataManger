{
    Psm_VpaStateFunctionType_VpaState_FunctionType_FUNCTION_TYPE_NONE = 0;
    Psm_VpaStateFunctionType_VpaState_FunctionType_FUNCTION_TYPE_MAP = 1;
    Psm_VpaStateFunctionType_VpaState_FunctionType_FUNCTION_TYPE_VPA = 2;
}

