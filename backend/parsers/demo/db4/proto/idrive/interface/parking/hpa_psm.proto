}

message ApaPlanExit
{
    ApaPlanningErrorCode plan_error_code = 1;
    ApaControlErrorCode control_error_code = 2;
    ApaDecisionErrorCode decision_error_code = 3;
}

message PlanState
{
    PlanStateType type = 1;
    PlanStateSource state_source = 2;
    PlanExitReason exit_reason = 3;
    PlanPauseReason pause_reason = 4;
    CtrlStateType ctrl_state = 5;
    HandShakableType handshakable = 6;
    ParkingWorkingStatus parking_working_status = 7;
    CornerSlotType corner_slot = 8;
    sint64 error_code = 9;
    ApaPlanExit apa_plan_exit = 10;
}

message HpaToStateMachineMsg
{
    CommonMsgMsg common_msg = 1;
    PlanState plan_state = 2;
}

