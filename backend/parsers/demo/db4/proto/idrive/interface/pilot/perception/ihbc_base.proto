syntax = "proto3";
import "type/basic.proto";
package idrive.workflow.proto;

enum IhbcReason
{
    IhbcReason_IHBC_REASON_NONE = 0;
    IhbcReason_IHBC_REASON_ONCOMING = 1;
    IhbcReason_IHBC_REASON_PRECEDING = 2;
    IhbcReason_IHBC_REASON_STREETLIGHT = 4;
}

message LightSource
{
    Rect rect = 1;
    sint32 type = 2;
    float pos_x = 3;
    float pos_y = 4;
    float left_angle = 5;
    float right_angle = 6;
    sint32 id = 7;
    float confidence = 8;
    bool valid = 9;
    float pos_z = 10;
    sint32 veh_type = 11;
    float lumens = 12;
    float up_angle = 13;
    float bottom_angle = 14;
    float angle_velocity = 15;
    sint32 vehicle_id = 16;
    float distance = 17;
    sint32 age = 18;
    sint32 cyclist_id = 19;
}

message IhbcResult
{
    bool light_on = 1;
    float cal_lux_up = 2;
    uint32 num_light_source = 3;
    uint32 num_light_source_raw = 4;
    repeated LightSource light_source = 5;
    repeated LightSource light_source_raw = 6;
    sint32 cam_id = 7;
    sint32 frame_id = 8;
    sint64 time_stamp = 9;
    sint32 object_num = 10;
    float lux = 11;
    sint64 refer_time = 12;
    IhbcReason light_reason = 13;
}

