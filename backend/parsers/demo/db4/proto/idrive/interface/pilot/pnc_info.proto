message PncInfo_FuncIccCtrlDebug
{
    float torque_req_raw = 1;
    float ctrl_force_ff = 2;
    float ctrl_force_fb_p = 3;
    float ctrl_force_fb_i = 4;
    float current_slope = 5;
    float preview_curvature = 6;
    float preview_lat_error = 7;
    float preview_lat_v_error = 8;
    float preview_heading_error = 9;
    float preview_heading_v_error = 10;
    float ff_angle_output = 11;
    float fb_angle_output = 12;
    float fb_p_angle_output = 13;
    float fb_i_angle_output = 14;
    float fb_d_angle_output = 15;
    float steer_angle_lat_err = 16;
    float steer_angle_lat_v_err = 17;
    float steer_angle_heading_err = 18;
    float steer_angle_heading_v_err = 19;
    uint32 lqr_num_iter = 20;
}

message PncInfo_FuncIccDebug
{
    PncInfo_FuncIccPlanDebug plan_debug = 1;
    PncInfo_FuncIccCtrlDebug ctrl_debug = 2;
}

message PncInfo_PilotPncDebugInfo
{
    uint32 sequence = 1;
    uint32 time_consumption = 2;
    uint32 build_time = 3;
    PncInfo_FuncIccDebug icc_debug = 4;
}

message PncInfoMsg
{
    CommonMsgMsg common_msg = 1;
    PncInfo_PilotPncDebugInfo pilot_pnc_debug = 2;
}

