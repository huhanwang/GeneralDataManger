    float left_tgt_l_gap = 16;
    float left_tgt_time_buffer = 17;
    float left_tgt_desired_s_gap = 18;
    float left_tgt_vs = 19;
    float left_tgt_abs_a = 20;
    float right_tgt_s_gap = 21;
    float right_tgt_l_gap = 22;
    float right_tgt_time_buffer = 23;
    float right_tgt_desired_s_gap = 24;
    float right_tgt_vs = 25;
