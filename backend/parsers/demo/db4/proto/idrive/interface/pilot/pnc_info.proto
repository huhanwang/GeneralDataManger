syntax = "proto3";
import "common/common_msg.proto";
package idrive.workflow.proto;

enum PncInfo_LaneChangeState
{
    PncInfo_LaneChangeState_LC_STATE_COMPLETED = 0;
    PncInfo_LaneChangeState_LC_STATE_PREPARE_LEFT = 1;
    PncInfo_LaneChangeState_LC_STATE_PREPARE_RIGHT = 2;
    PncInfo_LaneChangeState_LC_STATE_ACTIVE_LEFT = 3;
    PncInfo_LaneChangeState_LC_STATE_ACTIVE_RIGHT = 4;
    PncInfo_LaneChangeState_LC_STATE_CANCEL = 5;
}

enum PncInfo_LangeChangeReason
{
    PncInfo_LangeChangeReason_LC_REASON_NONE = 0;
    PncInfo_LangeChangeReason_LC_REASON_DRIVER_REQ = 1;
    PncInfo_LangeChangeReason_LC_REASON_ROUTING_REQ = 2;
    PncInfo_LangeChangeReason_LC_REASON_MERGE = 3;
    PncInfo_LangeChangeReason_LC_REASON_OVERTAKE = 4;
    PncInfo_LangeChangeReason_LC_REASON_HIGHER_SPEED_LIMIT = 5;
    PncInfo_LangeChangeReason_LC_REASON_DRIVER_CANCEL = 6;
    PncInfo_LangeChangeReason_LC_REASON_AUTO_CANCEL = 7;
}

enum PncInfo_LangeChangeCommand
{
    PncInfo_LangeChangeCommand_LC_COMMAND_NONE = 0;
    PncInfo_LangeChangeCommand_LC_COMMAND_LEFT = 1;
    PncInfo_LangeChangeCommand_LC_COMMAND_RIGHT = 2;
    PncInfo_LangeChangeCommand_LC_COMMAND_CANCEL = 3;
}

enum PncInfo_LangeChangeUrgency
{
    PncInfo_LangeChangeUrgency_LC_URGENCY_LV0 = 0;
    PncInfo_LangeChangeUrgency_LC_URGENCY_LV1 = 1;
    PncInfo_LangeChangeUrgency_LC_URGENCY_LV2 = 2;
    PncInfo_LangeChangeUrgency_LC_URGENCY_LV3 = 3;
}

message PncInfo_PathPoint
{
    float x = 1;
    float y = 2;
    float theta = 3;
    float kappa = 4;
    float accum_s = 5;
}

message PncInfo_TrajectoryPoint
{
    float t = 1;
    float v = 2;
    float a = 3;
    PncInfo_PathPoint path_point = 4;
}

